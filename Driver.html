<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>رادار الكابتن | منظومة الحوت 🐋</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #000; color: #fff; overflow-x: hidden; }
        .receipt-card { background: linear-gradient(145deg, #0f172a, #020617); border: 1px solid rgba(251, 191, 36, 0.2); box-shadow: 0 20px 50px rgba(0,0,0,0.5); position: relative; }
        .radar-ping { animation: ping 2s cubic-bezier(0, 0, 0.2, 1) infinite; }
        @keyframes ping { 75%, 100% { transform: scale(2); opacity: 0; } }
        .img-zoom { transition: transform 0.3s; width: 100%; height: auto; border-radius: 1rem; cursor: zoom-in; max-height: 300px; object-fit: contain; }
        .img-zoom:active { transform: scale(1.5); z-index: 100; position: relative; }
        .hidden { display: none !important; }
        .active-mission { border-top: 4px solid #fbbf24; }
        .btn-amber { background: #fbbf24; color: #000; font-weight: 900; }
        .pulse-text { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen pb-10">
    
    <header class="p-5 bg-slate-900 rounded-b-[2.5rem] border-b border-amber-500/30 shadow-2xl flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="relative">
                <div class="absolute inset-0 bg-amber-500 rounded-full radar-ping opacity-20"></div>
                <div class="w-3 h-3 bg-amber-500 rounded-full relative z-10"></div>
            </div>
            <div>
                <h1 class="text-[10px] font-black text-amber-500 italic uppercase tracking-tighter">Whale Pilot Radar V10.3</h1>
                <p id="welcomeName" class="text-xs text-white font-bold italic text-right tracking-wide">جاري الاتصال...</p>
            </div>
        </div>
        <button onclick="logout()" class="text-[10px] bg-red-500/10 text-red-400 px-4 py-2 rounded-xl font-black italic border border-red-500/20 active:scale-90 transition-all">خروج</button>
    </header>

    <main class="p-6">
        <div id="searchingStatus" class="text-center mb-8 py-20">
            <div class="w-24 h-24 border-4 border-amber-500/20 border-t-amber-500 rounded-full animate-spin mx-auto mb-6"></div>
            <p id="radarText" class="text-[11px] text-amber-500 font-black uppercase tracking-[0.4em] italic pulse-text">Calculating Best Route...</p>
            <p class="text-slate-500 text-[10px] mt-4 italic">الرادار يبحث عن طلبات تناسب موقعك ومدة انتظارك</p>
        </div>

        <div id="orderCard" class="receipt-card p-6 rounded-[2.5rem] relative overflow-hidden hidden active-mission">
            <div class="mb-6 flex flex-col items-center border-b border-white/5 pb-6 text-center">
                <span class="text-[8px] bg-amber-500 text-black px-3 py-0.5 rounded-full font-black uppercase mb-3 italic tracking-widest">مهمة مخصصة لك 🎯</span>
                <h2 id="restaurantTitle" class="text-2xl font-black text-white italic tracking-tight">--</h2>
                <div id="orderStatusBadge" class="mt-3 px-4 py-1.5 rounded-full bg-white/5 text-[10px] font-bold text-amber-400 border border-amber-500/20 italic">تم اختيارك بناءً على موقعك</div>
            </div>

            <div id="receiptView" class="hidden space-y-4 mb-6 text-center">
                <p class="text-[9px] text-gray-500 font-black italic uppercase">اضغط للتكبير 🔍</p>
                <img id="receiptImg" src="" class="img-zoom border border-white/10 shadow-2xl">
            </div>

            <div class="space-y-4 mb-8">
                <div class="bg-white/5 p-4 rounded-2xl border border-white/5">
                    <p class="text-[8px] text-gray-500 font-black uppercase italic mb-1">📍 وجهة التوصيل</p>
                    <p id="locationTxt" class="text-sm font-black text-white italic leading-relaxed text-right">--</p>
                </div>
                <div class="bg-white/5 p-4 rounded-2xl border border-white/5 flex justify-between">
                    <div>
                        <p class="text-[8px] text-gray-500 font-black uppercase italic mb-1">💰 الأجرة</p>
                        <p id="feeTxt" class="text-sm font-black text-emerald-400 italic">--</p>
                    </div>
                    <div class="text-left">
                        <p class="text-[8px] text-gray-500 font-black uppercase italic mb-1">⏱️ مدة الانتظار</p>
                        <p id="waitTimer" class="text-sm font-black text-amber-400 italic">00:00</p>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 gap-3">
                <button id="confirmBtn" onclick="updateMission('accepted')" class="btn-amber p-5 rounded-2xl font-black text-sm italic active:scale-95 shadow-lg shadow-amber-500/20">تأكيد الاستلام والتحرك 🏎️</button>
                
                <div id="actionBtns" class="grid grid-cols-2 gap-3 hidden">
                    <button onclick="updateMission('picked')" class="bg-blue-500/20 text-blue-400 p-4 rounded-2xl font-black text-[10px] italic border border-blue-500/20">وصلت للمطعم 📦</button>
                    <button onclick="updateMission('delivered')" class="bg-green-500 text-black p-4 rounded-2xl font-black text-[10px] italic">تم تسليم الطلب 🏁</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbzf4_VqfC5fBq0uK2Hl7S-qR-XlS6Z0T5F8H4-X-Z/exec'; 
        const driverPhone = localStorage.getItem('whale_driver_phone');
        let activeOrderID = null;
        let isProcessing = false;
        let lastUpdate = Date.now();

        if (!driverPhone) window.location.href = "Driver_login.html";

        window.onload = () => {
            document.getElementById('welcomeName').innerText = "كابتن: " + (localStorage.getItem('whale_driver_name') || "طيار الحوت");
            startRadar();
            trackLocation();
            setInterval(updateWaitTimer, 60000); // تحديث عداد الانتظار كل دقيقة
        };

        function updateWaitTimer() {
            if (activeOrderID) return;
            const diff = Math.floor((Date.now() - lastUpdate) / 60000);
            document.getElementById('waitTimer').innerText = diff + " دقيقة";
        }

        async function startRadar() {
            setInterval(async () => {
                if (activeOrderID || isProcessing) return; 

                try {
                    // نرسل طلب "البحث عن مهام" مع بيانات الكابتن الحالية
                    const res = await fetch(`${scriptURL}?action=get_master_data&pass=112233`);
                    const data = await res.json();
                    
                    if (data.status === "success") {
                        // السكريبت V10.3 في الخلفية هو من يقرر من هو الكابتن المناسب ويضع رقمه في خانة driver_phone للطلب
                        const myOrder = data.orders.find(o => String(o.driver_phone) === String(driverPhone) && o.status !== "delivered");
                        
                        if (myOrder) {
                            showOrder(myOrder);
                        }
                    }
                } catch (e) { console.warn("Searching..."); }
            }, 8000);
        }

        function showOrder(order) {
            activeOrderID = order.orderid;
            document.getElementById('searchingStatus').classList.add('hidden');
            document.getElementById('orderCard').classList.remove('hidden');
            document.getElementById('restaurantTitle').innerText = order.restaurant;
            document.getElementById('locationTxt').innerText = `${order.area} - ${order.details}`;
            document.getElementById('feeTxt').innerText = order.fee + " دينار";
            
            if (order.image && order.image !== "") {
                document.getElementById('receiptView').classList.remove('hidden');
                document.getElementById('receiptImg').src = order.image;
            }

            if (order.status === "accepted" || order.status === "picked") {
                document.getElementById('confirmBtn').classList.add('hidden');
                document.getElementById('actionBtns').classList.remove('hidden');
            }
        }

        async function updateMission(newStatus) {
            isProcessing = true;
            try {
                await fetch(scriptURL, {
                    method: 'POST',
                    body: JSON.stringify({ 
                        action: 'update_status', 
                        type: 'Orders', 
                        id: activeOrderID, 
                        status: newStatus,
                        driver_phone: driverPhone // لضمان ربط الإنجاز بالسائق
                    })
                });
                
                if (newStatus === 'delivered') {
                    alert("عاش كابتن! تم تسجيل الطلب في سجل إنجازاتك اليومية 🏁");
                    location.reload();
                } else {
                    document.getElementById('confirmBtn').classList.add('hidden');
                    document.getElementById('actionBtns').classList.remove('hidden');
                }
            } catch (e) { alert("خطأ في التحديث"); }
            isProcessing = false;
        }

        function trackLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(pos => {
                    // إرسال الإحداثيات مع الوقت الحالي لضمان حساب "مدة الانتظار" في الشيت
                    fetch(scriptURL, {
                        method: 'POST',
                        body: JSON.stringify({
                            action: 'update_location',
                            phone: driverPhone,
                            lat: pos.coords.latitude,
                            lng: pos.coords.longitude,
                            last_seen: new Date().toISOString() // مهم جداً لمعرفة مدة الانتظار
                        })
                    });
                }, null, { enableHighAccuracy: true });
            }
        }

        function logout() {
            if(confirm("هل تريد إنهاء نوبة العمل؟")) {
                localStorage.clear();
                window.location.href = "Driver_login.html";
            }
        }
    </script>
</body>
</html>
