<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>مركز قيادة الحوت | Al-Hut Command Center</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root {
            --sidebar-width: 280px;
            --primary-dark: #0f172a;
            --accent-orange: #f97316;
            --bg-light: #f1f5f9;
        }

        body { 
            background-color: var(--bg-light); 
            font-family: 'Cairo', sans-serif; 
            margin: 0; 
            overflow-x: hidden; 
        }

        /* شاشة القفل */
        #authOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0f172a; z-index: 10000; display: flex; align-items: center; justify-content: center;
        }
        .auth-card {
            background: white; border-radius: 30px; padding: 40px; width: 90%; max-width: 400px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2); text-align: center;
        }

        .sidebar {
            width: var(--sidebar-width); background: var(--primary-dark);
            height: 100vh; position: fixed; right: 0; top: 0; color: white; 
            padding: 25px 15px; z-index: 1001; transition: transform 0.3s ease;
        }
        
        .main-content { 
            margin-right: var(--sidebar-width); 
            padding: 30px; 
            min-height: 100vh; 
            transition: margin 0.3s ease;
        }

        .nav-item {
            display: flex; align-items: center; gap: 15px; padding: 15px 20px; color: #94a3b8;
            text-decoration: none; border-radius: 15px; margin-bottom: 10px; cursor: pointer; transition: 0.3s;
        }
        .nav-item:hover, .nav-item.active { background: #1e293b; color: white; }
        .nav-item.active { border-right: 5px solid var(--accent-orange); background: rgba(249, 115, 22, 0.1); }

        .stat-widget {
            background: white; border-radius: 25px; padding: 25px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.02); border: 1px solid #e2e8f0;
            height: 100%; transition: 0.3s;
        }
        .icon-shape { width: 55px; height: 55px; border-radius: 18px; display: flex; align-items: center; justify-content: center; }

        #adminMap { 
            height: 500px; width: 100%; border-radius: 30px; 
            border: 10px solid white; box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            background: #e5e7eb;
        }

        .custom-table-card { 
            background: white; border-radius: 30px; padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.02); border: 1px solid #e2e8f0;
        }

        .sov-btn {
            border: none; border-radius: 10px; width: 35px; height: 35px; 
            display: inline-flex; align-items: center; justify-content: center; transition: 0.2s; cursor: pointer;
        }
        .sov-accept { background: #dcfce7; color: #166534; }
        .sov-pause { background: #fef9c3; color: #854d0e; }
        .sov-delete { background: #fee2e2; color: #ef4444; }
        .sov-call { background: #e0f2fe; color: #0369a1; }

        .smart-order-card {
            background: white; border-radius: 20px; padding: 20px;
            border: 1px solid #e2e8f0; border-right: 6px solid #94a3b8;
            box-shadow: 0 5px 15px rgba(0,0,0,0.03); position: relative; margin-bottom: 20px;
        }
        
        .badge-status { padding: 6px 14px; border-radius: 10px; font-size: 0.8rem; font-weight: bold; }

        @media (max-width: 1100px) {
            .sidebar { transform: translateX(100%); }
            .main-content { margin-right: 0; padding: 20px; }
            .sidebar.show { transform: translateX(0); }
        }
    </style>
</head>
<body>

<div id="authOverlay">
    <div class="auth-card">
        <div class="mb-4"><i data-lucide="shield" size="50" color="#f97316"></i></div>
        <h4 class="fw-black mb-3">تسجيل دخول المسؤول</h4>
        <input type="password" id="masterPass" class="form-control form-control-lg text-center mb-3 shadow-none border-2" placeholder="كلمة المرور السيادية" onkeypress="if(event.key === 'Enter') checkAuth()">
        <button class="btn btn-dark w-100 py-3 fw-bold rounded-4" onclick="checkAuth()">فتح بروتوكول القيادة</button>
    </div>
</div>

<div class="d-none" id="mainDashboard">
    <aside class="sidebar" id="sidebar">
        <div class="d-flex align-items-center gap-3 mb-5 px-3">
            <div class="bg-warning p-2 rounded-3"><i data-lucide="waves" color="#0f172a"></i></div>
            <h4 class="m-0 fw-black">نظام الحوت</h4>
        </div>
        <nav>
            <div class="nav-item active" onclick="showTab(event, 'live')"><i data-lucide="radar"></i> <span>الرصد الحي</span></div>
            <div class="nav-item" onclick="showTab(event, 'orders')"><i data-lucide="shopping-bag"></i> <span>سجل الطلبات</span></div>
            <div class="nav-item" onclick="showTab(event, 'restaurants')"><i data-lucide="store"></i> <span>المطاعم</span></div>
            <div class="nav-item" onclick="showTab(event, 'drivers')"><i data-lucide="user-check"></i> <span>الأسطول</span></div>
        </nav>
    </aside>

    <main class="main-content">
        <header class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="fw-black m-0">لوحة القيادة</h2>
                <p class="text-muted m-0">الحالة الميدانية الآن</p>
            </div>
            <div id="liveTime" class="bg-white px-4 py-2 rounded-pill shadow-sm fw-bold border">00:00:00</div>
        </header>

        <div id="tab-live" class="admin-tab">
            <div class="row g-4 mb-4">
                <div class="col-md-4"><div class="stat-widget">الطلبات: <span id="count-orders">...</span></div></div>
                <div class="col-md-4"><div class="stat-widget">الأسطول: <span id="count-drivers">...</span></div></div>
                <div class="col-md-4"><div class="stat-widget">المطاعم: <span id="count-res">...</span></div></div>
            </div>
            
            <div id="adminMap"></div>

            <div class="mt-5">
                <h4 class="fw-black mb-4"><i data-lucide="activity" class="text-danger"></i> الطلبات النشطة الآن</h4>
                <div class="row" id="smartOrdersContainer">
                    <div class="text-muted p-5 text-center">جاري جلب البيانات الميدانية...</div>
                </div>
            </div>
        </div>

        <div id="tab-orders" class="admin-tab d-none">
            <div class="custom-table-card"><table class="table"><thead><tr><th>ID</th><th>المطعم</th><th>الحالة</th></tr></thead><tbody id="ordersTableBody"></tbody></table></div>
        </div>
        <div id="tab-restaurants" class="admin-tab d-none"><div class="row" id="resListContainer"></div></div>
        <div id="tab-drivers" class="admin-tab d-none"><div class="row" id="driverListContainer"></div></div>
    </main>
</div>

<script>
    // تهيئة الأيقونات فوراً
    lucide.createIcons();

    const API_URL = "https://script.google.com/macros/s/AKfycbwIELSbF-1Fioo5mTwhsJw4jZ3MRcAgOY5G43ma1vDu6OkOHvItLH3HOOCSZAguWd0Ssw/exec";
    
    function checkAuth() {
        const pass = document.getElementById('masterPass').value;
        if(pass === "223344") {
            // تنفيذ الإجراءات فوراً لمنع الشعور بالجمود
            document.getElementById('authOverlay').style.display = 'none';
            document.getElementById('mainDashboard').classList.remove('d-none');
            
            // تشغيل المحركات
            startClock();
            refreshData(); 
            setInterval(refreshData, 20000); // تحديث كل 20 ثانية
        } else {
            alert("⚠️ رمز الدخول غير صحيح، حاول مجدداً سيادة المدير.");
        }
    }

    function startClock() {
        setInterval(() => {
            document.getElementById('liveTime').innerText = new Date().toLocaleTimeString('ar-EG');
        }, 1000);
    }

    function refreshData() {
        console.log("جاري تحديث البيانات من السيرفر...");
        const script = document.createElement('script');
        // استخدام JSONP لتجنب مشاكل الـ CORS
        script.src = `${API_URL}?action=getGlobalData&callback=renderData&ts=${Date.now()}`;
        script.onerror = () => console.error("فشل في الاتصال بالسيرفر. تأكد من نشر السكربت كـ Web App.");
        document.body.appendChild(script);
    }

    window.renderData = function(data) {
        try {
            if(!data || !data.orders) throw new Error("بيانات ناقصة");

            // تحديث العدادات
            document.getElementById('count-orders').innerText = data.orders.length - 1;
            document.getElementById('count-drivers').innerText = data.drivers.length - 1;
            document.getElementById('count-res').innerText = data.restaurants.length - 1;

            // تحديث حاوية الطلبات الذكية
            let smartHtml = '';
            let activeOrders = data.orders.slice(1).filter(o => o[6] !== 'completed' && o[6] !== 'مكتمل');

            if(activeOrders.length === 0) {
                smartHtml = '<div class="col-12 text-center p-5 text-muted">لا توجد طلبات نشطة حالياً.</div>';
            } else {
                activeOrders.forEach(o => {
                    smartHtml += `
                    <div class="col-md-6">
                        <div class="smart-order-card">
                            <h5 class="fw-bold">طلب #${o[1]}</h5>
                            <p class="mb-2">المطعم: ${o[2]} | الحالة: <span class="badge bg-primary">${o[6]}</span></p>
                            <div class="d-flex gap-2">
                                <button class="btn btn-sm btn-outline-dark" onclick="window.open('tel:${o[4]||''}')">اتصال بالزبون</button>
                                <button class="btn btn-sm btn-dark">تتبع المسار</button>
                            </div>
                        </div>
                    </div>`;
                });
            }
            document.getElementById('smartOrdersContainer').innerHTML = smartHtml;
            
            // تحديث الأيقونات الجديدة
            lucide.createIcons();

        } catch (err) {
            console.error("خطأ في معالجة البيانات:", err);
        }
    };

    function showTab(e, name) {
        document.querySelectorAll('.admin-tab').forEach(t => t.classList.add('d-none'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('tab-' + name).classList.remove('d-none');
        e.currentTarget.classList.add('active');
        lucide.createIcons();
    }
</script>

<script async defer src="https://maps.googleapis.com/maps/api/js?callback=initMap"></script>
<script>
    function initMap() {
        const map = new google.maps.Map(document.getElementById("adminMap"), {
            zoom: 13, center: { lat: 35.468, lng: 44.392 },
        });
    }
</script>

</body>
</html>
