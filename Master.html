<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>مركز قيادة الحوت | Al-Hut Command Center</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root {
            --sidebar-width: 280px;
            --primary-dark: #0f172a;
            --accent-orange: #f97316;
            --bg-light: #f1f5f9;
        }

        body { 
            background-color: var(--bg-light); 
            font-family: 'Cairo', sans-serif; 
            margin: 0; 
            overflow-x: hidden; 
        }

        /* شاشة القفل المحسنة */
        #authOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0f172a; z-index: 10000; display: flex; align-items: center; justify-content: center;
        }
        .auth-card {
            background: white; border-radius: 30px; padding: 40px; width: 90%; max-width: 400px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2); text-align: center;
        }

        /* الهيكل الجانبي - منع التداخل */
        .sidebar {
            width: var(--sidebar-width); background: var(--primary-dark);
            height: 100vh; position: fixed; right: 0; top: 0; color: white; 
            padding: 25px 15px; z-index: 1001; transition: transform 0.3s ease;
        }
        
        .main-content { 
            margin-right: var(--sidebar-width); 
            padding: 30px; 
            min-height: 100vh; 
            transition: margin 0.3s ease;
        }

        /* قائمة التنقل */
        .nav-item {
            display: flex; align-items: center; gap: 15px; padding: 15px 20px; color: #94a3b8;
            text-decoration: none; border-radius: 15px; margin-bottom: 10px; cursor: pointer; transition: 0.3s;
        }
        .nav-item:hover, .nav-item.active { background: #1e293b; color: white; }
        .nav-item.active { border-right: 5px solid var(--accent-orange); background: rgba(249, 115, 22, 0.1); }

        /* الكروت والويدجت */
        .stat-widget {
            background: white; border-radius: 25px; padding: 25px; 
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.02); border: 1px solid #e2e8f0;
            height: 100%; transition: 0.3s;
        }
        .icon-shape { width: 55px; height: 55px; border-radius: 18px; display: flex; align-items: center; justify-content: center; }

        /* خريطة ذكية */
        #adminMap { 
            height: 500px; width: 100%; border-radius: 30px; 
            border: 10px solid white; box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        /* جداول مستجيبة */
        .custom-table-card { 
            background: white; border-radius: 30px; padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.02); border: 1px solid #e2e8f0;
        }
        .table thead th { background: #f8fafc; border: none; padding: 20px; font-weight: 700; color: #64748b; }
        .table tbody td { padding: 20px; vertical-align: middle; border-bottom: 1px solid #f1f5f9; }

        .badge-status { padding: 6px 14px; border-radius: 10px; font-size: 0.8rem; font-weight: bold; }

        /* موبايل وتصحيح التداخل */
        @media (max-width: 1100px) {
            .sidebar { transform: translateX(100%); }
            .main-content { margin-right: 0; padding: 20px; }
            .sidebar.show { transform: translateX(0); }
            .menu-toggle { display: block !important; }
        }

        .menu-toggle {
            display: none; position: fixed; bottom: 20px; left: 20px; 
            width: 60px; height: 60px; background: var(--accent-orange);
            color: white; border-radius: 50%; border: none; z-index: 2000;
            box-shadow: 0 10px 20px rgba(249, 115, 22, 0.4);
        }

        /* أزرار الإجراءات */
        .btn-action {
            background: #fee2e2; color: #ef4444; border: none; border-radius: 10px;
            width: 32px; height: 32px; display: inline-flex; align-items: center; justify-content: center;
            transition: 0.2s;
        }
        .btn-action:hover { background: #ef4444; color: white; }
    </style>
</head>
<body>

<div id="authOverlay">
    <div class="auth-card">
        <div class="mb-4"><i data-lucide="lock" size="50" color="#f97316"></i></div>
        <h4 class="fw-black mb-3">تسجيل دخول المسؤول</h4>
        <input type="password" id="masterPass" class="form-control form-control-lg text-center mb-3 shadow-none border-2" placeholder="كلمة المرور">
        <button class="btn btn-dark w-100 py-3 fw-bold rounded-4" onclick="checkAuth()">دخول النظام</button>
    </div>
</div>

<button class="menu-toggle" onclick="toggleSidebar()"><i data-lucide="menu"></i></button>

<div class="d-none" id="mainDashboard">
    <aside class="sidebar" id="sidebar">
        <div class="d-flex align-items-center gap-3 mb-5 px-3">
            <div class="bg-warning p-2 rounded-3"><i data-lucide="waves" color="#0f172a"></i></div>
            <h4 class="m-0 fw-black">نظام الحوت</h4>
        </div>
        <nav>
            <div class="nav-item active" onclick="showTab(event, 'live')"><i data-lucide="radar"></i> <span>الرصد الحي</span></div>
            <div class="nav-item" onclick="showTab(event, 'orders')"><i data-lucide="shopping-bag"></i> <span>الطلبات</span></div>
            <div class="nav-item" onclick="showTab(event, 'restaurants')"><i data-lucide="store"></i> <span>المطاعم</span></div>
            <div class="nav-item" onclick="showTab(event, 'drivers')"><i data-lucide="user-check"></i> <span>الكباتن</span></div>
        </nav>
        <div style="position: absolute; bottom: 30px; width: calc(100% - 30px);">
            <div class="nav-item text-danger" onclick="location.reload()"><i data-lucide="log-out"></i> <span>تسجيل خروج</span></div>
        </div>
    </aside>

    <main class="main-content">
        <header class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
            <div>
                <h2 class="fw-black m-0">لوحة القيادة</h2>
                <p class="text-muted m-0">متابعة الأسطول - كركوك</p>
            </div>
            <div id="liveTime" class="bg-white px-4 py-2 rounded-pill shadow-sm fw-bold border">00:00:00</div>
        </header>

        <div id="tab-live" class="admin-tab">
            <div class="custom-table-card mb-4 d-flex flex-wrap align-items-center gap-3">
                <div class="bg-primary bg-opacity-10 p-2 rounded-circle text-primary"><i data-lucide="megaphone"></i></div>
                <h6 class="m-0 fw-bold">بث أمر للأسطول:</h6>
                <input type="text" id="adminMsg" class="form-control bg-light border-0 rounded-pill px-4 flex-grow-1 shadow-none" placeholder="اكتب التعليمات لتظهر فوراً لدى جميع الكباتن...">
                <button class="btn btn-dark rounded-pill px-4 fw-bold" onclick="sendBroadcast()">إرسال الأمر</button>
            </div>

            <div class="row g-4 mb-4">
                <div class="col-xl-4 col-md-6">
                    <div class="stat-widget">
                        <div><small class="text-muted fw-bold">إجمالي الطلبات</small><h2 class="fw-black m-0" id="count-orders">0</h2></div>
                        <div class="icon-shape bg-primary bg-opacity-10 text-primary"><i data-lucide="package"></i></div>
                    </div>
                </div>
                <div class="col-xl-4 col-md-6">
                    <div class="stat-widget">
                        <div><small class="text-muted fw-bold">كابتن نشط</small><h2 class="fw-black m-0 text-success" id="count-drivers">0</h2></div>
                        <div class="icon-shape bg-success bg-opacity-10 text-success"><i data-lucide="navigation"></i></div>
                    </div>
                </div>
                <div class="col-xl-4 col-md-12">
                    <div class="stat-widget">
                        <div><small class="text-muted fw-bold">شركاء المطاعم</small><h2 class="fw-black m-0 text-warning" id="count-res">0</h2></div>
                        <div class="icon-shape bg-warning bg-opacity-10 text-warning"><i data-lucide="store"></i></div>
                    </div>
                </div>
            </div>
            <div id="adminMap"></div>
        </div>

        <div id="tab-orders" class="admin-tab d-none">
            <div class="custom-table-card table-responsive">
                <table class="table align-middle m-0">
                    <thead>
                        <tr><th>ID</th><th>المطعم</th><th>الكابتن</th><th>المنطقة</th><th>الحالة</th><th>إجراء</th></tr>
                    </thead>
                    <tbody id="ordersTableBody"></tbody>
                </table>
            </div>
        </div>

        <div id="tab-restaurants" class="admin-tab d-none"><div class="row g-4" id="resListContainer"></div></div>
        <div id="tab-drivers" class="admin-tab d-none"><div class="row g-4" id="driverListContainer"></div></div>
    </main>
</div>

<script async defer src="https://maps.googleapis.com/maps/api/js?libraries=visualization&callback=initMasterMap"></script>
<script>
    lucide.createIcons();
    // استخدمنا الرابط الذي قدمته أنت
    const API_URL = "https://script.google.com/macros/s/AKfycbwIELSbF-1Fioo5mTwhsJw4jZ3MRcAgOY5G43ma1vDu6OkOHvItLH3HOOCSZAguWd0Ssw/exec";
    const API_TOKEN = "HUT_SECURE_99";
    
    let map, heatmap, markers = [];

    function checkAuth() {
        if(document.getElementById('masterPass').value === "223344") {
            document.getElementById('authOverlay').style.display = 'none';
            document.getElementById('mainDashboard').classList.remove('d-none');
            startClock(); refreshData(); setInterval(refreshData, 15000);
        } else { alert("رمز خاطئ!"); }
    }

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('show'); }

    function showTab(e, name) {
        document.querySelectorAll('.admin-tab').forEach(t => t.classList.add('d-none'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('tab-' + name).classList.remove('d-none');
        e.currentTarget.classList.add('active');
        if(window.innerWidth < 1100) toggleSidebar();
        lucide.createIcons();
    }

    function initMasterMap() {
        map = new google.maps.Map(document.getElementById("adminMap"), {
            zoom: 13, center: { lat: 35.468, lng: 44.392 }, disableDefaultUI: true
        });

        // تهيئة الخريطة الحرارية
        heatmap = new google.maps.visualization.HeatmapLayer({
            data: [], map: map, radius: 45, opacity: 0.8
        });
    }

    function startClock() { setInterval(() => { document.getElementById('liveTime').innerText = new Date().toLocaleTimeString('ar-EG'); }, 1000); }

    function refreshData() {
        const script = document.createElement('script');
        script.src = `${API_URL}?action=getGlobalData&callback=renderData&ts=${Date.now()}`;
        document.body.appendChild(script);
    }

    window.renderData = function(data) {
        document.getElementById('count-orders').innerText = (data.orders.length - 1);
        document.getElementById('count-drivers').innerText = data.drivers.filter(d => d[4] === 'active').length;
        document.getElementById('count-res').innerText = data.restaurants.filter(r => r[4] === 'active').length;

        // معالجة الجدول وإضافة زر الحذف
        let oHtml = '';
        let heatPoints = [];
        data.orders.slice(1).reverse().forEach(o => {
            oHtml += `<tr>
                <td><strong class="text-primary">#${o[1]}</strong></td>
                <td>${o[2]}</td>
                <td>${o[7] || '<span class="text-muted small">بالانتظار</span>'}</td>
                <td>${o[9]}</td>
                <td><span class="badge-status ${o[6]==='pending'?'bg-warning text-dark':'bg-success text-white'}">${o[6]}</span></td>
                <td><button class="btn-action" onclick="deleteEntry('ORDER', '${o[1]}')" title="إلغاء الطلب"><i data-lucide="trash-2" size="14"></i></button></td>
            </tr>`;
            
            // جمع نقاط الخريطة الحرارية (بافتراض أن الموقع في العمودين 10 و 11)
            if(o[10] && o[11]) {
                heatPoints.push(new google.maps.LatLng(parseFloat(o[10]), parseFloat(o[11])));
            }
        });
        document.getElementById('ordersTableBody').innerHTML = oHtml;

        // تحديث الخريطة
        if(heatmap) heatmap.setData(heatPoints);
        updateMapMarkers(data.drivers, data.restaurants);

        // تحديث الكروت مع زر الحذف
        renderCards('resListContainer', data.restaurants, 'store', 'RESTAURANT');
        renderCards('driverListContainer', data.drivers, 'user', 'DRIVER');
    };

    function updateMapMarkers(drivers, res) {
        markers.forEach(m => m.setMap(null));
        markers = [];
        // المطاعم
        res.slice(1).forEach(r => {
            if(r[5] && r[6]) markers.push(new google.maps.Marker({ position: { lat: parseFloat(r[5]), lng: parseFloat(r[6]) }, map: map, title: r[1], icon: 'https://maps.google.com/mapfiles/ms/icons/orange-dot.png' }));
        });
        // الكباتن
        drivers.slice(1).forEach(d => {
            if(d[5] && d[6] && d[4] === 'active') markers.push(new google.maps.Marker({ position: { lat: parseFloat(d[5]), lng: parseFloat(d[6]) }, map: map, title: d[1], icon: 'https://maps.google.com/mapfiles/ms/icons/motorcycle.png' }));
        });
    }

    function renderCards(id, list, icon, type) {
        let html = '';
        list.slice(1).forEach(i => {
            html += `<div class="col-md-6 col-xl-4"><div class="stat-widget">
                <div class="d-flex align-items-center gap-3">
                    <div class="icon-shape bg-light"><i data-lucide="${icon}"></i></div>
                    <div><h6 class="m-0 fw-bold">${i[1]}</h6><small class="text-muted">${i[2]}</small></div>
                </div>
                <div class="d-flex align-items-center gap-2">
                    <span class="badge-status ${i[4] === 'active' ? 'bg-success text-white' : 'bg-secondary text-white'}">${i[4]}</span>
                    <button class="btn-action" onclick="deleteEntry('${type}', '${i[2]}')"><i data-lucide="x" size="14"></i></button>
                </div>
            </div></div>`;
        });
        document.getElementById(id).innerHTML = html;
        lucide.createIcons();
    }

    // إرسال تنبيه للكباتن
    function sendBroadcast() {
        const msg = document.getElementById('adminMsg').value;
        if(!msg) return alert("الرجاء كتابة رسالة!");
        fetch(`${API_URL}?action=sendBroadcast&msg=${encodeURIComponent(msg)}`).then(() => {
            alert("تم إرسال الأمر للأسطول بنجاح!");
            document.getElementById('adminMsg').value = '';
        });
    }

    // حذف/إلغاء قيود من النظام
    function deleteEntry(type, id) {
        if(confirm(`هل أنت متأكد من الحذف؟ إجراء لا يمكن التراجع عنه.`)) {
            const script = document.createElement('script');
            script.src = `${API_URL}?action=ADMIN_DELETE&type=${type}&id=${id}&token=${API_TOKEN}&callback=onDeleteSuccess`;
            document.body.appendChild(script);
        }
    }

    window.onDeleteSuccess = () => {
        alert("تم الحذف بنجاح");
        refreshData();
    };
</script>
</body>
</html>
