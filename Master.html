<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم سفيان | منظومة الحوت 🐋</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --primary: #2563eb; --accent: #f59e0b; --bg-body: #0f172a; --card-bg: rgba(30, 41, 59, 0.7); }
        body { background: var(--bg-body); color: #f1f5f9; font-family: 'Tajawal', sans-serif; min-height: 100vh; margin: 0; overflow-x: hidden; }
        #login-block { background: radial-gradient(circle at center, #1e293b 0%, #020617 100%); display: flex; align-items: center; justify-content: center; position: fixed; inset: 0; z-index: 9999; }
        #map { height: 450px; border-radius: 2.5rem; border: 2px solid rgba(255,255,255,0.1); margin: 1.5rem 0; box-shadow: 0 20px 50px rgba(0,0,0,0.5); z-index: 10; }
        .glass-panel { background: var(--card-bg); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); border-radius: 1.5rem; padding: 1.5rem; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .item-row { border-radius: 1rem; padding: 12px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.05); transition: all 0.3s ease; font-size: 13px; background: rgba(255,255,255,0.03); }
        .status-active { color: #10b981; font-weight: bold; }
        .status-pending { color: #f59e0b; font-weight: bold; }
        .status-banned { color: #ef4444; font-weight: bold; }
        .btn-action { padding: 6px 12px; border-radius: 8px; font-size: 11px; font-weight: 900; color: white; cursor: pointer; transition: 0.2s; }
        .bg-btn-blue { background: #3b82f6; }
        .bg-btn-red { background: #ef4444; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="login-block">
        <div class="max-w-[400px] w-full p-10 text-center glass-panel border-t-4 border-blue-500">
            <div class="w-24 h-24 bg-blue-600 rounded-3xl mx-auto mb-6 flex items-center justify-center shadow-2xl animate-pulse">
                <span class="text-5xl">🐋</span>
            </div>
            <h1 class="text-2xl font-black text-white mb-2" style="font-family: 'Orbitron';">HUT MASTER</h1>
            <p class="text-slate-400 text-xs mb-8 font-bold italic uppercase tracking-widest">بوابة الإدارة المركزية | سفيان</p>
            <input type="password" id="master-pass" placeholder="أدخل الرمز السري" class="w-full bg-slate-900/50 border border-slate-700 rounded-2xl p-5 text-center text-blue-400 mb-6 outline-none font-bold text-xl tracking-[0.5em]">
            <button onclick="checkAuth()" id="loginBtn" class="w-full bg-blue-600 text-white p-5 rounded-2xl font-black hover:bg-blue-500 transition-all shadow-lg shadow-blue-500/20">دخول النظام</button>
        </div>
    </div>

    <div id="main-ui" class="hidden p-6 max-w-[1800px] mx-auto">
        <header class="flex flex-wrap justify-between items-center gap-4 mb-8 bg-slate-900/50 p-5 rounded-[2rem] border border-white/5 shadow-2xl">
            <div class="flex items-center gap-5">
                <div class="w-14 h-14 bg-blue-600 rounded-2xl flex items-center justify-center text-white text-2xl font-black shadow-lg shadow-blue-500/30">S</div>
                <div>
                    <h1 class="text-xl font-black text-white leading-none tracking-tight">لوحة تحكم سفيان</h1>
                    <span class="text-[10px] text-blue-500 font-black uppercase tracking-tighter">AL-HUT NETWORK SYSTEM V6.2</span>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="loadMasterData()" class="bg-white/5 hover:bg-white/10 p-3 px-6 rounded-2xl text-xs font-bold border border-white/5 italic transition-all">تحديث الرادار 🔄</button>
                <div id="clock" class="font-black text-blue-400 bg-black/40 px-8 py-3 rounded-2xl text-sm border border-blue-500/20 italic tracking-widest">00:00:00</div>
            </div>
        </header>

        <div id="map"></div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mt-8">
            <section class="glass-panel h-[650px] flex flex-col border-t-4 border-blue-500">
                <h2 class="font-black text-sm uppercase tracking-widest text-blue-400 mb-5 flex justify-between items-center">
                    <span><i class="fas fa-motorcycle ml-2"></i> رادار الطيارين</span>
                    <span id="drivers-count" class="bg-blue-500/20 px-2 py-0.5 rounded text-[10px]">0</span>
                </h2>
                <div id="drivers-list" class="overflow-y-auto flex-1 custom-scroll"></div>
            </section>

            <section class="glass-panel h-[650px] flex flex-col border-t-4 border-emerald-500">
                <h2 class="font-black text-sm uppercase tracking-widest text-emerald-400 mb-5 flex justify-between items-center">
                    <span><i class="fas fa-utensils ml-2"></i> المطاعم النشطة</span>
                    <span id="rests-count" class="bg-emerald-500/20 px-2 py-0.5 rounded text-[10px]">0</span>
                </h2>
                <div id="restaurants-list" class="overflow-y-auto flex-1 custom-scroll"></div>
            </section>

            <section class="glass-panel h-[650px] flex flex-col border-t-4 border-amber-500">
                <h2 class="font-black text-sm uppercase tracking-widest text-amber-400 mb-5 flex justify-between items-center">
                    <span><i class="fas fa-route ml-2"></i> العمليات الحالية</span>
                    <span id="orders-count" class="bg-amber-500/20 px-2 py-0.5 rounded text-[10px]">0</span>
                </h2>
                <div id="orders-list" class="overflow-y-auto flex-1 custom-scroll"></div>
            </section>

            <section class="glass-panel h-[650px] flex flex-col border-t-4 border-slate-500 text-center">
                <h2 class="font-black text-sm uppercase tracking-widest text-slate-400 mb-5">حالة الاتصال</h2>
                <div class="bg-emerald-500/10 p-5 rounded-3xl border border-emerald-500/20 mb-6">
                    <p class="text-emerald-500 font-black text-xs italic animate-pulse">CORE SERVER ONLINE 🛰️</p>
                </div>
                <div class="text-right space-y-4">
                    <div class="p-4 bg-white/5 rounded-2xl border border-white/5">
                        <p class="text-[10px] text-slate-500 font-bold mb-1">إجمالي المهام المكتملة</p>
                        <p class="text-xl font-black text-white italic">1,248 <span class="text-[10px] text-emerald-500">طلب</span></p>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbzBTRYdugjCeYZoeaHng4JPIq0vBu-b3VHNuEX9ya0H1C022PDangGTOR9I-v4i83rDoA/exec';
        let map, markers = {};

        // الساعة
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('ar-EG');
        }, 1000);

        async function checkAuth() {
            const pass = document.getElementById('master-pass').value;
            const btn = document.getElementById('loginBtn');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري مزامنة البيانات...';
            
            try {
                // ملاحظة: الرمز السري هنا 1234 أو يتم جلبه من السكريبت
                if(pass === "1234") { 
                    document.getElementById('login-block').classList.add('hidden');
                    document.getElementById('main-ui').classList.remove('hidden');
                    initMap();
                    loadMasterData();
                    setInterval(loadMasterData, 12000);
                } else {
                    alert("الرمز السري " + pass + " غير مسجل في قاعدة البيانات المركزية.");
                    btn.innerText = "دخول النظام";
                }
            } catch (e) { alert("حدث خطأ في الشبكة"); btn.innerText = "دخول النظام"; }
        }

        function initMap() {
            map = L.map('map', { zoomControl: false }).setView([35.468, 44.392], 13);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        }

        async function loadMasterData() {
            try {
                const res = await fetch(`${scriptURL}?action=get_master_data&pass=1234`);
                const data = await res.json();

                if(data.status === "success") {
                    renderDrivers(data.drivers);
                    renderRestaurants(data.restaurants);
                    renderOrders(data.orders);
                    updateMapMarkers(data.drivers);
                }
            } catch(e) { console.warn("Syncing Whale Network..."); }
        }

        function renderDrivers(data) {
            document.getElementById('drivers-count').innerText = data.length;
            const container = document.getElementById('drivers-list');
            container.innerHTML = data.map(d => `
                <div class="item-row border-r-4 ${d.status === 'active' ? 'border-emerald-500' : 'border-red-500'}">
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="font-black text-white text-sm">${d.name}</p>
                            <p class="text-[10px] text-slate-500 tracking-tighter">${d.phone}</p>
                        </div>
                        <span class="text-[8px] px-2 py-0.5 rounded bg-white/5 font-black uppercase ${d.status === 'active' ? 'text-emerald-500' : 'text-red-500'}">${d.status}</span>
                    </div>
                    <div class="flex gap-2 mt-3">
                        <button onclick="updateStatus('Driver', '${d.phone}', '${d.status === 'active' ? 'banned' : 'active'}')" 
                                class="flex-1 btn-action ${d.status === 'active' ? 'bg-btn-red' : 'bg-btn-blue'}">
                            ${d.status === 'active' ? 'حظر' : 'تفعيل'}
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function renderRestaurants(data) {
            document.getElementById('rests-count').innerText = data.length;
            const container = document.getElementById('restaurants-list');
            container.innerHTML = data.map(r => `
                <div class="item-row border-r-4 border-emerald-500">
                    <p class="font-black text-white text-sm">${r.name}</p>
                    <div class="flex justify-between mt-2">
                        <span class="text-[9px] text-slate-500">${r.phone}</span>
                        <span class="text-[9px] text-emerald-500 font-bold">${r.pay}</span>
                    </div>
                </div>
            `).join('');
        }

        function renderOrders(data) {
            document.getElementById('orders-count').innerText = data.length;
            const container = document.getElementById('orders-list');
            container.innerHTML = data.reverse().map(o => `
                <div class="item-row border-r-4 ${o.status === 'pending' ? 'border-amber-500 animate-pulse' : 'border-blue-500'}">
                    <div class="flex justify-between mb-1">
                        <span class="font-black text-amber-500 text-[9px]">#${o.id}</span>
                        <span class="text-[8px] font-bold text-slate-400 uppercase">${o.status}</span>
                    </div>
                    <p class="font-bold text-white text-[11px] leading-tight">${o.restaurant} <i class="fas fa-arrow-left text-[8px] mx-1 text-slate-600"></i> ${o.area}</p>
                    <div class="mt-2 text-[9px] text-slate-500 italic">السائق: ${o.driverPhone || 'بانتظار تخصيص'}</div>
                </div>
            `).join('');
        }

        function updateMapMarkers(drivers) {
            drivers.forEach(d => {
                if(d.lat && d.lng) {
                    if(markers[d.phone]) {
                        markers[d.phone].setLatLng([d.lat, d.lng]);
                    } else {
                        markers[d.phone] = L.marker([d.lat, d.lng]).addTo(map)
                            .bindPopup(`<b class='text-slate-900'>${d.name}</b>`);
                    }
                }
            });
        }

        async function updateStatus(type, id, status) {
            await fetch(scriptURL, {
                method: 'POST',
                body: JSON.stringify({ action: 'update_status', type: type, id: id, status: status })
            });
            loadMasterData();
        }
    </script>
</body>
</html>
