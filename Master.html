<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم سفيان | منظومة الحوت 🐋</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --primary: #2563eb; --accent: #f59e0b; --bg-body: #0f172a; --card-bg: rgba(30, 41, 59, 0.7); }
        body { background: var(--bg-body); color: #f1f5f9; font-family: 'Tajawal', sans-serif; min-height: 100vh; margin: 0; overflow-x: hidden; }
        
        /* شاشة الدخول الاحترافية */
        #login-block { background: radial-gradient(circle at center, #1e293b 0%, #020617 100%); display: flex; align-items: center; justify-content: center; position: fixed; inset: 0; z-index: 9999; }
        
        #map { height: 400px; border-radius: 2rem; border: 2px solid rgba(255,255,255,0.1); margin: 1.5rem 0; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        
        .glass-panel { background: var(--card-bg); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); border-radius: 1.5rem; padding: 1.5rem; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        
        .item-row { border-radius: 1rem; padding: 12px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.05); transition: all 0.3s ease; font-size: 13px; background: rgba(255,255,255,0.03); }
        .item-row:hover { background: rgba(255,255,255,0.07); transform: translateX(-5px); }
        
        .status-active { color: #10b981; font-weight: bold; }
        .status-waiting { color: #f59e0b; font-weight: bold; }
        .status-banned { color: #ef4444; font-weight: bold; }
        .status-away { color: #94a3b8; font-weight: bold; }

        .btn-action { padding: 6px 12px; border-radius: 8px; font-size: 11px; font-weight: 900; color: white; cursor: pointer; transition: 0.2s; }
        .bg-btn-blue { background: #3b82f6; box-shadow: 0 4px 14px rgba(59, 130, 246, 0.4); }
        .bg-btn-red { background: #ef4444; box-shadow: 0 4px 14px rgba(239, 68, 68, 0.4); }
        
        .hidden { display: none; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="login-block">
        <div class="max-w-[400px] w-full p-10 text-center glass-panel border-t-4 border-blue-500">
            <div class="w-24 h-24 bg-blue-600 rounded-3xl mx-auto mb-6 flex items-center justify-center shadow-2xl animate-pulse">
                <i class="fas fa-whale text-5xl text-white">🐋</i>
            </div>
            <h1 class="text-2xl font-black text-white mb-2" style="font-family: 'Orbitron';">HUT MASTER</h1>
            <p class="text-slate-400 text-xs mb-8 font-bold italic uppercase tracking-widest">Central Intelligence Unit</p>
            <input type="password" id="master-pass" placeholder="MASTER KEY" class="w-full bg-slate-900/50 border border-slate-700 rounded-2xl p-5 text-center text-blue-400 mb-6 outline-none font-bold text-xl tracking-[1em]">
            <button onclick="checkAuth()" id="loginBtn" class="w-full bg-blue-600 text-white p-5 rounded-2xl font-black hover:bg-blue-500 transition-all transform active:scale-95 shadow-lg shadow-blue-500/20">ACCESS SYSTEM</button>
        </div>
    </div>

    <div id="main-ui" class="hidden p-6 max-w-[1800px] mx-auto">
        <header class="flex justify-between items-center mb-8 bg-slate-900/50 p-5 rounded-[2rem] border border-white/5 shadow-2xl">
            <div class="flex items-center gap-5">
                <div class="w-14 h-14 bg-gradient-to-br from-blue-600 to-blue-800 rounded-2xl flex items-center justify-center text-white text-2xl font-black shadow-xl ring-2 ring-blue-500/20">S</div>
                <div>
                    <h1 class="text-xl font-black text-white leading-none">لوحة تحكم سفيان</h1>
                    <span class="text-[10px] text-blue-500 font-black uppercase tracking-tighter">Iraqi Intelligence - Al-Hut Network</span>
                </div>
            </div>
            <div class="flex gap-4">
                <button onclick="loadMasterData()" class="bg-white/5 hover:bg-white/10 p-3 px-6 rounded-2xl text-xs font-bold transition-all border border-white/5"><i class="fas fa-sync-alt ml-2 animate-spin-slow"></i> تحديث الإشارة</button>
                <div id="clock" class="font-black text-blue-400 bg-black/40 px-8 py-3 rounded-2xl text-sm border border-blue-500/20 italic shadow-inner">00:00:00</div>
            </div>
        </header>

        <div id="map"></div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mt-8">
            
            <section class="glass-panel h-[650px] flex flex-col border-t-4 border-blue-500">
                <div class="flex justify-between items-center mb-5">
                    <h2 class="font-black text-sm uppercase tracking-widest text-blue-400"><i class="fas fa-satellite-dish ml-2"></i> تتبع الطيارين</h2>
                    <span id="driver-count" class="bg-blue-500/20 text-blue-400 px-3 py-1 rounded-full text-[10px] font-black">0</span>
                </div>
                <div id="drivers-list" class="overflow-y-auto flex-1 pr-2"></div>
            </section>

            <section class="glass-panel h-[650px] flex flex-col border-t-4 border-emerald-500">
                <h2 class="font-black text-sm uppercase tracking-widest text-emerald-400 mb-5"><i class="fas fa-shish-kebab ml-2"></i> شبكة المطاعم</h2>
                <div id="restaurants-list" class="overflow-y-auto flex-1 pr-2"></div>
            </section>

            <section class="glass-panel h-[650px] flex flex-col border-t-4 border-amber-500">
                <h2 class="font-black text-sm uppercase tracking-widest text-amber-400 mb-5"><i class="fas fa-box-open ml-2"></i> العمليات الجارية</h2>
                <div id="orders-list" class="overflow-y-auto flex-1 pr-2"></div>
            </section>

            <section class="glass-panel h-[650px] flex flex-col border-t-4 border-slate-500">
                <h2 class="font-black text-sm uppercase tracking-widest text-slate-400 mb-5"><i class="fas fa-microchip ml-2"></i> حالة المنظومة</h2>
                <div id="settings-area" class="space-y-4">
                    <div class="bg-black/30 p-5 rounded-2xl border border-white/5">
                        <p class="text-[10px] text-slate-500 mb-2 uppercase font-bold">Node Connection</p>
                        <div class="flex justify-between items-center">
                            <span class="text-xs font-black text-emerald-500"><i class="fas fa-signal animate-pulse ml-2"></i> SYSTEM ACTIVE</span>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbzywi3-mLv5H4bNHYvQbFDpy_FwA-AceD4g8JZX6Ah3QZhmC5LGXNLvBeQBjYO9tmt9vA/exec';
        let map, markers = {};

        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('ar-EG');
        }, 1000);

        async function checkAuth() {
            const pass = document.getElementById('master-pass').value;
            const btn = document.getElementById('loginBtn');
            btn.innerHTML = `<i class="fas fa-spinner animate-spin"></i> VERIFYING KEY...`;
            
            try {
                const response = await fetch(`${scriptURL}?action=get_master_data&pass=${pass}`);
                const data = await response.json();
                
                if(data.status === "success") {
                    localStorage.setItem('master_pass', pass);
                    document.getElementById('login-block').classList.add('hidden');
                    document.getElementById('main-ui').classList.remove('hidden');
                    initMap();
                    renderFullData(data);
                    setInterval(loadMasterData, 20000); // تحديث كل 20 ثانية لمواكبة السائقين
                } else {
                    alert("⚠️ خطأ: الرمز السري غير مطابق للرادار");
                    btn.innerText = "ACCESS SYSTEM";
                }
            } catch (e) {
                alert("❌ فشل الاتصال بسيرفر الحوت");
                btn.innerText = "ACCESS SYSTEM";
            }
        }

        function initMap() {
            map = L.map('map', { zoomControl: false }).setView([35.468, 44.392], 13);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        }

        async function loadMasterData() {
            const pass = localStorage.getItem('master_pass');
            try {
                const response = await fetch(`${scriptURL}?action=get_master_data&pass=${pass}`);
                const data = await response.json();
                if(data.status === "success") renderFullData(data);
            } catch(e) { console.error("Signal lost..."); }
        }

        function renderFullData(data) {
            renderDrivers(data.drivers);
            renderRestaurants(data.restaurants);
            renderOrders(data.orders);
        }

        function renderDrivers(rows) {
            const container = document.getElementById('drivers-list');
            document.getElementById('driver-count').innerText = rows.length - 1;
            container.innerHTML = rows.slice(1).map(d => `
                <div class="item-row border-r-4 ${d[4] === 'active' ? 'border-emerald-500' : d[4] === 'banned' ? 'border-red-500' : 'border-slate-500'}">
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="font-black text-white">${d[1]}</p>
                            <p class="text-[10px] text-slate-500 font-bold">${d[2]}</p>
                        </div>
                        <span class="status-${d[4]} text-[9px] uppercase">${d[4]}</span>
                    </div>
                    <div class="flex gap-2 mt-3">
                        <button onclick="controlItem('Drivers', '${d[2]}', 4, '${d[4] === 'active' ? 'banned' : 'active'}')" class="btn-action ${d[4] === 'active' ? 'bg-btn-red' : 'bg-btn-blue'} flex-1">
                            ${d[4] === 'active' ? 'حظر الطيار' : 'تفعيل الطيار'}
                        </button>
                    </div>
                </div>
            `).join('');

            rows.slice(1).forEach(d => {
                if(d[5] && d[6]) { // Latitude & Longitude
                    const lat = parseFloat(d[5]);
                    const lng = parseFloat(d[6]);
                    if(markers[d[2]]) {
                        markers[d[2]].setLatLng([lat, lng]);
                    } else {
                        markers[d[2]] = L.marker([lat, lng], {
                            icon: L.divIcon({
                                className: 'custom-div-icon',
                                html: `<div style="background-color: ${d[4] === 'active' ? '#10b981' : '#ef4444'}; width: 12px; height: 12px; border-radius: 50%; border: 2px solid white; box-shadow: 0 0 10px rgba(0,0,0,0.5);"></div>`,
                                iconSize: [12, 12],
                                iconAnchor: [6, 6]
                            })
                        }).addTo(map).bindPopup(`<b>الكابتن: ${d[1]}</b><br>الحالة: ${d[4]}`);
                    }
                }
            });
        }

        function renderRestaurants(rows) {
            const container = document.getElementById('restaurants-list');
            container.innerHTML = rows.slice(1).map(r => `
                <div class="item-row border-r-4 border-emerald-500">
                    <div class="flex justify-between">
                        <p class="font-black text-white">${r[1]}</p>
                        <button onclick="deleteItem('Restaurants', '${r[2]}')" class="text-red-500 hover:text-red-400 transition-colors"><i class="fas fa-trash-alt"></i></button>
                    </div>
                    <p class="text-[10px] text-slate-500 font-bold mt-1">${r[2]} | ${r[4]}</p>
                    <div class="mt-2 pt-2 border-t border-white/5 flex justify-between items-center">
                        <span class="text-[9px] font-black text-emerald-500 uppercase">${r[9] || '0'} د.ع رصيد</span>
                        <span class="text-[8px] bg-emerald-500/10 text-emerald-500 px-2 py-0.5 rounded">${r[8] || 'نظام دفع مجهول'}</span>
                    </div>
                </div>
            `).join('');
        }

        function renderOrders(rows) {
            const container = document.getElementById('orders-list');
            container.innerHTML = rows.slice(1).reverse().map(o => `
                <div class="item-row border-r-4 ${o[5] === 'waiting' ? 'border-amber-500 animate-pulse' : o[5] === 'assigned' ? 'border-blue-500' : 'border-emerald-500'}">
                    <div class="flex justify-between mb-2">
                        <span class="font-black text-amber-500 text-[10px]">${o[0]}</span>
                        <span class="text-[9px] text-slate-500 font-bold italic">${new Date(o[7]).toLocaleTimeString('ar-EG')}</span>
                    </div>
                    <p class="font-bold text-white text-xs">${o[1]} ➔ ${o[9]}</p>
                    <div class="flex justify-between items-center mt-3">
                        <span class="bg-white/5 border border-white/5 px-3 py-1 rounded-lg text-[9px] font-black uppercase text-slate-300">${o[5]}</span>
                        <div class="flex gap-2">
                             ${o[4] && o[4] !== 'No Photo' && o[4] !== 'Error' ? `<a href="${o[4]}" target="_blank" class="text-blue-400 text-xs"><i class="fas fa-image"></i></a>` : ''}
                             <button onclick="deleteItem('Orders', '${o[0]}')" class="text-red-400 text-[10px] font-black uppercase">حذف</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function controlItem(sheet, id, col, val) {
            const pass = localStorage.getItem('master_pass');
            try {
                await fetch(scriptURL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: "master_control",
                        pass: pass,
                        targetSheet: sheet,
                        targetID: id,
                        colIndex: col,
                        newValue: val
                    })
                });
                loadMasterData();
            } catch(e) { alert("⚠️ فشل في إرسال أمر التحكم"); }
        }

        async function deleteItem(sheet, id) {
            if(!confirm("⚠️ سيتم حذف البيانات نهائياً من قاعدة بيانات الحوت. هل أنت متأكد؟")) return;
            const pass = localStorage.getItem('master_pass');
            try {
                await fetch(scriptURL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: "delete_item",
                        pass: pass,
                        targetSheet: sheet,
                        targetID: id
                    })
                });
                loadMasterData();
            } catch(e) { alert("⚠️ فشل في تنفيذ عملية الحذف"); }
        }
    </script>
</body>
</html>
