<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>مركز قيادة الحوت | Al-Hut Command Center</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root {
            --sidebar-width: 280px;
            --primary-dark: #0f172a;
            --accent-orange: #f97316;
            --bg-light: #f1f5f9;
        }

        body { background-color: var(--bg-light); font-family: 'Cairo', sans-serif; margin: 0; overflow-x: hidden; }

        /* شاشة القفل المحسنة */
        #authOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0f172a; z-index: 10000; display: flex; align-items: center; justify-content: center;
        }
        .auth-card {
            background: white; border-radius: 30px; padding: 40px; width: 90%; max-width: 400px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2); text-align: center;
        }

        .sidebar {
            width: var(--sidebar-width); background: var(--primary-dark);
            height: 100vh; position: fixed; right: 0; top: 0; color: white; 
            padding: 25px 15px; z-index: 1005; transition: transform 0.3s ease;
        }
        
        .main-content { margin-right: var(--sidebar-width); padding: 30px; min-height: 100vh; transition: margin 0.3s ease; }

        .nav-item {
            display: flex; align-items: center; gap: 15px; padding: 15px 20px; color: #94a3b8;
            text-decoration: none; border-radius: 15px; margin-bottom: 10px; cursor: pointer; transition: 0.3s;
        }
        .nav-item:hover, .nav-item.active { background: #1e293b; color: white; }
        .nav-item.active { border-right: 5px solid var(--accent-orange); background: rgba(249, 115, 22, 0.1); }

        .stat-widget {
            background: white; border-radius: 25px; padding: 25px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.02); border: 1px solid #e2e8f0;
            height: 100%; transition: 0.3s;
        }

        #adminMap { height: 500px; width: 100%; border-radius: 30px; border: 10px solid white; box-shadow: 0 10px 30px rgba(0,0,0,0.05); background: #e2e8f0; }

        /* --- أزرار السيادة الاحترافية --- */
        .sov-btn {
            border: none; border-radius: 12px; width: 40px; height: 40px; 
            display: inline-flex; align-items: center; justify-content: center; transition: 0.2s; cursor: pointer;
        }
        .sov-accept { background: #dcfce7; color: #166534; }
        .sov-pause { background: #fef9c3; color: #854d0e; }
        .sov-delete { background: #fee2e2; color: #ef4444; }
        .sov-call { background: #e0f2fe; color: #0369a1; }
        .sov-btn:hover { filter: brightness(0.9); transform: translateY(-2px); box-shadow: 0 4px 6px rgba(0,0,0,0.1); }

        /* --- كروت الطلبات الذكية --- */
        .smart-order-card {
            background: white; border-radius: 20px; padding: 25px; margin-bottom: 20px;
            border: 1px solid #e2e8f0; border-right: 8px solid #94a3b8;
            box-shadow: 0 10px 25px rgba(0,0,0,0.03); position: relative;
        }
        .status-danger { border-right-color: #ef4444; }
        .status-warning { border-right-color: #f59e0b; }
        .status-success { border-right-color: #10b981; }
        
        .delay-badge {
            position: absolute; top: -12px; left: 20px; background: #ef4444; color: white;
            padding: 6px 16px; border-radius: 20px; font-size: 0.8rem; font-weight: 900;
            animation: pulse 2s infinite; box-shadow: 0 4px 10px rgba(239, 68, 68, 0.4);
        }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        .info-row {
            display: flex; justify-content: space-between; align-items: center; 
            background: #f8fafc; padding: 10px 15px; border-radius: 12px; margin-bottom: 8px;
            border: 1px solid #f1f5f9; transition: 0.2s;
        }
        .info-row:hover { background: #f1f5f9; }

        .btn-call-mini {
            background: white; border: 1px solid #e2e8f0; border-radius: 50%; width: 32px; height: 32px;
            display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s;
        }
        .btn-call-mini:hover { background: #f97316; color: white; border-color: #f97316; }

        /* --- إعدادات زر القائمة للموبايل --- */
        .menu-toggle-btn {
            display: none; background: white; border: 1px solid #e2e8f0; 
            border-radius: 12px; padding: 10px; cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .menu-toggle-btn:hover { background: #f1f5f9; }

        .sidebar-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1002;
            display: none; backdrop-filter: blur(3px);
        }

        @media (max-width: 1100px) {
            .sidebar { transform: translateX(100%); }
            .main-content { margin-right: 0; padding: 20px; }
            .sidebar.show { transform: translateX(0); box-shadow: -10px 0 50px rgba(0,0,0,0.5); }
            .menu-toggle-btn { display: flex; align-items: center; justify-content: center; }
            .sidebar-overlay.show { display: block; }
        }
    </style>
</head>
<body>

<div id="authOverlay">
    <div class="auth-card">
        <div class="mb-4"><i data-lucide="shield-check" size="60" color="#f97316"></i></div>
        <h4 class="fw-black mb-3">نظام الحوت | القيادة العليا</h4>
        <input type="password" id="masterPass" class="form-control form-control-lg text-center mb-3 shadow-none border-2" placeholder="كلمة المرور" onkeypress="if(event.key === 'Enter') checkAuth()">
        <button class="btn btn-dark w-100 py-3 fw-bold rounded-4" onclick="checkAuth()">تسجيل الدخول</button>
    </div>
</div>

<div class="d-none" id="mainDashboard">
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

    <aside class="sidebar" id="sidebar">
        <div class="d-flex align-items-center justify-content-between mb-5 px-3">
            <div class="d-flex align-items-center gap-3">
                <div class="bg-warning p-2 rounded-3"><i data-lucide="waves" color="#0f172a"></i></div>
                <h4 class="m-0 fw-black">مركز الحوت</h4>
            </div>
            <button class="btn btn-sm btn-outline-light border-0 d-block d-xl-none" onclick="toggleSidebar()">
                <i data-lucide="x"></i>
            </button>
        </div>
        <nav>
            <div class="nav-item active" onclick="showTab(event, 'live')"><i data-lucide="radar"></i> <span>الرصد الميداني</span></div>
            <div class="nav-item" onclick="showTab(event, 'orders')"><i data-lucide="shopping-bag"></i> <span>الأرشيف الإداري</span></div>
            <div class="nav-item" onclick="showTab(event, 'restaurants')"><i data-lucide="store"></i> <span>تحكم المطاعم</span></div>
            <div class="nav-item" onclick="showTab(event, 'drivers')"><i data-lucide="user-check"></i> <span>تحكم الأسطول</span></div>
        </nav>
    </aside>

    <main class="main-content">
        <header class="d-flex justify-content-between align-items-center mb-4">
            <div class="d-flex align-items-center gap-3">
                <button class="menu-toggle-btn" onclick="toggleSidebar()">
                    <i data-lucide="menu"></i>
                </button>
                <div>
                    <h2 class="fw-black m-0">لوحة القيادة والسيادة</h2>
                    <p class="text-muted m-0">كركوك - متابعة حية</p>
                </div>
            </div>
            <div id="liveTime" class="bg-white px-4 py-2 rounded-pill shadow-sm fw-bold border text-primary">00:00:00</div>
        </header>

        <div id="tab-live" class="admin-tab">
            <div class="row g-4 mb-4">
                <div class="col-md-4"><div class="stat-widget d-flex justify-content-between align-items-center"><div><small class="fw-bold text-muted">إجمالي الطلبات</small><h2 id="count-orders" class="fw-black m-0">0</h2></div><div class="bg-primary bg-opacity-10 p-3 rounded-4"><i data-lucide="package" class="text-primary"></i></div></div></div>
                <div class="col-md-4"><div class="stat-widget d-flex justify-content-between align-items-center"><div><small class="fw-bold text-muted">أسطول نشط</small><h2 id="count-drivers" class="fw-black m-0 text-success">0</h2></div><div class="bg-success bg-opacity-10 p-3 rounded-4"><i data-lucide="truck" class="text-success"></i></div></div></div>
                <div class="col-md-4"><div class="stat-widget d-flex justify-content-between align-items-center"><div><small class="fw-bold text-muted">شركاء الخدمة</small><h2 id="count-res" class="fw-black m-0 text-warning">0</h2></div><div class="bg-warning bg-opacity-10 p-3 rounded-4"><i data-lucide="store" class="text-warning"></i></div></div></div>
            </div>
            
            <div id="adminMap"></div>

            <div class="mt-5">
                <h4 class="fw-black mb-4 d-flex align-items-center gap-2 border-bottom pb-3"><i data-lucide="activity" class="text-danger"></i> الطلبات الحالية النشطة</h4>
                <div class="row g-4" id="smartOrdersContainer">
                    <div class="text-center p-5 text-muted fw-bold">جاري تحميل الرادار الميداني...</div>
                </div>
            </div>
        </div>

        <div id="tab-orders" class="admin-tab d-none">
            <div class="stat-widget table-responsive"><table class="table align-middle"><thead><tr><th>ID</th><th>المطعم</th><th>السائق</th><th>الحالة</th></tr></thead><tbody id="ordersTableBody"></tbody></table></div>
        </div>
        <div id="tab-restaurants" class="admin-tab d-none"><div class="row g-4" id="resListContainer"></div></div>
        <div id="tab-drivers" class="admin-tab d-none"><div class="row g-4" id="driverListContainer"></div></div>
    </main>
</div>

<script>
    lucide.createIcons();
    // الرابط المحدث والتوكن
    const API_URL = "https://script.google.com/macros/s/AKfycbznHSOuvIqqhFU5g1PiI7T-PU7gAXpzmV9NAHqb-dkg9HUCA2Nb-mVgLJYznf6CCNhAww/exec";
    const API_TOKEN = "HUT_SECURE_99";
    
    function checkAuth() {
        const pass = document.getElementById('masterPass').value;
        if(pass === "223344") {
            document.getElementById('authOverlay').style.display = 'none';
            document.getElementById('mainDashboard').classList.remove('d-none');
            startClock(); refreshData(); setInterval(refreshData, 15000);
        } else { alert("❌ رمز الدخول السيادي خاطئ!"); }
    }

    function startClock() { setInterval(() => { document.getElementById('liveTime').innerText = new Date().toLocaleTimeString('ar-EG'); }, 1000); }

    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('show');
        document.getElementById('sidebarOverlay').classList.toggle('show');
    }

    function refreshData() {
        const script = document.createElement('script');
        script.src = `${API_URL}?action=getGlobalData&callback=renderData&ts=${Date.now()}`;
        document.body.appendChild(script);
    }

    window.renderData = function(data) {
        document.getElementById('count-orders').innerText = data.orders.length > 1 ? data.orders.length - 1 : 0;
        document.getElementById('count-drivers').innerText = data.drivers.filter(d => d[4] === 'active').length;
        document.getElementById('count-res').innerText = data.restaurants.filter(r => r[4] === 'active').length;

        let smartHtml = '';
        // حسب جداولك: العمود F (اندكس 5) هو الحالة
        const activeOrders = data.orders.slice(1).filter(o => o[5] !== 'completed' && o[5] !== 'مكتمل');
        
        activeOrders.forEach(o => {
            const orderId = o[0];
            const restName = o[1];
            const details = o[3];
            const status = o[5];
            const driverPhone = o[6]; // هاتف السائق العمود G
            const orderTimeStr = o[7]; // الوقت العمود H
            
            const hasDriver = (driverPhone && driverPhone.toString().trim() !== "" && driverPhone !== "pending_driver");
            const isPickedUp = (status === 'picked_up' || status === 'في الطريق');
            
            const orderTime = orderTimeStr ? new Date(orderTimeStr) : new Date();
            const diffMins = Math.floor((new Date() - orderTime) / 60000);
            const isDelayed = diffMins > 30; 

            let cardClass = "status-danger";
            let statusDesc = "🔴 بانتظار سائق (لم يتم القبول)";
            
            if(hasDriver && !isPickedUp) { 
                cardClass = "status-warning"; 
                statusDesc = "🟠 السائق متوجه للمطعم للاستلام"; 
            }
            if(hasDriver && isPickedUp) { 
                cardClass = "status-success"; 
                statusDesc = "🟢 استلم الطلب وفي الطريق للزبون"; 
            }

            smartHtml += `
            <div class="col-xl-6">
                <div class="smart-order-card ${cardClass}">
                    ${isDelayed ? `<div class="delay-badge">تنبيه تأخير: مر ${diffMins} دقيقة</div>` : ''}
                    
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <div>
                            <h5 class="fw-black m-0 mb-1">طلب #${orderId}</h5>
                            <small class="fw-bold ${hasDriver ? 'text-dark' : 'text-danger'}">${statusDesc}</small>
                        </div>
                        ${hasDriver ? `<button class="btn btn-dark rounded-pill px-3 shadow-sm d-flex align-items-center gap-2" onclick="trackDriver('${orderId}')"><i data-lucide="map-pin" size="16"></i> تتبع الكابتن</button>` : `<span class="badge bg-danger p-2">جاري البحث</span>`}
                    </div>

                    <div class="d-flex flex-column gap-1">
                        <div class="info-row">
                            <div class="d-flex align-items-center gap-2"><i data-lucide="info" class="text-primary" size="18"></i> <span class="fw-bold">التفاصيل:</span> ${details || 'لا توجد تفاصيل'}</div>
                        </div>
                        
                        <div class="info-row">
                            <div class="d-flex align-items-center gap-2"><i data-lucide="store" class="text-warning" size="18"></i> <span class="fw-bold">المطعم:</span> ${restName || 'غير متوفر'}</div>
                        </div>

                        <div class="info-row">
                            <div class="d-flex align-items-center gap-2"><i data-lucide="bike" class="text-success" size="18"></i> <span class="fw-bold">هاتف السائق:</span> <span dir="ltr">${driverPhone || '<span class="text-danger">لا يوجد</span>'}</span></div>
                            ${hasDriver ? `<button class="btn-call-mini text-success" onclick="window.open('tel:${driverPhone}')" title="اتصال بالكابتن"><i data-lucide="phone" size="14"></i></button>` : ''}
                        </div>
                    </div>
                </div>
            </div>`;
        });
        document.getElementById('smartOrdersContainer').innerHTML = smartHtml || '<div class="col-12 text-center p-4 fw-bold text-success">الرادار نظيف، لا توجد طلبات معلقة حالياً.</div>';

        // رقم الهاتف في العمود C (اندكس 2)
        renderControlCards('resListContainer', data.restaurants, 'store', 'RESTAURANT', 2);
        renderControlCards('driverListContainer', data.drivers, 'user', 'DRIVER', 2);
        
        lucide.createIcons();
    };

    function renderControlCards(containerId, list, icon, type, phoneIndex) {
        let html = '';
        list.slice(1).forEach(item => {
            const name = item[1];
            const phone = item[phoneIndex];
            const isActive = item[4] === 'active';
            html += `
            <div class="col-md-6 col-xl-4">
                <div class="stat-widget flex-column align-items-stretch">
                    <div class="d-flex align-items-center gap-3 mb-4">
                        <div class="bg-light p-3 rounded-4"><i data-lucide="${icon}" size="24" class="text-dark"></i></div>
                        <div class="flex-grow-1">
                            <h6 class="m-0 fw-black mb-1">${name}</h6>
                            <span class="badge ${isActive ? 'bg-success' : 'bg-secondary'} px-2 py-1 rounded-2">${isActive ? 'نشط' : 'غير نشط'}</span>
                        </div>
                    </div>
                    
                    <div class="d-flex justify-content-between align-items-center pt-3 border-top">
                        <div class="d-flex gap-2">
                            <button class="sov-btn sov-accept" onclick="adminAction('ACCEPT', '${type}', '${type === 'ORDER' ? item[0] : phone}')" title="قبول انضمام / تفعيل"><i data-lucide="check" size="20"></i></button>
                            <button class="sov-btn sov-pause" onclick="adminAction('PAUSE', '${type}', '${type === 'ORDER' ? item[0] : phone}')" title="إيقاف مؤقت / تجميد"><i data-lucide="pause" size="20"></i></button>
                            <button class="sov-btn sov-delete" onclick="adminAction('DELETE', '${type}', '${type === 'ORDER' ? item[0] : phone}')" title="حذف نهائي"><i data-lucide="trash-2" size="20"></i></button>
                        </div>
                        <button class="sov-btn sov-call shadow-sm" onclick="window.open('tel:${phone}')" title="اتصال سريع"><i data-lucide="phone-call" size="20"></i></button>
                    </div>
                </div>
            </div>`;
        });
        document.getElementById(containerId).innerHTML = html;
    }

    function adminAction(cmd, type, id) {
        const statusMap = { 'ACCEPT': 'active', 'PAUSE': 'inactive', 'DELETE': 'deleted' };
        const newStatus = statusMap[cmd];
        const actionText = cmd === 'ACCEPT' ? 'تفعيل' : cmd === 'PAUSE' ? 'إيقاف' : 'حذف';

        if(confirm(`⚠️ سيادة المدير، هل أنت متأكد من (${actionText}) لـ [${id}]؟`)) {
            const url = `${API_URL}?action=ADMIN_UPDATE_STATUS&type=${type}&id=${id}&status=${newStatus}&token=${API_TOKEN}`;
            const script = document.createElement('script');
            script.src = `${url}&callback=afterAdminAction`;
            document.body.appendChild(script);
        }
    }

    window.afterAdminAction = function(response) {
        if(response.success) {
            alert("✅ تم تنفيذ الأمر بنجاح في قاعدة البيانات.");
            refreshData();
        } else {
            alert("❌ فشل التحديث: " + (response.msg || "خطأ غير معروف"));
        }
    };

    function trackDriver(orderId) { 
        alert(`📍 جاري فتح رادار التتبع المباشر للسائق المرتبط بالطلب رقم #${orderId}...`); 
    }

    function showTab(e, name) {
        document.querySelectorAll('.admin-tab').forEach(t => t.classList.add('d-none'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('tab-' + name).classList.remove('d-none');
        e.currentTarget.classList.add('active');
        lucide.createIcons();

        if(window.innerWidth <= 1100) {
            document.getElementById('sidebar').classList.remove('show');
            document.getElementById('sidebarOverlay').classList.remove('show');
        }
    }
</script>

<script async defer src="https://maps.googleapis.com/maps/api/js?callback=initMap"></script>
<script>
    function initMap() {
        new google.maps.Map(document.getElementById("adminMap"), {
            zoom: 13, center: { lat: 35.468, lng: 44.392 },
            styles: [{ "featu
