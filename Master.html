<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>مركز قيادة الحوت | Al-Hut Command Center</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root {
            --sidebar-width: 280px;
            --primary-dark: #0f172a;
            --accent-orange: #f97316;
            --bg-light: #f1f5f9;
        }

        body { background-color: var(--bg-light); font-family: 'Cairo', sans-serif; margin: 0; overflow-x: hidden; }

        /* شاشة القفل المحسنة */
        #authOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0f172a; z-index: 10000; display: flex; align-items: center; justify-content: center;
        }
        .auth-card {
            background: white; border-radius: 30px; padding: 40px; width: 90%; max-width: 400px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2); text-align: center;
        }

        .sidebar {
            width: var(--sidebar-width); background: var(--primary-dark);
            height: 100vh; position: fixed; right: 0; top: 0; color: white; 
            padding: 25px 15px; z-index: 1001; transition: transform 0.3s ease;
        }
        
        .main-content { margin-right: var(--sidebar-width); padding: 30px; min-height: 100vh; transition: margin 0.3s ease; }

        .nav-item {
            display: flex; align-items: center; gap: 15px; padding: 15px 20px; color: #94a3b8;
            text-decoration: none; border-radius: 15px; margin-bottom: 10px; cursor: pointer; transition: 0.3s;
        }
        .nav-item:hover, .nav-item.active { background: #1e293b; color: white; }
        .nav-item.active { border-right: 5px solid var(--accent-orange); background: rgba(249, 115, 22, 0.1); }

        .stat-widget {
            background: white; border-radius: 25px; padding: 25px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.02); border: 1px solid #e2e8f0;
            height: 100%; transition: 0.3s;
        }

        #adminMap { height: 500px; width: 100%; border-radius: 30px; border: 10px solid white; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }

        /* --- أزرار السيادة --- */
        .sov-btn {
            border: none; border-radius: 10px; width: 35px; height: 35px; 
            display: inline-flex; align-items: center; justify-content: center; transition: 0.2s; cursor: pointer;
        }
        .sov-accept { background: #dcfce7; color: #166534; }
        .sov-pause { background: #fef9c3; color: #854d0e; }
        .sov-delete { background: #fee2e2; color: #ef4444; }
        .sov-call { background: #e0f2fe; color: #0369a1; }
        .sov-btn:hover { filter: brightness(0.9); transform: scale(1.05); }

        /* --- كروت الطلبات الذكية --- */
        .smart-order-card {
            background: white; border-radius: 20px; padding: 20px; margin-bottom: 20px;
            border: 1px solid #e2e8f0; border-right: 8px solid #94a3b8;
            box-shadow: 0 5px 15px rgba(0,0,0,0.03); position: relative;
        }
        .status-danger { border-right-color: #ef4444; } /* لا يوجد سائق */
        .status-warning { border-right-color: #f59e0b; } /* بانتظار الاستلام */
        .status-success { border-right-color: #10b981; } /* في الطريق */
        
        .delay-badge {
            position: absolute; top: -10px; left: 20px; background: #ef4444; color: white;
            padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: bold;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

        .contact-pill {
            display: flex; align-items: center; gap: 8px; background: #f8fafc; padding: 8px 12px;
            border-radius: 12px; border: 1px solid #e2e8f0; font-size: 0.85rem;
        }

        @media (max-width: 1100px) {
            .sidebar { transform: translateX(100%); }
            .main-content { margin-right: 0; padding: 20px; }
            .sidebar.show { transform: translateX(0); }
        }
    </style>
</head>
<body>

<div id="authOverlay">
    <div class="auth-card">
        <div class="mb-4"><i data-lucide="shield-check" size="60" color="#f97316"></i></div>
        <h4 class="fw-black mb-3">دخول السيادة | نظام الحوت</h4>
        <input type="password" id="masterPass" class="form-control form-control-lg text-center mb-3 shadow-none border-2" placeholder="كلمة المرور" onkeypress="if(event.key === 'Enter') checkAuth()">
        <button class="btn btn-dark w-100 py-3 fw-bold rounded-4" onclick="checkAuth()">فتح بروتوكول القيادة</button>
    </div>
</div>

<div class="d-none" id="mainDashboard">
    <aside class="sidebar" id="sidebar">
        <div class="d-flex align-items-center gap-3 mb-5 px-3">
            <div class="bg-warning p-2 rounded-3"><i data-lucide="waves" color="#0f172a"></i></div>
            <h4 class="m-0 fw-black">مركز الحوت</h4>
        </div>
        <nav>
            <div class="nav-item active" onclick="showTab(event, 'live')"><i data-lucide="radar"></i> <span>الرصد الميداني</span></div>
            <div class="nav-item" onclick="showTab(event, 'orders')"><i data-lucide="shopping-bag"></i> <span>الأرشيف الإداري</span></div>
            <div class="nav-item" onclick="showTab(event, 'restaurants')"><i data-lucide="store"></i> <span>تحكم المطاعم</span></div>
            <div class="nav-item" onclick="showTab(event, 'drivers')"><i data-lucide="user-check"></i> <span>تحكم الأسطول</span></div>
        </nav>
    </aside>

    <main class="main-content">
        <header class="d-flex justify-content-between align-items-center mb-4">
            <div><h2 class="fw-black m-0">لوحة القيادة والسيادة</h2><p class="text-muted m-0">كركوك - بث حي ومباشر</p></div>
            <div id="liveTime" class="bg-white px-4 py-2 rounded-pill shadow-sm fw-bold border">00:00:00</div>
        </header>

        <div id="tab-live" class="admin-tab">
            <div class="row g-4 mb-4">
                <div class="col-md-4"><div class="stat-widget d-flex justify-content-between align-items-center"><div><small>طلبات اليوم</small><h2 id="count-orders" class="fw-black m-0">0</h2></div><i data-lucide="package" class="text-primary"></i></div></div>
                <div class="col-md-4"><div class="stat-widget d-flex justify-content-between align-items-center"><div><small>أسطول نشط</small><h2 id="count-drivers" class="fw-black m-0 text-success">0</h2></div><i data-lucide="truck" class="text-success"></i></div></div>
                <div class="col-md-4"><div class="stat-widget d-flex justify-content-between align-items-center"><div><small>شركاء الخدمة</small><h2 id="count-res" class="fw-black m-0 text-warning">0</h2></div><i data-lucide="store" class="text-warning"></i></div></div>
            </div>
            
            <div id="adminMap"></div>

            <div class="mt-5">
                <h4 class="fw-black mb-4 d-flex align-items-center gap-2"><i data-lucide="activity" class="text-danger"></i> رادار الطلبات النشطة</h4>
                <div class="row" id="smartOrdersContainer">
                    <div class="text-center p-5 text-muted">بانتظار وصول إشارات الميدان...</div>
                </div>
            </div>
        </div>

        <div id="tab-orders" class="admin-tab d-none">
            <div class="stat-widget"><table class="table align-middle"><thead><tr><th>ID</th><th>المطعم</th><th>السائق</th><th>الحالة</th><th>سيادة</th></tr></thead><tbody id="ordersTableBody"></tbody></table></div>
        </div>
        <div id="tab-restaurants" class="admin-tab d-none"><div class="row g-4" id="resListContainer"></div></div>
        <div id="tab-drivers" class="admin-tab d-none"><div class="row g-4" id="driverListContainer"></div></div>
    </main>
</div>

<script>
    lucide.createIcons();
    const API_URL = "https://script.google.com/macros/s/AKfycbwIELSbF-1Fioo5mTwhsJw4jZ3MRcAgOY5G43ma1vDu6OkOHvItLH3HOOCSZAguWd0Ssw/exec";
    
    function checkAuth() {
        const pass = document.getElementById('masterPass').value;
        if(pass === "223344") {
            document.getElementById('authOverlay').style.display = 'none';
            document.getElementById('mainDashboard').classList.remove('d-none');
            startClock(); refreshData(); setInterval(refreshData, 15000);
        } else { alert("❌ رمز الدخول السيادي خاطئ!"); }
    }

    function startClock() { setInterval(() => { document.getElementById('liveTime').innerText = new Date().toLocaleTimeString('ar-EG'); }, 1000); }

    function refreshData() {
        const script = document.createElement('script');
        script.src = `${API_URL}?action=getGlobalData&callback=renderData&ts=${Date.now()}`;
        document.body.appendChild(script);
    }

    window.renderData = function(data) {
        document.getElementById('count-orders').innerText = data.orders.length - 1;
        document.getElementById('count-drivers').innerText = data.drivers.filter(d => d[4] === 'active').length;
        document.getElementById('count-res').innerText = data.restaurants.filter(r => r[4] === 'active').length;

        // 1. معالجة الطلبات النشطة (الرادار الذكي)
        let smartHtml = '';
        const activeOrders = data.orders.slice(1).filter(o => o[6] !== 'completed' && o[6] !== 'مكتمل');
        
        activeOrders.forEach(o => {
            const hasDriver = o[7] ? true : false;
            const isPickedUp = (o[6] === 'picked_up' || o[6] === 'في الطريق');
            const diffMins = Math.floor((new Date() - new Date(o[0])) / 60000);
            
            let cardClass = "status-danger";
            let statusDesc = "بانتظار سائق...";
            if(hasDriver) { cardClass = "status-warning"; statusDesc = "السائق متوجه للمطعم"; }
            if(isPickedUp) { cardClass = "status-success"; statusDesc = "في الطريق للزبون"; }

            smartHtml += `
            <div class="col-xl-6">
                <div class="smart-order-card ${cardClass}">
                    ${diffMins > 30 ? `<div class="delay-badge">تأخير: ${diffMins} دقيقة</div>` : ''}
                    <div class="d-flex justify-content-between align-items-start mb-3">
                        <div><h5 class="fw-black m-0">طلب #${o[1]}</h5><small class="text-muted fw-bold">${statusDesc}</small></div>
                        <button class="btn btn-sm btn-dark rounded-pill px-3" onclick="trackDriver('${o[1]}')">تتبع اللحظي 📍</button>
                    </div>
                    <div class="d-flex flex-wrap gap-2 mb-3">
                        <div class="contact-pill"><i data-lucide="user" size="14"></i> ${o[3]} <button class="border-0 bg-transparent text-primary p-0 ms-1" onclick="window.open('tel:${o[4]}')">📞</button></div>
                        <div class="contact-pill"><i data-lucide="store" size="14"></i> ${o[2]}</div>
                        <div class="contact-pill"><i data-lucide="bike" size="14"></i> ${o[7] || 'لا يوجد'} ${hasDriver ? `<button class="border-0 bg-transparent text-primary p-0 ms-1" onclick="window.open('tel:${o[8]}')">📞</button>` : ''}</div>
                    </div>
                </div>
            </div>`;
        });
        document.getElementById('smartOrdersContainer').innerHTML = smartHtml || '<div class="text-center p-4">لا توجد طلبات نشطة حالياً.</div>';

        // 2. تحديث قوائم التحكم (المطاعم والكباتن)
        renderControlCards('resListContainer', data.restaurants, 'store', 'RESTAURANT');
        renderControlCards('driverListContainer', data.drivers, 'user', 'DRIVER');
        
        lucide.createIcons();
    };

    function renderControlCards(containerId, list, icon, type) {
        let html = '';
        list.slice(1).forEach(item => {
            const isActive = item[4] === 'active';
            html += `
            <div class="col-md-6 col-xl-4">
                <div class="stat-widget flex-column align-items-stretch">
                    <div class="d-flex align-items-center gap-3 mb-3">
                        <div class="icon-shape bg-light"><i data-lucide="${icon}"></i></div>
                        <div class="flex-grow-1"><h6 class="m-0 fw-bold">${item[1]}</h6><small class="text-muted">${item[2]}</small></div>
                    </div>
                    <div class="d-flex justify-content-between pt-2 border-top">
                        <div class="d-flex gap-2">
                            <button class="sov-btn sov-accept" onclick="adminAction('ACTIVATE', '${type}', '${item[2]}')" title="تفعيل"><i data-lucide="check" size="18"></i></button>
                            <button class="sov-btn sov-pause" onclick="adminAction('PAUSE', '${type}', '${item[2]}')" title="إيقاف مؤقت"><i data-lucide="pause" size="18"></i></button>
                            <button class="sov-btn sov-delete" onclick="adminAction('DELETE', '${type}', '${item[2]}')" title="حذف نهائي"><i data-lucide="trash-2" size="18"></i></button>
                        </div>
                        <button class="sov-btn sov-call" onclick="window.open('tel:${item[3]}')"><i data-lucide="phone" size="18"></i></button>
                    </div>
                </div>
            </div>`;
        });
        document.getElementById(containerId).innerHTML = html;
    }

    function adminAction(cmd, type, id) {
        if(confirm(`سيادة المدير، هل أنت متأكد من تنفيذ أمر (${cmd}) على (${id})؟`)) {
            // هنا يتم الربط مع Google Script لتنفيذ الحذف أو الإيقاف الفعلي
            alert("تم إرسال الأمر السيادي للسيرفر بنجاح.");
        }
    }

    function trackDriver(orderId) { alert("جاري فتح رادار التتبع للسائق المرتبط بالطلب #" + orderId); }

    function showTab(e, name) {
        document.querySelectorAll('.admin-tab').forEach(t => t.classList.add('d-none'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('tab-' + name).classList.remove('d-none');
        e.currentTarget.classList.add('active');
        lucide.createIcons();
    }
</script>

<script async defer src="https://maps.googleapis.com/maps/api/js?callback=initMap"></script>
<script>
    function initMap() {
        new google.maps.Map(document.getElementById("adminMap"), {
            zoom: 13, center: { lat: 35.468, lng: 44.392 },
            styles: [{ "featureType": "all", "elementType": "labels.text.fill", "stylers": [{"color": "#ffffff"}] }] 
        });
    }
</script>
</body>
</html>
