<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم سفيان | منظومة الحوت 🐋</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --primary: #2563eb; --accent: #f59e0b; --bg-body: #0f172a; --card-bg: rgba(30, 41, 59, 0.7); }
        body { background: var(--bg-body); color: #f1f5f9; font-family: 'Tajawal', sans-serif; min-height: 100vh; margin: 0; overflow-x: hidden; }
        #login-block { background: radial-gradient(circle at center, #1e293b 0%, #020617 100%); display: flex; align-items: center; justify-content: center; position: fixed; inset: 0; z-index: 9999; }
        #map { height: 400px; border-radius: 2rem; border: 2px solid rgba(255,255,255,0.1); margin: 1.5rem 0; box-shadow: 0 20px 50px rgba(0,0,0,0.5); z-index: 10; }
        .glass-panel { background: var(--card-bg); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); border-radius: 1.5rem; padding: 1.5rem; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .item-row { border-radius: 1rem; padding: 12px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.05); transition: all 0.3s ease; font-size: 13px; background: rgba(255,255,255,0.03); }
        .status-active { color: #10b981; font-weight: bold; }
        .status-pending { color: #f59e0b; font-weight: bold; }
        .status-banned { color: #ef4444; font-weight: bold; }
        .btn-action { padding: 6px 12px; border-radius: 8px; font-size: 11px; font-weight: 900; color: white; cursor: pointer; transition: 0.2s; }
        .bg-btn-blue { background: #3b82f6; }
        .bg-btn-red { background: #ef4444; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="login-block">
        <div class="max-w-[400px] w-full p-10 text-center glass-panel border-t-4 border-blue-500">
            <div class="w-24 h-24 bg-blue-600 rounded-3xl mx-auto mb-6 flex items-center justify-center shadow-2xl animate-pulse">
                <span class="text-5xl">🐋</span>
            </div>
            <h1 class="text-2xl font-black text-white mb-2" style="font-family: 'Orbitron';">HUT MASTER</h1>
            <p class="text-slate-400 text-xs mb-8 font-bold italic uppercase tracking-widest">وحدة التحكم المركزية</p>
            <input type="password" id="master-pass" placeholder="أدخل الرمز السري" class="w-full bg-slate-900/50 border border-slate-700 rounded-2xl p-5 text-center text-blue-400 mb-6 outline-none font-bold text-xl tracking-[0.5em]">
            <button onclick="checkAuth()" id="loginBtn" class="w-full bg-blue-600 text-white p-5 rounded-2xl font-black hover:bg-blue-500 transition-all shadow-lg shadow-blue-500/20">دخول النظام</button>
        </div>
    </div>

    <div id="main-ui" class="hidden p-6 max-w-[1800px] mx-auto">
        <header class="flex justify-between items-center mb-8 bg-slate-900/50 p-5 rounded-[2rem] border border-white/5 shadow-2xl">
            <div class="flex items-center gap-5">
                <div class="w-14 h-14 bg-blue-600 rounded-2xl flex items-center justify-center text-white text-2xl font-black">S</div>
                <div>
                    <h1 class="text-xl font-black text-white leading-none">لوحة تحكم سفيان</h1>
                    <span class="text-[10px] text-blue-500 font-black uppercase tracking-tighter">AL-HUT NETWORK SYSTEM V6.2</span>
                </div>
            </div>
            <div class="flex gap-4">
                <button onclick="loadMasterData()" class="bg-white/5 hover:bg-white/10 p-3 px-6 rounded-2xl text-xs font-bold border border-white/5 italic">تحديث البيانات 🔄</button>
                <div id="clock" class="font-black text-blue-400 bg-black/40 px-8 py-3 rounded-2xl text-sm border border-blue-500/20 italic">00:00:00</div>
            </div>
        </header>

        <div id="map"></div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mt-8">
            <section class="glass-panel h-[650px] flex flex-col border-t-4 border-blue-500">
                <h2 class="font-black text-sm uppercase tracking-widest text-blue-400 mb-5"><i class="fas fa-motorcycle ml-2"></i> رادار الطيارين</h2>
                <div id="drivers-list" class="overflow-y-auto flex-1"></div>
            </section>

            <section class="glass-panel h-[650px] flex flex-col border-t-4 border-emerald-500">
                <h2 class="font-black text-sm uppercase tracking-widest text-emerald-400 mb-5"><i class="fas fa-utensils ml-2"></i> المطاعم المسجلة</h2>
                <div id="restaurants-list" class="overflow-y-auto flex-1"></div>
            </section>

            <section class="glass-panel h-[650px] flex flex-col border-t-4 border-amber-500">
                <h2 class="font-black text-sm uppercase tracking-widest text-amber-400 mb-5"><i class="fas fa-route ml-2"></i> العمليات النشطة</h2>
                <div id="orders-list" class="overflow-y-auto flex-1"></div>
            </section>

            <section class="glass-panel h-[650px] flex flex-col border-t-4 border-slate-500 text-center">
                <h2 class="font-black text-sm uppercase tracking-widest text-slate-400 mb-5">حالة النظام</h2>
                <div class="bg-emerald-500/10 p-4 rounded-2xl border border-emerald-500/20 mb-4">
                    <p class="text-emerald-500 font-black text-xs italic">SYSTEM ONLINE 🛰️</p>
                </div>
                <div id="settings-info" class="text-right text-[11px] space-y-2 text-slate-400">
                    </div>
            </section>
        </div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbzBTRYdugjCeYZoeaHng4JPIq0vBu-b3VHNuEX9ya0H1C022PDangGTOR9I-v4i83rDoA/exec';
        let map, markers = {};

        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('ar-EG');
        }, 1000);

        async function checkAuth() {
            const pass = document.getElementById('master-pass').value;
            const btn = document.getElementById('loginBtn');
            btn.innerHTML = "جاري التحقق...";
            
            try {
                // نطلب الإعدادات للتأكد من الرقم السري
                const res = await fetch(`${scriptURL}?action=get_settings`);
                const settings = await res.json();
                
                if(pass === settings.Master_Pass) {
                    localStorage.setItem('master_pass', pass);
                    document.getElementById('login-block').classList.add('hidden');
                    document.getElementById('main-ui').classList.remove('hidden');
                    initMap();
                    loadMasterData();
                    setInterval(loadMasterData, 15000);
                } else {
                    alert("الرمز السري غير صحيح!");
                    btn.innerText = "دخول النظام";
                }
            } catch (e) { alert("فشل الاتصال بالخادم"); btn.innerText = "دخول النظام"; }
        }

        function initMap() {
            map = L.map('map', { zoomControl: false }).setView([35.468, 44.392], 13);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        }

        async function loadMasterData() {
            try {
                // جلب كافة البيانات في طلب واحد (تحتاج إضافة أكشن get_full_data في Apps Script لاحقاً أو جلبهم منفصلين)
                // حالياً سنفترض أننا نجلب الأقسام الرئيسية
                const [driversRes, restRes, ordersRes] = await Promise.all([
                    fetch(`${scriptURL}?action=get_list&type=Drivers`),
                    fetch(`${scriptURL}?action=get_list&type=Restaurants`),
                    fetch(`${scriptURL}?action=get_list&type=Orders`)
                ]);
                
                const drivers = await driversRes.json();
                const rests = await restRes.json();
                const orders = await ordersRes.json();

                renderDrivers(drivers);
                renderRestaurants(rests);
                renderOrders(orders);
            } catch(e) { console.log("Updating..."); }
        }

        function renderDrivers(data) {
            const container = document.getElementById('drivers-list');
            container.innerHTML = data.map(d => `
                <div class="item-row border-r-4 ${d.status === 'active' ? 'border-emerald-500' : 'border-red-500'}">
                    <div class="flex justify-between">
                        <div>
                            <p class="font-black text-white">${d.name}</p>
                            <p class="text-[10px] text-slate-500">${d.phone}</p>
                        </div>
                        <span class="status-${d.status} text-[9px] uppercase">${d.status}</span>
                    </div>
                    <button onclick="updateStatus('Drivers', '${d.phone}', '${d.status === 'active' ? 'banned' : 'active'}')" 
                            class="w-full mt-3 btn-action ${d.status === 'active' ? 'bg-btn-red' : 'bg-btn-blue'}">
                        ${d.status === 'active' ? 'حظر الكابتن' : 'تفعيل الكابتن'}
                    </button>
                </div>
            `).join('');
        }

        function renderRestaurants(data) {
            const container = document.getElementById('restaurants-list');
            container.innerHTML = data.map(r => `
                <div class="item-row border-r-4 border-emerald-500">
                    <div class="flex justify-between items-center">
                        <p class="font-black text-white">${r.name}</p>
                        <span class="text-[9px] bg-white/5 p-1 rounded text-slate-400">${r.area}</span>
                    </div>
                    <p class="text-[10px] text-slate-500 mt-1">${r.phone}</p>
                    <button onclick="deleteItem('Restaurants', '${r.phone}')" class="text-red-500 text-[10px] font-bold mt-2">حذف المطعم 🗑️</button>
                </div>
            `).join('');
        }

        function renderOrders(data) {
            const container = document.getElementById('orders-list');
            container.innerHTML = data.reverse().map(o => `
                <div class="item-row border-r-4 ${o.status === 'waiting' ? 'border-amber-500 animate-pulse' : 'border-blue-500'}">
                    <div class="flex justify-between">
                        <span class="font-black text-amber-500 text-[10px]">${o.id}</span>
                        <span class="text-[9px] text-slate-500 italic">${o.status}</span>
                    </div>
                    <p class="font-bold text-white text-xs mt-1">${o.restaurant} ➔ ${o.area}</p>
                    <div class="mt-2 flex gap-2">
                        <button onclick="deleteItem('Orders', '${o.id}')" class="bg-red-500/20 text-red-500 px-2 py-1 rounded text-[9px] font-black">حذف</button>
                    </div>
                </div>
            `).join('');
        }

        async function updateStatus(type, id, newVal) {
            await fetch(scriptURL, {
                method: 'POST',
                body: JSON.stringify({ action: 'update_status', type: type, id: id, status: newVal })
            });
            loadMasterData();
        }

        async function deleteItem(type, id) {
            if(!confirm("هل أنت متأكد من الحذف؟")) return;
            await fetch(scriptURL, {
                method: 'POST',
                body: JSON.stringify({ action: 'delete_item', type: type, id: id })
            });
            loadMasterData();
        }
    </script>
</body>
</html>
