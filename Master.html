<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <script>
        // --- الإصدار 5.3 (اللوحة السيادية - تناسق تام 100% وإصلاح التنقل) ---
        const CURRENT_APP_VERSION = "5.3";
        const VERSION_KEY = 'hut_master_app_version';
        try {
            if (localStorage.getItem(VERSION_KEY) !== CURRENT_APP_VERSION) {
                localStorage.setItem(VERSION_KEY, CURRENT_APP_VERSION);
                if (localStorage.getItem(VERSION_KEY) === CURRENT_APP_VERSION) {
                    console.log("نسخة إدارة سيادية جديدة مكتشفة... جاري التحديث!");
                    if ('caches' in window) { caches.keys().then(names => names.forEach(n => caches.delete(n))); }
                    if ('serviceWorker' in navigator) { navigator.serviceWorker.getRegistrations().then(regs => regs.forEach(r => r.update())); }
                    window.location.reload();
                }
            }
        } catch (e) { console.warn('تعذّر التحقق من الإصدار:', e.message); }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>مكتب سفيان | الإدارة العليا</title>
    <meta name="theme-color" content="#f0f7ff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="إدارة الحوت">
    <link rel="apple-touch-icon" href="master-logo.png">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest" defer></script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.heat/0.2.0/leaflet-heat.js" defer></script>

    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

    <style>
        /* 💎 DESIGN SYSTEM — PREMIUM LIGHT */
        :root {
            --primary:       #3b9edd;   
            --primary-dark:  #1d7fc4;   
            --primary-light: #e8f4fd;   
            --primary-mist:  #f0f7ff;   
            --accent:        #f97316;   
            --accent-dark:   #ea580c;   
            --accent-light:  #fff4ed;   
            --surface:       #ffffff;
            --border:        rgba(59,158,221,0.15);
            --text-1:        #0f2744;
            --text-2:        #3d5a80;
            --text-3:        #7a9bbf;
            --success:       #0dba77;
            --warning:       #f59e0b;
            --danger:        #ef4444;
            --purple:        #7c3aed;
            --s-xs: 0 2px 8px rgba(15,39,68,0.05);
            --s-sm: 0 8px 24px rgba(15,39,68,0.06);
            --s-lg: 0 20px 48px rgba(15,39,68,0.12);
            --r-md: 20px; --r-lg: 28px; --r-full: 999px;
            --nav-h: 75px;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; width: 100%; overflow: hidden; background: var(--primary-mist); font-family: 'Cairo', sans-serif; color: var(--text-1); -webkit-tap-highlight-color: transparent; }
        .hidden-section { display: none !important; }

        /* Ticker */
        .top-ticker { background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); padding: 8px 15px; font-size: 0.8rem; font-weight: 800; color: var(--primary-dark); white-space: nowrap; overflow: hidden; display: flex; align-items: center; position: fixed; top: 0; left:0; width: 100%; z-index: 1050; box-shadow: var(--s-xs); height: 35px; }
        .ticker-content { display: inline-block; animation: tickerScroll 25s linear infinite; }
        @keyframes tickerScroll { 0% { transform: translateX(100vw); } 100% { transform: translateX(-100%); } }

        /* Layout Structure */
        #mainDashboard { display: flex; flex-direction: column; height: 100vh; width: 100vw; padding-top: 35px; padding-bottom: var(--nav-h); position: relative; }
        .admin-tab { flex: 1; overflow-y: auto; overflow-x: hidden; background: var(--primary-mist); position: absolute; top: 35px; bottom: var(--nav-h); left: 0; right: 0; opacity: 0; visibility: hidden; transition: opacity 0.3s ease; }
        .admin-tab.active-tab { opacity: 1; visibility: visible; z-index: 10; }

        /* Live Tab Specifics (Map + Bottom Sheet) */
        #tab-live.active-tab { display: flex; flex-direction: column; }
        .map-wrapper { flex: 1; position: relative; transition: all 0.3s ease; min-height: 40vh; }
        .map-wrapper.fullscreen { position: fixed !important; top: 0 !important; left: 0 !important; width: 100vw !important; height: 100vh !important; z-index: 9999 !important; }
        #adminMap { width: 100%; height: 100%; }
        
        .bottom-sheet { flex: 1; max-height: 50vh; background: var(--primary-mist); border-radius: 30px 30px 0 0; z-index: 1000; display: flex; flex-direction: column; box-shadow: 0 -10px 30px rgba(15,39,68,0.08); transition: 0.3s; }
        .sheet-handle { width: 40px; height: 5px; background: #cbd5e1; border-radius: 99px; margin: 12px auto; flex-shrink: 0; }
        .sheet-content { overflow-y: auto; padding: 10px 15px 20px; flex: 1; scrollbar-width: none; }
        .sheet-content::-webkit-scrollbar { display: none; }

        /* FABs */
        .fab-map-action { position: absolute; right: 15px; width: 45px; height: 45px; border-radius: 14px; background: var(--surface); color: var(--text-1); display: flex; align-items: center; justify-content: center; box-shadow: var(--s-sm); cursor: pointer; z-index: 1010; border: 1px solid var(--border); transition: 0.2s; }
        .fab-map-action:active { transform: scale(0.9); }
        .fab-expand { top: 15px; }
        .fab-cancel-track { top: 70px; background: #fef2f2; color: var(--danger); border-color: #fecaca; display: none; }
        .fab-broadcast { position: absolute; bottom: 20px; left: 15px; width: 55px; height: 55px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent-dark)); color: white; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 24px rgba(249,115,22,0.35); cursor: pointer; z-index: 1010; border: none; transition: 0.2s; }
        .fab-broadcast:active { transform: scale(0.9); }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: var(--nav-h); background: rgba(255,255,255,0.95); backdrop-filter: blur(20px); border-top: 1px solid var(--border); border-radius: 25px 25px 0 0; display: flex; justify-content: space-around; align-items: center; z-index: 10000; padding-bottom: env(safe-area-inset-bottom); box-shadow: 0 -5px 25px rgba(0,0,0,0.05); }
        .b-nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; width: 25%; cursor: pointer; padding: 10px 0; transition: 0.3s; }
        .b-nav-icon { width: 40px; height: 40px; border-radius: 14px; display: flex; align-items: center; justify-content: center; color: var(--text-3); transition: 0.3s; }
        .b-nav-label { font-size: 0.65rem; font-weight: 800; color: var(--text-3); transition: 0.3s; }
        .b-nav-item.active .b-nav-icon { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: #fff; box-shadow: 0 4px 15px rgba(59,158,221,0.4); transform: translateY(-3px); }
        .b-nav-item.active .b-nav-label { color: var(--primary-dark); }

        /* General UI Elements */
        .filter-bar { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 5px; margin-bottom: 15px; scrollbar-width: none; }
        .filter-bar::-webkit-scrollbar { display: none; }
        .fp { flex-shrink: 0; padding: 8px 16px; border-radius: var(--r-full); font-family: 'Cairo'; font-size: 0.8rem; font-weight: 800; color: var(--text-2); background: var(--surface); border: 1px solid var(--border); cursor: pointer; transition: 0.2s; white-space: nowrap; }
        .fp.active { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: #fff; border-color: transparent; box-shadow: 0 4px 12px rgba(59,158,221,0.3); }

        .order-card { background: var(--surface); border-radius: var(--r-md); padding: 15px; margin-bottom: 12px; box-shadow: var(--s-xs); border: 1px solid var(--border); border-right: 4px solid var(--primary); position: relative; overflow: hidden; transition: 0.2s; }
        .oc-warn { border-right-color: var(--warning); background: #fffdf5; }
        .oc-danger { border-right-color: var(--danger); background: #fff5f5; animation: urgentBlink 2s infinite; }
        @keyframes urgentBlink { 0%, 100% { border-left: 1px solid var(--border); } 50% { border-left: 3px solid var(--danger); } }
        .oc-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .oc-title { font-weight: 900; font-size: 0.95rem; color: var(--text-1); }
        .oc-price { font-weight: 900; color: var(--success); font-size: 1rem; }
        .reject-tag { background: #fef2f2; color: var(--danger); font-size: 0.7rem; font-weight: 800; padding: 3px 8px; border-radius: 8px; border: 1px solid #fecaca; display: inline-flex; align-items: center; gap: 4px; margin-top: 5px; }
        .btn-action-sm { background: var(--primary-light); color: var(--primary); border: none; padding: 6px 12px; border-radius: 12px; font-size: 0.8rem; font-weight: 800; display: inline-flex; align-items: center; gap: 5px; cursor: pointer; transition: 0.2s; font-family: 'Cairo'; }
        .btn-action-sm:active { transform: scale(0.95); }
        .btn-action-sm.red { background: #fef2f2; color: var(--danger); }
        .assign-select { border: 1.5px solid var(--border); border-radius: 12px; padding: 6px 10px; font-family: 'Cairo'; font-size: 0.75rem; font-weight: 800; max-width: 120px; background: var(--surface); color: var(--primary-dark); outline: none; }

        .entity-card { background: var(--surface); border-radius: var(--r-md); padding: 15px; margin-bottom: 10px; border: 1px solid var(--border); display: flex; flex-direction: column; position: relative; overflow: hidden; }
        .e-info { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .e-avatar { width: 42px; height: 42px; border-radius: 14px; background: var(--primary-light); color: var(--primary); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; flex-shrink: 0; }
        .e-name { font-weight: 900; color: var(--text-1); font-size: 0.95rem; }
        .e-sub { font-size: 0.75rem; color: var(--text-3); font-weight: 700; }
        .e-debt-box { background: #fef2f2; border-radius: 12px; padding: 8px 12px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .e-actions { display: flex; justify-content: space-between; border-top: 1px solid var(--border); padding-top: 10px; }
        .perf-dot { position: absolute; top: 12px; left: 12px; width: 10px; height: 10px; border-radius: 50%; }
        .perf-green { background: var(--success); box-shadow: 0 0 8px rgba(13,186,119,0.5); }
        .perf-yellow { background: var(--warning); }
        .perf-red { background: var(--danger); }

        /* Map Markers */
        .smooth-marker { transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .drv-marker { width: 34px; height: 34px; border-radius: 50%; border: 2px solid #fff; display: flex; align-items: center; justify-content: center; font-size: 15px; box-shadow: var(--s-sm); }
        .drv-active { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: #fff; }
        .drv-ghost { background: #94a3b8; filter: grayscale(100%); opacity: 0.8; }
        .res-pulse { width: 24px; height: 24px; background: var(--accent); border-radius: 50%; border: 2px solid #fff; color: white; display: flex; align-items: center; justify-content: center; font-size: 10px; box-shadow: 0 0 0 0 rgba(249, 115, 22, 0.7); animation: rPulse 1.5s infinite; }
        @keyframes rPulse { 70% { box-shadow: 0 0 0 10px rgba(249, 115, 22, 0); } 100% { box-shadow: 0 0 0 0 rgba(249, 115, 22, 0); } }

        /* Modals & Utils */
        .modal-overlay { position: fixed; inset: 0; background: rgba(15,39,68,0.6); backdrop-filter: blur(5px); z-index: 200000; display: none; align-items: center; justify-content: center; padding: 20px; animation: fadeIn 0.3s; }
        .modal-card { background: var(--surface); border-radius: var(--r-xl); width: 100%; max-width: 350px; padding: 25px; box-shadow: var(--s-lg); animation: emergIn .3s; }
        .msg-btn { width: 100%; text-align: right; background: var(--primary-mist); border: 1px solid var(--border); padding: 12px; border-radius: 12px; margin-bottom: 8px; font-weight: 800; color: var(--text-2); cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 10px; font-family: 'Cairo'; }
        .msg-btn:active { transform: scale(0.98); background: var(--primary-light); }
        
        #toast-container { position: fixed; top: 45px; left: 50%; transform: translateX(-50%); z-index: 999999; display: flex; flex-direction: column; gap: 8px; width: 90%; max-width: 350px; pointer-events: none; }
        .toast-msg { background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); border-radius: 16px; padding: 12px 16px; box-shadow: var(--s-md); display: flex; align-items: center; gap: 10px; font-weight: 800; font-size: 0.85rem; border: 1px solid var(--border); animation: toastIn .3s forwards; }
        @keyframes toastIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        
        .spinner-mini { width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .arch-toolbar { background: var(--surface); border-radius: var(--r-md); padding: 15px; border: 1px solid var(--border); margin-bottom: 15px; }
        .form-ctrl { width: 100%; background: var(--primary-mist); border: 1.5px solid var(--border); border-radius: 12px; padding: 10px; font-family: 'Cairo'; font-size: 0.8rem; font-weight: 700; outline: none; margin-bottom: 10px;}
        .arch-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; background: var(--surface); border-radius: var(--r-md); overflow: hidden;}
        .arch-table th { background: var(--primary-mist); padding: 12px; text-align: right; color: var(--text-3); font-weight: 800; }
        .arch-table td { padding: 12px; border-bottom: 1px solid var(--border); font-weight: 700; }
        .empty-state { text-align: center; padding: 40px 20px; color: var(--text-3); }

        .leaflet-container { font-family: 'Cairo', sans-serif; }
        .leaflet-popup-content-wrapper { border-radius: var(--r-sm) !important; box-shadow: var(--s-sm) !important; }
        .map-popup { padding: 5px; font-weight: 800; font-size: 0.85rem; color: var(--text-1); text-align: center; }
        .path-animated { animation: dashMove 15s linear infinite; }
        @keyframes dashMove { to { stroke-dashoffset: -1000; } }
        
        /* Auth Screen */
        #authOverlay { position: fixed; inset: 0; z-index: 1000000; background: linear-gradient(145deg, #dbeeff 0%, #f0f7ff 40%, #fff4ed 100%); display: flex; align-items: center; justify-content: center; }
        .auth-wrap { width: 90%; max-width: 350px; background: rgba(255,255,255,0.9); backdrop-filter: blur(20px); border-radius: 30px; padding: 40px 30px; text-align: center; box-shadow: var(--s-lg); }
    </style>
</head>
<body>

<div id="toast-container"></div>
<audio id="adminAlertSound" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" preload="auto"></audio>

<div id="authOverlay">
    <div class="auth-wrap">
        <div style="width:70px; height:70px; background:linear-gradient(135deg, var(--primary), var(--primary-dark)); color:white; border-radius:20px; display:inline-flex; align-items:center; justify-content:center; margin-bottom:20px; box-shadow:var(--s-blue);"><i data-lucide="shield-check" width="35" height="35"></i></div>
        <h3 class="fw-black mb-1 text-dark">برج المراقبة</h3>
        <p class="text-muted fw-bold mb-4 small">نظام الحوت - الإدارة العليا</p>
        <input type="password" id="masterPass" class="form-control mb-3 text-center fw-bold" style="border-radius:15px; padding:15px; background:var(--primary-mist); border:2px solid transparent;" placeholder="رمز السيادة" onkeypress="if(event.key==='Enter') checkAuth()">
        <button class="btn w-100 fw-bold text-white" id="loginBtn" style="background:linear-gradient(135deg, var(--primary), var(--primary-dark)); padding:15px; border-radius:15px; box-shadow:var(--s-blue);" onclick="checkAuth()">تسجيل الدخول</button>
    </div>
</div>

<div class="main-wrapper d-none" id="appMain">
    
    <div class="top-ticker">
        <div class="ticker-content" id="tickerText"><span>🟢 جاري الاتصال بالرادار اللحظي...</span></div>
    </div>

    <div id="tab-live" class="admin-tab active-tab">
        <div class="map-wrapper" id="mapWrapper">
            <div id="adminMap"></div>
            <button class="fab-map-action fab-expand" onclick="toggleFullscreen()"><i data-lucide="maximize" id="fsIcon"></i></button>
            <button class="fab-map-action fab-cancel-track" id="btnCancelTrack" onclick="cancelTracking()"><i data-lucide="x"></i></button>
            <button class="fab-broadcast" onclick="document.getElementById('broadcastModal').style.display='flex'"><i data-lucide="megaphone" width="22"></i></button>
        </div>

        <div class="bottom-sheet" id="radarSheet">
            <div class="sheet-handle"></div>
            <div class="sheet-content">
                <div class="filter-bar" id="radarFilters">
                    <button class="fp active" onclick="filterRadar('all',this)">الكل</button>
                    <button class="fp" style="color:var(--danger)" onclick="filterRadar('pending',this)">بانتظار كابتن</button>
                    <button class="fp" style="color:var(--success)" onclick="filterRadar('active',this)">قيد التوصيل</button>
                </div>
                <div id="smartOrdersContainer">
                    <div class="text-center text-muted fw-bold mt-4"><div class="spinner-border spinner-border-sm mb-2 text-primary"></div><br>جاري رصد الميدان...</div>
                </div>
            </div>
        </div>
    </div>

    <div class="admin-tab" id="tab-drivers" style="padding: 15px;">
        <h4 class="fw-black mb-3 text-primary"><i data-lucide="users" class="me-2" width="24"></i> الأسطول اللحظي <span id="drvCount" class="badge bg-primary rounded-pill fs-6 ms-2">0</span></h4>
        <input type="text" id="searchDriverInput" class="form-ctrl mb-3" placeholder="بحث بالاسم أو الرقم..." oninput="renderEntityLists('DRIVER')">
        <div id="driversListContainer"></div>
    </div>

    <div class="admin-tab" id="tab-res" style="padding: 15px;">
        <h4 class="fw-black mb-3 text-accent"><i data-lucide="store" class="me-2" width="24"></i> الشركاء والديون <span id="resCount" class="badge rounded-pill fs-6 ms-2" style="background:var(--accent);">0</span></h4>
        <input type="text" id="searchResInput" class="form-ctrl mb-3" placeholder="بحث باسم المطعم..." oninput="renderEntityLists('RESTAURANT')">
        <div id="resListContainer"></div>
    </div>

    <div class="admin-tab" id="tab-orders" style="padding: 15px;">
        <h4 class="fw-black mb-3"><i data-lucide="file-text" class="me-2" width="24"></i> الأرشيف المركزي</h4>
        <div class="arch-toolbar">
            <input type="text" id="arcSearch" class="form-ctrl" placeholder="بحث برقم الطلب..." oninput="renderArchive()">
            <div class="row g-2">
                <div class="col-6"><input type="date" id="arcDateFrom" class="form-ctrl" onchange="renderArchive()"></div>
                <div class="col-6"><input type="date" id="arcDateTo" class="form-ctrl" onchange="renderArchive()"></div>
            </div>
            <button class="btn w-100 fw-bold text-white mt-2" style="background:var(--primary); border-radius:12px; padding:10px;" onclick="exportExcel()"><i data-lucide="download" width="16" class="me-2"></i> تصدير إكسل</button>
        </div>
        <div style="overflow-x:auto; border-radius:var(--r-md); border:1px solid var(--border);">
            <table class="arch-table" id="archiveTable">
                <thead><tr><th>الطلب</th><th>التاريخ</th><th>المطعم</th><th>الكابتن</th></tr></thead>
                <tbody id="ordersTableBody"><tr><td colspan="4" class="text-center py-4 fw-bold text-muted">جاري التحميل...</td></tr></tbody>
            </table>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="b-nav-item active" onclick="switchTab('live', this)">
            <div class="b-nav-icon"><i data-lucide="radar" width="22"></i></div><span class="b-nav-label">الرادار</span>
        </div>
        <div class="b-nav-item" onclick="switchTab('drivers', this)">
            <div class="b-nav-icon"><i data-lucide="users" width="22"></i></div><span class="b-nav-label">الكباتن</span>
        </div>
        <div class="b-nav-item" onclick="switchTab('res', this)">
            <div class="b-nav-icon"><i data-lucide="store" width="22"></i></div><span class="b-nav-label">المطاعم</span>
        </div>
        <div class="b-nav-item" onclick="switchTab('orders', this)">
            <div class="b-nav-icon"><i data-lucide="file-text" width="22"></i></div><span class="b-nav-label">الأرشيف</span>
        </div>
    </nav>
</div>

<div class="modal-overlay" id="broadcastModal" onclick="this.style.display='none'">
    <div class="modal-card" onclick="event.stopPropagation()">
        <h5 class="fw-black mb-3 text-primary"><i data-lucide="radio" class="me-2"></i> بث رسالة سيادية</h5>
        <p class="text-muted fw-bold small mb-4">ستظهر كإشعار يوقف شاشة جميع الكباتن.</p>
        <button class="msg-btn" onclick="sendBroadcast('prayer')"><span style="font-size:1.5rem;">🕌</span> <span>حان موعد الصلاة، تقبل الله طاعاتكم.</span></button>
        <button class="msg-btn" onclick="sendBroadcast('clean')"><span style="font-size:1.5rem;">🧼</span> <span>الرجاء الحفاظ على نظافة الصندوق والدراجة.</span></button>
        <button class="msg-btn" onclick="sendBroadcast('trust')"><span style="font-size:1.5rem;">✨</span> <span>توكلوا على الله، يوم عمل موفق.</span></button>
        <button class="btn btn-light w-100 fw-bold mt-2" onclick="document.getElementById('broadcastModal').style.display='none'">إلغاء</button>
    </div>
</div>

<script>
/* ═══════════════════════════════════════════
   🛡️ XSS Protection & Constants
═══════════════════════════════════════════ */
function escHtml(str) { if(str==null)return''; const d=document.createElement('div'); d.textContent=String(str); return d.innerHTML; }
function safeIcon(id) { const el = document.getElementById(id); if(el && typeof lucide !== 'undefined') lucide.createIcons({root: el}); }

const O = { ID:0, REST_NAME:1, AREA:2, DETAILS:3, PRICE:4, STATUS:5, DRIVER_PHONE:6, TIME:7 };
const R = { ID:0, NAME:1, PHONE:2, AREA:3, STATUS:4, COMMISSION:5, LAT:6, LNG:7, PAY_TYPE:8 };
const D = { ID:0, NAME:1, PHONE:2, AREA:3, STATUS:4, LAT:5, LNG:6 };

const API_URL   = "https://script.google.com/macros/s/AKfycbxt4vA6cbF7sCRg196WYQoc26mR2yc9JelqotDzVdLDEEPjFtXDDXVbT7l_FwbZTANA/exec";
const API_TOKEN = "HUT_SECURE_99";

let map, heatLayer, driverClusterGroup, trackPolyline = null;
let globalData = null;
let currentRadarFilter = 'all';
let masterPassword = "";
let lastPendingCount = 0;
let liveFirebaseOrders = [];
let liveDriverMarkers = {};
let liveResMarkers = {};
let liveLedgers = { drivers: {}, restaurants: {} };
let isFirebaseListening = false;
let isFullscreen = false;
let dataRefreshInterval = null;

/* ─── Init Firebase ─── */
firebase.initializeApp({
    apiKey: "AIzaSyAo1rmqUzieYZU3RIwXOAN87GkpNrp-_Hc",
    authDomain: "sufyan-delivery.firebaseapp.com",

    projectId: "sufyan-delivery"
});
const db = firebase.database();
if (typeof lucide !== 'undefined') lucide.createIcons();

function showToast(msg, isError = false) {
    const c = document.getElementById('toast-container');
    const t = document.createElement('div');
    t.className = 'toast-msg';
    t.style.cssText = `background:${isError?'#fef2f2':'#e6faf3'}; color:${isError?'#ef4444':'#0dba77'}; border-color:${isError?'#fecaca':'#a7f3d0'};`;
    t.innerHTML = `<i data-lucide="${isError?'alert-circle':'check-circle'}"></i> ${escHtml(msg)}`;
    c.appendChild(t); lucide.createIcons({root: t});
    setTimeout(() => { t.style.opacity='0'; t.style.transform='translateY(-10px)'; t.style.transition='0.3s'; setTimeout(()=>t.remove(),300); }, 3000);
}

function sendBroadcast(type) {
    const msgs = { prayer: "🕌 حان الآن موعد الصلاة، تقبل الله طاعاتكم.", clean: "🧼 تذكير: يرجى الحفاظ على نظافة صندوق التوصيل، الدراجة، والمظهر العام.", trust: "✨ توكلوا على الله، يوم عمل موفق ورزق حلال للجميع." };
    db.ref('system_broadcast').set({ msg: msgs[type], ts: Date.now() });
    showToast("تم إرسال البث بنجاح");

/* ─── Auth ─── */
async function checkAuth() {
    const pass = document.getElementById('masterPass').value.trim();
    if (!pass) return showToast("الرجاء إدخال رمز المرور", true);
    masterPassword = encodeURIComponent(pass);
    const btn = document.getElementById('loginBtn');
    btn.innerHTML = `<div class="spinner-mini"></div>`; btn.disabled = true;

    try {
        const res = await fetch(`${API_URL}?action=VERIFY_MASTER_PASS&pass=${masterPassword}&token=${API_TOKEN}&ts=${Date.now()}`);
        const response = await res.json();
        if (response.success) {
            document.getElementById('authOverlay').style.display = 'none';
            document.getElementById('appMain').classList.remove('d-none');
            const a = document.getElementById('adminAlertSound'); a.volume=0; a.play().then(()=>{a.pause();a.currentTime=0;a.volume=1;}).catch(()=>{});
            initMap(); refreshData();
        } else { masterPassword = ""; showToast("رمز المرور غير صحيح", true); }
    } catch (err) { showToast("فشل الاتصال بالخادم", true); } 
    finally { btn.innerHTML = 'تسجيل الدخول'; btn.disabled = false; }
}

/* ─── Navigation ─── */
function switchTab(tab, btn) {
    document.querySelectorAll('.admin-tab').forEach(el => el.classList.remove('active-tab'));
    document.getElementById('tab-'+tab).classList.add('active-tab');
    document.querySelectorAll('.b-nav-item').forEach(b => b.classList.remove('active'));

}

function toggleFullscreen() {
    const w = document.getElementById('mapWrapper');
    const s = document.getElementById('radarSheet');
    const i = document.getElementById('fsIcon');
    isFullscreen = !isFullscreen;
    if(isFullscreen) {
        w.classList.add('fullscreen'); s.style.display = 'none';

        w.classList.remove('fullscreen'); s.style.display = 'flex';

/* ─── Data Sync ─── */
async function refreshData() {
    try {
        const res = await fetch(`${API_URL}?action=getGlobalData&token=${API_TOKEN}&ts=${Date.now()}`);
        globalData = await res.json();
        
        if (!isFirebaseListening) {
            isFirebaseListening = true;
            listenToFirebaseLedgers(); listenToFirebaseLocations(); listenToFirebaseOrders();
            dataRefreshInterval = setInterval(refreshData, 300000); // 5 mins archive sync
        } else {
            renderEntityLists('DRIVER'); renderEntityLists('RESTAURANT'); renderArchive();
        }
    } catch (e) { console.error("Sync Failed", e); }
}

function listenToFirebaseLedgers() {
    db.ref('ledgers').on('value', snap => {
        liveLedgers = snap.val() || { drivers:{}, restaurants:{} };
        let totalRev = 0;
        if(liveLedgers.restaurants) Object.values(liveLedgers.restaurants).forEach(r => totalRev += (r.debt || 0));
        document.getElementById('tickerText').innerHTML = `<span>💰 ديون وعمولات الميدان اليوم: <b class="text-success">${totalRev} د.ع</b></span> &nbsp;&nbsp;&nbsp; <span>🚀 محرك الرادار (V4.1) متصل </span>`;
        if (globalData) { renderEntityLists('DRIVER'); renderEntityLists('RESTAURANT'); }
    });
}

function listenToFirebaseLocations() {
    if (!map) return;
    db.ref('drivers_locations').on('value', snap => {
        const locs = snap.val() || {};
        const now = Date.now();
        Object.keys(locs).forEach(phone => {
            const d = locs[phone];
            if (d.status === 'active' && d.lat && d.lng) {
                const lat = parseFloat(d.lat), lng = parseFloat(d.lng);
                const isGhost = (d.last_update ? (now - new Date(d.last_update).getTime())/60000 : 0) > 45;
                if (liveDriverMarkers[phone]) {
                    liveDriverMarkers[phone].setLatLng([lat, lng]);
                    const iconEl = liveDriverMarkers[phone].getElement();
                    if(iconEl) iconEl.innerHTML = `<div class="drv-marker ${isGhost ? 'drv-ghost' : 'drv-active'}">${isGhost?'👻':'🛵'}</div>`;
                } else {
                    const name = globalData?.drivers.find(x => String(x[D.PHONE]) === String(phone))?.[D.NAME] || phone;
                    const icon = L.divIcon({ className: 'smooth-marker', html: `<div class="drv-marker ${isGhost ? 'drv-ghost' : 'drv-active'}">${isGhost?'👻':'🛵'}</div>`, iconSize: [36, 36], iconAnchor: [18, 18] });
                    liveDriverMarkers[phone] = L.marker([lat, lng], {icon}).addTo(map).bindPopup(`<b style="font-family:Cairo">${escHtml(name)}</b>`);
                }
            } else if (liveDriverMarkers[phone]) { map.removeLayer(liveDriverMarkers[phone]); delete liveDriverMarkers[phone]; }
        });
    });
}

function listenToFirebaseOrders() {
    db.ref('active_orders').on('value', snap => {
        const ordersObj = snap.val() || {};
        let arr = [], pendingCount = 0;
        const now = Date.now();

        Object.values(ordersObj).forEach(o => {
            if (!o.restaurant || o.restaurant.trim() === "") return; 
            arr.push(o);
            if (!o.driverPhone || o.driverPhone === "pending_driver" || o.driverPhone === "system_routing") {
                pendingCount++;
            }
        });

        arr.sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
        liveFirebaseOrders = arr;

        if (pendingCount > lastPendingCount) { document.getElementById('adminAlertSound').play().catch(()=>{}); }
        lastPendingCount = pendingCount;

        if (globalData) { smartRenderRadar(); updateHeatmap(); updateRestaurantPulse(); }
    });
}

function updateHeatmap() {
    if (!heatLayer || !globalData) return;
    const pts = [];
    liveFirebaseOrders.forEach(o => {
        const rData = globalData.restaurants.find(r => r[R.NAME] === o.restaurant);
        if (rData?.[R.LAT] && rData?.[R.LNG]) pts.push([parseFloat(rData[R.LAT]), parseFloat(rData[R.LNG]), 1]);
    });
    heatLayer.setLatLngs(pts);
}

function updateRestaurantPulse() {
    if(!map || !globalData) return;
    Object.keys(liveResMarkers).forEach(k => { map.removeLayer(liveResMarkers[k]); delete liveResMarkers[k]; });
    const activeResNames = [...new Set(liveFirebaseOrders.map(o => o.restaurant))];
    activeResNames.forEach(rName => {
        const rData = globalData.restaurants.find(r => r[R.NAME] === rName);
        if(rData && rData[R.LAT] && rData[R.LNG]) {
            const icon = L.divIcon({ className: '', html: `<div class="res-pulse">🍽</div>`, iconSize: [24, 24], iconAnchor: [12, 12] });
            liveResMarkers[rName] = L.marker([parseFloat(rData[R.LAT]), parseFloat(rData[R.LNG])], {icon}).addTo(map);
        }
    });
}

/* ─── UI Rendering ─── */
function filterRadar(type, btn) {
    currentRadarFilter = type;
    document.querySelectorAll('#radarFilters .fp').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    smartRenderRadar();
}

function smartRenderRadar() {
    const container = document.getElementById('smartOrdersContainer');
    let filtered = [...liveFirebaseOrders];
    if (currentRadarFilter === 'pending') filtered = filtered.filter(o => !o.driverPhone || o.driverPhone === "pending_driver" || o.driverPhone === "system_routing");
    if (currentRadarFilter === 'active')  filtered = filtered.filter(o => o.driverPhone && o.driverPhone !== "pending_driver" && o.driverPhone !== "system_routing");

    if (filtered.length === 0) {
        container.innerHTML = `<div class="empty-state"><i data-lucide="check-circle" width="40" style="color:var(--success); margin-bottom:10px;"></i><br><b style="color:var(--text-2);">الرادار نظيف!</b></div>`;
        safeIcon('smartOrdersContainer'); return;
    }

    let drvOptions = '<option value="" disabled selected>تعيين 🔄</option>';
    globalData.drivers.slice(1).forEach(d => {
        if (d[D.STATUS] === 'active') {
            const c = liveLedgers.drivers?.[String(d[D.PHONE])]?.completed_orders || 0;
            drvOptions += `<option value="${escHtml(d[D.PHONE])}">${c>=100?'🟢':(c>=30?'🟡':'🔴')} ${escHtml(d[D.NAME])}</option>`;
        }
    });

    let html = '';
    const now = Date.now();

    filtered.forEach(o => {
        const hasDriver = o.driverPhone && o.driverPhone !== 'system_routing' && o.driverPhone !== 'manual_pending' && o.driverPhone !== 'pending_driver';
        const dName = hasDriver ? (globalData.drivers.find(d => String(d[D.PHONE]) === String(o.driverPhone))?.[D.NAME] || 'كابتن') : 'يبحث...';
        const waitMins = Math.floor((now - new Date(o.timestamp).getTime())/60000);
        
        let cardClass = 'order-card';
        if(!hasDriver && waitMins > 4) cardClass += ' oc-warn';
        if(!hasDriver && waitMins > 8) cardClass += ' oc-danger';

        let rejectHtml = '';
        if(!hasDriver && o.last_offered_to) {
            const rName = globalData.drivers.find(d => String(d[D.PHONE]) === String(o.last_offered_to))?.[D.NAME] || o.last_offered_to;
            rejectHtml = `<div class="reject-tag"><i data-lucide="user-x" width="10"></i> رفضه: ${escHtml(rName)}</div>`;
        }

        let ctrl = '';
        if(hasDriver) {
            ctrl += `<button class="btn-action-sm" onclick="trackDriver('${escHtml(o.driverPhone)}', '${escHtml(o.restaurant)}')"><i data-lucide="map-pin" width="14"></i></button>`;
            ctrl += `<button class="btn-action-sm red" onclick="forceWithdraw('${escHtml(o.id)}', '${escHtml(o.driverPhone)}')"><i data-lucide="user-minus" width="14"></i> سحب</button>`;
        } else {
            ctrl += `<select class="assign-select" onchange="assignDriverOptUI('${escHtml(o.id)}', this.value, this)">${drvOptions}</select>`;
        }

        html += `
        <div class="${cardClass}">
            <div class="oc-header">
                <div>
                    <div class="oc-title">#${escHtml(o.id)} - ${escHtml(o.restaurant)}</div>
                    <div style="font-size:0.75rem; color:var(--text-3); font-weight:700;"><i data-lucide="map-pin" width="12"></i> ${escHtml(o.area)} ${rejectHtml}</div>
                </div>
                <div class="text-end">
                    <div class="oc-price">${escHtml(o.price)} د.ع</div>
                    <div style="font-size:0.7rem; font-weight:800; color:${waitMins>4?'var(--danger)':'var(--text-2)'};"><i data-lucide="clock" width="10"></i> ${waitMins} دق</div>
                </div>
            </div>
            <div style="border-top:1px solid var(--border); padding-top:10px; display:flex; justify-content:space-between; align-items:center;">
                <span class="fw-bold" style="font-size:0.8rem; color:var(--primary-dark);"><i data-lucide="bike" width="14"></i> ${escHtml(dName)}</span>
                <div style="display:flex; gap:5px;">
                    ${ctrl}
                    <button class="btn-action-sm" style="background:#e6faf3; color:var(--success);" onclick="forceComplete('${escHtml(o.id)}')"><i data-lucide="check" width="14"></i></button>
                </div>
            </div>
        </div>`;
    });

    container.innerHTML = html; safeIcon('smartOrdersContainer');
}

function renderEntityLists(type) {
    if(!globalData) return;
    const isDrv = type === 'DRIVER';
    const sq = document.getElementById(isDrv ? 'searchDriverInput' : 'searchResInput').value.trim().toLowerCase();
    const container = document.getElementById(isDrv ? 'driversListContainer' : 'resListContainer');
    const list = isDrv ? globalData.drivers : globalData.restaurants;
    const icon = isDrv ? 'user' : 'store';
    
    let html = ''; let count = 0;
    list.slice(1).forEach(item => {
        if(item[4] === 'deleted' || item[4] !== 'active') return; 
        if(sq && !item[1].toLowerCase().includes(sq) && !String(item[2]).includes(sq)) return;
        count++;
        
        const phone = String(item[2]);
        const ledger = isDrv ? (liveLedgers.drivers?.[phone] || {debt:0, completed_orders:0}) : (liveLedgers.restaurants?.[phone] || {debt:0, completed_orders:0});
        const pClass = ledger.completed_orders>=100 ? 'perf-green' : (ledger.completed_orders>=30 ? 'perf-yellow' : 'perf-red');
        const perfDot = isDrv ? `<div class="perf-dot ${pClass}"></div>` : '';

        html += `
        <div class="entity-card">
            ${perfDot}
            <div class="e-info">
                <div class="e-avatar" ${!isDrv?'style="background:var(--accent-light); color:var(--accent);"':''}><i data-lucide="${icon}" width="20"></i></div>
                <div>
                    <div class="e-name">${escHtml(item[1])}</div>
                    <div class="e-sub">${escHtml(phone)} | أنجز: ${ledger.completed_orders}</div>
                </div>
            </div>
            <div class="e-debt-box">
                <span style="font-size:0.75rem; font-weight:800; color:var(--danger);">مطلوب:</span>
                <span style="font-size:0.95rem; font-weight:900; color:var(--danger);">${ledger.debt} د.ع</span>
            </div>
            <div class="e-actions">
                <button class="btn-action-sm" style="background:#fef2f2; color:var(--danger);" onclick="resetDebt('${type}', '${escHtml(phone)}')"><i data-lucide="banknote" width="14"></i> تصفير الديون</button>
                <button class="btn-action-sm" style="background:var(--primary-mist); color:var(--primary);" onclick="window.open('tel:${escHtml(phone)}')"><i data-lucide="phone" width="14"></i> اتصال</button>
            </div>
        </div>`;
    });

    document.getElementById(isDrv ? 'drvCount' : 'resCount').innerText = count;
    container.innerHTML = html || `<div class="empty-state">لا توجد نتائج نشطة</div>`;
    safeIcon(isDrv ? 'driversListContainer' : 'resListContainer');
}

function renderArchive() {
    if (!globalData) return;
    const search = document.getElementById('arcSearch').value.trim().toLowerCase();
    const dateFrom = document.getElementById('arcDateFrom').value;
    const dateTo = document.getElementById('arcDateTo').value;

    let html = '';
    const completed = globalData.orders.slice(1).filter(o => o[O.STATUS] === 'completed' || o[O.STATUS] === 'مكتمل' || o[O.STATUS] === 'settled').reverse();

    let count = 0;
    completed.forEach(o => {
        let isoDate = '';
        if (o[O.TIME]) { const d = new Date(o[O.TIME]); if (!isNaN(d.getTime())) isoDate = d.toISOString().split('T')[0]; }
        if (search && !String(o[O.ID]).toLowerCase().includes(search)) return;
        if (dateFrom && isoDate && isoDate < dateFrom) return;
        if (dateTo && isoDate && isoDate > dateTo) return;
        
        count++;
        if(count > 100) return; // Limit DOM rendering

        const dp = o[O.DRIVER_PHONE];
        const dData = globalData.drivers.find(d => String(d[D.PHONE]) === String(dp));
        const driverName = dData ? dData[D.NAME] : dp;

        html += `<tr>
            <td style="color:var(--primary); font-weight:900;">${escHtml(o[O.ID])}</td>
            <td style="font-size:0.7rem; color:var(--text-3);">${escHtml(isoDate)}</td>
            <td style="font-weight:800; color:var(--text-1);">${escHtml(o[O.REST_NAME])}</td>
            <td style="color:var(--text-2); font-size:0.75rem;">${escHtml(driverName)}</td>
        </tr>`;
    });

    document.getElementById('ordersTableBody').innerHTML = html || `<tr><td colspan="4" class="text-center py-4">لا توجد نتائج</td></tr>`;
}

function exportExcel() {
    if (!globalData?.orders) return showToast("لا توجد بيانات", true);
    const completed = globalData.orders.slice(1).filter(o => o[O.STATUS] === 'completed' || o[O.STATUS] === 'مكتمل' || o[O.STATUS] === 'settled');
    if (!completed.length) return showToast("لا توجد طلبات", true);

    let csv = '\uFEFF'; csv += "ID الطلب,التاريخ,المطعم,الكابتن,السعر\n";
    completed.forEach(o => {
        const dp = o[O.DRIVER_PHONE]; const dName = globalData.drivers.find(d => String(d[D.PHONE]) === String(dp))?.[D.NAME] || dp;
        const date = o[O.TIME] ? new Date(o[O.TIME]).toLocaleString('ar-EG') : '';
        const esc = v => '"' + String(v??'').replace(/"/g, '""') + '"';
        csv += [esc(o[O.ID]), esc(date), esc(o[O.REST_NAME]), esc(dName), esc(o[O.PRICE])].join(',') + '\n';
    });

    const blobUrl = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
    const a = document.createElement('a'); a.href = blobUrl; a.download = `ارشيف_الحوت_${new Date().toISOString().split('T')[0]}.csv`;
    document.body.appendChild(a); a.click(); a.remove(); setTimeout(() => URL.revokeObjectURL(blobUrl), 1000);
}

/* ─── Sovereign Actions (Zero Latency) ─── */
function assignDriverOptUI(orderId, driverPhone, el) {
    if (!driverPhone) return;
    el.disabled = true;
    el.insertAdjacentHTML('afterend', '<div class="spinner-mini" style="border-top-color:var(--primary); margin-right:5px;"></div>');
    
    const now = new Date().toISOString();
    db.ref(`active_orders/${orderId}`).update({ status: 'manual_pending', driverPhone: driverPhone, last_update: now, is_sovereign: true });
    fetch(`${API_URL}?action=ASSIGN_DRIVER&orderId=${orderId}&driverPhone=${driverPhone}&token=${API_TOKEN}&pass=${masterPassword}`).catch(e=>{});
}

function forceWithdraw(orderId, driverPhone) {
    if(!confirm("سحب الطلب وإعادته للرادار؟")) return;
    if("vibrate" in navigator) navigator.vibrate([100, 50, 100]); 
    const now = new Date().toISOString();
    db.ref(`active_orders/${orderId}`).update({ status: 'pending_driver', driverPhone: 'system_routing', last_update: now, last_offered_to: driverPhone, last_offered_time: now, is_sovereign: false });
    fetch(`${API_URL}?action=DECLINE_ORDER&orderId=${orderId}&driverPhone=${driverPhone}&token=${API_TOKEN}&pass=${masterPassword}`).catch(()=>{});
}

// 🟢 الإكمال القسري المصحح (يضيف الأموال للمحافظ)
function forceComplete(orderId) {
    if(!confirm("تأكيد إكمال الطلب قسرياً؟ سيتم تسجيله في حساب الكابتن والمطعم.")) return;
    
    const oData = liveFirebaseOrders.find(x => x.id === orderId);
    if(oData) {
        const driverPhone = oData.driverPhone;
        const price = parseFloat(oData.price) || 0;
        const resPhone = oData.resPhone;
        const comm = parseFloat(oData.comm) || 0;
        const payType = oData.payType || "المطعم يدفع";

        let driverDebtInc = 0; let resDebtInc = comm;
        if (payType.includes('مناصفة')) driverDebtInc = comm / 2;

        let updates = {};
        updates[`active_orders/${orderId}`] = null;
        
        if(driverPhone && driverPhone !== 'system_routing' && driverPhone !== 'pending_driver') {
            updates[`ledgers/drivers/${driverPhone}/completed_orders`] = firebase.database.ServerValue.increment(1);
            updates[`ledgers/drivers/${driverPhone}/debt`] = firebase.database.ServerValue.increment(driverDebtInc);
            const todayStr = new Date().toISOString().split('T')[0];
            updates[`daily_ledgers/${driverPhone}/${todayStr}/${orderId}`] = { orderId, resName: oData.restaurant, area: oData.area, price, timestamp: Date.now() };
        }
        if(resPhone && resPhone !== "غير متوفر") {
            updates[`ledgers/restaurants/${resPhone}/completed_orders`] = firebase.database.ServerValue.increment(1);
            updates[`ledgers/restaurants/${resPhone}/debt`] = firebase.database.ServerValue.increment(resDebtInc);
        }
        
        db.ref().update(updates);
        fetch(`${API_URL}?action=ADMIN_UPDATE_STATUS&type=ORDER&id=${orderId}&status=completed&token=${API_TOKEN}&pass=${masterPassword}`).catch(()=>{});
        showToast("تم الإكمال وإضافة الأموال للمحافظ!");
    } else {
        // Fallback if data not fully loaded
        db.ref(`active_orders/${orderId}`).remove();
        fetch(`${API_URL}?action=ADMIN_UPDATE_STATUS&type=ORDER&id=${orderId}&status=completed&token=${API_TOKEN}&pass=${masterPassword}`).catch(()=>{});
        showToast("تم الإكمال (بدون إضافة للمحفظة لعدم توفر البيانات)");
    }
}

function resetDebt(type, phone) {
    if(!confirm("تأكيد تصفير حساب الديون والأعداد؟")) return;
    showToast("جاري التصفير...");
    fetch(`${API_URL}?action=RESET_DEBT&type=${type}&id=${phone}&token=${API_TOKEN}&pass=${masterPassword}`)
    .then(r=>r.json()).then(res=>{
        if(res.success) showToast("تم التصفير بنجاح");
        else showToast("حدث خطأ بالسيرفر", true);
    }).catch(()=>showToast("خطأ شبكة", true));
}

/* ─── Map Tracking ─── */
function trackDriver(driverPhone, restName) {
    if (!map || !globalData) return;
    const driver = globalData.drivers.find(d => String(d[D.PHONE]) === String(driverPhone));
    const restaurant = globalData.restaurants.find(r => r[R.NAME] === restName);
    
    let dLat = parseFloat(driver?.[D.LAT]), dLng = parseFloat(driver?.[D.LNG]);
    if (liveDriverMarkers[String(driverPhone)]) {
        const pos = liveDriverMarkers[String(driverPhone)].getLatLng();
        dLat = pos.lat; dLng = pos.lng;
    }
    if (isNaN(dLat) || isNaN(dLng)) return showToast("موقع الكابتن غير متاح حالياً", true);

    if (trackPolyline) map.removeLayer(trackPolyline);
    let bounds = [[dLat, dLng]];

    // إخفاء كل الكباتن والمطاعم الأخرى للتركيز
    Object.values(liveDriverMarkers).forEach(m => m.setOpacity(0.1));
    Object.values(liveResMarkers).forEach(m => m.setOpacity(0.1));
    if(liveDriverMarkers[driverPhone]) liveDriverMarkers[driverPhone].setOpacity(1);
    if(liveResMarkers[restName]) liveResMarkers[restName].setOpacity(1);

    if (restaurant?.[R.LAT] && restaurant?.[R.LNG]) {
        const rLat = parseFloat(restaurant[R.LAT]), rLng = parseFloat(restaurant[R.LNG]);
        bounds.push([rLat, rLng]);
        trackPolyline = L.polyline([[dLat, dLng], [rLat, rLng]], { color: 'var(--primary-dark)', weight: 4, dashArray: '10, 10', className: 'path-animated' }).addTo(map);
        map.fitBounds(bounds, { padding: [60, 60], maxZoom: 16, animate: true, duration: 1 });
    } else { map.flyTo([dLat, dLng], 16, { duration: 1 }); }

    document.getElementById('btnCancelTrack').style.display = 'flex';
    if(!isFullscreen) toggleFullscreen();
}

function cancelTracking() {
    if (trackPolyline) { map.removeLayer(trackPolyline); trackPolyline = null; }
    Object.values(liveDriverMarkers).forEach(m => m.setOpacity(1));
    Object.values(liveResMarkers).forEach(m => m.setOpacity(1));
    document.getElementById('btnCancelTrack').style.display = 'none';
    map.setView([35.468, 44.392], 13, {animate: true});
}

function initMap() {
    map = L.map('adminMap', { zoomControl: false, attributionControl: false }).setView([35.468, 44.392], 13);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { maxZoom: 19 }).addTo(map);
    heatLayer = L.heatLayer([], { radius: 25, blur: 15, gradient: { 0.4: '#fed7aa', 0.7: '#f97316', 1.0: '#ea580c' } }).addTo(map);
    setTimeout(() => map.invalidateSize(), 500);
}
