<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>دخول المطاعم | منظومة الحوت 🐋</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --whale-blue: #2563eb; --whale-light: #f8fafc; }
        body { font-family: 'Tajawal', sans-serif; background: var(--whale-light); color: #1e293b; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow-x: hidden; }
        
        .bg-pattern { position: fixed; inset: 0; background-color: #f8fafc; background-image: radial-gradient(#2563eb 0.5px, transparent 0.5px); background-size: 20px 20px; opacity: 0.1; z-index: -1; }
        
        .login-card { background: white; border-radius: 2.5rem; box-shadow: 0 25px 50px -12px rgba(37, 99, 235, 0.15); border: 1px solid rgba(37, 99, 235, 0.1); width: 100%; max-width: 420px; padding: 2.5rem; position: relative; overflow: hidden; }
        
        .whale-input { width: 100%; padding: 1.2rem; background: #f1f5f9; border: 2px solid transparent; border-radius: 1.2rem; color: #1e293b; outline: none; transition: 0.3s; font-weight: bold; text-align: center; font-size: 1rem; }
        .whale-input:focus { border-color: var(--whale-blue); background: white; box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.1); }
        
        .btn-primary { background: var(--whale-blue); color: white; font-weight: 900; border-radius: 1.2rem; transition: 0.3s; box-shadow: 0 10px 20px rgba(37, 99, 235, 0.3); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 15px 25px rgba(37, 99, 235, 0.4); }
        .btn-primary:active { transform: scale(0.95); }

        .loading-ring { width: 50px; height: 50px; border: 4px solid #f1f5f9; border-top: 4px solid var(--whale-blue); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .fade-step { animation: slideUp 0.5s ease-out forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .hidden { display: none; }
    </style>
</head>
<body class="p-6">
    <div class="bg-pattern"></div>

    <div class="login-card">
        <div class="text-center mb-8">
            <div class="w-20 h-20 bg-blue-600 text-white rounded-[2rem] flex items-center justify-center text-4xl mx-auto mb-4 shadow-xl shadow-blue-200">
                <i class="fas fa-whale"></i>
            </div>
            <h2 class="text-2xl font-black text-slate-800 italic uppercase tracking-tighter">AL-HUT <span class="text-blue-600">RADAR</span></h2>
            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-[0.2em] mt-1">بوابة المطاعم المعتمدة</p>
        </div>

        <div id="step-auth" class="space-y-5 fade-step">
            <div class="relative">
                <input type="tel" id="mainPhone" placeholder="077XXXXXXXX" class="whale-input tracking-widest" dir="ltr">
                <i class="fas fa-phone-alt absolute left-4 top-1/2 -translate-y-1/2 text-slate-300"></i>
            </div>
            <button onclick="handleLogin()" id="loginBtn" class="w-full py-5 btn-primary flex items-center justify-center gap-3">
                <span>دخول السيستم</span>
                <i class="fas fa-arrow-left"></i>
            </button>
        </div>

        <div id="step-register" class="hidden space-y-4 fade-step">
            <div class="bg-blue-50 p-4 rounded-2xl mb-4 border border-blue-100">
                <p class="text-[11px] text-blue-600 font-bold text-center italic">رقمك غير مسجل، يرجى تعبئة بيانات مطعمك للانضمام للأسطول 🚀</p>
            </div>
            <input type="text" id="resName" placeholder="اسم المطعم" class="whale-input">
            <select id="resArea" class="whale-input cursor-pointer appearance-none">
                <option value="" disabled selected>اختر المنطقة في كركوك</option>
                <option value="الماس">الماس</option>
                <option value="طريق بغداد">طريق بغداد</option>
                <option value="التسعين">التسعين</option>
                <option value="شارع المحافظة">شارع المحافظة</option>
                <option value="قورية">قورية</option>
                <option value="بنجه علي">بنجه علي</option>
                <option value="عرفه">عرفه</option>
                <option value="الواسطي">حي الواسطي</option>
            </select>
            <input type="url" id="resMapLink" placeholder="رابط خرائط جوجل (Location)" class="whale-input">
            
            <div class="bg-slate-50 p-3 rounded-2xl flex items-center justify-between gap-2 border border-slate-100">
                <p class="text-[10px] font-black text-slate-500 mr-2">النظام</p>
                <select id="paySystem" class="bg-transparent border-none text-[11px] font-black text-blue-600 outline-none cursor-pointer">
                    <option value="المطعم يدفع">المطعم يدفع العمولة</option>
                    <option value="المناصفة">نظام المناصفة</option>
                </select>
            </div>
            
            <button onclick="submitNewRegistration()" id="regBtn" class="w-full py-5 btn-primary mt-2">تقديم الطلب للإدارة</button>
            <button onclick="location.reload()" class="w-full text-[10px] font-bold text-slate-400 uppercase tracking-widest">إلغاء</button>
        </div>

        <div id="step-wait" class="hidden text-center py-6 fade-step">
            <div class="loading-ring mb-6"></div>
            <h3 class="text-xl font-black text-slate-800 italic">بانتظار موافقة طه</h3>
            <p class="text-xs text-slate-400 mt-3 leading-relaxed">تم استلام طلبك بنجاح.<br>يرجى البقاء في هذه الصفحة، سيتم دخولك تلقائياً فور تفعيل حسابك من الإدارة.</p>
            
            <div class="mt-8 pt-6 border-t border-slate-100">
                <button onclick="logout()" class="text-red-500 text-[10px] font-black uppercase flex items-center justify-center gap-2 mx-auto">
                    <i class="fas fa-times"></i> تغيير رقم الهاتف
                </button>
            </div>
        </div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxziP5TpfK4FVZcVO-4xzPaLqvpxjLMVL_JbSIZ0E9pKujgxgQU0ZIIfR1GufbOehwPBg/exec';
        let checkInterval = null;

        window.onload = () => {
            const savedPhone = localStorage.getItem('whale_res_phone');
            if (savedPhone) {
                document.getElementById('mainPhone').value = savedPhone;
                handleLogin(true); // دخول تلقائي صامت
            }
        };

        async function handleLogin(isAuto = false) {
            const phone = document.getElementById('mainPhone').value.trim();
            if (!phone || phone.length < 10) {
                if(!isAuto) alert("يرجى إدخال رقم هاتف صحيح");
                return;
            }

            const btn = document.getElementById('loginBtn');
            if(!isAuto) {
                btn.disabled = true;
                btn.innerHTML = `<i class="fas fa-spinner animate-spin"></i> جاري التحقق...`;
            }

            try {
                // نستخدم الماكرو لجلب البيانات وفحص الحالة
                const response = await fetch(`${scriptURL}?action=get_master_data&pass=CHECK_LOGIN&phone=${phone}`);
                const data = await response.json();
                
                // البحث عن المطعم في القائمة
                const resProfile = data.restaurants.find(r => r[2] == phone);

                if (resProfile) {
                    localStorage.setItem('whale_res_phone', phone);
                    if (resProfile[4] === 'active') {
                        window.location.replace('Restaurant.html');
                    } else {
                        showStep('step-wait');
                        startAutoCheck();
                    }
                } else {
                    if(!isAuto) showStep('step-register');
                }
            } catch (e) {
                console.error("Auth Error", e);
                if(!isAuto) {
                    alert("عذراً، تعذر الاتصال بالسيرفر. حاول مجدداً.");
                    btn.disabled = false;
                    btn.innerHTML = `<span>دخول السيستم</span> <i class="fas fa-arrow-left"></i>`;
                }
            }
        }

        async function submitNewRegistration() {
            const phone = document.getElementById('mainPhone').value.trim();
            const name = document.getElementById('resName').value.trim();
            const area = document.getElementById('resArea').value.trim();
            const mapLink = document.getElementById('resMapLink').value.trim();
            const pay = document.getElementById('paySystem').value;
            const btn = document.getElementById('regBtn');

            if (!name || !area || !mapLink) return alert("يرجى ملء جميع الحقول المطلوبة");

            btn.disabled = true;
            btn.innerHTML = `<i class="fas fa-satellite animate-pulse"></i> جاري إرسال البيانات...`;

            // الحصول على الموقع الجغرافي لضبطه في الشيت تلقائياً
            const coords = await new Promise(resolve => {
                navigator.geolocation.getCurrentPosition(
                    p => resolve({lat: p.coords.latitude, lng: p.coords.longitude}),
                    () => resolve({lat: 35.467, lng: 44.392}), // كركوك المركز
                    { timeout: 4000 }
                );
            });

            const payload = {
                action: "register_user",
                type: "Restaurant",
                name: name,
                phone: phone,
                address: `${area} | ${mapLink}`,
                fee: "1000", // قيمة افتراضية يقوم طه بتعديلها لاحقاً
                paySystem: pay,
                lat: coords.lat,
                lng: coords.lng
            };

            try {
                await fetch(scriptURL, { 
                    method: 'POST', 
                    mode: 'no-cors', 
                    body: JSON.stringify(payload) 
                });
                
                localStorage.setItem('whale_res_phone', phone);
                showStep('step-wait');
                startAutoCheck();
            } catch (e) {
                alert("حدث خطأ أثناء الإرسال. حاول مرة أخرى.");
                btn.disabled = false;
            }
        }

        function showStep(stepId) {
            document.getElementById('step-auth').classList.add('hidden');
            document.getElementById('step-register').classList.add('hidden');
            document.getElementById('step-wait').classList.add('hidden');
            document.getElementById(stepId).classList.remove('hidden');
        }

        function startAutoCheck() {
            if (!checkInterval) {
                checkInterval = setInterval(() => {
                    handleLogin(true);
                }, 10000); // فحص كل 10 ثوانٍ
            }
        }

        function logout() {
            clearInterval(checkInterval);
            localStorage.clear();
            location.reload();
        }
    </script>
</body>
</html>
