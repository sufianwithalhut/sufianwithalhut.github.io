<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تسجيل المطاعم | رادار الحوت 🐋</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --whale-emerald: #10b981; --whale-navy: #020617; }
        body { font-family: 'Tajawal', sans-serif; background: #010409; color: white; overflow-x: hidden; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .radar-grid { position: fixed; inset: 0; background-image: linear-gradient(rgba(16, 185, 129, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(16, 185, 129, 0.03) 1px, transparent 1px); background-size: 30px 30px; z-index: -1; }
        .glass-card { background: rgba(13, 17, 23, 0.85); backdrop-filter: blur(25px); border: 1px solid rgba(16, 185, 129, 0.2); box-shadow: 0 0 50px rgba(16, 185, 129, 0.1); }
        .whale-input { width: 100%; padding: 1.1rem 1.1rem; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(16, 185, 129, 0.2); border-radius: 1.2rem; color: white; outline: none; transition: 0.3s; font-weight: bold; font-size: 0.85rem; }
        .whale-input:focus { border-color: var(--whale-emerald); background: rgba(16, 185, 129, 0.05); }
        .action-btn { background: var(--whale-emerald); color: #020617; font-weight: 900; clip-path: polygon(4% 0, 100% 0, 96% 100%, 0% 100%); transition: 0.3s; cursor: pointer; }
        .hidden { display: none; }
        .input-icon { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #10b981; opacity: 0.6; }
        .input-group { position: relative; }
    </style>
</head>
<body class="p-6">
    <div class="radar-grid"></div>
    <div class="max-w-md w-full glass-card p-8 rounded-[2.5rem] relative z-10">
        <div id="loader" class="text-center py-12">
            <div class="w-14 h-14 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin mx-auto mb-6"></div>
            <p class="text-emerald-500 font-black italic uppercase text-[10px]">Verifying with Radar...</p>
        </div>

        <div id="authUI" class="hidden">
            <header class="text-center mb-6">
                <h2 class="text-2xl font-black italic" style="font-family: 'Orbitron';">WHALE <span class="text-emerald-500">KITCHEN</span></h2>
                <p class="text-[10px] text-gray-400 mt-1 font-bold italic opacity-60">تفعيل رادار الشركاء V6.2</p>
            </header>
            <form id="smartForm" class="space-y-4">
                <input type="text" id="resName" required placeholder="اسم المطعم" class="whale-input text-right">
                <input type="tel" id="resPhone" required placeholder="رقم الهاتف" class="whale-input text-right">
                
                <div class="input-group">
                    <input type="text" id="resArea" required placeholder="اسم المنطقة (مثال: طريق بغداد)" class="whale-input text-right border-emerald-500/40">
                    <i class="fas fa-map-marker-alt input-icon"></i>
                </div>

                <input type="url" id="resMapLink" required placeholder="رابط الموقع من الخريطة (Maps)" class="whale-input text-right">
                
                <div class="grid grid-cols-2 gap-2">
                    <input type="number" id="fixedFee" required placeholder="العمولة" class="whale-input text-center p-2">
                    <select id="paySystem" class="whale-input bg-slate-900 text-[10px] text-center">
                        <option value="المطعم يدفع">المطعم يدفع</option>
                        <option value="مناصفة">مناصفة</option>
                    </select>
                </div>
                <button type="submit" id="mainBtn" class="w-full py-5 action-btn mt-4 italic">إرسال طلب الانضمام</button>
            </form>
        </div>

        <div id="waitMessage" class="hidden text-center py-12">
            <div class="text-6xl mb-6 animate-bounce">⏳</div>
            <h3 class="text-xl font-black text-amber-500 italic uppercase">بانتظار تفعيل طه</h3>
            <p class="text-[10px] text-slate-400 mt-6 italic">سيتم التحقق من التفعيل تلقائياً كل 15 ثانية...</p>
            <button onclick="logout()" class="mt-10 text-[9px] text-red-500 font-black border-b border-red-500/30">تعديل البيانات</button>
        </div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbyIqK63Xu4b2G8BN0aNQIs42oTqvvYRlGDLfQCCSMo68YPYoysKjQ_IjoXhie0MhIaZpQ/exec';

        window.onload = () => {
            const savedPhone = localStorage.getItem('whale_res_phone');
            if (savedPhone) checkResLogin(savedPhone);
            else showUI('authUI');
        };

        async function checkResLogin(phone) {
            try {
                const timestamp = new Date().getTime();
                const res = await fetch(`${scriptURL}?action=login_check&type=Restaurant&id=${encodeURIComponent(phone)}&cb=${timestamp}`);
                const result = await res.json();
                
                if (result.status === 'active') {
                    localStorage.setItem('whale_res_phone', phone);
                    window.location.href = 'restaurant.html'; 
                } else if (result.status === 'pending') {
                    showUI('waitMessage');
                    setTimeout(() => checkResLogin(phone), 15000);
                } else showUI('authUI');
            } catch (e) { showUI('authUI'); }
        }

        function showUI(id) {
            document.getElementById('loader').classList.add('hidden');
            document.getElementById('authUI').classList.add('hidden');
            document.getElementById('waitMessage').classList.add('hidden');
            document.getElementById(id).classList.remove('hidden');
        }

        async function getCoords() {
            return new Promise((resolve) => {
                if (!navigator.geolocation) resolve({ lat: 0, lng: 0 });
                navigator.geolocation.getCurrentPosition(
                    (pos) => resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude }),
                    () => resolve({ lat: 0, lng: 0 }),
                    { enableHighAccuracy: true, timeout: 5000 }
                );
            });
        }

        document.getElementById('smartForm').onsubmit = async function(e) {
            e.preventDefault();
            const btn = document.getElementById('mainBtn');
            btn.disabled = true;
            btn.innerText = "جاري الحفظ...";
            
            const coords = await getCoords();
            const phone = document.getElementById('resPhone').value;
            const area = document.getElementById('resArea').value;
            const mapLink = document.getElementById('resMapLink').value;

            // هنا يتم دمج اسم المنطقة مع الرابط في حقل واحد
            const combinedAddress = `${area} | ${mapLink}`;

            const data = {
                action: "register_user",
                type: "Restaurant",
                name: document.getElementById('resName').value,
                phone: phone,
                address: combinedAddress, // نرسل العنوان المدمج
                fee: document.getElementById('fixedFee').value,
                paySystem: document.getElementById('paySystem').value,
                lat: coords.lat,
                lng: coords.lng
            };

            localStorage.setItem('whale_res_phone', phone);
            try {
                await fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
                setTimeout(() => checkResLogin(phone), 2000);
            } catch (e) { showUI('waitMessage'); }
        };

        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
