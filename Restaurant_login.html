<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>دخول المطاعم | منظومة الحوت 🐋</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --whale-emerald: #10b981; }
        body { font-family: 'Tajawal', sans-serif; background: #010409; color: white; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow-x: hidden; }
        .radar-grid { position: fixed; inset: 0; background-image: linear-gradient(rgba(16, 185, 129, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(16, 185, 129, 0.03) 1px, transparent 1px); background-size: 30px 30px; z-index: -1; }
        .glass-card { background: rgba(13, 17, 23, 0.85); backdrop-filter: blur(25px); border: 1px solid rgba(16, 185, 129, 0.2); box-shadow: 0 0 50px rgba(16, 185, 129, 0.1); }
        .whale-input { width: 100%; padding: 1.1rem; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(16, 185, 129, 0.2); border-radius: 1.2rem; color: white; outline: none; transition: 0.3s; font-weight: bold; text-align: center; font-size: 0.9rem; }
        .whale-input:focus { border-color: var(--whale-emerald); background: rgba(16, 185, 129, 0.05); }
        .action-btn { background: var(--whale-emerald); color: #020617; font-weight: 900; clip-path: polygon(4% 0, 100% 0, 96% 100%, 0% 100%); cursor: pointer; transition: 0.3s; }
        .hidden { display: none; }
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="p-6">
    <div class="radar-grid"></div>

    <div class="max-w-md w-full glass-card p-8 rounded-[2.5rem] relative z-10">
        
        <header class="text-center mb-8">
            <h2 class="text-2xl font-black italic" style="font-family: 'Orbitron';">WHALE <span class="text-emerald-500">RADAR</span></h2>
            <p class="text-[10px] text-gray-400 mt-1 font-bold italic opacity-60 uppercase tracking-widest">Network Verification V7.0</p>
        </header>

        <div id="checkUI" class="space-y-5">
            <input type="tel" id="mainPhone" placeholder="أدخل رقم الهاتف" class="whale-input text-lg tracking-widest" dir="ltr">
            <button onclick="handleSmartAuth()" id="checkBtn" class="w-full py-5 action-btn italic uppercase shadow-lg">دخول السيستم 🛰️</button>
        </div>

        <div id="registerUI" class="hidden fade-in space-y-4 mt-6 pt-6 border-t border-white/5">
            <p class="text-center text-[10px] text-emerald-400 font-black mb-4 italic">سجل مطعمك في أسطول الحوت:</p>
            <input type="text" id="resName" placeholder="اسم المطعم" class="whale-input">
            <input type="text" id="resArea" placeholder="المنطقة في كركوك" class="whale-input">
            <input type="url" id="resMapLink" placeholder="رابط موقعك على الخريطة" class="whale-input">
            
            <div class="grid grid-cols-2 gap-2">
                <input type="number" id="fixedFee" placeholder="العمولة المتفق عليها" class="whale-input p-2 text-sm">
                <select id="paySystem" class="whale-input text-[10px] bg-[#0d1117]">
                    <option value="مناصفة">نظام المناصفة</option>
                    <option value="المطعم يدفع">المطعم يدفع بالكامل</option>
                </select>
            </div>
            <button onclick="submitNewRegistration()" id="regBtn" class="w-full py-5 action-btn">إرسال طلب الانضمام</button>
        </div>

        <div id="waitMessage" class="hidden text-center py-10 fade-in">
            <div class="w-16 h-16 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin mx-auto mb-6 shadow-[0_0_20px_rgba(16,185,129,0.4)]"></div>
            <h3 class="text-xl font-black text-white italic">بانتظار تفعيل طه..</h3>
            <p class="text-[10px] text-slate-400 mt-4 italic leading-loose">طلبك قيد المراجعة في غرفة العمليات.<br>سيفتح الرادار تلقائياً فور التفعيل.</p>
            <button onclick="localStorage.clear(); location.reload()" class="mt-8 text-red-500 text-[10px] font-bold border-b border-red-500/20 uppercase">تغيير الرقم</button>
        </div>

    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxODYE0lTSF_v3NdQw1lN0GCq3dcxeEfo3SB9QaDy2Klcg3NEMvs3GxUjHFxQ5fooQm2Q/exec';
        let checkTimer = null;

        window.onload = () => {
            const saved = localStorage.getItem('whale_res_phone');
            if (saved) {
                document.getElementById('mainPhone').value = saved;
                handleSmartAuth();
            }
        };

        async function handleSmartAuth() {
            const phone = document.getElementById('mainPhone').value.trim();
            if (!phone) return;

            const btn = document.getElementById('checkBtn');
            btn.disabled = true;
            btn.innerHTML = `<i class="fas fa-circle-notch animate-spin"></i> جاري الاتصال...`;

            try {
                const response = await fetch(`${scriptURL}?action=login_check&type=Restaurant&id=${encodeURIComponent(phone)}&cb=${Date.now()}`);
                const result = await response.json();

                if (result.status === 'active') {
                    localStorage.setItem('whale_res_phone', phone);
                    window.location.replace('restaurant.html');
                } 
                else if (result.status === 'pending') {
                    localStorage.setItem('whale_res_phone', phone);
                    showSection('waitMessage');
                    if (!checkTimer) checkTimer = setInterval(handleSmartAuth, 10000);
                } 
                else if (result.status === 'not_found' || result.status === 'away') {
                    showSection('registerUI');
                    document.getElementById('mainPhone').disabled = true;
                    btn.classList.add('hidden');
                }
            } catch (e) {
                alert("خطأ في الاتصال بالسيستم");
                btn.disabled = false;
                btn.innerText = "دخول السيستم 🛰️";
            }
        }

        async function submitNewRegistration() {
            const btn = document.getElementById('regBtn');
            const phone = document.getElementById('mainPhone').value.trim();
            const name = document.getElementById('resName').value.trim();
            const area = document.getElementById('resArea').value.trim();
            const mapLink = document.getElementById('resMapLink').value.trim();

            if (!name || !area || !mapLink) return alert("يرجى ملء جميع البيانات");

            btn.disabled = true;
            btn.innerHTML = `<i class="fas fa-satellite-dish animate-pulse"></i> جاري الإرسال...`;

            const coords = await getCoords();
            
            const data = {
                action: "register_user",
                type: "Restaurant",
                name: name,
                phone: phone,
                address: `${area} | ${mapLink}`,
                fee: document.getElementById('fixedFee').value || "1000",
                paySystem: document.getElementById('paySystem').value,
                lat: coords.lat,
                lng: coords.lng
            };

            try {
                await fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
                localStorage.setItem('whale_res_phone', phone);
                showSection('waitMessage');
                checkTimer = setInterval(handleSmartAuth, 10000);
            } catch (e) {
                alert("فشل الإرسال، حاول ثانية");
                btn.disabled = false;
            }
        }

        function showSection(id) {
            document.getElementById('checkUI').classList.add('hidden');
            document.getElementById('registerUI').classList.add('hidden');
            document.getElementById('waitMessage').classList.add('hidden');
            document.getElementById(id).classList.remove('hidden');
        }

        async function getCoords() {
            return new Promise((resolve) => {
                navigator.geolocation.getCurrentPosition(
                    (p) => resolve({ lat: p.coords.latitude, lng: p.coords.longitude }),
                    () => resolve({ lat: 35.467, lng: 44.392 }), // افتراضي كركوك
                    { timeout: 5000 }
                );
            });
        }
    </script>
</body>
</html>
