<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>دخول المطاعم | منظومة الحوت 🐋</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --whale-blue: #2563eb; --whale-light: #f8fafc; }
        body { font-family: 'Tajawal', sans-serif; background: var(--whale-light); color: #1e293b; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow-x: hidden; }
        .bg-pattern { position: fixed; inset: 0; background-image: radial-gradient(#2563eb 0.5px, transparent 0.5px); background-size: 20px 20px; opacity: 0.05; z-index: -1; }
        .login-card { background: white; border-radius: 2.5rem; box-shadow: 0 25px 50px -12px rgba(37, 99, 235, 0.15); border: 1px solid rgba(37, 99, 235, 0.1); width: 100%; max-width: 400px; padding: 2rem; position: relative; }
        .whale-input { width: 100%; padding: 1.1rem; background: #f1f5f9; border: 2px solid transparent; border-radius: 1.2rem; font-weight: bold; text-align: center; transition: 0.3s; }
        .whale-input:focus { border-color: var(--whale-blue); background: white; outline: none; }
        .btn-primary { background: var(--whale-blue); color: white; font-weight: 900; border-radius: 1.2rem; transition: 0.3s; box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2); }
        .btn-primary:active { transform: scale(0.95); }
        .loading-ring { width: 40px; height: 40px; border: 4px solid #f1f5f9; border-top: 4px solid var(--whale-blue); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(3600deg); } }
        .hidden { display: none; }
    </style>
</head>
<body class="p-6">
    <div class="bg-pattern"></div>

    <div class="login-card">
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-blue-600 text-white rounded-2xl flex items-center justify-center text-3xl mx-auto mb-4 shadow-lg">
                <i class="fas fa-utensils"></i>
            </div>
            <h2 class="text-xl font-black text-slate-800 italic uppercase">AL-HUT <span class="text-blue-600">KITCHEN</span></h2>
            <p class="text-[9px] text-slate-400 font-bold tracking-widest mt-1 uppercase">Kirkuk Delivery Network</p>
        </div>

        <div id="step-auth" class="space-y-4">
            <input type="tel" id="mainPhone" placeholder="077XXXXXXXX" class="whale-input tracking-[0.2em]" dir="ltr">
            <button onclick="handleLogin()" id="loginBtn" class="w-full py-4 btn-primary flex items-center justify-center gap-2">
                <span>دخول الرادار</span>
                <i class="fas fa-satellite-dish"></i>
            </button>
        </div>

        <div id="step-register" class="hidden space-y-3">
            <div class="bg-blue-50 p-3 rounded-xl mb-2">
                <p class="text-[10px] text-blue-600 font-bold text-center italic">سجل بيانات مطعمك للانضمام للمنظومة 🚀</p>
            </div>
            <input type="text" id="resName" placeholder="اسم المطعم" class="whale-input">
            <select id="resArea" class="whale-input cursor-pointer">
                <option value="" disabled selected>اختر منطقة المطعم</option>
                <option value="الماس">الماس</option>
                <option value="طريق بغداد">طريق بغداد</option>
                <option value="التسعين">التسعين</option>
                <option value="قورية">قورية</option>
                <option value="الواسطي">حي الواسطي</option>
                <option value="عرفه">عرفه</option>
                <option value="غرناطة">غرناطة</option>
            </select>
            <input type="url" id="resMapLink" placeholder="رابط الموقع (Google Maps)" class="whale-input text-xs">
            
            <button onclick="submitNewRegistration()" id="regBtn" class="w-full py-4 btn-primary mt-2">إرسال طلب الانضمام</button>
            <button onclick="location.reload()" class="w-full text-[10px] font-bold text-slate-400 uppercase">رجوع</button>
        </div>

        <div id="step-wait" class="hidden text-center py-4">
            <div class="loading-ring mb-4"></div>
            <h3 class="text-lg font-black text-slate-800 italic">بانتظار موافقة طه...</h3>
            <p class="text-[11px] text-slate-400 mt-2 px-4">طلبك قيد المراجعة الآن. سيتم فتح لوحة التحكم تلقائياً بمجرد تفعيل الحساب.</p>
            <button onclick="logout()" class="mt-6 text-red-500 text-[9px] font-black uppercase"><i class="fas fa-phone"></i> تغيير الرقم</button>
        </div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbyi9ksTSLnwjRyCloT_0oEzhH4a_35Ijhr2unGVB-9wdOB6eoItU-XVKV9ufOlFLkLUCA/exec';
        let checkInterval = null;

        window.onload = () => {
            const savedPhone = localStorage.getItem('whale_res_phone');
            if (savedPhone) {
                document.getElementById('mainPhone').value = savedPhone;
                handleLogin(true);
            }
        };

        async function handleLogin(isAuto = false) {
            const phone = document.getElementById('mainPhone').value.trim();
            if (!phone || phone.length < 10) return;

            const btn = document.getElementById('loginBtn');
            if(!isAuto) { btn.disabled = true; btn.innerText = "جاري الفحص..."; }

            try {
                const response = await fetch(`${scriptURL}?action=get_master_data&pass=112233`);
                const data = await response.json();
                const resProfile = data.restaurants.find(r => r[2] == phone);

                if (resProfile) {
                    localStorage.setItem('whale_res_phone', phone);
                    if (resProfile[4] === 'active') {
                        window.location.replace('Restaurant.html');
                    } else {
                        showStep('step-wait');
                        startAutoCheck();
                    }
                } else {
                    if(!isAuto) showStep('step-register');
                }
            } catch (e) {
                if(!isAuto) { alert("خطأ في الاتصال بالسيرفر"); btn.disabled = false; btn.innerText = "دخول الرادار"; }
            }
        }

        async function submitNewRegistration() {
            const phone = document.getElementById('mainPhone').value.trim();
            const name = document.getElementById('resName').value.trim();
            const area = document.getElementById('resArea').value.trim();
            const mapLink = document.getElementById('resMapLink').value.trim();
            const btn = document.getElementById('regBtn');

            if (!name || !area) return alert("يرجى إكمال البيانات");

            btn.disabled = true;
            btn.innerText = "جاري الحفظ...";

            const payload = {
                action: "register_user",
                type: "Restaurant",
                name: name,
                phone: phone,
                address: `${area} | ${mapLink}`,
                fee: "1000",
                lat: 35.467, lng: 44.392 // إحداثيات افتراضية لكركوك
            };

            try {
                await fetch(scriptURL, { method: 'POST', body: JSON.stringify(payload) });
                localStorage.setItem('whale_res_phone', phone);
                showStep('step-wait');
                startAutoCheck();
            } catch (e) { alert("حدث خطأ، حاول ثانية"); btn.disabled = false; }
        }

        function showStep(stepId) {
            document.querySelectorAll('.login-card > div:not(:first-child)').forEach(el => el.classList.add('hidden'));
            document.getElementById(stepId).classList.remove('hidden');
        }

        function startAutoCheck() {
            if (!checkInterval) checkInterval = setInterval(() => handleLogin(true), 10000);
        }

        function logout() {
            clearInterval(checkInterval);
            localStorage.clear();
            location.reload();
        }
    </script>
</body>
</html>
