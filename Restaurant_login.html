<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دخول المطعم | الحوت</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Tajawal', sans-serif; }
        .login-box { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(16, 185, 129, 0.2); }
    </style>
</head>
<body class="p-6">
    <div class="login-box p-8 rounded-[2.5rem] w-full max-w-sm text-center shadow-2xl">
        <div class="text-5xl mb-6">🏪</div>
        <h2 class="text-2xl font-black text-white mb-8 italic">بوابة المطاعم <span class="text-emerald-500">V10</span></h2>
        <form id="loginForm" class="space-y-4">
            <input type="tel" id="resPhone" placeholder="رقم الهاتف المسجل" class="w-full p-4 bg-slate-800 border-2 border-transparent focus:border-emerald-500 rounded-2xl text-white font-bold text-center tracking-widest outline-none" required>
            <button type="submit" id="btn" class="w-full bg-emerald-500 text-slate-900 py-4 rounded-2xl font-black text-lg transition-all active:scale-95 shadow-lg shadow-emerald-500/20">دخول النظام</button>
        </form>
    </div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbzywi3-mLv5H4bNHYvQbFDpy_FwA-AceD4g8JZX6Ah3QZhmC5LGXNLvBeQBjYO9tmt9vA/exec";
        document.getElementById('loginForm').onsubmit = async function(e) {
            e.preventDefault();
            const phone = document.getElementById('resPhone').value;
            const btn = document.getElementById('btn');
            btn.innerText = "جاري الفحص..."; btn.disabled = true;

            try {
                // نستخدم نفس اكشن التحقق
                const res = await fetch(`${API}?action=get_master_data&pass=112233`);
                const data = await res.json();
                const found = data.restaurants.find(r => String(r[2]) === String(phone));
                
                if (found && found[4] === "active") {
                    localStorage.setItem('whale_res_phone', phone);
                    window.location.href = "restaurant.html";
                } else {
                    alert("الرقم غير مسجل أو الحساب معطل.");
                    btn.innerText = "دخول النظام"; btn.disabled = false;
                }
            } catch (e) { alert("خطأ في الاتصال بالسيرفر"); btn.disabled = false; }
        };
    </script>
</body>
</html>
