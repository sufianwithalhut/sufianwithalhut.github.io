<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>رادار الكابتن | منظومة الحوت 🐋</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --whale-blue: #2563eb; --whale-bg: #f1f5f9; }
        body { font-family: 'Tajawal', sans-serif; background: var(--whale-bg); color: #1e293b; overflow-x: hidden; }
        
        .header-glass { background: white; border-bottom: 2px solid var(--whale-blue); box-shadow: 0 10px 30px rgba(37, 99, 235, 0.1); }
        .order-card { background: white; border-radius: 2.5rem; border: 1px solid rgba(37, 99, 235, 0.1); box-shadow: 0 20px 40px rgba(0,0,0,0.05); }
        
        .radar-ping { animation: ping 2s infinite; background: var(--whale-blue); }
        @keyframes ping { 75%, 100% { transform: scale(3); opacity: 0; } }
        
        .timer-font { font-family: 'Orbitron', sans-serif; letter-spacing: 2px; }
        .hidden { display: none; }
        
        .btn-action { transition: 0.3s; font-weight: 900; text-transform: uppercase; font-style: italic; border-radius: 1.5rem; }
        .btn-action:active { transform: scale(0.95); }
        
        .receipt-preview { border-radius: 2rem; border: 4px solid #f1f5f9; transition: 0.3s; cursor: pointer; }
        .receipt-preview:active { transform: scale(1.1); z-index: 100; position: relative; }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen pb-10">
    
    <header class="p-4 header-glass flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="relative w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg">
                <i class="fas fa-satellite-dish animate-pulse"></i>
                <div class="absolute inset-0 rounded-xl radar-ping opacity-30"></div>
            </div>
            <div>
                <h1 class="text-[9px] font-black text-blue-600 uppercase tracking-widest italic leading-none">Pilot Radar V8.5</h1>
                <p id="welcomeName" class="text-xs text-slate-800 font-black mt-1">كابتن: جاري الاتصال..</p>
            </div>
        </div>
        <button onclick="logout()" class="w-10 h-10 bg-red-50 text-red-500 rounded-xl flex items-center justify-center border border-red-100 active:scale-90"><i class="fas fa-sign-out-alt"></i></button>
    </header>

    <main class="p-6">
        <div id="searchingStatus" class="text-center mb-8 py-4 bg-blue-50 rounded-2xl border border-blue-100">
            <p id="radarText" class="text-[10px] text-blue-600 font-black uppercase tracking-[0.3em] italic animate-pulse">Scanning Kirkuk Sector 📡</p>
        </div>

        <div id="orderCard" class="order-card p-6 relative overflow-hidden hidden">
            
            <div class="text-center mb-6 bg-slate-50 py-4 rounded-[2rem]">
                <p class="text-[9px] text-slate-400 uppercase font-black mb-1 italic">المتبقي للتسليم (دقيقة)</p>
                <div id="timerDisplay" class="timer-font text-4xl font-black text-blue-600 tracking-tighter">30:00</div>
            </div>

            <div class="mb-6 flex flex-col items-center border-b border-slate-100 pb-6 text-center">
                <div class="bg-blue-600 text-white px-4 py-1 rounded-full text-[10px] font-black mb-2 italic">مهمة نشطة 🐋</div>
                <h2 id="restaurantTitle" class="text-2xl font-black text-slate-800 italic">اسم المطعم</h2>
                <div id="restaurantArea" class="text-blue-500 font-black text-xs mt-1 italic flex items-center gap-1">
                   <i class="fas fa-map-marker-alt"></i> <span id="resAreaName">جاري التحديد...</span>
                </div>
                
                <a id="restMapLink" href="#" target="_blank" class="mt-4 w-full flex items-center justify-center gap-2 bg-blue-600 text-white py-4 rounded-2xl shadow-lg shadow-blue-200 text-sm font-black italic">
                    <i class="fas fa-directions"></i>
                    <span>التوجه للمطعم (خرائط)</span>
                </a>
            </div>

            <div id="receiptOnlyView" class="hidden space-y-4 mb-6">
                <div class="rounded-[2rem] overflow-hidden bg-slate-100 relative group">
                    <img id="receiptImg" src="" class="receipt-preview w-full" alt="Receipt">
                    <div class="absolute inset-0 bg-gradient-to-t from-black/20 to-transparent pointer-events-none"></div>
                </div>
                <p class="text-[9px] text-center text-slate-400 font-bold italic uppercase tracking-widest"><i class="fas fa-search-plus"></i> انقر على الصورة للتكبير</p>
            </div>

            <div class="space-y-4">
                <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                    <p class="text-[9px] text-slate-400 font-black uppercase italic mb-1 tracking-widest">🏠 ملاحظات العنوان</p>
                    <p id="locationTxt" class="text-sm font-black text-slate-700 italic leading-relaxed text-right">...</p>
                </div>
                
                <div id="customerPhoneSection" class="bg-emerald-50 p-4 rounded-2xl border border-emerald-100 flex justify-between items-center hidden">
                    <div class="flex-1">
                        <p class="text-[9px] text-emerald-600 font-black uppercase italic mb-1 tracking-widest">📞 هاتف الزبون</p>
                        <p id="phoneTxt" class="text-xl font-black text-emerald-600 font-mono tracking-widest">077XXXXXXXX</p>
                    </div>
                    <a id="phoneCall" href="#" class="bg-emerald-500 w-14 h-14 rounded-2xl text-white shadow-lg flex items-center justify-center text-2xl active:scale-90 transition-all">
                        <i class="fas fa-phone-alt"></i>
                    </a>
                </div>
            </div>

            <div class="mt-8 space-y-3">
                <button id="pickUpBtn" onclick="updateOrderStatus('picked-up')" class="w-full bg-blue-600 text-white py-5 btn-action text-lg shadow-xl shadow-blue-200 flex items-center justify-center gap-3">
                    <span>استلمت الطلب من المطعم</span> <i class="fas fa-check-circle"></i>
                </button>
                <button id="deliverBtn" onclick="updateOrderStatus('delivered')" class="w-full bg-emerald-500 text-white py-5 btn-action text-lg shadow-xl shadow-emerald-200 flex items-center justify-center gap-3 hidden">
                    <span>تم التسليم بنجاح ✅</span>
                </button>
            </div>
        </div>

        <div id="noOrders" class="text-center py-24 opacity-30 flex flex-col items-center">
            <div class="w-24 h-24 bg-blue-100 rounded-full flex items-center justify-center mb-6 border-4 border-white shadow-inner animate-bounce">
                <i class="fas fa-satellite-dish text-4xl text-blue-600"></i>
            </div>
            <p class="text-sm font-black text-slate-800 uppercase tracking-widest italic">الرادار يبحث عن إشارات نشطة</p>
            <p class="text-[10px] text-slate-500 mt-2 font-bold italic tracking-widest uppercase">Kirkuk Network Connected</p>
        </div>
    </main>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxziP5TpfK4FVZcVO-4xzPaLqvpxjLMVL_JbSIZ0E9pKujgxgQU0ZIIfR1GufbOehwPBg/exec';
        const driverPhone = localStorage.getItem('whale_driver_phone'); 
        let currentOrderID = null;
        let deathTimer = null;

        window.onload = () => {
            if (!driverPhone) { window.location.href = 'driver_login.html'; return; }
            document.getElementById('welcomeName').innerText = "كابتن: " + (localStorage.getItem('whale_driver_name') || "مجهول");
            
            startGPS();
            checkOrders(); 
            setInterval(checkOrders, 8000); // تحديث الرادار كل 8 ثوانٍ
        };

        // تتبع الموقع الفعلي وإرساله لطه في الشيت
        function startGPS() {
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition((pos) => {
                    const data = { action: "update_location", type: "Driver", phone: driverPhone, lat: pos.coords.latitude, lng: pos.coords.longitude };
                    fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
                }, null, { enableHighAccuracy: true });
            }
        }

        async function checkOrders() {
            try {
                const res = await fetch(`${scriptURL}?action=get_master_data&pass=GET_DRIVER_MISSION&phone=${driverPhone}`);
                const data = await res.json();
                
                // البحث عن أول طلب مسند (Assigned) لهذا السائق ولم يسلم بعد
                const myOrder = data.orders.find(o => String(o[6]) === String(driverPhone) && o[5] !== "delivered");

                if (myOrder) {
                    const restInfo = data.restaurants.find(r => r[1] === myOrder[1]);
                    renderOrder(myOrder, restInfo);
                } else {
                    document.getElementById('orderCard').classList.add('hidden');
                    document.getElementById('noOrders').classList.remove('hidden');
                    document.getElementById('radarText').innerText = "Scanning Kirkuk Sector 📡";
                    stopDeathTimer();
                }
            } catch (e) { console.log("Radar Scan Loop..."); }
        }

        function renderOrder(order, restInfo) {
            currentOrderID = order[0]; 
            document.getElementById('noOrders').classList.add('hidden');
            document.getElementById('orderCard').classList.remove('hidden');
            document.getElementById('radarText').innerText = "LOCKED ON MISSION 🐋";
            
            document.getElementById('restaurantTitle').innerText = order[1];
            if (restInfo) {
                document.getElementById('resAreaName').innerText = restInfo[3].split('|')[0].trim();
                document.getElementById('restMapLink').href = restInfo[3].split('|')[1] ? restInfo[3].split('|')[1].trim() : "#";
            }

            const isPicked = order[5] === "picked-up";
            document.getElementById('pickUpBtn').classList.toggle('hidden', isPicked);
            document.getElementById('deliverBtn').classList.toggle('hidden', !isPicked);

            // عرض الوصل لو كان صورة
            const rImg = document.getElementById('receiptImg');
            if (order[4] && order[4].length > 100) {
                document.getElementById('receiptOnlyView').classList.remove('hidden');
                rImg.src = order[4];
            } else {
                document.getElementById('receiptOnlyView').classList.add('hidden');
            }

            // عرض تفاصيل العنوان والهاتف
            document.getElementById('locationTxt').innerText = order[3] || "اتبع توجيهات المطعم";
            const phoneMatch = (order[3] || "").match(/07[0-9]{9}/);
            const pSec = document.getElementById('customerPhoneSection');
            if (phoneMatch) {
                pSec.classList.remove('hidden');
                document.getElementById('phoneTxt').innerText = phoneMatch[0];
                document.getElementById('phoneCall').href = "tel:" + phoneMatch[0];
            } else { pSec.classList.add('hidden'); }

            if (!deathTimer) startDeathTimer();
        }

        async function updateOrderStatus(newStatus) {
            if (!currentOrderID) return;
            const btnId = (newStatus === 'picked-up') ? 'pickUpBtn' : 'deliverBtn';
            const btn = document.getElementById(btnId);
            
            btn.disabled = true;
            btn.innerHTML = `<i class="fas fa-sync-alt animate-spin"></i> تحديث المهمة...`;

            try {
                await fetch(scriptURL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ action: "master_control", targetSheet: "Orders", targetID: currentOrderID, colIndex: 5, newValue: newStatus })
                });
                
                if (newStatus === 'delivered') {
                    alert("عاش يا بطل! تم إكمال المهمة بنجاح 🏅");
                    stopDeathTimer();
                }
                setTimeout(checkOrders, 1000);
            } catch (e) { alert("حدث خطأ في الشبكة، جرب ثانية"); }
            finally { btn.disabled = false; }
        }

        function startDeathTimer() {
            let timeLeft = 1800; // 30 دقيقة
            deathTimer = setInterval(() => {
                const mins = Math.floor(timeLeft / 60);
                const secs = timeLeft % 60;
                const display = document.getElementById('timerDisplay');
                display.innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
                
                if (timeLeft < 300) display.classList.replace('text-blue-600', 'text-red-500'); // تحذير آخر 5 دقايق
                if (timeLeft <= 0) {
                    display.innerText = "تأخير!";
                    clearInterval(deathTimer);
                }
                timeLeft--;
            }, 1000);
        }

        function stopDeathTimer() {
            clearInterval(deathTimer);
            deathTimer = null;
            document.getElementById('timerDisplay').innerText = "30:00";
            document.getElementById('timerDisplay').classList.replace('text-red-500', 'text-blue-600');
        }

        function logout() { localStorage.clear(); window.location.href = 'driver_login.html'; }
    </script>
</body>
</html>
