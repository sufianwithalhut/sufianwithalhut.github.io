<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مركز القيادة | طيار الحوت 🐋 V10.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --whale-blue: #2563eb; --whale-dark: #0f172a; }
        body { font-family: 'Tajawal', sans-serif; background: #f1f5f9; color: var(--whale-dark); transition: 0.5s; }
        
        /* نظام الزجاج (Glassmorphism) */
        .glass-header { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(37, 99, 235, 0.1); }
        .mission-card { background: white; border-radius: 3rem; box-shadow: 0 25px 50px -12px rgba(37, 99, 235, 0.1); border: 1px solid rgba(255,255,255,1); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        
        /* تأثيرات الرادار */
        .radar-pulse { position: relative; }
        .radar-pulse::after { content: ''; position: absolute; inset: -4px; border-radius: inherit; border: 2px solid var(--whale-blue); animation: pulse-ring 1.5s infinite; }
        @keyframes pulse-ring { 0% { transform: scale(0.8); opacity: 0.5; } 100% { transform: scale(1.5); opacity: 0; } }

        .btn-mission { border-radius: 2rem; font-weight: 900; transition: 0.3s; position: relative; overflow: hidden; }
        .btn-mission:active { transform: scale(0.95); }
        
        .timer-glow { font-family: 'Orbitron', sans-serif; text-shadow: 0 0 15px rgba(37, 99, 235, 0.3); }
        
        /* حالة الطلب المستلم */
        .status-picked-up { background: #eff6ff !important; border-color: #3b82f6 !important; }
        .status-picked-up .timer-glow { color: #1e40af; }

        .hidden { display: none; }
        .fade-in { animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen">

    <header class="sticky top-0 z-50 glass-header p-4 flex justify-between items-center px-6">
        <div class="flex items-center gap-3">
            <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center text-white shadow-lg radar-pulse">
                <i class="fas fa-location-arrow"></i>
            </div>
            <div>
                <p id="pilotName" class="text-[10px] font-black text-blue-600 uppercase tracking-widest italic leading-none">Pilot: Connecting...</p>
                <div class="flex items-center gap-1 mt-1">
                    <span class="w-2 h-2 bg-emerald-500 rounded-full animate-ping"></span>
                    <span id="gpsStatus" class="text-[9px] font-bold text-slate-500 italic">GPS Active</span>
                </div>
            </div>
        </div>
        <button onclick="logout()" class="w-10 h-10 bg-slate-100 text-slate-400 rounded-xl hover:bg-red-50 hover:text-red-500 transition-all">
            <i class="fas fa-power-off"></i>
        </button>
    </header>

    <main class="p-6">
        <div id="searchView" class="text-center py-20 opacity-50">
            <div class="w-32 h-32 bg-white rounded-full flex items-center justify-center mx-auto mb-6 shadow-xl relative">
                <i class="fas fa-satellite text-4xl text-blue-500 animate-bounce"></i>
                <div class="absolute inset-0 border-4 border-blue-500/10 rounded-full animate-ping"></div>
            </div>
            <p class="text-xs font-black text-slate-400 uppercase tracking-[0.3em] italic">Scanning Kirkuk Grid 📡</p>
        </div>

        <div id="missionCard" class="mission-card p-6 hidden fade-in">
            <div class="text-center mb-8 bg-slate-50/50 py-6 rounded-[2.5rem] border border-white">
                <p class="text-[9px] text-slate-400 font-black uppercase tracking-widest mb-1 italic">Mission Time Remaining</p>
                <div id="countdown" class="timer-glow text-5xl font-black text-blue-600 tracking-tighter">30:00</div>
            </div>

            <div class="flex flex-col items-center mb-6">
                <span class="bg-blue-600 text-white px-4 py-1 rounded-full text-[9px] font-black italic shadow-md mb-4 uppercase tracking-widest">Target Found</span>
                <h2 id="resName" class="text-2xl font-black text-slate-800 italic">...</h2>
                <div class="flex gap-2 mt-3">
                    <span id="resZone" class="bg-blue-50 text-blue-600 px-3 py-1 rounded-lg text-[10px] font-black">...</span>
                    <span id="orderPrice" class="bg-emerald-50 text-emerald-600 px-3 py-1 rounded-lg text-[10px] font-black">...</span>
                </div>
            </div>

            <div id="receiptBox" class="hidden mb-6 group cursor-pointer" onclick="zoomImage()">
                <div class="rounded-[2.5rem] overflow-hidden border-4 border-slate-50 shadow-inner">
                    <img id="receiptImg" src="" class="w-full object-contain max-h-48" alt="Receipt">
                </div>
                <p class="text-[9px] text-center text-slate-400 mt-2 font-bold italic">إضغط لتكبير صورة الوصل</p>
            </div>

            <div class="space-y-4">
                <div class="bg-slate-50 p-5 rounded-3xl border border-white flex gap-4">
                    <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center text-blue-500 shadow-sm shrink-0">
                        <i class="fas fa-map-marker-alt"></i>
                    </div>
                    <div>
                        <p class="text-[9px] text-slate-400 font-black uppercase italic mb-1">Target Address</p>
                        <p id="targetAddress" class="text-sm font-black text-slate-700 leading-relaxed italic">...</p>
                    </div>
                </div>

                <div id="customerBox" class="hidden bg-emerald-50/50 p-5 rounded-3xl border border-emerald-100 flex justify-between items-center">
                    <div>
                        <p class="text-[9px] text-emerald-600 font-black uppercase italic mb-1 tracking-widest">Customer Line</p>
                        <p id="customerPhone" class="text-xl font-black text-emerald-700 font-mono tracking-widest">...</p>
                    </div>
                    <a id="callBtn" href="#" class="w-14 h-14 bg-emerald-500 text-white rounded-2xl flex items-center justify-center text-2xl shadow-lg shadow-emerald-500/30 animate-pulse">
                        <i class="fas fa-phone"></i>
                    </a>
                </div>
            </div>

            <div class="mt-8 space-y-4">
                <button id="btnPick" onclick="updateMission('picked-up')" class="w-full py-6 bg-blue-600 text-white btn-mission text-xl shadow-xl shadow-blue-200 flex items-center justify-center gap-3">
                    <span>استلمت من المطعم</span> <i class="fas fa-box"></i>
                </button>
                <button id="btnDone" onclick="updateMission('delivered')" class="w-full py-6 bg-emerald-500 text-white btn-mission text-xl shadow-xl shadow-emerald-200 flex items-center justify-center gap-3 hidden">
                    <span>إتمام التوصيل ✅</span>
                </button>
            </div>
        </div>
    </main>

    <script>
        const API = 'https://script.google.com/macros/s/AKfycbzywi3-mLv5H4bNHYvQbFDpy_FwA-AceD4g8JZX6Ah3QZhmC5LGXNLvBeQBjYO9tmt9vA/exec';
        const dPhone = localStorage.getItem('whale_driver_phone');
        let currentOrder = null;
        let timer = null;

        window.onload = () => {
            if (!dPhone) return window.location.href = 'driver_login.html';
            document.getElementById('pilotName').innerText = "Pilot: " + (localStorage.getItem('whale_driver_name') || "Active");
            
            initGPS();
            checkRadar();
            setInterval(checkRadar, 10000); // تحديث كل 10 ثواني
        };

        function initGPS() {
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(pos => {
                    const data = { action: "update_location", phone: dPhone, lat: pos.coords.latitude, lng: pos.coords.longitude };
                    fetch(API, { method: 'POST', body: JSON.stringify(data) }).catch(() => {});
                    document.getElementById('gpsStatus').innerText = "Signal Locked";
                }, null, { enableHighAccuracy: true });
            }
        }

        async function checkRadar() {
            try {
                const res = await fetch(`${API}?action=get_master_data&pass=NONE`); // يتم التحقق داخليا في السكربت بناء على ID السائق
                const data = await res.json();
                
                // البحث عن الطلب المسند لهذا السائق فقط
                const myOrder = data.orders.find(o => String(o[6]) === String(dPhone) && (o[5] === "assigned" || o[5] === "picked-up" || o[5] === "pending_confirmation"));

                if (myOrder) displayMission(myOrder);
                else hideMission();
            } catch (e) { console.log("Radar Searching..."); }
        }

        function displayMission(order) {
            currentOrder = order;
            document.getElementById('searchView').classList.add('hidden');
            document.getElementById('missionCard').classList.remove('hidden');
            
            document.getElementById('resName').innerText = order[1];
            document.getElementById('resZone').innerText = order[9] || "كركوك";
            document.getElementById('orderPrice').innerText = order[8] + " د.ع";
            document.getElementById('targetAddress').innerText = order[3];

            // حالة الأزرار
            const status = order[5];
            const isPicked = status === 'picked-up';
            document.getElementById('btnPick').classList.toggle('hidden', isPicked);
            document.getElementById('btnDone').classList.toggle('hidden', !isPicked);
            document.getElementById('missionCard').classList.toggle('status-picked-up', isPicked);

            // صورة الوصل
            if (order[4] && order[4].startsWith('http')) {
                document.getElementById('receiptImg').src = order[4];
                document.getElementById('receiptBox').classList.remove('hidden');
            }

            // هاتف الزبون
            const phone = order[3].match(/07[0-9]{9}/);
            if (phone) {
                document.getElementById('customerBox').classList.remove('hidden');
                document.getElementById('customerPhone').innerText = phone[0];
                document.getElementById('callBtn').href = "tel:" + phone[0];
            }

            if (!timer) startTimer();
        }

        function hideMission() {
            document.getElementById('missionCard').classList.add('hidden');
            document.getElementById('searchView').classList.remove('hidden');
            if (timer) { clearInterval(timer); timer = null; }
            document.getElementById('countdown').innerText = "30:00";
        }

        async function updateMission(status) {
            const btn = document.getElementById(status === 'picked-up' ? 'btnPick' : 'btnDone');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-sync animate-spin"></i> Processing...';

            const payload = { 
                action: "master_control", 
                pass: "112233", // الماستر باسورد من شيت Settings
                targetSheet: "Orders", 
                targetID: currentOrder[0], 
                colIndex: 5, 
                newValue: status 
            };

            try {
                await fetch(API, { method: 'POST', body: JSON.stringify(payload) });
                if (status === 'delivered') alert("أحسنت! تمت المهمة بنجاح 🐋");
                checkRadar();
            } catch (e) { alert("خطأ في الشبكة"); }
            finally { btn.disabled = false; }
        }

        function startTimer() {
            let sec = 1800;
            timer = setInterval(() => {
                const m = Math.floor(sec/60);
                const s = sec%60;
                document.getElementById('countdown').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
                if (sec-- <= 0) clearInterval(timer);
            }, 1000);
        }

        function zoomImage() {
            window.open(document.getElementById('receiptImg').src, '_blank');
        }

        function logout() {
            if(confirm("إنهاء نوبة العمل وتسجيل الخروج؟")) {
                localStorage.clear();
                window.location.href = 'driver_login.html';
            }
        }
    </script>
</body>
</html>
