<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة السائق | نظام الحوت</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <style>
        body { background-color: #eceff1; font-family: 'Segoe UI', Tahoma, sans-serif; }
        .card { border-radius: 20px; border: none; box-shadow: 0 8px 20px rgba(0,0,0,0.08); }
        .status-badge { font-size: 0.9rem; padding: 5px 15px; border-radius: 20px; }
        .timer-circle { width: 80px; height: 80px; border: 5px solid #e74c3c; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: bold; margin: 10px auto; color: #e74c3c; }
        #orderAlert { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; display: none; color: white; padding: 20px; text-align: center; }
        .hidden-section { display: none; }
        #loadingOverlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:10000; display:none; align-items:center; justify-content:center; }
    </style>
</head>
<body>

<div id="loadingOverlay">
    <div class="spinner-border text-light"></div>
</div>

<div class="container mt-4">
    <div id="driverLoginSection" class="card p-4 mb-4">
        <h3 class="text-center mb-3">دخول السائق</h3>
        <input type="tel" id="checkDriverPhone" class="form-control mb-3" placeholder="أدخل رقم هاتفك المسجل">
        <button class="btn btn-primary w-100 p-3" onclick="checkDriverStatus()">دخول للنظام</button>
        <hr>
        <button class="btn btn-outline-secondary w-100" onclick="toggleRegForm()">تسجيل سائق جديد</button>
    </div>

    <div id="driverRegSection" class="card p-4 mb-4 hidden-section">
        <h3 class="text-center mb-4">انضمام لفريق الحوت</h3>
        <form id="driverRegForm">
            <div class="mb-3">
                <label class="form-label">الاسم الثلاثي</label>
                <input type="text" id="driverName" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">رقم الهاتف</label>
                <input type="tel" id="driverPhone" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-success w-100 p-3">إرسال الطلب</button>
        </form>
    </div>

    <div id="driverDashboard" class="hidden-section">
        <div class="card p-3 mb-3 text-center">
            <h5 id="welcomeMsg">مرحباً بك</h5>
            <div class="d-flex justify-content-around mt-3">
                <div>
                    <small class="text-muted d-block">طلبات اليوم</small>
                    <b id="dailyOrders">0</b>
                </div>
                <div>
                    <small class="text-muted d-block">مدة الانتظار</small>
                    <b id="waitTime">0 دقيقة</b>
                </div>
            </div>
        </div>

        <div class="card p-3 text-center">
            <span id="onlineStatus" class="status-badge bg-success text-white mb-3">رادارك نشط الآن</span>
            <small class="d-block mb-3 text-muted">إحداثياتك الحالية: <span id="coordsDisplay">جاري الجلب...</span></small>
            <button class="btn btn-danger w-100" onclick="location.reload()">تسجيل خروج</button>
        </div>
    </div>
</div>

<div id="orderAlert">
    <h2 class="mt-5">طلب جديد لك!</h2>
    <div class="timer-circle" id="timer">60</div>
    <div class="card bg-dark p-3 mt-4 text-white text-end mx-auto" style="max-width: 400px;">
        <p><strong>المطعم:</strong> <span id="alertResName">...</span></p>
        <p><strong>المنطقة:</strong> <span id="alertArea">...</span></p>
    </div>
    <div class="d-flex gap-3 mt-5 justify-content-center">
        <button class="btn btn-success btn-lg px-5 p-3" onclick="acceptOrder()">قبول</button>
        <button class="btn btn-danger btn-lg px-5 p-3" onclick="rejectOrder()">رفض</button>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycby7a-gZ44EKeTLJWHnayDvUhiWwKnX8eKZp8BudmWf7xaLLTVBnAdOSgtVa3DTJe9lUJA/exec";
    let driverPhone = "";
    let waitSeconds = 0;
    let driverPos = { lat: 0, lng: 0 };

    function toggleRegForm() {
        document.getElementById('driverRegSection').classList.toggle('hidden-section');
    }

    function checkDriverStatus() {
        const phone = document.getElementById('checkDriverPhone').value;
        if(!phone) return alert("أدخل الرقم");
        
        showLoading(true);
        fetch(`${API_URL}?action=checkDriver&phone=${phone}`)
        .then(res => res.json())
        .then(data => {
            showLoading(false);
            if(data.status === "active") {
                driverPhone = phone;
                startDriverSystem(data.name);
            } else {
                alert("الحساب غير مفعل أو غير موجود");
            }
        });
    }

    function startDriverSystem(name) {
        document.getElementById('driverLoginSection').classList.add('hidden-section');
        document.getElementById('driverRegSection').classList.add('hidden-section');
        document.getElementById('driverDashboard').classList.remove('hidden-section');
        document.getElementById('welcomeMsg').innerText = "مرحباً يا بطل، " + name;
        
        trackLocation();
        setInterval(updateWaitTime, 1000);
        setInterval(checkForNewOrders, 10000); // يفحص الشيت كل 10 ثواني بحثاً عن طلبات موجهة له
    }

    function trackLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(pos => {
                driverPos.lat = pos.coords.latitude;
                driverPos.lng = pos.coords.longitude;
                document.getElementById('coordsDisplay').innerText = `${driverPos.lat.toFixed(4)}, ${driverPos.lng.toFixed(4)}`;
                syncLocation();
            });
        }
    }

    function syncLocation() {
        const url = `${API_URL}?action=DRIVER_UPDATE&phone=${driverPhone}&lat=${driverPos.lat}&lng=${driverPos.lng}&wait=${Math.floor(waitSeconds/60)}`;
        fetch(url); // تحديث صامت للشيت
    }

    function updateWaitTime() {
        waitSeconds++;
        document.getElementById('waitTime').innerText = Math.floor(waitSeconds / 60) + " دقيقة";
    }

    function checkForNewOrders() {
        if(!driverPhone) return;
        fetch(`${API_URL}?action=checkMyOrders&phone=${driverPhone}`)
        .then(res => res.json())
        .then(order => {
            if(order.id) showNewOrder(order);
        });
    }

    function showNewOrder(order) {
        document.getElementById('alertResName').innerText = order.resName;
        document.getElementById('alertArea').innerText = order.customerArea;
        document.getElementById('orderAlert').style.display = 'block';
        // بدء عد تنازلي 60 ثانية هنا...
    }

    document.getElementById('driverRegForm').onsubmit = function(e) {
        e.preventDefault();
        showLoading(true);
        const data = {
            name: document.getElementById('driverName').value,
            phone: document.getElementById('driverPhone').value,
            action: 'DRIVER_REG'
        };
        fetch(API_URL, { method: 'POST', body: JSON.stringify(data) })
        .then(() => {
            showLoading(false);
            alert("تم إرسال طلب الانضمام بنجاح.");
            location.reload();
        });
    };

    function showLoading(s) { document.getElementById('loadingOverlay').style.display = s ? 'flex' : 'none'; }
</script>
</body>
</html>
