<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>بوابة الكابتن | نظام الحوت</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --dark-bg: #0f172a;
            --accent-green: #22c55e;
            --accent-red: #ef4444;
            --glass-white: rgba(255, 255, 255, 0.9);
        }

        body { 
            background-color: #f1f5f9; 
            font-family: 'Cairo', sans-serif; 
            touch-action: manipulation; /* لمنع التكبير العشوائي على الموبايل */
            overflow-x: hidden;
        }

        .hidden-section { display: none !important; }

        /* شاشة التنبيه الكبرى (الرنين) */
        #orderAlert {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(180deg, var(--dark-bg) 0%, #1e293b 100%);
            z-index: 10000; color: white; padding: 40px 20px;
            text-align: center; display: flex; flex-direction: column; justify-content: space-between;
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .timer-ring {
            position: relative; width: 120px; height: 120px; margin: 20px auto;
            border: 8px solid rgba(255,255,255,0.1); border-top: 8px solid var(--accent-green);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 2.5rem; font-weight: 900; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .timer-text { position: absolute; font-size: 2.5rem; animation: none; font-family: monospace;}

        /* لوحة التحكم */
        .driver-card {
            border: none; border-radius: 28px; background: white;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05); margin-bottom: 20px; overflow: hidden;
        }

        .status-header {
            padding: 20px; background: var(--dark-bg); color: white;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom-left-radius: 30px; border-bottom-right-radius: 30px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .online-dot {
            width: 12px; height: 12px; background: var(--accent-green);
            border-radius: 50%; display: inline-block; margin-left: 8px;
            box-shadow: 0 0 10px var(--accent-green); animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        .stat-box {
            background: #f8fafc; border-radius: 20px; padding: 15px; text-align: center;
            border: 1px solid #e2e8f0;
        }

        .btn-action {
            border-radius: 20px; padding: 20px; font-weight: 700; font-size: 1.2rem;
            border: none; transition: 0.2s; width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-accept { background: var(--accent-green); color: white; }
        .btn-reject { background: rgba(255,255,255,0.1); color: #94a3b8; margin-top: 15px; }

        #loadingOverlay {
            position: fixed; top:0; left:0; width:100%; height:100%; 
            background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(5px);
            z-index:11000; display:none; align-items:center; justify-content:center; color: white;
        }
        
        /* Pulse Radar effect */
        .radar-box { position: relative; width: 150px; height: 150px; margin: 0 auto; display: flex; align-items: center; justify-content: center;}
        .radar-box::before { content: ''; position: absolute; width: 100%; height: 100%; background: rgba(34, 197, 94, 0.2); border-radius: 50%; animation: radarPulse 2s infinite; }
        @keyframes radarPulse { 0% { transform: scale(0.5); opacity: 1; } 100% { transform: scale(1.5); opacity: 0; } }
    </style>
</head>
<body>

<div id="loadingOverlay">
    <div class="text-center">
        <div class="spinner-border text-success" role="status" style="width: 3rem; height: 3rem;"></div>
        <div class="mt-3 fw-bold fs-5">جاري الاتصال بالمركز...</div>
    </div>
</div>

<div class="container-fluid p-0">
    <div id="driverLoginSection" class="p-4 mt-5">
        <div class="text-center mb-5">
            <i data-lucide="navigation" size="64" color="#0f172a" class="mb-3"></i>
            <h2 class="fw-black mt-3">دخول الكابتن</h2>
            <p class="text-muted fw-bold">أهلاً بك في أسطول الحوت</p>
        </div>
        <div class="driver-card p-4">
            <input type="tel" id="checkDriverPhone" class="form-control form-control-lg mb-3 shadow-none text-center" placeholder="أدخل رقم هاتفك" style="font-size: 1.2rem; letter-spacing: 2px;">
            <button class="btn btn-dark w-100 p-3 fw-bold fs-5 rounded-4 shadow" onclick="checkDriverStatus()">
                <i data-lucide="power" class="me-2"></i> ابدأ العمل الآن
            </button>
        </div>
    </div>

    <div id="driverDashboard" class="hidden-section">
        <div class="status-header">
            <div>
                <h5 class="m-0 fw-black" id="welcomeMsg">الكابتن</h5>
                <small class="text-success fw-bold"><span class="online-dot"></span> متصل وجاهز للطلبات</small>
            </div>
            <button class="btn btn-outline-light btn-sm rounded-pill px-3" onclick="location.reload()">إيقاف</button>
        </div>

        <div class="p-3 mt-2">
            <div class="row g-3 mb-4">
                <div class="col-6">
                    <div class="stat-box">
                        <small class="text-muted fw-bold d-block">إحداثياتك</small>
                        <span id="latDisplay" class="d-block text-primary small fw-bold">...</span>
                        <span id="lngDisplay" class="d-block text-primary small fw-bold">...</span>
                    </div>
                </div>
                <div class="col-6">
                    <div class="stat-box">
                        <small class="text-muted fw-bold d-block">حالة الرادار</small>
                        <h5 class="m-0 fw-bold text-success mt-2">نشط <i data-lucide="rss" size="18"></i></h5>
                    </div>
                </div>
            </div>

            <div class="text-center mt-5">
                <div class="radar-box mb-4">
                    <div class="bg-success text-white rounded-circle d-flex align-items-center justify-content-center shadow-lg" style="width: 80px; height: 80px;">
                        <i data-lucide="map" size="40"></i>
                    </div>
                </div>
                <h4 class="fw-bold">نبحث عن طلبات قريبة...</h4>
                <p class="text-muted">ابقَ التطبيق مفتوحاً لتتلقى الطلبات فوراً</p>
            </div>
        </div>
    </div>
</div>

<div id="orderAlert" class="hidden-section">
    <div>
        <i data-lucide="bell-ring" size="60" class="text-success mb-3" style="animation: pulse 1s infinite;"></i>
        <h1 class="fw-black text-warning">طلب توصيل جديد!</h1>
    </div>
    
    <div class="timer-ring">
        <div class="timer-text" id="timerValue">60</div>
    </div>

    <div class="driver-card p-4 mt-4 text-dark shadow-lg text-start">
        <div class="d-flex align-items-center justify-content-between mb-3 border-bottom pb-3">
            <span class="badge bg-primary px-3 py-2 fs-6 rounded-pill">معلومات الطلب</span>
            <span class="text-muted small fw-bold" id="alertOrderId">#HUT-000</span>
        </div>
        <h3 class="fw-black text-dark mb-3" id="alertResName">اسم المطعم</h3>
        <div class="d-flex align-items-center gap-3 bg-light p-3 rounded-4">
            <i data-lucide="navigation-2" size="24" class="text-primary"></i>
            <div>
                <small class="text-muted d-block fw-bold">منطقة الزبون</small>
                <span id="alertArea" class="fs-5 fw-bold">المنطقة</span>
            </div>
        </div>
    </div>

    <div class="pb-4">
        <button class="btn btn-action btn-accept mb-3 shadow-lg" onclick="acceptOrder()">
            <i data-lucide="check-circle" size="28"></i> قبـــول الطلب
        </button>
        <button class="btn btn-action btn-reject" onclick="rejectOrder()">
            <i data-lucide="x" size="20"></i> تجاهل
        </button>
    </div>
</div>

<script>
    lucide.createIcons();
    
    // الرابط المحدث
    const API_URL = "https://script.google.com/macros/s/AKfycbwIELSbF-1Fioo5mTwhsJw4jZ3MRcAgOY5G43ma1vDu6OkOHvItLH3HOOCSZAguWd0Ssw/exec";
    
    let currentDriverPhone = "";
    let currentLat = 0;
    let currentLng = 0;
    let currentOrderId = null;
    let orderCheckInterval;
    let countdownInterval;

    function showLoading(s) { document.getElementById('loadingOverlay').style.display = s ? 'flex' : 'none'; }

    // 1. تسجيل الدخول عبر JSONP
    function checkDriverStatus() {
        const phone = document.getElementById('checkDriverPhone').value;
        if(!phone) return alert("أدخل رقم الهاتف أولاً");
        
        showLoading(true);
        currentDriverPhone = phone;
        
        const script = document.createElement('script');
        script.src = `${API_URL}?action=checkDriver&phone=${phone}&callback=handleLogin`;
        document.body.appendChild(script);
    }

    window.handleLogin = function(data) {
        showLoading(false);
        if(data.status === "active") {
            document.getElementById('driverLoginSection').style.display = 'none';
            document.getElementById('driverDashboard').classList.remove('hidden-section');
            document.getElementById('welcomeMsg').innerText = "كابتن " + data.name;
            startSystem();
        } else if (data.status === "pending") {
            alert("حسابك قيد المراجعة، يرجى انتظار تفعيل الإدارة.");
        } else {
            alert("رقم الهاتف غير مسجل في النظام.");
        }
    };

    // 2. تشغيل النظام (الرادار + الـ GPS)
    function startSystem() {
        // تشغيل GPS
        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(
                (position) => {
                    currentLat = position.coords.latitude;
                    currentLng = position.coords.longitude;
                    document.getElementById('latDisplay').innerText = `Lat: ${currentLat.toFixed(5)}`;
                    document.getElementById('lngDisplay').innerText = `Lng: ${currentLng.toFixed(5)}`;
                    
                    // تحديث الموقع في الشيت
                    updateLocationInSheet();
                },
                (error) => { console.error("GPS Error:", error); },
                { enableHighAccuracy: true, maximumAge: 10000, timeout: 5000 }
            );
        } else {
            alert("جهازك لا يدعم تحديد الموقع!");
        }

        // فحص الطلبات الجديدة كل 10 ثوانٍ
        orderCheckInterval = setInterval(checkForOrders, 10000);
        checkForOrders(); // فحص فوري
    }

    function updateLocationInSheet() {
        const script = document.createElement('script');
        script.src = `${API_URL}?action=DRIVER_UPDATE&phone=${currentDriverPhone}&lat=${currentLat}&lng=${currentLng}&callback=dummyCallback`;
        document.body.appendChild(script);
    }
    window.dummyCallback = function() {}; // فقط لمنع خطأ الـ JSONP

    // 3. فحص الطلبات الموجهة للكابتن
    function checkForOrders() {
        // إذا كانت شاشة التنبيه معروضة حالياً، لا تقم بفحص طلبات جديدة
        if (!document.getElementById('orderAlert').classList.contains('hidden-section')) return;

        const script = document.createElement('script');
        script.src = `${API_URL}?action=checkMyOrders&phone=${currentDriverPhone}&callback=handleNewOrder`;
        document.body.appendChild(script);
    }

    window.handleNewOrder = function(data) {
        if (data.id && data.id !== null) {
            currentOrderId = data.id;
            document.getElementById('alertOrderId').innerText = "#" + data.id;
            document.getElementById('alertResName').innerText = data.resName;
            document.getElementById('alertArea').innerText = data.customerArea;
            
            // إظهار التنبيه وتشغيل العداد
            document.getElementById('orderAlert').classList.remove('hidden-section');
            startCountdown(60);
            
            // تشغيل صوت رنين (اختياري)
            // if(navigator.vibrate) navigator.vibrate([500, 250, 500, 250]);
        }
    };

    // 4. نظام العداد التنازلي للطلب
    function startCountdown(seconds) {
        let timeLeft = seconds;
        document.getElementById('timerValue').innerText = timeLeft;
        
        clearInterval(countdownInterval);
        countdownInterval = setInterval(() => {
            timeLeft--;
            document.getElementById('timerValue').innerText = timeLeft;
            if (timeLeft <= 0) {
                rejectOrder(); // تجاهل تلقائي إذا انتهى الوقت
            }
        }, 1000);
    }

    // 5. قبول أو رفض الطلب (POST)
    function acceptOrder() {
        clearInterval(countdownInterval);
        showLoading(true);
        updateOrderStatus("accepted");
    }

    function rejectOrder() {
        clearInterval(countdownInterval);
        document.getElementById('orderAlert').classList.add('hidden-section');
        updateOrderStatus("rejected"); // يمكن إضافة منطق لإعادة توجيه الطلب لسائق آخر لاحقاً
    }

    function updateOrderStatus(status) {
        const data = {
            action: 'UPDATE_ORDER_STATUS',
            orderId: currentOrderId,
            status: status
        };

        fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify(data)
        }).then(res => res.json()).then(result => {
            showLoading(false);
            if(status === "accepted") {
                document.getElementById('orderAlert').classList.add('hidden-section');
                alert("تم قبول الطلب! توجه إلى المطعم الآن.");
                // يمكن هنا نقل الكابتن لشاشة تتبع تفاصيل الطلب النشط
            }
        }).catch(() => {
            showLoading(false);
            document.getElementById('orderAlert').classList.add('hidden-section');
        });
    }
</script>
</body>
</html>
