<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <script>
        // --- نظام التحديث الإجباري وتطهير الكاش (إصدار 1.4) ---
        const CURRENT_APP_VERSION = "1.4"; 
        if (localStorage.getItem('hut_app_version') !== CURRENT_APP_VERSION) {
            console.log("نسخة قديمة مكتشفة... جاري التحديث الإجباري والتطهير!");
            localStorage.setItem('hut_app_version', CURRENT_APP_VERSION);
            if ('caches' in window) {
                caches.keys().then(function(names) {
                    for (let name of names) caches.delete(name);
                });
            }
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.getRegistrations().then(function(registrations) {
                    for(let registration of registrations) { registration.update(); }
                });
            }
            window.location.reload(true);
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>كباتن سفيان | نظام الحوت</title>
    <meta name="theme-color" content="#1e3a8a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="driver-logo.png"> 
    <link rel="manifest" href="manifest_driver.json">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root { --primary-blue: #1e3a8a; --accent-blue: #3b82f6; --accent-orange: #f97316; --success-green: #10b981; --danger-red: #ef4444; --bg-light: #f8fafc; --card-bg: #ffffff; --text-main: #0f172a; --text-muted: #64748b; }
        body { background: var(--bg-light); font-family: 'Cairo', sans-serif; overflow-x: hidden; color: var(--text-main); -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none; overscroll-behavior-y: contain; }
        .hidden { display: none !important; }
        #loadingOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px); z-index: 20000; display: none; align-items: center; justify-content: center; flex-direction: column; color: white; text-align: center; }
        #permissionOverlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.98); backdrop-filter: blur(10px); z-index: 30000; display: flex; align-items: center; justify-content: center; flex-direction: column; color: white; text-align: center; padding: 25px; }
        .permission-icon { animation: shakeAlert 0.5s ease-in-out infinite alternate; }
        @keyframes shakeAlert { 0% { transform: translateX(-5px); } 100% { transform: translateX(5px); } }
        .login-wrapper { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%); padding: 20px; padding-bottom: env(safe-area-inset-bottom); }
        .login-card { background: var(--card-bg); border-radius: 30px; padding: 40px; width: 100%; max-width: 400px; box-shadow: 0 20px 40px rgba(0,0,0,0.08); text-align: center; position: relative; }
        .phone-input { background: #f1f5f9; border: 2px solid transparent; border-radius: 20px; padding: 18px; font-weight: 900; font-size: 1.5rem; text-align: center; color: var(--primary-blue); letter-spacing: 2px; transition: 0.3s; width: 100%; margin-bottom: 15px;}
        .phone-input:focus { background: white; border-color: var(--accent-blue); outline: none; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); }
        .custom-input { background: #f1f5f9; border: 2px solid transparent; border-radius: 20px; padding: 18px; font-weight: 900; font-size: 1.2rem; text-align: center; color: var(--primary-blue); transition: 0.3s; width: 100%; margin-bottom: 15px; }
        .btn-big { border-radius: 20px; padding: 20px; font-weight: 900; font-size: 1.2rem; width: 100%; border: none; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .btn-big:active { transform: scale(0.96); }
        .btn-login { background: var(--primary-blue); color: white; }
        .btn-accept { background: var(--success-green); color: white; box-shadow: 0 10px 20px rgba(16, 185, 129, 0.3); font-size: 1.4rem; padding: 25px; border-radius: 25px;}
        .btn-arrived { background: #f59e0b; color: white; margin-top: 20px; box-shadow: 0 10px 20px rgba(245, 158, 11, 0.3); }
        .btn-picked { background: #8b5cf6; color: white; margin-top: 20px; box-shadow: 0 10px 20px rgba(139, 92, 246, 0.3); }
        .btn-finish { background: var(--success-green); color: white; margin-top: 20px; box-shadow: 0 10px 20px rgba(16, 185, 129, 0.3); }
        .btn-whatsapp { background: #ecfdf5; color: #10b981; border: 1px solid #a7f3d0; border-radius: 12px; padding: 8px 14px; font-size: 0.85rem; font-weight: 800; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 6px; }
        .btn-photo-view { background: #e0e7ff; color: #1d4ed8; border: 1px solid #bfdbfe; border-radius: 12px; padding: 6px 12px; font-size: 0.8rem; font-weight: 800; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 4px; margin-top: 8px;}
        .switch { position: relative; display: inline-block; width: 50px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #cbd5e1; transition: .4s; border-radius: 30px; }
        .slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        input:checked + .slider { background-color: var(--success-green); }
        input:checked + .slider:before { transform: translateX(24px); }
        .dash-header { background: var(--primary-blue); color: white; padding: 30px 20px 60px 20px; border-bottom-left-radius: 35px; border-bottom-right-radius: 35px; box-shadow: 0 10px 30px rgba(30, 58, 138, 0.2); }
        .status-badge { padding: 6px 14px; border-radius: 20px; font-weight: 800; font-size: 0.85rem; display: inline-flex; align-items: center; gap: 6px; transition: 0.3s; }
        .status-badge.online { background: rgba(16, 185, 129, 0.15); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.3); }
        .status-badge.offline { background: rgba(255, 255, 255, 0.15); color: #e2e8f0; border: 1px solid rgba(255, 255, 255, 0.3); }
        .stats-wrapper { margin-top: -35px; position: relative; z-index: 10; }
        .stat-box { background: white; border-radius: 20px; padding: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; border: 1px solid #e2e8f0; }
        .radar-container { background: var(--card-bg); border-radius: 35px; padding: 40px 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.04); border: 1px solid #e2e8f0; text-align: center; margin: 20px 15px 0 15px; transition: 0.3s;}
        .radar-container.offline-mode { filter: grayscale(100%) opacity(0.5); }
        .radar-center { width: 160px; height: 160px; margin: 0 auto 30px auto; position: relative; display: flex; align-items: center; justify-content: center; }
        .radar-wave { position: absolute; width: 100%; height: 100%; border: 3px solid var(--accent-blue); border-radius: 50%; animation: radarWave 2.5s cubic-bezier(0.25, 1, 0.5, 1) infinite; opacity: 0; }
        @keyframes radarWave { 0% { transform: scale(0.3); opacity: 1; border-width: 3px; } 100% { transform: scale(1.6); opacity: 0; border-width: 1px; } }
        .active-order-card { background: var(--card-bg); border-radius: 30px; padding: 25px; box-shadow: 0 20px 40px rgba(0,0,0,0.06); border: 1px solid #e2e8f0; border-top: 8px solid var(--primary-blue); }
        .info-row { display: flex; justify-content: space-between; align-items: center; background: #f8fafc; padding: 15px 20px; border-radius: 16px; margin-bottom: 12px; border: 1px solid #f1f5f9; }
        .info-label { color: var(--text-muted); font-size: 0.9rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }
        .info-value { color: var(--text-main); font-weight: 900; font-size: 1.1rem; text-align: left; }
        .btn-call-mini { background: white; border: 1px solid #e2e8f0; border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.05); color: var(--primary-blue); flex-shrink: 0; }
        #ledgerModal { position: fixed; inset: 0; background: var(--bg-light); z-index: 20000; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        #orderAlertOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.98); backdrop-filter: blur(15px); z-index: 10000; color: white; display: flex; flex-direction: column; justify-content: space-between; padding: 50px 20px calc(30px + env(safe-area-inset-bottom)) 20px; text-align: center; overflow-y: auto; }
        .alert-pulse { width: 80px; height: 80px; background: var(--accent-orange); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px auto; box-shadow: 0 0 0 0 rgba(249, 115, 22, 0.7); animation: pulseOrange 2s infinite; }
        @keyframes pulseOrange { 0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(249, 115, 22, 0.7); } 70% { transform: scale(1); box-shadow: 0 0 0 20px rgba(249, 115, 22, 0); } 100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(249, 115, 22, 0); } }
        .timer-container { position: relative; width: 150px; height: 150px; margin: 30px auto; display: flex; align-items: center; justify-content: center; flex-shrink: 0;}
        .timer-circle { fill: none; stroke: var(--accent-orange); stroke-width: 8; stroke-dasharray: 440; stroke-dashoffset: 0; transition: 1s linear; stroke-linecap: round; }
        .alert-details-card { background: rgba(255, 255, 255, 0.1); border-radius: 25px; padding: 25px; border: 1px solid rgba(255,255,255,0.2); margin-bottom: 30px; text-align: right; flex-shrink: 0;}
        .waiting-pulse { animation: softPulse 2s infinite; display: inline-block;}
        @keyframes softPulse { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.7; transform: scale(0.95); } 100% { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

<div id="permissionOverlay" class="hidden">
    <i data-lucide="map-pin-off" size="70" class="text-danger mb-4 permission-icon"></i>
    <h2 class="fw-black text-danger mb-3">عذراً كابتن!</h2>
    <p class="fw-bold mb-4 fs-5">الرادار مغلق لأنك لم تسمح بـ "الموقع الدقيق".</p>
    <button class="btn btn-light rounded-pill px-5 py-3 fw-bold fs-5 text-primary shadow-lg" onclick="location.reload()">تحديث بعد تفعيل الموقع</button>
</div>

<div id="loadingOverlay">
    <div class="spinner-grow text-primary mb-3" role="status" style="width: 3rem; height: 3rem;"></div>
    <h5 class="fw-bold" id="loadingText">جاري التحقق...</h5>
</div>

<audio id="alertSound" loop src="https://actions.google.com/sounds/v1/alarms/submarine_dive_horn.ogg"></audio>
<audio id="doubleOrderSound" loop src="https://actions.google.com/sounds/v1/alarms/bugle_tune.ogg"></audio>
<audio id="cancelSound" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>
<audio id="welcomeSound" src="https://actions.google.com/sounds/v1/water/water_drop.ogg"></audio> 

<div id="loginPage" class="login-wrapper">
    <div class="login-card" id="authBox">
        <div class="d-inline-block p-4 bg-light rounded-circle shadow-sm mb-4">
            <i data-lucide="shield-check" size="50" color="#1e3a8a"></i>
        </div>
        <h2 class="fw-black mb-1" style="color: var(--primary-blue);">مكتب سفيان</h2>
        <p class="text-muted fw-bold mb-4 small">بوابة الكباتن - بالتعاون مع الحوت</p>
        <input type="tel" id="driverPhone" class="form-control phone-input mb-3" placeholder="رقم الهاتف المسجل" dir="ltr">
        <div id="registerFields" class="hidden">
            <input type="text" id="driverName" class="custom-input" placeholder="الاسم الثلاثي">
        </div>
        <button class="btn-big btn-login" id="mainAuthBtn" onclick="initAudioAndAuth()">فحص الإشارة <i data-lucide="radar"></i></button>
    </div>
    
    <div class="login-card hidden" id="waitingBox">
        <div class="waiting-pulse mb-3 bg-warning bg-opacity-10 p-4 rounded-circle">
            <i data-lucide="hourglass" size="60" class="text-warning"></i>
        </div>
        <h3 class="fw-black mb-2 text-dark">أنت في غرفة الانتظار</h3>
        <span class="text-primary fw-bold small" id="waitingStatusText">جاري الاستعلام التلقائي...</span>
        <button class="btn btn-outline-secondary mt-4 w-100" onclick="checkWaitingStatus(true)">تحديث يدوي <i data-lucide="refresh-cw" size="16"></i></button>
    </div>
</div>

<div id="dashboardPage" class="hidden">
    <div class="dash-header">
        <div class="d-flex justify-content-between align-items-start">
            <div>
                <h3 class="fw-black m-0 mb-2" id="driverNameDisplay">...</h3>
                <div class="d-flex align-items-center gap-2 mt-2">
                    <label class="switch">
                        <input type="checkbox" id="onlineToggle" checked onchange="toggleOnlineStatus()">
                        <span class="slider"></span>
                    </label>
                    <div id="onlineStatusBadge" class="status-badge online">
                        <div class="spinner-grow spinner-grow-sm text-success" role="status" style="width: 8px; height: 8px;"></div>
                        <span id="onlineStatusText">يستقبل طلبات</span>
                    </div>
                </div>
            </div>
            <button class="btn btn-light rounded-circle shadow-sm" style="width: 45px; height: 45px;" onclick="logout()">
                <i data-lucide="power" color="#ef4444"></i>
            </button>
        </div>
    </div>

    <div class="container pb-5" style="padding-bottom: env(safe-area-inset-bottom);">
        <div class="row g-3 px-1 stats-wrapper">
            <div class="col-6">
                <div class="stat-box">
                    <i data-lucide="check-circle" class="text-success mb-2" size="24"></i>
                    <h3 class="fw-black m-0" style="color: var(--primary-blue);" id="statOrdersCount">0</h3>
                </div>
            </div>
            <div class="col-6">
                <div class="stat-box">
                    <i data-lucide="wallet" class="text-danger mb-2" size="24"></i>
                    <h4 class="fw-black text-danger m-0" id="statDebt">0</h4>
                </div>
            </div>
            <div class="col-12">
                <button class="btn btn-white w-100 fw-bold shadow-sm d-flex align-items-center justify-content-center gap-2" style="background: white; border-radius: 16px; padding: 14px; border: 1px solid #e2e8f0;" onclick="openLedger()">
                    <i data-lucide="receipt-text" size="20"></i> سجل رحلاتي اليوم
                </button>
            </div>
        </div>

        <div id="searchingStatus" class="radar-container">
            <div class="radar-center">
                <div class="radar-wave"></div>
                <div class="bg-white rounded-circle shadow-lg d-flex align-items-center justify-content-center position-relative" style="width: 80px; height: 80px; z-index: 10;">
                    <i id="radarIcon" data-lucide="radar" size="40" style="color: var(--accent-blue);"></i>
                </div>
            </div>
            <h4 class="fw-black text-dark mb-2" id="radarTitle">الرادار يعمل</h4>
            <p class="text-muted fw-bold mb-0" id="radarDesc">جاري البحث عن طلبات قريبة...</p>
        </div>

        <div id="activeOrderBox" class="hidden" style="margin: 20px 15px 0 15px;"></div>
    </div>
</div>

<div id="ledgerModal" class="hidden">
    <div class="d-flex justify-content-between mb-4">
        <h3 class="fw-black m-0">سجل اليوم</h3>
        <button class="btn btn-light rounded-circle" onclick="closeLedger()"><i data-lucide="x"></i></button>
    </div>
    <div id="ledgerList"></div>
</div>

<div id="orderAlertOverlay" class="hidden">
    <div class="alert-pulse"><i data-lucide="bell-ring" color="#fff" size="40"></i></div>
    <h1 class="fw-black mb-1">طلب جديد!</h1>
    <div class="timer-container">
        <svg style="transform: rotate(-90deg); width: 150px; height: 150px;">
            <circle class="timer-circle" id="timerCircle" cx="75" cy="75" r="70"></circle>
        </svg>
        <div class="position-absolute fw-black text-warning" style="font-size: 3.5rem;" id="seconds">60</div>
    </div>
    <div class="alert-details-card">
        <h3 class="fw-black m-0 text-warning" id="alertResName">---</h3>
        <h4 class="fw-bold m-0 text-success" id="alertArea">---</h4>
    </div>
    <button class="btn-big btn-accept w-100" onclick="acceptOrder()">قبول الطلب <i data-lucide="check" size="30"></i></button>
    <button class="btn btn-link text-white-50 mt-3" onclick="declineOrder()">تجاهل الطلب</button>
</div>

<script>
    lucide.createIcons();

    // 🔴 الرابط الجديد المعتمد V21
    const API_URL = "https://script.google.com/macros/s/AKfycbxWySjqwjNbW5RNBZUSCR6cm5PtL4yUrtRnnD31nJv_FqVWa3gd2hOOFRe7o0jqX9STRQ/exec";
    const API_TOKEN = "HUT_SECURE_99";
    
    let driverData = null, countdownInterval, currentOrderData = null;
    let activeOrders = [], isRegistering = false, isOnline = true, checkOrdersTimer = null;
    let wakeLock = null, waitingPollingTimer = null;

    function showLoading(show, text="جاري التحقق...") {
        const overlay = document.getElementById('loadingOverlay');
        document.getElementById('loadingText').innerText = text;
        overlay.style.display = show ? 'flex' : 'none';
    }

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js').catch(err => console.error('SW Error:', err));
        });
    }

    async function requestWakeLock() {
        if ('wakeLock' in navigator) { try { wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {} }
    }

    function initAudioAndAuth() {
        const sounds = ['alertSound', 'doubleOrderSound', 'cancelSound', 'welcomeSound'];
        sounds.forEach(id => {
            let a = document.getElementById(id);
            if(a) { a.volume = 0; a.play().then(() => { a.pause(); a.currentTime = 0; a.volume = 1; }).catch(e=>{}); }
        });
        authAction();
    }

    function authAction() {
        let rawPhone = document.getElementById('driverPhone').value.trim();
        if(!rawPhone) return alert("يرجى إدخال رقم الهاتف");
        let phone = rawPhone.startsWith('0') ? rawPhone.substring(1) : rawPhone;

        if (isRegistering) {
            const name = document.getElementById('driverName').value.trim();
            if(!name) return alert("يرجى كتابة اسمك الثلاثي");
            setLoadingBtn(true);
            fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'DRIVER_REG', token: API_TOKEN, name: name, phone: phone }) })
            .then(() => { localStorage.setItem('hut_driver_pending', phone); showWaitingRoom(); })
            .catch(() => { alert("خطأ في الاتصال"); setLoadingBtn(false, "إرسال طلب الانضمام", "send"); });
            return;
        }
        setLoadingBtn(true);
        const script = document.createElement('script');
        script.src = `${API_URL}?action=checkDriver&phone=${phone}&token=${API_TOKEN}&callback=handleLoginCheck&ts=${Date.now()}`;
        document.body.appendChild(script);
    }

    window.handleLoginCheck = function(data) {
        let rawPhone = document.getElementById('driverPhone').value.trim();
        let phone = rawPhone.startsWith('0') ? rawPhone.substring(1) : rawPhone;
        if(data.status === "active" || data.status === "inactive") {
            driverData = { phone: phone, name: data.name, timestamp: Date.now() };
            localStorage.setItem('hut_driver', JSON.stringify(driverData));
            localStorage.setItem('hut_driver_session', JSON.stringify(driverData));
            showDashboard();
        } else if (data.status === "pending" || data.status === "waiting") {
            showWaitingRoom();
        } else {
            isRegistering = true;
            document.getElementById('registerFields').classList.remove('hidden');
            setLoadingBtn(false, "إرسال طلب الانضمام", "send");
        }
    };

    function showDashboard() {
        document.getElementById('loginPage').classList.add('hidden');
        document.getElementById('dashboardPage').classList.remove('hidden');
        document.getElementById('driverNameDisplay').innerText = "كابتن " + driverData.name;
        startSystem();
    }

    // 🔴 2. نظام تتبع الموقع الموجه للكاش (RAM Cache GPS)
    function startSystem() {
        if (isOnline) requestWakeLock();
        if (checkOrdersTimer) clearInterval(checkOrdersTimer);
        checkOrdersTimer = setInterval(checkForOrders, 15000);
        updateStats();
        setInterval(updateStats, 30000);

        if(navigator.geolocation) {
            navigator.geolocation.watchPosition(pos => {
                document.getElementById('permissionOverlay').classList.add('hidden');
                if(!isOnline && activeOrders.length === 0) return;
                
                // 🟢 إرسال الموقع للكاش (أسرع بـ 100 مرة من الكتابة في الإكسل)
                const url = `${API_URL}?action=DRIVER_UPDATE&phone=${driverData.phone}&lat=${pos.coords.latitude}&lng=${pos.coords.longitude}&token=${API_TOKEN}`;
                fetch(url, { mode: 'no-cors' }).catch(()=>{});
            }, err => {
                if(err.code === 1) document.getElementById('permissionOverlay').classList.remove('hidden');
            }, { enableHighAccuracy: true, maximumAge: 0, timeout: 10000 });
        }
    }

    function checkForOrders() {
        if(!isOnline || activeOrders.length >= 2 || !document.getElementById('orderAlertOverlay').classList.contains('hidden')) return;
        const script = document.createElement('script');
        script.src = `${API_URL}?action=checkMyOrders&phone=${driverData.phone}&token=${API_TOKEN}&callback=onNewOrder&ts=${Date.now()}`;
        document.body.appendChild(script);
    }

    window.onNewOrder = function(data) {
        if(data && data.id) {
            if(activeOrders.find(o => String(o.id) === String(data.id))) return;
            currentOrderData = data;
            currentOrderData.expireTime = Date.now() + 60000;
            document.getElementById('alertResName').innerText = data.resName;
            document.getElementById('alertArea').innerText = data.area;
            document.getElementById('orderAlertOverlay').classList.remove('hidden');
            let s = document.getElementById(activeOrders.length > 0 ? 'doubleOrderSound' : 'alertSound');
            s.currentTime = 0; s.play().catch(e=>{});
            startCountdown();
        }
    };

    function startCountdown() {
        const c = document.getElementById('timerCircle');
        clearInterval(countdownInterval);
        countdownInterval = setInterval(() => {
            let r = Math.ceil((currentOrderData.expireTime - Date.now()) / 1000);
            if (r <= 0) declineOrder();
            document.getElementById('seconds').innerText = r;
            if(c) c.style.strokeDashoffset = 440 - (r * (440 / 60));
        }, 1000);
    }

    function acceptOrder() {
        closeAlert();
        const newOrder = { ...currentOrderData, state: 'heading' };
        activeOrders.push(newOrder);
        localStorage.setItem('hut_active_orders', JSON.stringify(activeOrders));
        displayActiveOrders();
        updateStatusOnServer('accepted', "ORDER", newOrder.id);
    }

    function updateStatusOnServer(status, type="ORDER", explicitId=null) {
        const script = document.createElement('script');
        script.src = `${API_URL}?action=ADMIN_UPDATE_STATUS&type=${type}&id=${explicitId || driverData.phone}&status=${status}&token=${API_TOKEN}&ts=${Date.now()}`;
        document.body.appendChild(script);
    }

    function toggleOnlineStatus() {
        isOnline = document.getElementById('onlineToggle').checked;
        updateStatusOnServer(isOnline ? 'active' : 'inactive', 'DRIVER');
        document.getElementById('onlineStatusBadge').className = isOnline ? "status-badge online" : "status-badge offline";
        document.getElementById('searchingStatus').classList.toggle('offline-mode', !isOnline);
    }

    function displayActiveOrders() {
        if (activeOrders.length === 0) {
            document.getElementById('searchingStatus').classList.remove('hidden');
            document.getElementById('activeOrderBox').classList.add('hidden');
            return;
        }
        document.getElementById('searchingStatus').classList.add('hidden');
        document.getElementById('activeOrderBox').classList.remove('hidden');
        
        let html = '';
        activeOrders.forEach(o => {
            let btnClass = o.state === 'heading' ? 'btn-arrived' : (o.state === 'arrived' ? 'btn-picked' : 'btn-finish');
            let btnText = o.state === 'heading' ? 'أنا في المطعم' : (o.state === 'arrived' ? 'استلمت الطلب' : 'تأكيد التسليم');
            let func = o.state === 'heading' ? `arriveAtRestaurant('${o.id}')` : (o.state === 'arrived' ? `pickUpOrder('${o.id}')` : `finishOrder('${o.id}')`);
            
            html += `
            <div class="active-order-card mb-4">
                <h5 class="fw-black mb-3">#${o.id} - ${o.resName}</h5>
                <div class="info-row"><span class="info-label">المنطقة</span><span class="info-value">${o.area}</span></div>
                <div class="info-row"><span class="info-label">الحساب</span><span class="info-value text-success">${o.price} د.ع</span></div>
                <button class="btn-big ${btnClass} w-100 mt-3" onclick="${func}">${btnText}</button>
                <div class="d-flex gap-2 mt-2">
                    <button class="btn btn-sm btn-light flex-grow-1" onclick="window.open('tel:${o.resPhone}')"><i data-lucide="phone"></i></button>
                    <button class="btn btn-sm btn-primary flex-grow-1" onclick="window.open('https://www.google.com/maps/dir/?api=1&destination=${o.resLat},${o.resLng}', '_blank')"><i data-lucide="navigation"></i></button>
                </div>
            </div>`;
        });
        document.getElementById('activeOrderBox').innerHTML = html;
        lucide.createIcons();
    }

    function arriveAtRestaurant(id) { 
        const o = activeOrders.find(x => x.id == id);
        o.state = 'arrived';
        localStorage.setItem('hut_active_orders', JSON.stringify(activeOrders));
        displayActiveOrders();
        updateStatusOnServer('arrived_at_res', "ORDER", id);
    }

    function pickUpOrder(id) { 
        const o = activeOrders.find(x => x.id == id);
        o.state = 'picked_up';
        localStorage.setItem('hut_active_orders', JSON.stringify(activeOrders));
        displayActiveOrders();
        updateStatusOnServer('picked_up', "ORDER", id);
    }

    function finishOrder(id) {
        if(confirm("تأكيد تسليم الطلب؟")) {
            updateStatusOnServer('completed', "ORDER", id);
            activeOrders = activeOrders.filter(x => x.id != id);
            localStorage.setItem('hut_active_orders', JSON.stringify(activeOrders));
            displayActiveOrders();
            updateStats();
        }
    }

    function closeAlert() {
        document.getElementById('orderAlertOverlay').classList.add('hidden');
        document.getElementById('alertSound').pause();
        document.getElementById('doubleOrderSound').pause();
        clearInterval(countdownInterval);
    }

    function declineOrder() {
        if(currentOrderData) fetch(`${API_URL}?action=DECLINE_ORDER&orderId=${currentOrderData.id}&driverPhone=${driverData.phone}&token=${API_TOKEN}`, {mode:'no-cors'});
        closeAlert();
    }

    function updateStats() {
        if (!driverData) return;
        const s = document.createElement('script');
        s.src = `${API_URL}?action=getGlobalData&token=${API_TOKEN}&callback=renderDriverData&ts=${Date.now()}`;
        document.body.appendChild(s);
    }

    window.renderDriverData = function(data) {
        if(!data) return;
        const myOrders = data.orders.filter(o => String(o[6]) === String(driverData.phone) && o[5] === 'completed');
        document.getElementById('statOrdersCount').innerText = myOrders.length;
        // هنا يمكن إضافة حساب الديون مستقبلاً
    };

    function setLoadingBtn(load, txt, icon) {
        const b = document.getElementById('mainAuthBtn');
        b.innerHTML = load ? `<span class="spinner-border spinner-border-sm"></span>` : `${txt} <i data-lucide="${icon}"></i>`;
        b.disabled = load;
        lucide.createIcons();
    }

    function logout() { if(confirm("خروج؟")) { localStorage.clear(); location.reload(); } }
    function openLedger() { document.getElementById('ledgerModal').classList.remove('hidden'); }
    function closeLedger() { document.getElementById('ledgerModal').classList.add('hidden'); }
</script>
</body>
</html>
