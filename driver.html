<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رادار الطيار | الحوت</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 p-4 font-['Tajawal'] text-white">
    <header class="bg-blue-600 p-4 rounded-2xl flex justify-between items-center mb-6">
        <span id="pName" class="font-black italic">طيار الحوت</span>
        <div id="posStatus" class="text-[10px] bg-black/20 px-2 py-1 rounded-full">تحديد الموقع.. 📡</div>
    </header>

    <div id="activeOrder" class="hidden bg-slate-900 p-6 rounded-[2rem] border-2 border-blue-500 animate-pulse">
        <h3 class="text-blue-400 font-black text-sm mb-4 tracking-widest uppercase italic">New Mission Detected!</h3>
        <div id="orderContent" class="space-y-3 font-bold"></div>
        <button onclick="confirmOrder()" class="w-full bg-blue-500 py-4 rounded-2xl text-white font-black mt-6 shadow-xl">قبول وتوجه للمطعم</button>
    </div>

    <div id="noOrders" class="text-center py-20 text-slate-600 font-black italic">
        <div class="text-6xl mb-4">⚓</div>
        لا توجد مهام حالية في كركوك
    </div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbzywi3-mLv5H4bNHYvQbFDpy_FwA-AceD4g8JZX6Ah3QZhmC5LGXNLvBeQBjYO9tmt9vA/exec";
        const phone = localStorage.getItem('whale_driver_phone');
        document.getElementById('pName').innerText = localStorage.getItem('whale_driver_name');

        // تحديث الموقع الجغرافي للسيرفر
        navigator.geolocation.watchPosition(pos => {
            const coords = { action: "update_location", phone: phone, lat: pos.coords.latitude, lng: pos.coords.longitude };
            fetch(API, { method: 'POST', body: JSON.stringify(coords) });
            document.getElementById('posStatus').innerText = "Signal Locked 🛰️";
        }, null, { enableHighAccuracy: true });

        // فحص الطلبات المسندة
        async function checkTasks() {
            const res = await fetch(`${API}?action=get_master_data&pass=112233`);
            const data = await res.json();
            const myOrder = data.orders.find(o => String(o[6]) === String(phone) && o[5] === "pending_confirmation");

            if (myOrder) {
                document.getElementById('noOrders').classList.add('hidden');
                document.getElementById('activeOrder').classList.remove('hidden');
                document.getElementById('orderContent').innerHTML = `
                    <p class="text-xl">🏪 ${myOrder[1]}</p>
                    <p class="text-sm text-slate-400">📍 ${myOrder[9]}</p>
                    <hr class="border-slate-800 my-2">
                    <p class="text-xs">${myOrder[3]}</p>
                `;
            } else {
                document.getElementById('noOrders').classList.remove('hidden');
                document.getElementById('activeOrder').classList.add('hidden');
            }
        }

        async function confirmOrder() {
            // كود تأكيد الاستلام وتغيير حالة الطلب من pending_confirmation إلى assigned
            alert("تم قبول المهمة! توجه للمطعم فوراً.");
        }

        setInterval(checkTasks, 5000);
    </script>
</body>
</html>
