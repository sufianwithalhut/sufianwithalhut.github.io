<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>رادار الكابتن | منظومة الحوت 🐋</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #000; color: #fff; overflow-x: hidden; }
        .receipt-card { background: linear-gradient(145deg, #0f172a, #020617); border: 1px solid rgba(251, 191, 36, 0.2); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .radar-ping { animation: ping 2s infinite; }
        @keyframes ping { 75%, 100% { transform: scale(2.5); opacity: 0; } }
        .death-timer { font-family: 'Orbitron', sans-serif; text-shadow: 0 0 10px #ef4444; }
        .hidden { display: none; }
        .img-zoom:active { transform: scale(1.8); z-index: 100; position: relative; transition: 0.3s; }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen pb-10">
    
    <header class="p-5 bg-slate-900 rounded-b-[2.5rem] border-b border-amber-500/30 shadow-2xl flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="relative">
                <div class="absolute inset-0 bg-amber-500 rounded-full radar-ping opacity-20"></div>
                <div class="w-3 h-3 bg-amber-500 rounded-full relative z-10"></div>
            </div>
            <div>
                <h1 class="text-[8px] font-black text-amber-500 italic uppercase tracking-widest">Pilot Radar V7.5</h1>
                <p id="welcomeName" class="text-xs text-white font-bold italic">جاري المزامنة...</p>
            </div>
        </div>
        <button onclick="logout()" class="text-[10px] bg-red-500/10 text-red-400 px-4 py-2 rounded-xl font-black border border-red-500/20 uppercase">خروج</button>
    </header>

    <main class="p-6">
        <div id="searchingStatus" class="text-center mb-8">
            <p id="radarText" class="text-[9px] text-amber-500 font-black uppercase tracking-[0.4em] italic animate-pulse">Scanning Kirkuk Sector...</p>
        </div>

        <div id="orderCard" class="receipt-card p-6 rounded-[2.5rem] relative overflow-hidden hidden border-t-4 border-amber-500">
            
            <div class="text-center mb-4">
                <p class="text-[8px] text-gray-500 uppercase font-black mb-1">الوقت المتبقي للتوصيل</p>
                <div id="timerDisplay" class="death-timer text-3xl font-bold text-red-500 italic">30:00</div>
            </div>

            <div class="mb-6 flex flex-col items-center border-b border-white/5 pb-6 text-center">
                <h2 id="restaurantTitle" class="text-2xl font-black text-white italic tracking-tight">اسم المطعم</h2>
                <div id="restaurantArea" class="text-amber-400 font-black text-[10px] mt-1 italic">📍 جاري التحديد...</div>
                
                <a id="restMapLink" href="#" target="_blank" class="mt-4 flex items-center gap-2 text-white bg-blue-600 px-6 py-3 rounded-full shadow-lg text-[11px] font-black italic active:scale-95 transition-all">
                    <i class="fas fa-location-arrow"></i>
                    <span>فتح موقع المطعم (Maps)</span>
                </a>
            </div>

            <div id="receiptOnlyView" class="hidden space-y-4 mb-6">
                <div class="rounded-2xl overflow-hidden border border-white/10 shadow-2xl bg-black">
                    <img id="receiptImg" src="" class="img-zoom w-full" alt="Receipt">
                </div>
                <p class="text-[8px] text-center text-gray-500 font-bold italic uppercase">اضغط مطولاً على الوصل للتكبير</p>
            </div>

            <div class="space-y-4">
                <div class="bg-white/5 p-4 rounded-2xl border border-white/5">
                    <p class="text-[8px] text-gray-500 font-black uppercase italic mb-1">🏠 ملاحظات الوجهة</p>
                    <p id="locationTxt" class="text-sm font-black text-white italic leading-relaxed text-right">...</p>
                </div>
                
                <div id="customerPhoneSection" class="bg-emerald-500/10 p-4 rounded-2xl border border-emerald-500/20 flex justify-between items-center hidden">
                    <div>
                        <p class="text-[8px] text-emerald-400 font-black uppercase italic mb-1">📞 هاتف الزبون</p>
                        <p id="phoneTxt" class="text-lg font-black text-emerald-400 font-mono tracking-widest italic">077XXXXXXXX</p>
                    </div>
                    <a id="phoneCall" href="#" class="bg-emerald-600 w-12 h-12 rounded-2xl text-white shadow-lg flex items-center justify-center text-xl active:scale-90 transition-all">
                        <i class="fas fa-phone-alt"></i>
                    </a>
                </div>
            </div>

            <div class="mt-8 space-y-3">
                <button id="pickUpBtn" onclick="updateOrderStatus('picked-up')" class="w-full bg-amber-500 text-black py-5 rounded-[1.5rem] font-black text-lg shadow-xl italic flex items-center justify-center gap-2 active:scale-95 transition-all">
                    <span>تأكيد الاستلام 🥡</span>
                </button>
                <button id="deliverBtn" onclick="updateOrderStatus('delivered')" class="w-full bg-emerald-500 text-black py-5 rounded-[1.5rem] font-black text-lg shadow-xl italic flex items-center justify-center gap-2 hidden active:scale-95 transition-all">
                    <span>تم التسليم بنجاح ✅</span>
                </button>
            </div>
        </div>

        <div id="noOrders" class="text-center py-32 opacity-20 italic">
            <i class="fas fa-satellite-dish text-6xl mb-4 text-slate-700"></i>
            <p class="text-xs font-black uppercase tracking-[0.3em]">الرادار يبحث عن إشارات في كركوك</p>
        </div>
    </main>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxODYE0lTSF_v3NdQw1lN0GCq3dcxeEfo3SB9QaDy2Klcg3NEMvs3GxUjHFxQ5fooQm2Q/exec';
        const driverPhone = localStorage.getItem('whale_driver_phone'); 
        let currentOrderID = null;
        let deathTimer = null;

        window.onload = () => {
            if (!driverPhone) { window.location.href = 'driver_login.html'; return; }
            document.getElementById('welcomeName').innerText = "كابتن: " + (localStorage.getItem('whale_driver_name') || "مجهول");
            
            // بدء الرادار وتتبع الموقع
            startGPS();
            checkOrders(); 
            setInterval(checkOrders, 8000); 
        };

        function startGPS() {
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition((pos) => {
                    const data = { action: "update_location", type: "Driver", phone: driverPhone, lat: pos.coords.latitude, lng: pos.coords.longitude };
                    fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
                }, null, { enableHighAccuracy: true });
            }
        }

        async function checkOrders() {
            try {
                const res = await fetch(`${scriptURL}?action=get_master_data&pass=112233&cb=${Date.now()}`);
                const data = await res.json();
                
                // البحث عن طلب مسند لهذا السائق ولم يكتمل
                const myOrder = data.orders.find(o => String(o[6]) === String(driverPhone) && o[5] !== "delivered");

                if (myOrder) {
                    const restInfo = data.restaurants.find(r => r[1] === myOrder[1]);
                    renderOrder(myOrder, restInfo);
                    if (!deathTimer) startDeathTimer();
                } else {
                    document.getElementById('orderCard').classList.add('hidden');
                    document.getElementById('noOrders').classList.remove('hidden');
                    document.getElementById('radarText').innerText = "Scanning Kirkuk Sector...";
                    stopDeathTimer();
                }
            } catch (e) { console.log("Radar Scan..."); }
        }

        function renderOrder(order, restInfo) {
            currentOrderID = order[0]; 
            document.getElementById('noOrders').classList.add('hidden');
            document.getElementById('orderCard').classList.remove('hidden');
            document.getElementById('radarText').innerText = "LOCKED ON MISSION 🐋";
            
            document.getElementById('restaurantTitle').innerText = order[1];
            if (restInfo && restInfo[3]) {
                const parts = restInfo[3].split('|');
                document.getElementById('restaurantArea').innerText = "📍 " + parts[0].trim();
                document.getElementById('restMapLink').href = parts[1] ? parts[1].trim() : "#";
            }

            const isPicked = order[5] === "picked-up";
            document.getElementById('pickUpBtn').classList.toggle('hidden', isPicked);
            document.getElementById('deliverBtn').classList.toggle('hidden', !isPicked);

            // عرض الوصل
            const rImg = document.getElementById('receiptImg');
            if (order[4] && order[4].length > 20) {
                document.getElementById('receiptOnlyView').classList.remove('hidden');
                rImg.src = order[4];
            } else {
                document.getElementById('receiptOnlyView').classList.add('hidden');
            }

            // استخراج الهاتف واللوكيشن
            document.getElementById('locationTxt').innerText = order[3] || "توجيه يدوي";
            const phoneMatch = (order[3] || "").match(/07[0-9]{9}/);
            const pSec = document.getElementById('customerPhoneSection');
            if (phoneMatch) {
                pSec.classList.remove('hidden');
                document.getElementById('phoneTxt').innerText = phoneMatch[0];
                document.getElementById('phoneCall').href = "tel:" + phoneMatch[0];
            } else { pSec.classList.add('hidden'); }
        }

        async function updateOrderStatus(newStatus) {
            if (!currentOrderID) return;
            const btn = (newStatus === 'picked-up') ? document.getElementById('pickUpBtn') : document.getElementById('deliverBtn');
            btn.disabled = true;
            btn.innerHTML = `<i class="fas fa-circle-notch animate-spin"></i> جاري التحديث...`;

            try {
                await fetch(scriptURL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ action: "master_control", targetSheet: "Orders", targetID: currentOrderID, colIndex: 5, newValue: newStatus })
                });
                
                if (newStatus === 'delivered') {
                    alert("عاش يا بطل! تم إغلاق المهمة.");
                    stopDeathTimer();
                }
                setTimeout(checkOrders, 1500);
            } catch (e) { alert("حدث خطأ، حاول ثانية"); }
            finally { btn.disabled = false; }
        }

        function startDeathTimer() {
            let timeLeft = 1800; // 30 دقيقة
            deathTimer = setInterval(() => {
                const mins = Math.floor(timeLeft / 60);
                const secs = timeLeft % 60;
                document.getElementById('timerDisplay').innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
                if (timeLeft <= 0) {
                    document.getElementById('timerDisplay').innerText = "وقت الموت!";
                    clearInterval(deathTimer);
                }
                timeLeft--;
            }, 1000);
        }

        function stopDeathTimer() {
            clearInterval(deathTimer);
            deathTimer = null;
            document.getElementById('timerDisplay').innerText = "30:00";
        }

        function logout() { localStorage.clear(); window.location.href = 'driver_login.html'; }
    </script>
</body>
</html>
