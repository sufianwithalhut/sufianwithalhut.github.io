<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>بوابة الكابتن | نظام الحوت</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --dark-bg: #0f172a;
            --accent-green: #22c55e;
            --accent-red: #ef4444;
            --glass-white: rgba(255, 255, 255, 0.9);
        }

        body { 
            background-color: #f1f5f9; 
            font-family: 'Cairo', sans-serif; 
            touch-action: manipulation;
        }

        /* شاشة التنبيه الكبرى */
        #orderAlert {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(180deg, var(--dark-bg) 0%, #1e293b 100%);
            z-index: 10000; display: none; color: white; padding: 40px 20px;
            text-align: center; animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .timer-ring {
            position: relative; width: 120px; height: 120px; margin: 20px auto;
            border: 8px solid rgba(255,255,255,0.1); border-top: 8px solid var(--accent-green);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 2.5rem; font-weight: 900; animation: spin 2s linear infinite;
        }

        /* لوحة التحكم */
        .driver-card {
            border: none; border-radius: 28px; background: white;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05); margin-bottom: 20px; overflow: hidden;
        }

        .status-header {
            padding: 20px; background: var(--dark-bg); color: white;
            display: flex; justify-content: space-between; align-items: center;
        }

        .online-dot {
            width: 12px; height: 12px; background: var(--accent-green);
            border-radius: 50%; display: inline-block; margin-left: 8px;
            box-shadow: 0 0 10px var(--accent-green);
        }

        .stat-box {
            background: #f8fafc; border-radius: 20px; padding: 15px; text-align: center;
            border: 1px solid #e2e8f0;
        }

        .btn-action {
            border-radius: 20px; padding: 20px; font-weight: 700; font-size: 1.2rem;
            border: none; transition: 0.2s;
        }

        .btn-accept { background: var(--accent-green); color: white; width: 100%; }
        .btn-reject { background: rgba(255,255,255,0.1); color: #94a3b8; width: 100%; margin-top: 15px; }

        #loadingOverlay {
            position: fixed; top:0; left:0; width:100%; height:100%; 
            background: rgba(15, 23, 42, 0.9); z-index:11000; display:none;
            align-items:center; justify-content:center; color: white;
        }
    </style>
</head>
<body>

<div id="loadingOverlay">
    <div class="text-center">
        <div class="spinner-border text-success" role="status"></div>
        <div class="mt-3 fw-bold">جاري تحديث الرادار...</div>
    </div>
</div>

<div class="container-fluid p-0">
    <div id="driverLoginSection" class="p-4 mt-5">
        <div class="text-center mb-5">
            <i data-lucide="anchor" size="64" color="#0f172a"></i>
            <h2 class="fw-bold mt-3">دخول الكابتن</h2>
            <p class="text-muted">أهلاً بك في أسطول الحوت</p>
        </div>
        <div class="driver-card p-4">
            <input type="tel" id="checkDriverPhone" class="form-control form-control-lg mb-3 shadow-sm" placeholder="رقم الهاتف">
            <button class="btn btn-dark w-100 p-3 fw-bold shadow" onclick="checkDriverStatus()">ابدأ العمل الآن</button>
            <button class="btn btn-link w-100 mt-3 text-decoration-none text-muted" onclick="toggleRegForm()">ليس لديك حساب؟ انضم لنا</button>
        </div>
    </div>

    <div id="driverDashboard" class="hidden-section">
        <div class="status-header">
            <div>
                <h5 class="m-0 fw-bold" id="welcomeMsg">الكابتن سفيان</h5>
                <small class="text-success"><span class="online-dot"></span> متصل الآن</small>
            </div>
            <button class="btn btn-outline-light btn-sm rounded-pill" onclick="location.reload()">خروج</button>
        </div>

        <div class="p-3">
            <div class="row g-3 mb-3">
                <div class="col-6">
                    <div class="stat-box">
                        <small class="text-muted d-block">طلبات اليوم</small>
                        <h3 class="m-0 fw-bold text-primary" id="dailyOrders">12</h3>
                    </div>
                </div>
                <div class="col-6">
                    <div class="stat-box">
                        <small class="text-muted d-block">وقت الانتظار</small>
                        <h3 class="m-0 fw-bold text-success" id="waitTime">0</h3>
                    </div>
                </div>
            </div>

            <div class="driver-card p-3 mb-3">
                <div class="d-flex align-items-center gap-3">
                    <div class="bg-primary bg-opacity-10 p-3 rounded-circle text-primary">
                        <i data-lucide="map-pin"></i>
                    </div>
                    <div>
                        <small class="text-muted d-block">موقعك الحالي</small>
                        <span id="coordsDisplay" class="fw-bold small">جاري تحديد الموقع...</span>
                    </div>
                </div>
            </div>

            <div class="text-center mt-4">
                <img src="https://cdn-icons-png.flaticon.com/512/2853/2853761.png" width="150" class="opacity-25 mb-3">
                <p class="text-muted">رادارك يبحث عن أقرب الطلبات إليك...</p>
            </div>
        </div>
    </div>
</div>

<div id="orderAlert">
    <div class="mb-5">
        <i data-lucide="bell-ring" size="48" class="text-success mb-3"></i>
        <h1 class="fw-black">طلب توصيل جديد!</h1>
    </div>
    
    <div class="timer-ring" id="timer">60</div>

    <div class="driver-card p-4 mt-5 text-dark shadow-lg">
        <div class="d-flex align-items-center justify-content-between mb-3 border-bottom pb-2">
            <span class="badge bg-primary px-3">مطعم</span>
            <h4 class="m-0 fw-bold" id="alertResName">كنتاكي كركوك</h4>
        </div>
        <div class="d-flex align-items-center gap-2 mb-2">
            <i data-lucide="navigation-2" size="20" class="text-muted"></i>
            <span id="alertArea" class="fs-5">حي النصر - شارع 30</span>
        </div>
    </div>

    <div class="fixed-bottom p-4">
        <button class="btn btn-action btn-accept mb-2" onclick="acceptOrder()">
            <i data-lucide="check-circle"></i> قبـــول الطلب
        </button>
        <button class="btn btn-action btn-reject" onclick="rejectOrder()">تجاهل</button>
    </div>
</div>

<script>
    lucide.createIcons();
    const API_URL = "https://script.google.com/macros/s/AKfycby7a-gZ44EKeTLJWHnayDvUhiWwKnX8eKZp8BudmWf7xaLLTVBnAdOSgtVa3DTJe9lUJA/exec";
    
    function checkDriverStatus() {
        const phone = document.getElementById('checkDriverPhone').value;
        if(!phone) return;
        
        showLoading(true);
        fetch(`${API_URL}?action=checkDriver&phone=${phone}`)
        .then(res => res.json())
        .then(data => {
            showLoading(false);
            if(data.status === "active") {
                document.getElementById('driverLoginSection').style.display = 'none';
                document.getElementById('driverDashboard').classList.add('show-section');
                document.getElementById('welcomeMsg').innerText = "الكابتن " + data.name;
                startSystem();
            } else {
                alert("الحساب غير مفعل حالياً");
            }
        });
    }

    function showLoading(s) { document.getElementById('loadingOverlay').style.display = s ? 'flex' : 'none'; }
    
    // باقي الكود البرمجي للتتبع والارسال يتم دمجه هنا بنفس الطريقة السابقة
</script>
</body>
</html>
