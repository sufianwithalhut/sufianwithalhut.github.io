<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>بوابة المطاعم | نظام الحوت الذكي</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #0f172a; 
            --accent: #f97316;  
            --bg: #f8fafc;
            --success: #22c55e;
        }

        body { background-color: var(--bg); font-family: 'Cairo', sans-serif; color: var(--primary); }
        .hidden-section { display: none !important; }

        /* شاشة التحميل */
        #loadingOverlay {
            position: fixed; top:0; left:0; width:100%; height:100%; 
            background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(8px);
            z-index:9999; display:none; align-items:center; justify-content:center; flex-direction: column; color: white;
        }

        .card {
            border: none; border-radius: 28px; background: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); padding: 30px;
            margin-bottom: 20px; border: 1px solid rgba(0,0,0,0.02);
        }

        .btn-main {
            background: var(--primary); color: white; border-radius: 18px;
            padding: 18px; font-weight: 700; border: none; width: 100%;
            display: flex; align-items: center; justify-content: center; gap: 12px;
            transition: 0.3s; font-size: 1.1rem;
        }
        .btn-main:active { transform: scale(0.98); }

        .form-control, .form-select {
            border-radius: 15px; padding: 15px; border: 2px solid #f1f5f9;
            font-weight: 600; transition: 0.3s;
        }
        .form-control:focus { border-color: var(--accent); box-shadow: none; }

        .res-header {
            background: var(--primary); color: white; padding: 40px 20px;
            border-bottom-left-radius: 40px; border-bottom-right-radius: 40px;
            margin-bottom: -30px; text-align: center;
        }

        .order-status-card {
            background: var(--success); color: white; border-radius: 20px;
            padding: 15px; margin-top: 20px; animation: slideIn 0.5s ease;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="loadingOverlay">
    <div class="spinner-border text-warning" style="width: 3.5rem; height: 3.5rem;"></div>
    <span class="mt-3 fw-bold fs-5">جاري الاتصال بالسيرفر...</span>
</div>

<div id="loginSection" class="container mt-5 pt-5">
    <div class="text-center mb-5">
        <div class="d-inline-block bg-white p-3 rounded-circle shadow-sm mb-3">
            <i data-lucide="utensils" size="45" color="#f97316"></i>
        </div>
        <h2 class="fw-black">دخول المطاعم</h2>
        <p class="text-muted">نظام الحوت لإدارة التوصيل</p>
    </div>
    
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card">
                <div class="mb-4">
                    <label class="form-label fw-bold text-muted small">رقم هاتف المطعم</label>
                    <input type="tel" id="checkPhone" class="form-control text-center fs-4" placeholder="07XXXXXXXXX">
                </div>
                <button class="btn btn-main" onclick="checkRestaurantStatus()">
                    دخول اللوحة <i data-lucide="log-in" size="20"></i>
                </button>
            </div>
        </div>
    </div>
</div>

<div id="orderSection" class="hidden-section">
    <div class="res-header">
        <h3 class="fw-black mb-1" id="resTitle">مرحباً بك</h3>
        <p class="opacity-75 mb-0" id="resPhoneDisplay"></p>
    </div>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <h5 class="fw-bold mb-4 d-flex align-items-center gap-2">
                        <i data-lucide="plus-circle" class="text-orange"></i> اطلب كابتن الآن
                    </h5>
                    <form id="orderForm">
                        <div class="mb-3">
                            <label class="small fw-bold text-muted mb-2">منطقة التوصيل</label>
                            <select id="customerArea" class="form-select">
                                <option>المنطقة المركزية</option>
                                <option>تسعين</option>
                                <option>طريق بغداد</option>
                                <option>القورية</option>
                                <option>روناكي</option>
                            </select>
                        </div>
                        <div class="mb-4">
                            <label class="small fw-bold text-muted mb-2">تفاصيل الطلب (رقم الزبون + العنوان)</label>
                            <textarea id="customerDetails" class="form-control" rows="3" placeholder="اكتب تفاصيل العنوان بدقة..." required></textarea>
                        </div>
                        <button type="submit" class="btn btn-main py-3">
                            إرسال الطلب للمركز <i data-lucide="send" size="20"></i>
                        </button>
                    </form>

                    <div id="orderStatusBox" class="hidden-section">
                        <div class="order-status-card text-center">
                            <i data-lucide="check-check" class="mb-2"></i>
                            <div class="fw-bold" id="statusMsg">تم إرسال الطلب بنجاح</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    lucide.createIcons();
    
    const API_URL = "https://script.google.com/macros/s/AKfycbwPlcGfCcyJMwYnaR4ZHWlpNi78F1jgKkkW8NYZW1MYzSgFnlDA7QGrR2G1ys7uiUVZkA/exec";
    const API_TOKEN = "HUT_SECURE_99";
    let currentRes = null;

    function showLoading(s) { 
        document.getElementById('loadingOverlay').style.display = s ? 'flex' : 'none';
    }

    // الدخول
    function checkRestaurantStatus() {
        const phone = document.getElementById('checkPhone').value.trim();
        if(!phone) return alert("يرجى إدخال رقم الهاتف");

        showLoading(true);
        const script = document.createElement('script');
        script.src = `${API_URL}?action=checkRes&phone=${phone}&token=${API_TOKEN}&callback=handleLogin&ts=${Date.now()}`;
        document.body.appendChild(script);
        script.onload = () => script.remove();
    }

    window.handleLogin = function(data) {
        showLoading(false);
        const status = String(data.status || "").trim().toLowerCase();
        
        if(status === "active") {
            currentRes = data;
            document.getElementById('loginSection').classList.add('hidden-section');
            document.getElementById('orderSection').classList.remove('hidden-section');
            document.getElementById('resTitle').innerText = data.name;
            document.getElementById('resPhoneDisplay').innerText = document.getElementById('checkPhone').value;
        } else if(status === "pending") {
            alert("⏳ حساب المطعم قيد المراجعة حالياً.");
        } else {
            alert("❌ هذا الرقم غير مسجل كمطعم شريك.");
        }
    };

    // إرسال طلب جديد
    document.getElementById('orderForm').onsubmit = function(e) {
        e.preventDefault();
        showLoading(true);
        
        const payload = {
            action: 'NEW_ORDER',
            token: API_TOKEN,
            restaurantName: currentRes.name,
            area: document.getElementById('customerArea').value,
            details: document.getElementById('customerDetails').value
        };

        fetch(API_URL, {
            method: 'POST',
            body: JSON.stringify(payload)
        })
        .then(r => r.json())
        .then(res => {
            showLoading(false);
            if(res.success) {
                document.getElementById('orderStatusBox').classList.remove('hidden-section');
                document.getElementById('statusMsg').innerHTML = `تم إرسال الطلب! <br> الكابتن الموجه: <b>${res.driverName}</b>`;
                document.getElementById('customerDetails').value = "";
                
                // إخفاء الرسالة بعد 10 ثواني
                setTimeout(() => {
                    document.getElementById('orderStatusBox').classList.add('hidden-section');
                }, 10000);
            } else {
                alert(res.msg || "حدث خطأ أثناء إرسال الطلب");
            }
        })
        .catch(err => {
            showLoading(false);
            alert("فشل الاتصال بالسيرفر، تأكد من الإنترنت.");
        });
    };
</script>
</body>
</html>
