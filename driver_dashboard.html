<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>رادار الكابتن | منظومة الحوت 🐋</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #000; color: #fff; overflow-x: hidden; }
        .receipt-card { background: linear-gradient(145deg, #0f172a, #020617); border: 1px solid rgba(255,255,255,0.05); }
        .hidden { display: none; }
        .step-active { color: #10b981; border-color: #10b981; }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen pb-10">
    
    <header class="p-6 bg-slate-900 rounded-b-[3rem] border-b border-emerald-500/30 shadow-2xl flex justify-between items-center">
        <div>
            <h1 class="text-sm font-black text-emerald-500 italic uppercase font-mono">Whale Pilot Radar</h1>
            <p id="welcomeName" class="text-[10px] text-gray-400 mt-1 italic">جاري تحميل البيانات...</p>
        </div>
        <button onclick="logout()" class="text-[9px] bg-red-500/10 text-red-500 px-3 py-2 rounded-xl font-black italic border border-red-500/20">خروج</button>
    </header>

    <main class="p-6">
        <div id="searchingStatus" class="flex items-center justify-center gap-2 mb-6">
            <span class="w-2 h-2 bg-emerald-500 rounded-full animate-ping"></span>
            <p id="radarText" class="text-[9px] text-emerald-500 font-black uppercase tracking-[0.3em] italic">الرادار يبحث...</p>
        </div>

        <div id="orderCard" class="receipt-card p-8 rounded-[3rem] shadow-2xl relative overflow-hidden border-t-4 border-emerald-500 hidden">
            
            <div class="mb-6 flex flex-col items-center border-b border-white/5 pb-6 text-center">
                <p class="text-[9px] text-emerald-500 font-black uppercase tracking-widest mb-2 italic">المصدر الحالي</p>
                <h2 id="restaurantTitle" class="text-2xl font-black text-white italic tracking-tight">...</h2>
                <div id="orderStatusBadge" class="mt-3 px-4 py-1 rounded-full bg-white/5 text-[9px] font-bold text-emerald-400 border border-emerald-500/20">قيد الانتظار</div>
            </div>

            <div id="receiptOnlyView" class="hidden space-y-4">
                <div class="rounded-[2rem] overflow-hidden border border-white/10 shadow-lg">
                    <img id="receiptImg" src="" class="w-full h-auto" alt="Receipt">
                </div>
            </div>

            <div id="manualInfoView" class="hidden space-y-6">
                <div class="bg-white/5 p-5 rounded-2xl border border-white/5">
                    <p class="text-[8px] text-gray-500 font-black uppercase italic mb-1">📍 الوجهة</p>
                    <p id="locationTxt" class="text-lg font-black text-white italic">...</p>
                </div>
                <div id="customerPhoneSection" class="bg-white/5 p-5 rounded-2xl border border-white/5 flex justify-between items-center hidden">
                    <div>
                        <p class="text-[8px] text-gray-500 font-black uppercase italic mb-1">📞 الزبون</p>
                        <p id="phoneTxt" class="text-lg font-black text-blue-400 font-mono italic">...</p>
                    </div>
                    <a id="phoneCall" href="#" class="bg-blue-600 p-4 rounded-2xl text-white shadow-lg shadow-blue-900/40">
                        <i class="fas fa-phone-alt"></i>
                    </a>
                </div>
            </div>

            <div class="mt-8 space-y-3">
                <button id="pickUpBtn" onclick="updateOrderStatus('picked-up')" class="w-full bg-amber-500 text-black py-5 rounded-3xl font-black text-lg active:scale-95 transition-all shadow-xl italic flex items-center justify-center gap-2">
                    استلمت الطعام من المطعم 🥡
                </button>
                
                <button id="deliverBtn" onclick="updateOrderStatus('delivered')" class="w-full bg-emerald-500 text-black py-5 rounded-3xl font-black text-lg active:scale-95 transition-all shadow-xl italic flex items-center justify-center gap-2 hidden">
                    تم التسليم للزبون ✅
                </button>

                <button onclick="requestCancel()" class="w-full bg-transparent text-red-500/50 py-3 rounded-xl font-bold text-[10px] border border-red-500/10 italic">
                    إبلاغ عن مشكلة ⚠️
                </button>
            </div>
        </div>

        <div id="noOrders" class="text-center py-24 opacity-30 italic">
            <div class="text-5xl mb-4 text-slate-700">🔍</div>
            <p class="text-xs font-black uppercase tracking-widest">لا توجد إشارات حالياً</p>
        </div>

    </main>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbz2Q28bDhfpg3DVhDfCrWWk8fkS-pVvUa5guZXfZJ-cqGEEoJ2t08SxK8KdFZbxR-OVSg/exec';
        const driverPhone = localStorage.getItem('whale_driver_phone'); 
        let currentOrderID = null;
        let isBusy = false; // لمنع استلام طلبين

        document.addEventListener('DOMContentLoaded', () => {
            if (!driverPhone) return window.location.href = 'driver_login.html';
            document.getElementById('welcomeName').innerText = "كابتن: " + (localStorage.getItem('whale_driver_name') || "مجهول");
            
            startLiveTracking();
            setInterval(checkOrders, 7000);
            checkOrders();
        });

        function startLiveTracking() {
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(p => {
                    fetch(scriptURL + "?action=update_driver_location", {
                        method: 'POST',
                        body: JSON.stringify({ lat: p.coords.latitude, lng: p.coords.longitude, phone: driverPhone })
                    });
                }, null, { enableHighAccuracy: true });
            }
        }

        async function checkOrders() {
            try {
                const r = await fetch(`${scriptURL}?action=get_my_orders&phone=${driverPhone}`);
                const data = await r.json();

                if (data.status === "found") {
                    renderOrder(data.order);
                    isBusy = true;
                    document.getElementById('radarText').innerText = "الرادار مقفل على طلبية نشطة";
                } else {
                    document.getElementById('orderCard').classList.add('hidden');
                    document.getElementById('noOrders').classList.remove('hidden');
                    isBusy = false;
                    document.getElementById('radarText').innerText = "الرادار يبحث...";
                    currentOrderID = null;
                }
            } catch (e) { console.log("Radar sync error"); }
        }

        function renderOrder(order) {
            currentOrderID = order.id;
            document.getElementById('noOrders').classList.add('hidden');
            document.getElementById('orderCard').classList.remove('hidden');
            document.getElementById('restaurantTitle').innerText = order.restaurantName;
            
            // تحديث الأزرار بناءً على الحالة
            if (order.status === "picked-up") {
                document.getElementById('pickUpBtn').classList.add('hidden');
                document.getElementById('deliverBtn').classList.remove('hidden');
                document.getElementById('orderStatusBadge').innerText = "في الطريق للزبون 🚀";
            } else {
                document.getElementById('pickUpBtn').classList.remove('hidden');
                document.getElementById('deliverBtn').classList.add('hidden');
                document.getElementById('orderStatusBadge').innerText = "توجه للمطعم للاستلام";
            }

            if (order.type === "photo") {
                document.getElementById('receiptOnlyView').classList.remove('hidden');
                document.getElementById('manualInfoView').classList.add('hidden');
                document.getElementById('receiptImg').src = order.img;
            } else {
                document.getElementById('receiptOnlyView').classList.add('hidden');
                document.getElementById('manualInfoView').classList.remove('hidden');
                document.getElementById('locationTxt').innerText = order.details;
                if(order.customerPhone) {
                    document.getElementById('customerPhoneSection').classList.remove('hidden');
                    document.getElementById('phoneTxt').innerText = order.customerPhone;
                    document.getElementById('phoneCall').href = "tel:" + order.customerPhone;
                }
            }
        }

        async function updateOrderStatus(newStatus) {
            if (!currentOrderID) return;
            const btn = (newStatus === 'picked-up') ? document.getElementById('pickUpBtn') : document.getElementById('deliverBtn');
            btn.disabled = true;
            btn.innerText = "جاري التحديث... 📡";

            try {
                await fetch(scriptURL + "?action=driver_status_update", {
                    method: 'POST',
                    body: JSON.stringify({ orderID: currentOrderID, status: newStatus })
                });
                if (newStatus === 'delivered') alert("عاش كابتن! تم إكمال المهمة 🐋");
                checkOrders();
            } catch (e) { alert("خطأ في الاتصال"); btn.disabled = false; }
        }

        function requestCancel() {
            const r = prompt("ما هو سبب الإبلاغ؟");
            if (r && currentOrderID) {
                fetch(scriptURL + "?action=driver_status_update", {
                    method: 'POST',
                    body: JSON.stringify({ orderID: currentOrderID, status: 'canceled', note: r })
                }).then(() => location.reload());
            }
        }

        function logout() { localStorage.clear(); window.location.href = 'driver_login.html'; }
    </script>
</body>
</html>
