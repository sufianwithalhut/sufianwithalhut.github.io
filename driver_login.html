<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دخول الطيار | الحوت</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 min-height-screen flex items-center justify-center p-6 font-['Tajawal']">
    <div class="w-full max-w-sm bg-slate-800 p-8 rounded-[3rem] text-center border border-white/5 shadow-2xl">
        <div class="text-5xl mb-4">🏍️</div>
        <h2 class="text-2xl font-black text-white italic mb-8">رادار الطيارين <span class="text-blue-500 uppercase">V10</span></h2>
        <input type="tel" id="dPhone" placeholder="077XXXXXXXX" class="w-full p-4 bg-slate-900 rounded-2xl text-white font-black text-center text-xl tracking-widest outline-none border-2 border-transparent focus:border-blue-500 mb-4">
        <button id="loginBtn" onclick="login()" class="w-full bg-blue-600 py-4 rounded-2xl text-white font-black text-lg shadow-lg shadow-blue-500/20 active:scale-95 transition-all">تشغيل المحرك</button>
        <div id="status" class="mt-4 text-xs font-bold text-slate-400 italic">...</div>
    </div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbzywi3-mLv5H4bNHYvQbFDpy_FwA-AceD4g8JZX6Ah3QZhmC5LGXNLvBeQBjYO9tmt9vA/exec";

        async function login() {
            const phone = document.getElementById('dPhone').value;
            const btn = document.getElementById('loginBtn');
            const status = document.getElementById('status');

            btn.disabled = true; status.innerText = "جاري البحث في الرادار...";

            try {
                const res = await fetch(`${API}?action=login_check&id=${phone}`);
                const data = await res.json();

                if (data.status === "active") {
                    localStorage.setItem('whale_driver_phone', phone);
                    localStorage.setItem('whale_driver_name', data.data[1]);
                    window.location.href = "driver.html";
                } else if (data.status === "pending") {
                    status.innerText = "طلبك معلق.. بانتظار موافقة طه";
                    btn.disabled = false;
                } else if (data.status === "not_found") {
                    status.innerText = "الرقم غير مسجل. يرجى مراجعة الإدارة";
                    btn.disabled = false;
                }
            } catch (e) { status.innerText = "خطأ في الشبكة"; btn.disabled = false; }
        }
    </script>
</body>
</html>
