<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>دخول الكابتن | رادار الحوت 🐋</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --whale-blue: #2563eb; --whale-bg: #f8fafc; }
        body { font-family: 'Tajawal', sans-serif; background: var(--whale-bg); color: #1e293b; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        
        .bg-grid { position: fixed; inset: 0; background-image: radial-gradient(var(--whale-blue) 0.5px, transparent 0.5px); background-size: 30px 30px; opacity: 0.05; z-index: -1; }
        
        .login-card { background: white; border-radius: 3rem; box-shadow: 0 25px 50px -12px rgba(37, 99, 235, 0.15); border: 1px solid rgba(37, 99, 235, 0.1); width: 100%; max-width: 400px; padding: 2.5rem; position: relative; }
        
        .whale-input { width: 100%; padding: 1.2rem; background: #f1f5f9; border: 2px solid transparent; border-radius: 1.5rem; color: #1e293b; outline: none; transition: 0.3s; font-weight: 900; text-align: center; font-size: 1.1rem; }
        .whale-input:focus { border-color: var(--whale-blue); background: white; box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.1); }
        
        .btn-pilot { background: var(--whale-blue); color: white; font-weight: 900; border-radius: 1.5rem; transition: 0.3s; box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2); text-transform: uppercase; font-style: italic; }
        .btn-pilot:hover { transform: translateY(-2px); box-shadow: 0 15px 25px rgba(37, 99, 235, 0.3); }
        .btn-pilot:active { transform: scale(0.95); }

        .status-pulse { animation: pulse 2s infinite; color: var(--whale-blue); }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.7; } 100% { transform: scale(1); opacity: 1; } }
        
        .hidden { display: none; }
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="p-6">
    <div class="bg-grid"></div>

    <div class="login-card">
        
        <div id="loader" class="text-center py-10">
            <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
            <p class="text-[10px] text-blue-600 font-black tracking-widest uppercase italic">Authenticating Pilot...</p>
        </div>

        <div id="authUI" class="hidden text-center fade-in">
            <header class="mb-8">
                <div class="w-20 h-20 bg-blue-600 text-white rounded-[2rem] flex items-center justify-center text-3xl mx-auto mb-4 shadow-xl shadow-blue-200">
                    <i class="fas fa-motorcycle"></i>
                </div>
                <h2 class="text-2xl font-black text-slate-800 italic uppercase tracking-tighter" style="font-family: 'Orbitron';">
                    WHALE <span class="text-blue-600">PILOT</span>
                </h2>
                <p class="text-[9px] text-slate-400 mt-1 font-bold italic uppercase tracking-[0.2em]">Kirkuk Field Ops V8.5</p>
            </header>

            <form id="loginForm" class="space-y-4">
                <div class="relative">
                    <input type="tel" id="driverPhone" required placeholder="077XXXXXXXX" 
                           class="whale-input tracking-[0.2em]" dir="ltr">
                </div>

                <div id="regFields" class="hidden space-y-4 pt-2 fade-in">
                    <div class="h-[1px] bg-slate-100 w-full my-4"></div>
                    <p class="text-[10px] text-blue-600 font-black italic mb-2">رقم جديد؟ أدخل اسمك الثلاثي للانضمام:</p>
                    <input type="text" id="driverName" placeholder="الاسم الثلاثي واللقب" class="whale-input text-sm">
                </div>

                <button type="submit" id="mainBtn" class="w-full py-5 btn-pilot mt-6 flex items-center justify-center gap-3 italic">
                    <span id="btnText">دخول الرادار</span>
                    <i class="fas fa-satellite-dish"></i>
                </button>
            </form>
        </div>

        <div id="statusMessage" class="hidden text-center py-10 fade-in">
            <div id="statusIcon" class="text-6xl mb-6 status-pulse"><i class="fas fa-broadcast-tower"></i></div>
            <h3 id="statusTitle" class="text-xl font-black text-blue-600 italic uppercase">إشارة معلقة</h3>
            <p id="statusDesc" class="text-xs text-slate-500 mt-6 leading-relaxed font-bold italic">تم إرسال بياناتك لغرفة العمليات.<br>سيفتح الرادار تلقائياً فور تفعيل طه لحسابك.</p>
            
            <div class="mt-10 pt-6 border-t border-slate-100">
                <button onclick="logout()" class="text-[10px] text-red-500 font-black uppercase tracking-widest flex items-center justify-center gap-2 mx-auto">
                    <i class="fas fa-user-edit"></i> تغيير البيانات
                </button>
            </div>
        </div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxziP5TpfK4FVZcVO-4xzPaLqvpxjLMVL_JbSIZ0E9pKujgxgQU0ZIIfR1GufbOehwPBg/exec';
        let checkTimer = null;

        window.onload = async () => {
            const savedPhone = localStorage.getItem('whale_driver_phone');
            if (savedPhone) {
                checkDriverStatus(savedPhone);
            } else { 
                showSection('authUI'); 
            }
        };

        async function checkDriverStatus(phone) {
            try {
                const response = await fetch(`${scriptURL}?action=get_master_data&pass=CHECK_LOGIN&phone=${phone}`);
                const data = await response.json();
                
                const driver = data.drivers.find(d => String(d[2]) === String(phone));
                
                if (driver) {
                    localStorage.setItem('whale_driver_phone', phone);
                    localStorage.setItem('whale_driver_name', driver[1]);
                    
                    if (driver[4] === 'active') {
                        window.location.replace('driver.html');
                    } else if (driver[4] === 'pending') {
                        showStatusView('pending');
                        if (!checkTimer) checkTimer = setInterval(() => checkDriverStatus(phone), 10000);
                    } else if (driver[4] === 'banned') {
                        showStatusView('banned');
                    }
                } else {
                    showSection('authUI');
                }
            } catch (e) {
                showSection('authUI');
            }
        }

        document.getElementById('loginForm').onsubmit = async function(e) {
            e.preventDefault();
            const phone = document.getElementById('driverPhone').value.trim();
            const name = document.getElementById('driverName').value.trim();
            const btn = document.getElementById('mainBtn');
            const regFields = document.getElementById('regFields');

            if (phone.length < 10) return alert("يرجى التأكد من رقم الهاتف");

            btn.disabled = true;
            btn.innerHTML = `<i class="fas fa-spinner animate-spin"></i> جاري الفحص...`;

            if (!regFields.classList.contains('hidden')) {
                // عملية تسجيل كابتن جديد
                if(!name) { alert("الاسم الثلاثي مطلوب للتفعيل"); btn.disabled = false; return; }
                
                const payload = {
                    action: "register_user",
                    type: "Driver",
                    name: name,
                    phone: phone,
                    wallet: 0 
                };

                try {
                    await fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                    localStorage.setItem('whale_driver_phone', phone);
                    localStorage.setItem('whale_driver_name', name);
                    showStatusView('pending');
                    checkTimer = setInterval(() => checkDriverStatus(phone), 10000);
                } catch (e) { 
                    alert("خطأ في الشبكة، جرب ثانية"); 
                    btn.disabled = false; 
                }
            } else {
                // محاولة دخول عادية
                try {
                    const response = await fetch(`${scriptURL}?action=get_master_data&pass=CHECK_LOGIN&phone=${phone}`);
                    const data = await response.json();
                    const driver = data.drivers.find(d => String(d[2]) === String(phone));

                    if (driver) {
                        checkDriverStatus(phone);
                    } else {
                        // رقم غير موجود، افتح حقول التسجيل
                        regFields.classList.remove('hidden');
                        btn.disabled = false;
                        btn.innerHTML = `تقديم طلب انضمام <i class="fas fa-plus-circle ml-2"></i>`;
                    }
                } catch (e) {
                    alert("حدث خطأ، تأكد من الإنترنت");
                    btn.disabled = false;
                }
            }
        };

        function showSection(id) {
            document.getElementById('loader').classList.add('hidden');
            document.getElementById('authUI').classList.add('hidden');
            document.getElementById('statusMessage').classList.add('hidden');
            document.getElementById(id).classList.remove('hidden');
        }

        function showStatusView(status) {
            showSection('statusMessage');
            if (status === 'banned') {
                document.getElementById('statusTitle').innerText = "تم حظر الحساب";
                document.getElementById('statusTitle').classList.replace('text-blue-600', 'text-red-500');
                document.getElementById('statusIcon').innerHTML = `<i class="fas fa-user-slash text-red-500"></i>`;
                document.getElementById('statusDesc').innerText = "تم تقييد وصولك للرادار لأسباب إدارية.\nيرجى التواصل مع طه فوراً لتسوية الحساب.";
            } else {
                document.getElementById('statusTitle').innerText = "بانتظار التفعيل";
                document.getElementById('statusIcon').innerHTML = `<i class="fas fa-broadcast-tower"></i>`;
            }
        }

        function logout() { 
            if(checkTimer) clearInterval(checkTimer);
            localStorage.clear(); 
            location.reload(); 
        }
    </script>
</body>
</html>
