<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>دخول الكابتن | رادار الحوت 🐋</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --whale-amber: #fbbf24; --whale-navy: #020617; }
        body { font-family: 'Tajawal', sans-serif; background: #010409; color: white; overflow-x: hidden; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .radar-grid { position: fixed; inset: 0; background-image: linear-gradient(rgba(251, 191, 36, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(251, 191, 36, 0.03) 1px, transparent 1px); background-size: 35px 35px; z-index: -1; }
        .glass-card { background: rgba(13, 17, 23, 0.85); backdrop-filter: blur(25px); border: 1px solid rgba(251, 191, 36, 0.15); }
        .whale-input { width: 100%; padding: 1.1rem 3.5rem 1.1rem 1.1rem; background: rgba(0, 0, 0, 0.6); border: 1px solid rgba(255,255,255,0.08); border-radius: 1.2rem; color: white; }
        .action-btn { background: var(--whale-amber); color: #020617; font-weight: 900; clip-path: polygon(5% 0, 100% 0, 95% 100%, 0% 100%); }
        .hidden { display: none; }
    </style>
</head>
<body class="p-6">

    <div class="radar-grid"></div>

    <div class="max-w-md w-full glass-card p-10 rounded-[2.5rem] relative z-10">
        
        <div id="loader" class="text-center py-12">
            <div class="w-14 h-14 border-4 border-amber-500 border-t-transparent rounded-full animate-spin mx-auto mb-6"></div>
            <p class="text-[10px] text-amber-500 font-black italic uppercase">Checking Identity...</p>
        </div>

        <div id="authUI" class="hidden">
            <header class="text-center mb-10">
                <div class="inline-block p-4 rounded-3xl bg-amber-500/10 border border-amber-500/20 mb-4">
                    <span class="text-4xl text-amber-500"><i class="fas fa-motorcycle"></i></span>
                </div>
                <h2 class="text-2xl font-black tracking-widest uppercase italic" style="font-family: 'Orbitron', sans-serif;">
                    WHALE <span class="text-amber-500">PILOT</span>
                </h2>
            </header>

            <form id="loginForm" class="space-y-4">
                <div class="relative">
                    <i class="fas fa-phone absolute right-4 top-1/2 -translate-y-1/2 text-amber-500"></i>
                    <input type="tel" id="driverPhone" required placeholder="رقم الهاتف المسجل" 
                           class="whale-input text-center font-black tracking-widest text-lg">
                </div>

                <div id="registerFields" class="hidden space-y-4 border-t border-white/5 pt-6">
                    <p class="text-[10px] text-amber-500 text-center font-bold italic mb-2">رقم جديد؟ يرجى ملء البيانات للانضمام</p>
                    <input type="text" id="regName" placeholder="الاسم الثلاثي" class="whale-input font-bold italic text-center">
                </div>

                <button type="submit" id="mainBtn" class="w-full py-5 action-btn mt-6 flex items-center justify-center gap-3 italic">
                    <span id="btnText">تفعيل الرادار</span>
                    <i class="fas fa-crosshairs"></i>
                </button>
            </form>
        </div>

        <div id="waitMessage" class="hidden text-center py-12">
            <div class="text-6xl mb-6">🛰️</div>
            <h3 class="text-xl font-black text-amber-500 italic uppercase">بانتظار إشارة الإدارة</h3>
            <p class="text-[10px] text-slate-400 mt-6 leading-relaxed italic">سيتم تفعيل الرادار لك فور مراجعة حسابك من قبل الإدارة.</p>
            <button onclick="logout()" class="mt-10 text-[9px] text-red-500/70 underline font-black">إعادة محاولة</button>
        </div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbz2Q28bDhfpg3DVhDfCrWWk8fkS-pVvUa5guZXfZJ-cqGEEoJ2t08SxK8KdFZbxR-OVSg/exec';

        window.onload = () => {
            const savedStatus = localStorage.getItem('whale_driver_status');
            
            setTimeout(() => {
                document.getElementById('loader').classList.add('hidden');
                if (savedStatus === 'pending') {
                    document.getElementById('waitMessage').classList.remove('hidden');
                } else {
                    document.getElementById('authUI').classList.remove('hidden');
                }
            }, 1000);
        };

        document.getElementById('loginForm').onsubmit = async function(e) {
            e.preventDefault();
            const phone = document.getElementById('driverPhone').value;
            const name = document.getElementById('regName').value;
            const btn = document.getElementById('mainBtn');
            
            btn.disabled = true;
            btn.innerText = "جاري التحقق... 📡";

            try {
                const response = await fetch(`${scriptURL}?action=driver_login&phone=${phone}&name=${encodeURIComponent(name)}`);
                const result = await response.json();

                if (result.status === 'active') {
                    localStorage.setItem('whale_driver_id', result.id);
                    localStorage.setItem('whale_driver_phone', phone);
                    localStorage.setItem('whale_driver_name', result.name);
                    localStorage.setItem('whale_driver_status', 'active');
                    window.location.href = 'driver_dashboard.html';
                } else if (result.status === 'not_found') {
                    // إذا لم يوجد الحساب، نطلب التسجيل
                    document.getElementById('registerFields').classList.remove('hidden');
                    btn.disabled = false;
                    btn.innerText = "تقديم طلب انضمام";
                } else {
                    // حالة الانتظار (Pending)
                    localStorage.setItem('whale_driver_status', 'pending');
                    document.getElementById('authUI').classList.add('hidden');
                    document.getElementById('waitMessage').classList.remove('hidden');
                }
            } catch (e) {
                alert("خطأ في الاتصال بالسيرفر");
                btn.disabled = false;
            }
        };

        function logout() {
            localStorage.clear();
            location.reload();
        }
    </script>
</body>
</html>
