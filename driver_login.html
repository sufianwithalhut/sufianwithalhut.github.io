<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>دخول الكابتن | رادار الحوت 🐋</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --whale-amber: #fbbf24; --whale-navy: #020617; }
        body { font-family: 'Tajawal', sans-serif; background: #010409; color: white; overflow-x: hidden; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .radar-grid { position: fixed; inset: 0; background-image: linear-gradient(rgba(251, 191, 36, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(251, 191, 36, 0.03) 1px, transparent 1px); background-size: 35px 35px; z-index: -1; }
        .glass-card { background: rgba(13, 17, 23, 0.85); backdrop-filter: blur(25px); border: 1px solid rgba(251, 191, 36, 0.15); box-shadow: 0 0 50px rgba(251, 191, 36, 0.05); }
        .whale-input { width: 100%; padding: 1.1rem 3.5rem 1.1rem 1.1rem; background: rgba(0, 0, 0, 0.6); border: 1px solid rgba(255,255,255,0.08); border-radius: 1.2rem; color: white; outline: none; transition: 0.3s; }
        .whale-input:focus { border-color: var(--whale-amber); box-shadow: 0 0 15px rgba(251, 191, 36, 0.2); }
        .action-btn { background: var(--whale-amber); color: #020617; font-weight: 900; clip-path: polygon(5% 0, 100% 0, 95% 100%, 0% 100%); transition: 0.3s; cursor: pointer; }
        .action-btn:active:not(:disabled) { transform: scale(0.95); }
        .action-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .hidden { display: none; }
    </style>
</head>
<body class="p-6">

    <div class="radar-grid"></div>

    <div class="max-w-md w-full glass-card p-10 rounded-[2.5rem] relative z-10">
        
        <div id="loader" class="text-center py-12">
            <div class="w-14 h-14 border-4 border-amber-500 border-t-transparent rounded-full animate-spin mx-auto mb-6"></div>
            <p class="text-[10px] text-amber-500 font-black italic uppercase tracking-widest">Scanning Pilot ID...</p>
        </div>

        <div id="authUI" class="hidden text-center">
            <header class="mb-10">
                <div class="inline-block p-4 rounded-3xl bg-amber-500/10 border border-amber-500/20 mb-4">
                    <span class="text-4xl text-amber-500"><i class="fas fa-motorcycle"></i></span>
                </div>
                <h2 class="text-2xl font-black tracking-widest uppercase italic" style="font-family: 'Orbitron', sans-serif;">
                    WHALE <span class="text-amber-500">PILOT</span>
                </h2>
                <p class="text-[9px] text-gray-500 mt-2 font-bold italic uppercase tracking-widest">قطاع كركوك الميداني V6.2</p>
            </header>

            <form id="loginForm" class="space-y-4">
                <div class="relative">
                    <i class="fas fa-phone absolute right-4 top-1/2 -translate-y-1/2 text-amber-500"></i>
                    <input type="tel" id="driverPhone" required placeholder="رقم هاتف الكابتن" 
                           class="whale-input text-center font-black tracking-[0.1em] text-lg">
                </div>

                <div id="regFields" class="hidden space-y-4 pt-2">
                    <div class="relative">
                        <i class="fas fa-user absolute right-4 top-1/2 -translate-y-1/2 text-amber-500"></i>
                        <input type="text" id="driverName" placeholder="الاسم الثلاثي واللقب" 
                               class="whale-input text-center font-bold">
                    </div>
                    <p class="text-[9px] text-amber-500 italic">أنت جديد في الرادار، يرجى كتابة اسمك بوضوح للتفعيل</p>
                </div>

                <button type="submit" id="mainBtn" class="w-full py-5 action-btn mt-6 flex items-center justify-center gap-3 italic shadow-lg shadow-amber-500/10">
                    <span id="btnText">تفعيل ودخول الرادار</span>
                    <i class="fas fa-crosshairs"></i>
                </button>
            </form>
        </div>

        <div id="statusMessage" class="hidden text-center py-12">
            <div id="statusIcon" class="text-6xl mb-6">🛰️</div>
            <h3 id="statusTitle" class="text-xl font-black text-amber-500 italic uppercase">بانتظار الإشارة</h3>
            <p id="statusDesc" class="text-[10px] text-slate-400 mt-6 leading-relaxed italic">يتم مراجعة طلبك من قبل الإدارة.<br>سيفتح الرادار تلقائياً فور التفعيل.</p>
            <button onclick="logout()" class="mt-10 text-[9px] text-red-500 font-black border-b border-red-500/30 pb-1 italic">خروج / تغيير البيانات</button>
        </div>
    </div>

    <script>
        // الرابط المحدث V6.2 - آذار 2026
        const scriptURL = 'https://script.google.com/macros/s/AKfycbyIqK63Xu4b2G8BN0aNQIs42oTqvvYRlGDLfQCCSMo68YPYoysKjQ_IjoXhie0MhIaZpQ/exec';

        window.onload = async () => {
            const savedPhone = localStorage.getItem('whale_driver_phone');
            if (savedPhone) {
                checkLoginStatus(savedPhone);
            } else { 
                showUI('authUI'); 
            }
        };

        async function checkLoginStatus(phone) {
            try {
                const response = await fetch(`${scriptURL}?action=login_check&type=Driver&id=${encodeURIComponent(phone)}`);
                const result = await response.json();
                handleDriverStatus(result, phone);
            } catch (e) { 
                console.error("Login Check Error:", e);
                showUI('authUI'); 
            }
        }

        function handleDriverStatus(result, phone) {
            document.getElementById('loader').classList.add('hidden');
            if (result.status === 'active') {
                localStorage.setItem('whale_driver_phone', phone);
                if (result.data) localStorage.setItem('whale_driver_name', result.data[1]); 
                window.location.href = 'driver.html';
            } else if (result.status === 'pending') {
                showStatusView('pending');
                // فحص ذكي: إعادة المحاولة كل 30 ثانية للتأكد من التفعيل
                setTimeout(() => location.reload(), 30000);
            } else if (result.status === 'banned') {
                showStatusView('banned');
            } else { 
                showUI('authUI'); 
            }
        }

        function showUI(id) {
            document.getElementById('loader').classList.add('hidden');
            document.getElementById('authUI').classList.add('hidden');
            document.getElementById('statusMessage').classList.add('hidden');
            document.getElementById(id).classList.remove('hidden');
        }

        document.getElementById('loginForm').onsubmit = async function(e) {
            e.preventDefault();
            const phone = document.getElementById('driverPhone').value;
            const name = document.getElementById('driverName').value;
            const btn = document.getElementById('mainBtn');
            const btnText = document.getElementById('btnText');
            const regFields = document.getElementById('regFields');
            
            btn.disabled = true;
            btnText.innerText = "جاري الاتصال بالقاعدة... 📡";

            try {
                if (!regFields.classList.contains('hidden')) {
                    // عملية تسجيل كابتن جديد
                    const regData = {
                        action: "register_user",
                        type: "Driver",
                        name: name,
                        phone: phone,
                        password: "123"
                    };
                    
                    await fetch(scriptURL, {
                        method: 'POST',
                        mode: 'no-cors',
                        body: JSON.stringify(regData)
                    });
                    
                    localStorage.setItem('whale_driver_phone', phone);
                    setTimeout(() => showStatusView('pending'), 2000);
                } else {
                    // محاولة دخول عادية
                    const response = await fetch(`${scriptURL}?action=login_check&type=Driver&id=${encodeURIComponent(phone)}`);
                    const result = await response.json();

                    if (result.status === 'not_found') {
                        regFields.classList.remove('hidden');
                        document.getElementById('driverName').required = true;
                        btn.disabled = false;
                        btnText.innerText = "إرسال طلب تفعيل";
                    } else {
                        localStorage.setItem('whale_driver_phone', phone);
                        handleDriverStatus(result, phone);
                    }
                }
            } catch (e) {
                alert("خطأ في الربط، تحقق من جودة الإنترنت.");
                btn.disabled = false;
                btnText.innerText = "تفعيل ودخول الرادار";
            }
        };

        function showStatusView(status) {
            showUI('statusMessage');
            const title = document.getElementById('statusTitle');
            const icon = document.getElementById('statusIcon');
            const desc = document.getElementById('statusDesc');

            if (status === 'banned') {
                title.innerText = "الوصول محظور";
                title.style.color = "#ef4444";
                icon.innerText = "🚫";
                desc.innerText = "لقد تم تقييد وصول هذا الكابتن من قبل الإدارة.";
            } else {
                title.innerText = "بانتظار موافقة طه";
                icon.innerText = "🛰️";
                desc.innerText = "تم استلام بياناتك وهي قيد المراجعة.\nبمجرد تفعيل طه لحسابك، سيفتح الرادار تلقائياً.";
            }
        }

        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
