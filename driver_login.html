<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>دخول الكابتن | رادار الحوت 🐋 V10.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --whale-blue: #2563eb; --whale-bg: #f8fafc; }
        body { font-family: 'Tajawal', sans-serif; background: var(--whale-bg); color: #1e293b; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .bg-grid { position: fixed; inset: 0; background-image: radial-gradient(var(--whale-blue) 0.5px, transparent 0.5px); background-size: 30px 30px; opacity: 0.05; z-index: -1; }
        .login-card { background: white; border-radius: 3rem; box-shadow: 0 25px 50px -12px rgba(37, 99, 235, 0.15); border: 1px solid rgba(37, 99, 235, 0.1); width: 100%; max-width: 380px; padding: 2.5rem; position: relative; z-index: 10; }
        .whale-input { width: 100%; padding: 1.1rem; background: #f1f5f9; border: 2px solid transparent; border-radius: 1.5rem; font-weight: 900; text-align: center; transition: 0.3s; }
        .whale-input:focus { border-color: var(--whale-blue); background: white; outline: none; box-shadow: 0 0 15px rgba(37, 99, 235, 0.1); }
        .btn-pilot { background: var(--whale-blue); color: white; font-weight: 900; border-radius: 1.5rem; transition: 0.3s; box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2); font-style: italic; border: none; cursor: pointer; }
        .btn-pilot:disabled { background: #cbd5e1; box-shadow: none; cursor: not-allowed; }
        .status-pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.7; } }
        .hidden { display: none; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="p-6">
    <div class="bg-grid"></div>

    <div class="login-card">
        <div id="loader" class="text-center py-10">
            <div class="w-14 h-14 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mx-auto mb-6"></div>
            <p class="text-[10px] text-blue-600 font-black tracking-[0.3em] uppercase italic">Verifying Pilot Signal...</p>
        </div>

        <div id="authUI" class="hidden text-center fade-in">
            <header class="mb-8">
                <div class="w-20 h-20 bg-blue-600 text-white rounded-[2rem] flex items-center justify-center text-4xl mx-auto mb-4 shadow-xl shadow-blue-100">
                    <i class="fas fa-motorcycle"></i>
                </div>
                <h2 class="text-2xl font-black text-slate-800 italic uppercase" style="font-family: 'Orbitron';">WHALE <span class="text-blue-600">PILOT</span></h2>
                <p class="text-[9px] text-slate-400 mt-2 font-bold italic tracking-[0.2em] uppercase">Kirkuk Grid V10.0</p>
            </header>

            <form id="loginForm" class="space-y-4">
                <div class="relative">
                    <input type="tel" id="driverPhone" required placeholder="رقم الهاتف (077...)" class="whale-input tracking-widest" dir="ltr">
                </div>

                <div id="regFields" class="hidden space-y-4 pt-4 border-t border-dashed border-slate-200 mt-4 fade-in">
                    <p class="text-[10px] text-blue-600 font-black italic uppercase tracking-widest">New Pilot Identity</p>
                    <input type="text" id="driverName" placeholder="الاسم الثلاثي" class="whale-input text-sm">
                </div>

                <button type="submit" id="mainBtn" class="w-full py-5 btn-pilot mt-6 flex items-center justify-center gap-3">
                    <span id="btnText">تشغيل المحرك</span>
                    <i class="fas fa-satellite-dish"></i>
                </button>
            </form>
        </div>

        <div id="statusMessage" class="hidden text-center py-8 fade-in">
            <div id="statusIcon" class="text-6xl mb-6 status-pulse text-blue-600">
                <i class="fas fa-broadcast-tower"></i>
            </div>
            <h3 id="statusTitle" class="text-2xl font-black text-blue-600 italic uppercase leading-none mb-3">Signal Locked</h3>
            <p id="statusDesc" class="text-[12px] text-slate-500 mt-4 leading-relaxed font-bold italic px-4">
                طلب الانضمام قيد المراجعة في سيرفر الحوت.<br>سيتم تفعيل الرادار تلقائياً فور موافقة طه.
            </p>
            
            <div class="mt-10 p-5 bg-blue-50/50 rounded-[1.5rem] border border-dashed border-blue-200">
                <p class="text-[9px] text-slate-400 font-black uppercase tracking-widest">Technical Support</p>
                <p class="text-sm font-black text-blue-600 mt-1" dir="ltr">+964 771 322 5471</p>
            </div>

            <button onclick="logout()" class="mt-8 text-[10px] text-red-500 font-black uppercase flex items-center justify-center gap-2 mx-auto hover:underline tracking-widest">
                <i class="fas fa-edit"></i> تعديل بيانات التسجيل
            </button>
        </div>
    </div>

    <script>
        // الرابط الموحد لمحرك V10.0
        const scriptURL = 'https://script.google.com/macros/s/AKfycbzywi3-mLv5H4bNHYvQbFDpy_FwA-AceD4g8JZX6Ah3QZhmC5LGXNLvBeQBjYO9tmt9vA/exec';
        let checkTimer = null;

        window.onload = () => {
            const savedPhone = localStorage.getItem('whale_driver_phone');
            if (savedPhone) {
                checkDriverStatus(savedPhone);
            } else { 
                showSection('authUI'); 
            }
        };

        // دالة فحص حالة السائق المباشرة
        async function checkDriverStatus(phone) {
            try {
                const response = await fetch(`${scriptURL}?action=login_check&id=${encodeURIComponent(phone)}`);
                const res = await response.json();
                
                if (res.status === 'active') {
                    localStorage.setItem('whale_driver_phone', phone);
                    localStorage.setItem('whale_driver_name', res.data[1]);
                    window.location.replace('driver.html');
                } else if (res.status === 'pending') {
                    localStorage.setItem('whale_driver_phone', phone);
                    showStatusView('pending');
                    if (!checkTimer) checkTimer = setInterval(() => checkDriverStatus(phone), 10000);
                } else if (res.status === 'banned') {
                    showStatusView('banned');
                } else {
                    showSection('authUI');
                }
            } catch (e) { 
                console.error("Sync Error");
                showSection('authUI'); 
            }
        }

        document.getElementById('loginForm').onsubmit = async function(e) {
            e.preventDefault();
            const phone = document.getElementById('driverPhone').value.trim();
            const name = document.getElementById('driverName').value.trim();
            const btn = document.getElementById('mainBtn');
            const btnText = document.getElementById('btnText');
            const regFields = document.getElementById('regFields');

            if (phone.length < 10) return alert("يرجى إدخال رقم هاتف صحيح");
            
            btn.disabled = true;
            btnText.innerText = "جاري الاتصال...";

            // معالجة طلب التسجيل الجديد
            if (!regFields.classList.contains('hidden')) {
                if(!name) { alert("الرجاء إدخال الاسم الثلاثي"); btn.disabled = false; btnText.innerText = "تقديم طلب انضمام"; return; }
                
                const payload = { 
                    action: "register_user", 
                    type: "Driver", // تحديد النوع للسيرفر
                    name: name, 
                    phone: phone,
                    address: "كركوك",
                    fee: "0",
                    lat: "0", lng: "0"
                };

                try {
                    const response = await fetch(scriptURL, { method: 'POST', body: JSON.stringify(payload) });
                    const result = await response.json();
                    if(result.status === "success") {
                        localStorage.setItem('whale_driver_phone', phone);
                        showStatusView('pending');
                        checkTimer = setInterval(() => checkDriverStatus(phone), 10000);
                    }
                } catch (e) { 
                    alert("خطأ في الشبكة، حاول مرة أخرى"); 
                    btn.disabled = false; 
                    btnText.innerText = "تقديم طلب انضمام";
                }
            } else {
                // فحص هل الرقم موجود مسبقاً؟
                try {
                    const response = await fetch(`${scriptURL}?action=login_check&id=${encodeURIComponent(phone)}`);
                    const res = await response.json();
                    
                    if (res.status !== "not_found") {
                        checkDriverStatus(phone);
                    } else {
                        // رقم جديد تماماً
                        regFields.classList.remove('hidden');
                        btn.disabled = false;
                        btnText.innerText = "تقديم طلب انضمام";
                    }
                } catch (e) { 
                    alert("تأكد من اتصال الإنترنت"); 
                    btn.disabled = false; 
                    btnText.innerText = "تشغيل المحرك";
                }
            }
        };

        function showSection(id) {
            document.getElementById('loader').classList.add('hidden');
            document.getElementById('authUI').classList.add('hidden');
            document.getElementById('statusMessage').classList.add('hidden');
            document.getElementById(id).classList.remove('hidden');
        }

        function showStatusView(status) {
            showSection('statusMessage');
            const title = document.getElementById('statusTitle');
            const desc = document.getElementById('statusDesc');
            const icon = document.getElementById('statusIcon');

            if (status === 'banned') {
                title.innerText = "Access Denied";
                title.className = "text-2xl font-black text-red-500 italic uppercase leading-none mb-3";
                icon.innerHTML = `<i class="fas fa-user-slash text-red-500"></i>`;
                desc.innerText = "تم تقييد وصولك للنظام بسبب مخالفة القوانين. يرجى مراجعة طه مباشرة.";
            } else {
                title.innerText = "Signal Locked";
                title.className = "text-2xl font-black text-blue-600 italic uppercase leading-none mb-3";
                icon.innerHTML = `<i class="fas fa-broadcast-tower"></i>`;
                desc.innerText = "طلبك قيد المراجعة في سيرفر الحوت. سيتم فتح الرادار تلقائياً فور تفعيل حسابك.";
            }
        }

        function logout() { 
            if(checkTimer) clearInterval(checkTimer);
            localStorage.clear(); 
            location.reload(); 
        }
    </script>
</body>
</html>
