<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>دخول الكابتن | رادار الحوت 🐋</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --whale-amber: #fbbf24; --whale-navy: #020617; }
        body { font-family: 'Tajawal', sans-serif; background: #010409; color: white; overflow-x: hidden; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .radar-grid { position: fixed; inset: 0; background-image: linear-gradient(rgba(251, 191, 36, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(251, 191, 36, 0.03) 1px, transparent 1px); background-size: 35px 35px; z-index: -1; }
        .glass-card { background: rgba(13, 17, 23, 0.85); backdrop-filter: blur(25px); border: 1px solid rgba(251, 191, 36, 0.15); box-shadow: 0 0 50px rgba(251, 191, 36, 0.05); }
        .whale-input { width: 100%; padding: 1.1rem 3.5rem 1.1rem 1.1rem; background: rgba(0, 0, 0, 0.6); border: 1px solid rgba(255,255,255,0.08); border-radius: 1.2rem; color: white; outline: none; transition: 0.3s; }
        .whale-input:focus { border-color: var(--whale-amber); box-shadow: 0 0 15px rgba(251, 191, 36, 0.2); }
        .action-btn { background: var(--whale-amber); color: #020617; font-weight: 900; clip-path: polygon(5% 0, 100% 0, 95% 100%, 0% 100%); transition: 0.3s; cursor: pointer; border: none; }
        .action-btn:active:not(:disabled) { transform: scale(0.95); }
        .hidden { display: none !important; }
    </style>
</head>
<body class="p-6">

    <div class="radar-grid"></div>

    <div class="max-w-md w-full glass-card p-10 rounded-[2.5rem] relative z-10">
        
        <div id="loader" class="text-center py-12">
            <div class="w-14 h-14 border-4 border-amber-500 border-t-transparent rounded-full animate-spin mx-auto mb-6"></div>
            <p class="text-[10px] text-amber-500 font-black italic uppercase tracking-widest">Booting Pilot System V10.3...</p>
        </div>

        <div id="authUI" class="hidden text-center">
            <header class="mb-10">
                <div class="inline-block p-4 rounded-3xl bg-amber-500/10 border border-amber-500/20 mb-4">
                    <span class="text-4xl text-amber-500"><i class="fas fa-motorcycle"></i></span>
                </div>
                <h2 class="text-2xl font-black tracking-widest uppercase italic" style="font-family: 'Orbitron', sans-serif;">
                    WHALE <span class="text-amber-500">PILOT</span>
                </h2>
                <p class="text-[9px] text-gray-500 mt-2 font-bold italic uppercase tracking-widest leading-loose">منظومة الحوت - كركوك V10.3</p>
            </header>

            <form id="loginForm" class="space-y-4">
                <div class="relative">
                    <i class="fas fa-phone absolute right-4 top-1/2 -translate-y-1/2 text-amber-500"></i>
                    <input type="tel" id="driverPhone" required placeholder="رقم هاتف الكابتن" 
                           class="whale-input text-center font-black tracking-[0.1em] text-lg">
                </div>

                <div id="regFields" class="hidden space-y-4 pt-2">
                    <div class="relative">
                        <i class="fas fa-user absolute right-4 top-1/2 -translate-y-1/2 text-amber-500"></i>
                        <input type="text" id="driverName" placeholder="الاسم الثلاثي واللقب" 
                               class="whale-input text-center font-bold">
                    </div>
                    <p class="text-[9px] text-amber-500/70 italic">سيطلب النظام إذن الموقع لربط هويتك بالرادار 🛰️</p>
                </div>

                <button type="submit" id="mainBtn" class="w-full py-5 action-btn mt-6 flex items-center justify-center gap-3 italic shadow-lg shadow-amber-500/10">
                    <span id="btnText">فحص حالة الهوية</span>
                    <i class="fas fa-crosshairs"></i>
                </button>
            </form>
        </div>

        <div id="statusMessage" class="hidden text-center py-12">
            <div id="statusIcon" class="text-6xl mb-6">🛰️</div>
            <h3 id="statusTitle" class="text-xl font-black text-amber-500 italic uppercase">بانتظار الإشارة</h3>
            <p id="statusDesc" class="text-[10px] text-slate-400 mt-6 leading-relaxed italic">يتم مراجعة هويتك الآن من قبل سفيان.<br>سيفتح الرادار تلقائياً فور تفعيل حسابك.</p>
            <button onclick="window.location.reload()" class="mt-10 text-[9px] text-red-500 font-black border-b border-red-500/30 pb-1">محاولة دخول مجدداً</button>
        </div>
    </div>

    <script>
        // رابط السكريبت الموحد V10.3
        const scriptURL = 'https://script.google.com/macros/s/AKfycbzf4_VqfC5fBq0uK2Hl7S-qR-XlS6Z0T5F8H4-X-Z/exec';
        let driverLat = 0, driverLng = 0;

        setTimeout(() => {
            document.getElementById('loader').classList.add('hidden');
            document.getElementById('authUI').classList.remove('hidden');
        }, 1200);

        // جلب الموقع فوراً استعداداً للتسجيل
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(pos => {
                driverLat = pos.coords.latitude;
                driverLng = pos.coords.longitude;
            });
        }

        const loginForm = document.getElementById('loginForm');
        
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const phone = document.getElementById('driverPhone').value;
            const name = document.getElementById('driverName').value;
            const btnText = document.getElementById('btnText');
            const regFields = document.getElementById('regFields');

            btnText.innerText = "جاري الاتصال بالرادار...";
            
            try {
                // فحص حالة السائق (Login Check)
                const response = await fetch(`${scriptURL}?action=login_check&type=Driver&id=${phone}`);
                const result = await response.json();

                if (result.status === "active") {
                    localStorage.setItem('whale_driver_phone', phone);
                    localStorage.setItem('whale_driver_name', result.name);
                    window.location.href = "Driver.html";
                } 
                else if (result.status === "banned") {
                    showStatus("هوية محظورة 🛑", "نعتذر كابتن، تم حظر وصولك للمنظومة مؤقتاً.", "🚫");
                } 
                else if (result.status === "pending" || result.status === "waiting") {
                    showStatus("قيد المراجعة ⏳", "أهلاً كابتن، هويتك وصلت لسفيان وبانتظار التفعيل.", "🛰️");
                } 
                else {
                    // السائق غير موجود -> عرض حقول التسجيل
                    if (!regFields.classList.contains('hidden')) {
                        if (!name) { alert("يرجى كتابة الاسم الثلاثي"); return; }
                        
                        btnText.innerText = "جاري تسجيل الهوية...";
                        
                        // إرسال طلب تسجيل جديد مع الإحداثيات الأولية
                        const regRes = await fetch(scriptURL, {
                            method: 'POST',
                            body: JSON.stringify({
                                action: "register",
                                type: "Driver",
                                phone: phone,
                                name: name,
                                lat: driverLat,
                                lng: driverLng
                            })
                        });
                        const regData = await regRes.json();
                        
                        if(regData.status === "success" || regData.status === "exists") {
                            showStatus("تم البث بنجاح 🚀", "سيتم تفعيل الرادار الخاص بك فور مراجعة سفيان لبياناتك.", "✅");
                        }
                    } else {
                        // إظهار حقل الاسم في المحاولة الأولى إذا لم يكن مسجلاً
                        regFields.classList.remove('hidden');
                        btnText.innerText = "تأكيد الانضمام للحوت";
                    }
                }
            } catch (err) {
                alert("⚠️ خطأ في الاتصال، تأكد من جودة الإنترنت.");
                btnText.innerText = "فحص حالة الهوية";
            }
        });

        function showStatus(title, desc, icon) {
            document.getElementById('authUI').classList.add('hidden');
            document.getElementById('statusMessage').classList.remove('hidden');
            document.getElementById('statusTitle').innerText = title;
            document.getElementById('statusDesc').innerText = desc;
            document.getElementById('statusIcon').innerText = icon;
        }
    </script>
</body>
</html>
