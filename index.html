<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رادار الحوت | الإدارة المركزية V10.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --whale-blue: #3b82f6; --whale-emerald: #10b981; --whale-dark: #0f172a; }
        body { font-family: 'Tajawal', sans-serif; background: #020617; color: white; min-height: 100vh; }
        .card-glass { background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; }
        .card-glass:hover { border-color: rgba(59, 130, 246, 0.3); }
        .status-badge { padding: 2px 8px; border-radius: 6px; font-size: 10px; font-weight: 900; text-transform: uppercase; }
        .active-pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body class="p-4 lg:p-8">

    <header class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center mb-8 gap-6">
        <div class="flex items-center gap-4">
            <div class="w-16 h-16 bg-blue-600 rounded-3xl flex items-center justify-center text-3xl shadow-lg shadow-blue-500/20 rotate-3">🐋</div>
            <div>
                <h1 class="text-3xl font-black italic tracking-tighter" style="font-family: 'Orbitron';">WHALE <span class="text-blue-500">MASTER</span></h1>
                <p class="text-[10px] text-slate-400 font-bold tracking-[0.4em] uppercase">Kirkuk Command Center V10.0</p>
            </div>
        </div>

        <div class="grid grid-cols-3 gap-4 w-full md:w-auto">
            <div class="card-glass p-4 rounded-2xl text-center border-b-4 border-blue-500">
                <p class="text-[9px] text-slate-400 font-bold uppercase mb-1">Orders</p>
                <p id="stat-orders" class="text-xl font-black italic">0</p>
            </div>
            <div class="card-glass p-4 rounded-2xl text-center border-b-4 border-emerald-500">
                <p class="text-[9px] text-slate-400 font-bold uppercase mb-1">Drivers</p>
                <p id="stat-drivers" class="text-xl font-black italic">0</p>
            </div>
            <div class="card-glass p-4 rounded-2xl text-center border-b-4 border-orange-500">
                <p class="text-[9px] text-slate-400 font-bold uppercase mb-1">Shops</p>
                <p id="stat-res" class="text-xl font-black italic">0</p>
            </div>
        </div>
    </header>

    <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <div class="lg:col-span-7 space-y-6">
            <div class="flex justify-between items-center px-2">
                <h2 class="text-xl font-black italic border-r-4 border-blue-500 pr-3">بث الطلبات المباشر</h2>
                <span class="text-[10px] bg-blue-500/10 text-blue-400 px-3 py-1 rounded-full font-bold active-pulse italic">LIVE RADAR SYNC</span>
            </div>
            
            <div id="ordersList" class="space-y-4 max-h-[75vh] overflow-y-auto pr-2">
                <div class="text-center py-20 opacity-20"><i class="fas fa-circle-notch animate-spin text-4xl"></i></div>
            </div>
        </div>

        <div class="lg:col-span-5 space-y-8">
            
            <div class="card-glass p-6 rounded-[2.5rem]">
                <h3 class="text-lg font-black mb-4 flex items-center justify-between">
                    <span>قائمة الطيارين</span>
                    <i class="fas fa-motorcycle text-emerald-500"></i>
                </h3>
                <div id="driversList" class="space-y-3 max-h-[30vh] overflow-y-auto pr-2"></div>
            </div>

            <div class="card-glass p-6 rounded-[2.5rem]">
                <h3 class="text-lg font-black mb-4 flex items-center justify-between">
                    <span>المطاعم النشطة</span>
                    <i class="fas fa-store text-orange-500"></i>
                </h3>
                <div id="resList" class="space-y-3 max-h-[30vh] overflow-y-auto pr-2"></div>
            </div>

        </div>
    </div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbzywi3-mLv5H4bNHYvQbFDpy_FwA-AceD4g8JZX6Ah3QZhmC5LGXNLvBeQBjYO9tmt9vA/exec";
        const PASS = "112233"; 

        async function refreshAll() {
            try {
                const res = await fetch(`${API}?action=get_master_data&pass=${PASS}`);
                const data = await res.json();
                
                updateStats(data);
                renderOrders(data.orders);
                renderDrivers(data.drivers);
                renderRestaurants(data.restaurants);
            } catch (e) { console.error("Sync Interrupted"); }
        }

        function updateStats(data) {
            document.getElementById('stat-orders').innerText = data.orders.length - 1;
            document.getElementById('stat-drivers').innerText = data.drivers.filter(d => d[4] === 'active').length;
            document.getElementById('stat-res').innerText = data.restaurants.filter(r => r[4] === 'active').length;
        }

        function renderOrders(orders) {
            const list = document.getElementById('ordersList');
            if (orders.length <= 1) { list.innerHTML = `<p class="text-center py-10 opacity-40">لا توجد طلبات حالياً</p>`; return; }

            list.innerHTML = orders.slice(1).reverse().map(o => {
                let statusColor = o[5] === 'pending_confirmation' ? 'bg-orange-500/20 text-orange-400' : 
                                 o[5] === 'picked-up' ? 'bg-blue-500/20 text-blue-400' : 'bg-emerald-500/20 text-emerald-400';
                
                return `
                <div class="card-glass p-5 rounded-3xl flex flex-col md:flex-row justify-between items-start md:items-center gap-4 border-l-4 ${o[5] === 'delivered' ? 'border-emerald-500' : 'border-blue-500'}">
                    <div class="flex-1">
                        <div class="flex items-center gap-3 mb-1">
                            <span class="text-xs font-black text-blue-500 font-mono tracking-tighter">#${o[0]}</span>
                            <span class="status-badge ${statusColor}">${o[5]}</span>
                        </div>
                        <h4 class="text-lg font-black italic">${o[1]} ⬅️ ${o[9]}</h4>
                        <p class="text-[10px] text-slate-400 mt-1 font-bold italic"><i class="fas fa-map-pin ml-1"></i> ${o[3]}</p>
                    </div>
                    <div class="flex md:flex-col items-center md:items-end gap-4 w-full md:w-auto border-t md:border-t-0 border-white/5 pt-4 md:pt-0">
                        <p class="text-xl font-black italic text-emerald-400 font-mono">${o[8]} <span class="text-[10px]">IQD</span></p>
                        <div class="flex gap-2">
                             <button onclick="updateData('Orders','${o[0]}', 5, 'delivered')" class="w-8 h-8 bg-emerald-500/20 text-emerald-500 rounded-lg hover:bg-emerald-500 hover:text-white transition-all"><i class="fas fa-check"></i></button>
                             <button onclick="updateData('Orders','${o[0]}', 5, 'cancelled')" class="w-8 h-8 bg-red-500/20 text-red-500 rounded-lg hover:bg-red-500 hover:text-white transition-all"><i class="fas fa-times"></i></button>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function renderDrivers(drivers) {
            document.getElementById('driversList').innerHTML = drivers.slice(1).map(d => `
                <div class="flex items-center justify-between p-3 bg-slate-900/30 rounded-2xl border border-white/5">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 rounded-full bg-emerald-500/10 flex items-center justify-center text-xs text-emerald-500 font-black italic uppercase">${d[1].charAt(0)}</div>
                        <span class="text-sm font-bold italic">${d[1]}</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <button onclick="updateData('Drivers','${d[2]}', 4, '${d[4] === 'active' ? 'banned' : 'active'}')" class="text-[9px] font-black uppercase italic ${d[4] === 'active' ? 'text-emerald-500' : 'text-red-500'} border border-current px-2 py-1 rounded-md hover:bg-current hover:text-slate-900 transition-all">
                            ${d[4]}
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function renderRestaurants(res) {
            document.getElementById('resList').innerHTML = res.slice(1).map(r => `
                <div class="flex items-center justify-between p-3 bg-slate-900/30 rounded-2xl border border-white/5">
                    <div>
                        <p class="text-sm font-bold italic">${r[1]}</p>
                        <p class="text-[9px] text-slate-500 font-black uppercase tracking-widest">${r[3]}</p>
                    </div>
                    <button onclick="updateData('Restaurants','${r[2]}', 4, '${r[4] === 'active' ? 'pending' : 'active'}')" class="text-[9px] font-black italic px-3 py-1 rounded-full border ${r[4] === 'active' ? 'border-orange-500 text-orange-500' : 'border-slate-500 text-slate-500'}">
                        ${r[4]}
                    </button>
                </div>
            `).join('');
        }

        async function updateData(sheet, id, col, val) {
            if (!confirm(`تأكيد تغيير الحالة إلى: ${val}؟`)) return;
            
            const payload = {
                action: "master_control",
                pass: PASS,
                targetSheet: sheet,
                targetID: id,
                colIndex: col,
                newValue: val
            };

            try {
                await fetch(API, { method: 'POST', body: JSON.stringify(payload) });
                refreshAll();
            } catch (e) { alert("حدث خطأ في المزامنة"); }
        }

        setInterval(refreshAll, 8000); 
        refreshAll();
    </script>
</body>
</html>
