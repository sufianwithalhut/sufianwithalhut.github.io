<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>سفيان — لوحة الموظفين</title>
<meta name="theme-color" content="#0a1628">
<meta name="apple-mobile-web-app-capable" content="yes">
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0a1628;--ink3:#4a6fa5;--ink4:#8bafd4;
  --sky:#2563eb;--sky-d:#1d4ed8;--sky-l:#eff6ff;--sky-m:#f0f7ff;
  --jade:#059669;--jade-l:#ecfdf5;--fire:#f97316;--fire-d:#ea580c;--fire-l:#fff7ed;
  --rose:#ef4444;--rose-l:#fef2f2;--amber:#f59e0b;--amber-l:#fffbeb;--violet:#7c3aed;--violet-l:#f5f3ff;
  --base:#fff;--base2:#f8fafc;--line:rgba(37,99,235,.1);--line2:rgba(37,99,235,.06);
  --sh-xs:0 1px 3px rgba(10,22,40,.08);--sh-sm:0 4px 16px rgba(10,22,40,.08);
  --sh-lg:0 20px 60px rgba(10,22,40,.14);--sh-sky:0 8px 24px rgba(37,99,235,.25);
  --rf:999px;--ease:cubic-bezier(.4,0,.2,1);
}
*,::before,::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--base2);font-family:'Cairo',sans-serif;color:var(--ink);
  -webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased;}
button,input,select{font-family:'Cairo',sans-serif;}
.dn{display:none!important;}

#toasts{position:fixed;top:max(16px,env(safe-area-inset-top));left:50%;transform:translateX(-50%);
  z-index:99999;display:flex;flex-direction:column;gap:8px;width:min(94%,360px);pointer-events:none;}
.ti{background:rgba(255,255,255,.97);backdrop-filter:blur(24px);border-radius:14px;padding:12px 16px;
  box-shadow:var(--sh-lg);display:flex;align-items:center;gap:10px;font-weight:700;font-size:.84rem;
  animation:tin .3s var(--ease);pointer-events:auto;}
.ti-ico{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ts .ti-ico{background:var(--jade-l);color:var(--jade);}.te .ti-ico{background:var(--rose-l);color:var(--rose);}
@keyframes tin{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:none}}

/* AUTH */
#auth{position:fixed;inset:0;z-index:60000;background:linear-gradient(135deg,#dbeeff,#f0f7ff 50%,#fff4ed);
  display:flex;align-items:center;justify-content:center;padding:20px;}
.auth-box{width:100%;max-width:380px;background:rgba(255,255,255,.92);backdrop-filter:blur(32px);
  border-radius:28px;box-shadow:var(--sh-lg);padding:44px 32px 36px;text-align:center;}
.auth-mark{width:72px;height:72px;border-radius:22px;background:linear-gradient(135deg,var(--sky),var(--sky-d));
  display:inline-flex;align-items:center;justify-content:center;box-shadow:var(--sh-sky);margin-bottom:18px;font-size:32px;}
.auth-h{font-size:1.4rem;font-weight:900;margin-bottom:3px;}
.auth-s{font-size:.76rem;font-weight:600;color:var(--ink4);margin-bottom:26px;}
.auth-in{width:100%;background:var(--sky-m);border:2px solid transparent;border-radius:14px;
  padding:13px 16px;font-size:.95rem;font-weight:700;text-align:center;outline:none;
  transition:all .2s;margin-bottom:11px;}
.auth-in:focus{background:#fff;border-color:var(--sky);box-shadow:0 0 0 4px var(--sky-l);}
.auth-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--sky),var(--sky-d));color:#fff;
  border:none;border-radius:14px;font-size:.95rem;font-weight:900;cursor:pointer;box-shadow:var(--sh-sky);transition:all .2s;}
.auth-btn:active{transform:scale(.97);}

/* HEADER */
.s-hdr{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.95);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--line);padding:12px 16px;padding-top:max(12px,env(safe-area-inset-top));
  display:flex;align-items:center;justify-content:space-between;gap:10px;}
.s-hl{display:flex;align-items:center;gap:10px;}
.s-logo{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,var(--sky),var(--sky-d));
  display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:var(--sh-sky);}
.s-nm{font-size:.92rem;font-weight:900;}
.s-role{font-size:.62rem;font-weight:700;color:var(--ink4);}
.s-hr{display:flex;align-items:center;gap:8px;}
.s-clk{background:var(--sky-l);color:var(--sky-d);padding:6px 12px;border-radius:var(--rf);font-weight:900;font-size:.82rem;}
.s-out{background:var(--rose-l);color:var(--rose);border:1px solid #fecaca;border-radius:11px;
  padding:8px 12px;font-weight:800;font-size:.78rem;cursor:pointer;display:flex;align-items:center;gap:5px;}
.s-out:active{transform:scale(.94);}

.wrap{max-width:1200px;margin:0 auto;padding:14px;}
.rt{font-size:.95rem;font-weight:900;display:flex;align-items:center;gap:7px;margin-bottom:12px;}
.rt-dot{width:8px;height:8px;border-radius:50%;background:var(--fire);animation:db 1.5s ease-in-out infinite;}
@keyframes db{0%,100%{transform:scale(1)}50%{transform:scale(1.6)}}

.kpi-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;}
.kc{background:var(--base);border-radius:18px;padding:14px 12px;border:1px solid var(--line2);
  box-shadow:var(--sh-xs);display:flex;align-items:center;gap:10px;position:relative;overflow:hidden;}
.kc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.kc.kb::before{background:linear-gradient(90deg,var(--sky),var(--sky-d));}
.kc.kg::before{background:linear-gradient(90deg,var(--jade),#047857);}
.kc.ko::before{background:linear-gradient(90deg,var(--fire),var(--fire-d));}
.kc-ic{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px;}
.kc-v{font-size:1.5rem;font-weight:900;line-height:1;}
.kc-l{font-size:.66rem;font-weight:700;color:var(--ink4);margin-top:3px;}

.fbar{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;flex-wrap:wrap;}
.fbar::-webkit-scrollbar{display:none;}
.fp{flex-shrink:0;padding:7px 13px;border-radius:var(--rf);font-size:.76rem;font-weight:800;color:var(--ink3);
  background:var(--base);border:1px solid var(--line);cursor:pointer;transition:all .18s;white-space:nowrap;
  display:inline-flex;align-items:center;gap:5px;}
.fp.on{background:linear-gradient(135deg,var(--sky),var(--sky-d));color:#fff;border-color:transparent;box-shadow:var(--sh-sky);}
.fp .fc{padding:1px 6px;border-radius:99px;font-size:.68rem;background:var(--sky-l);color:var(--sky);}
.fp.on .fc{background:rgba(255,255,255,.2);color:#fff;}
.fp.fr{color:var(--rose);}.fp.fr.on{background:linear-gradient(135deg,var(--rose),#dc2626);}
.fp.fg{color:var(--jade);}.fp.fg.on{background:linear-gradient(135deg,var(--jade),#047857);}
.fp.fo{color:var(--fire);}.fp.fo.on{background:linear-gradient(135deg,var(--fire),var(--fire-d));}
.fp.fa{color:var(--amber);}.fp.fa.on{background:linear-gradient(135deg,var(--amber),#d97706);}

.og{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;}
.oc{background:var(--base);border-radius:18px;padding:13px;border:1.5px solid var(--line2);
  box-shadow:var(--sh-xs);position:relative;overflow:hidden;transition:all .2s;}
.oc::after{content:'';position:absolute;right:0;top:10px;bottom:10px;width:3px;border-radius:99px;}
.op::after{background:var(--rose);}.or::after{background:var(--amber);}.oa::after{background:var(--jade);}
.oar::after{background:var(--fire);}.os::after{background:var(--violet);}.oh::after{background:var(--sky);}
.op{animation:rp 2.2s ease-in-out infinite;}
@keyframes rp{0%,100%{box-shadow:var(--sh-xs)}50%{box-shadow:0 4px 18px rgba(239,68,68,.2)}}
.oc-head{padding-bottom:10px;margin-bottom:10px;border-bottom:1px solid var(--line2);}
.oc-id{font-size:.92rem;font-weight:900;}
.oc-tm{font-size:.65rem;font-weight:700;color:var(--ink4);margin-top:2px;}
.oc-acts{display:flex;flex-direction:column;gap:6px;margin-bottom:10px;}
.oc-body{display:flex;flex-direction:column;gap:8px;}
.oc-row{display:flex;align-items:center;justify-content:space-between;}
.oc-res{font-size:.86rem;font-weight:800;}
.oc-pr{font-size:.92rem;font-weight:900;color:var(--jade);}
.oc-ar{font-size:.73rem;font-weight:700;color:var(--ink3);display:flex;align-items:center;gap:4px;}
.oc-dr{background:var(--sky-m);border-radius:10px;padding:8px 10px;display:flex;align-items:center;gap:7px;}
.oc-dn{font-size:.75rem;font-weight:800;color:var(--sky-d);flex:1;min-width:0;}
.oc-dn span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block;}
.oc-dc{display:flex;align-items:center;gap:5px;flex-shrink:0;}
.ob{width:30px;height:30px;border-radius:9px;border:none;cursor:pointer;display:inline-flex;
  align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;font-size:14px;}
.ob:active{transform:scale(.85);}
.b-ok{background:var(--jade-l);color:var(--jade);}.b-del{background:var(--rose-l);color:var(--rose);}
.b-img{background:var(--sky-l);color:var(--sky-d);}
.cb-sm{width:28px;height:28px;border-radius:8px;background:var(--jade-l);color:var(--jade);border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;}
.asel{border:1.5px solid var(--line);border-radius:8px;padding:5px 8px;font-size:.7rem;font-weight:800;
  max-width:130px;background:var(--base);color:var(--sky-d);outline:none;cursor:pointer;}
.stb{padding:3px 9px;border-radius:var(--rf);font-size:.67rem;font-weight:900;display:inline-block;}
.stb-r{background:var(--rose-l);color:var(--rose);border:1px solid #fecaca;}
.stb-w{background:var(--amber-l);color:var(--amber);border:1px solid #fde68a;}
.stb-g{background:var(--jade-l);color:var(--jade);border:1px solid #a7f3d0;}
.stb-b{background:var(--sky-l);color:var(--sky-d);border:1px solid rgba(37,99,235,.2);}
.stb-o{background:var(--fire-l);color:var(--fire-d);border:1px solid #fed7aa;}
.stb-v{background:var(--violet-l);color:var(--violet);border:1px solid #d8b4fe;}
.dl-pill{position:absolute;top:9px;left:12px;background:var(--rose-l);color:var(--rose);padding:2px 8px;
  border-radius:var(--rf);font-size:.65rem;font-weight:900;border:1px solid #fecaca;}
.rj-tag{background:var(--rose-l);color:var(--rose);font-size:.65rem;font-weight:800;padding:2px 6px;
  border-radius:7px;border:1px solid #fecaca;display:inline-flex;align-items:center;gap:3px;margin-top:2px;}
.empty-s{text-align:center;padding:42px 16px;color:var(--ink4);grid-column:1/-1;}
.es-ic{width:64px;height:64px;border-radius:20px;background:var(--sky-l);display:inline-flex;
  align-items:center;justify-content:center;margin-bottom:12px;color:var(--sky);font-size:28px;}
.es-t{font-size:.88rem;font-weight:800;color:var(--ink3);}
#fbSt{position:fixed;bottom:14px;left:14px;background:var(--base);border-radius:var(--rf);padding:6px 13px;
  box-shadow:var(--sh-sm);display:flex;align-items:center;gap:6px;font-weight:700;font-size:.72rem;z-index:800;border:1px solid var(--line);}
.fb-dot{width:8px;height:8px;border-radius:50%;background:var(--jade);}.fb-dot.off{background:var(--rose);}
.loading{color:transparent!important;pointer-events:none;position:relative;}
.loading::after{content:'';position:absolute;left:50%;top:50%;width:14px;height:14px;margin:-7px;
  border:2.5px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;}
@keyframes sp{to{transform:rotate(360deg)}}
#imgModal{position:fixed;inset:0;background:rgba(10,22,40,.9);backdrop-filter:blur(14px);z-index:50000;
  display:none;align-items:center;justify-content:center;padding:18px;}
.img-cl{position:absolute;top:11px;right:11px;width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,.5);
  color:#fff;border:2px solid rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;cursor:pointer;}
</style>
</head>
<body>
<div id="toasts"></div>
<div id="fbSt" class="dn"><span class="fb-dot" id="fbDot"></span><span id="fbTxt">متصل</span></div>

<div id="imgModal" onclick="clImg()">
  <div style="position:relative" onclick="event.stopPropagation()">
    <div class="img-cl" onclick="clImg()">✕</div>
    <img id="imgFull" style="max-width:96vw;max-height:88vh;object-fit:contain;display:block;border-radius:12px" src="" alt="">
  </div>
</div>

<!-- AUTH -->
<div id="auth">
  <div class="auth-box">
    <div class="auth-mark">🧑‍💼</div>
    <div class="auth-h">لوحة الموظفين</div>
    <div class="auth-s">سفيان — مراقبة الرادار</div>
    <input type="tel" id="sPhone" class="auth-in" placeholder="رقم الهاتف" autocomplete="off">
    <input type="password" id="sPass" class="auth-in" placeholder="كلمة المرور" autocomplete="off" onkeypress="if(event.key==='Enter')doLogin()">
    <button class="auth-btn" id="loginBtn" onclick="doLogin()">دخول</button>
  </div>
</div>

<!-- APP -->
<div id="app" class="dn">
  <div class="s-hdr">
    <div class="s-hl">
      <div class="s-logo">🧑‍💼</div>
      <div><div class="s-nm" id="empName">موظف</div><div class="s-role">مراقب الرادار</div></div>
    </div>
    <div class="s-hr">
      <div class="s-clk" id="clk">00:00</div>
      <button class="s-out" onclick="doLogout()">🚪 خروج</button>
    </div>
  </div>
  <div class="wrap">
    <div class="kpi-row">
      <div class="kc kb"><div class="kc-ic" style="background:var(--sky-l)">📦</div><div><div class="kc-v" id="vOrd">0</div><div class="kc-l">طلبات نشطة</div></div></div>
      <div class="kc kg"><div class="kc-ic" style="background:var(--jade-l)">🛵</div><div><div class="kc-v" id="vDrv">0</div><div class="kc-l">كباتن بالميدان</div></div></div>
      <div class="kc ko"><div class="kc-ic" style="background:var(--fire-l)">🔴</div><div><div class="kc-v" id="vPend">0</div><div class="kc-l">بانتظار كابتن</div></div></div>
    </div>
    <div class="rt"><div class="rt-dot"></div> الرادار الميداني</div>
    <div class="fbar" id="fbar">
      <button class="fp on" onclick="doFilt('all',this)">الكل <span class="fc" id="cA">0</span></button>
      <button class="fp fr" onclick="doFilt('pending',this)">بانتظار كابتن <span class="fc" id="cP">0</span></button>
      <button class="fp fg" onclick="doFilt('active',this)">قيد التوصيل <span class="fc" id="cAc">0</span></button>
      <button class="fp fo" onclick="doFilt('dlyr',this)">🕐 متأخر بالمطعم <span class="fc" id="cDR">0</span></button>
      <button class="fp fa" onclick="doFilt('dlyd',this)">🛵 متأخر بالطريق <span class="fc" id="cDD">0</span></button>
    </div>
    <div id="radar" class="og"></div>
  </div>
</div>

<script>
/* ════ CONSTANTS ════ */
const O={ID:0,RES:1,AREA:2,DETAILS:3,PRICE:4,STATUS:5,DRV:6,TIME:7,PHOTO:8,SOV:9,LU:10,LO:11,READY:12,COMM:13,PAY:14};
const D={ID:0,NAME:1,PHONE:2,AREA:3,STATUS:4,LAT:5,LNG:6,PASS:12,SHIFT:13};
const API="https://script.google.com/macros/s/AKfycbzKDBjgPxmt_iDCphkjB6EY-cnag_aqwxrdNDrY9uqBRbTZYsqGWl4TJn4pANS8OVYm/exec";
const TOK="HUT_SECURE_99";

/* ════ STATE ════ */
let STOKEN="",EMP_NAME="",EMP_PHONE="";
let liveOrd=[],actDrv=new Set(),gDrivers=[],liveLed={drivers:{}};
let drvLocs={},rfilt="all",pendCnt=0,fbConn=true,fbL=[];
let radarHtml="",drvSelOpts="";

/* Firebase */
try{firebase.initializeApp({apiKey:"AIzaSyAo1rmqUzieYZU3RIwXOAN87GkpNrp-_Hc",authDomain:"sufyan-delivery.firebaseapp.com",databaseURL:"https://sufyan-delivery-default-rtdb.europe-west1.firebasedatabase.app",projectId:"sufyan-delivery",storageBucket:"sufyan-delivery.firebasestorage.app",messagingSenderId:"941542380637",appId:"1:941542380637:web:9623fa6e627817ffeba9b4"});}catch(e){}
const db=firebase.database();
const auth=firebase.auth();

/* ════ الحماية السحابية: استهلاك توكن الموظف وتجديده ════ */
let _staffTokenTimer=null;
async function consumeStaffToken(tok,phone,pass){
  if(!tok){console.warn("⚠️ لم يصل firebase_token من السكربت — تحقق من مفاتيح الخدمة.");return;}
  try{
    await auth.signInWithCustomToken(tok);
    scheduleStaffTokenRefresh(phone,pass);
  }catch(e){console.error("Firebase Auth (staff):",e);}
}
function scheduleStaffTokenRefresh(phone,pass){
  if(_staffTokenTimer)clearTimeout(_staffTokenTimer);
  _staffTokenTimer=setTimeout(async()=>{
    try{
      const d=await apiGet({action:"STAFF_LOGIN",phone,password:pass});
      if(d&&d.success&&d.firebase_token){await auth.signInWithCustomToken(d.firebase_token);}
      scheduleStaffTokenRefresh(phone,pass);
    }catch(e){console.error("تعذّر تجديد توكن الموظف:",e);scheduleStaffTokenRefresh(phone,pass);}
  },50*60*1000);
}


/* ════ UTILS ════ */
function esc(s){if(s==null)return"";const d=document.createElement("div");d.textContent=String(s);return d.innerHTML;}
function ej(s){return String(s??'').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;');}
function nP(p){if(!p)return"";let s=String(p).replace(/[^\d]/g,"");if(s.startsWith("964"))s=s.slice(3);return s.replace(/^0+/,"");}
function dN(p){if(!p)return"غير محدد";const f=gDrivers.find(x=>nP(x.phone)===nP(p));if(f&&f.name)return f.name;const ph=String(p).replace(/[^0-9]/g,"");return ph.length>4?"0"+ph.slice(-4):ph;}
function toast(m,t="s"){const c=document.getElementById("toasts"),el=document.createElement("div");el.className=`ti t${t}`;el.innerHTML=`<div class="ti-ico">${t==="s"?"✅":"❌"}</div><span style="flex:1">${m}</span>`;c.appendChild(el);setTimeout(()=>{el.style.opacity="0";el.style.transition=".3s";setTimeout(()=>el.remove(),320);},3000);}
function opImg(u){if(!u)return;document.getElementById("imgFull").src=u;document.getElementById("imgModal").style.display="flex";}
function clImg(){document.getElementById("imgModal").style.display="none";document.getElementById("imgFull").src="";}

/* GET helper (JSONP-free, returns json) */
async function apiGet(params){
  const qs=Object.entries(params).map(([k,v])=>`${k}=${encodeURIComponent(v)}`).join("&");
  const r=await fetch(`${API}?${qs}&token=${TOK}&ts=${Date.now()}`);
  return await r.json();
}

/* ════ AUTH ════ */
window.addEventListener("DOMContentLoaded",()=>{
  const saved=sessionStorage.getItem("staff_session");
  if(saved){try{
    const s=JSON.parse(saved);STOKEN=s.token;EMP_NAME=s.name;EMP_PHONE=s.phone;
    enterApp();
    // استعادة الحماية السحابية: نطلب توكناً جديداً بكلمة المرور المحفوظة
    if(s.p){const pass=decodeURIComponent(escape(atob(s.p)));
      apiGet({action:"STAFF_LOGIN",phone:EMP_PHONE,password:pass}).then(d=>{
        if(d&&d.success&&d.firebase_token)consumeStaffToken(d.firebase_token,EMP_PHONE,pass);
      }).catch(()=>{});
    }
  }catch(e){}}
});
window.doLogin=async function(){
  const phone=document.getElementById("sPhone").value.trim();
  const pass=document.getElementById("sPass").value.trim();
  if(!phone||!pass)return toast("أدخل الهاتف وكلمة المرور","e");
  const btn=document.getElementById("loginBtn");btn.classList.add("loading");btn.disabled=true;
  try{
    const d=await apiGet({action:"STAFF_LOGIN",phone,password:pass});
    if(d.success){
      STOKEN=d.token;EMP_NAME=d.name;EMP_PHONE=d.phone;
      sessionStorage.setItem("staff_session",JSON.stringify({token:STOKEN,name:EMP_NAME,phone:EMP_PHONE,p:btoa(unescape(encodeURIComponent(pass)))}));
      await consumeStaffToken(d.firebase_token,EMP_PHONE,pass);
      enterApp();
    }else toast(d.msg||"فشل الدخول","e");
  }catch(e){toast("فشل الاتصال بالخادم","e");}
  finally{btn.classList.remove("loading");btn.disabled=false;}
};
function enterApp(){
  document.getElementById("auth").style.display="none";
  document.getElementById("app").classList.remove("dn");
  document.getElementById("fbSt").classList.remove("dn");
  document.getElementById("empName").textContent=EMP_NAME;
  startClk();setupFB();
}
window.doLogout=async function(){
  if(!confirm("تأكيد تسجيل الخروج؟"))return;
  try{await apiGet({action:"STAFF_LOGOUT",stoken:STOKEN});}catch(e){}
  if(_staffTokenTimer)clearTimeout(_staffTokenTimer);
  try{await auth.signOut();}catch(e){}
  fbL.forEach(({ref,cb})=>ref.off("value",cb));fbL=[];
  sessionStorage.clear();STOKEN="";location.reload();
};

/* ════ CLOCK ════ */
function startClk(){setInterval(()=>{document.getElementById("clk").textContent=new Date().toLocaleTimeString("ar-EG",{hour:"2-digit",minute:"2-digit"});},1000);}

/* ════ FIREBASE ════ */
function setupFB(){
  db.ref(".info/connected").on("value",s=>{
    fbConn=s.val()===true;
    const dot=document.getElementById("fbDot"),txt=document.getElementById("fbTxt");
    if(dot)dot.className=fbConn?"fb-dot":"fb-dot off";if(txt)txt.textContent=fbConn?"متصل":"غير متصل";
  });
  /* Orders */
  const oRef=db.ref("active_orders");
  const oCb=snap=>{
    const obj=snap.val();let active=[];const now=Date.now();
    if(obj)Object.values(obj).forEach(o=>{
      if(!o.restaurant?.trim())return;
      const st=String(o.status||"").toLowerCase().trim();
      const DONE=["completed","مكتمل","settled","delivered","done","تم التسليم","تم","finished","complete"];
      if(DONE.includes(st)||st==="deleted")return;
      active.push([o.id||"",o.restaurant||"",o.area||"غير محدد",o.details||"طلب توصيل",
        o.price||0,o.status||"pending",o.driverPhone||"",o.last_update||o.timestamp||"",
        o.photoUrl||"",o.is_sovereign||false,o.last_update||"",o.last_offered_to||"",o.ready_for_pickup||false,o.comm??null,o.payType||""]);
    });
    active.sort((a,b)=>new Date(b[O.TIME])-new Date(a[O.TIME]));
    liveOrd=active;
    const np=active.filter(o=>!o[O.DRV]||["pending_driver","system_routing","manual_pending"].includes(o[O.DRV])).length;
    pendCnt=np;
    document.getElementById("vOrd").textContent=active.length;
    document.getElementById("vPend").textContent=np;
    updCnts();renderRadar();
  };
  oRef.on("value",oCb);fbL.push({ref:oRef,cb:oCb});
  /* Driver locations */
  const lRef=db.ref("drivers_locations");
  const lCb=snap=>{
    const locs=snap.val()||{};drvLocs=locs;const now=Date.now();actDrv.clear();
    Object.keys(locs).forEach(phone=>{
      const d=locs[phone];const stale=(d.last_update?(now-new Date(d.last_update).getTime()):999999)>420000;
      if(d.status==="active"&&d.lat&&d.lng&&!stale)actDrv.add(nP(phone));
    });
    document.getElementById("vDrv").textContent=actDrv.size;
    renderRadar();
  };
  lRef.on("value",lCb);fbL.push({ref:lRef,cb:lCb});
  /* Drivers list (names) — from ledgers we only get phones, so read a light copy */
  const dvRef=db.ref("drivers_locations");
  /* Ledgers (for driver tier in assign dropdown) */
  const ledRef=db.ref("ledgers/drivers");
  const ledCb=snap=>{liveLed.drivers=snap.val()||{};};
  ledRef.on("value",ledCb);fbL.push({ref:ledRef,cb:ledCb});
  /* نجلب أسماء الكباتن عبر STAFF_DRIVERS الآمنة (أسماء وأرقام فقط، بلا كلمات مرور) */
  loadDriverNames();
}
async function loadDriverNames(){
  try{const d=await apiGet({action:"STAFF_DRIVERS",stoken:STOKEN});if(d&&d.success&&d.drivers){gDrivers=d.drivers;renderRadar();}}catch(e){}
}

/* ════ RADAR ════ */
window.doFilt=function(f,btn){
  rfilt=f;
  document.getElementById("fbar").querySelectorAll(".fp").forEach(b=>b.classList.toggle("on",(b.getAttribute("onclick")||"").includes("'"+f+"'")));
  renderRadar();
};
function updCnts(){
  const now=Date.now();const c={all:liveOrd.length,pending:0,active:0,dlyr:0,dlyd:0};
  liveOrd.forEach(o=>{
    const dp=o[O.DRV],st=o[O.STATUS],t=o[O.TIME];
    const hD=dp&&!["pending_driver","system_routing","manual_pending"].includes(dp);
    if(!hD)c.pending++;else c.active++;
    if(st==="arrived_at_res"&&t&&(now-new Date(t).getTime())/60000>10)c.dlyr++;
    if(["picked_up","في الطريق","heading"].includes(st)&&t&&(now-new Date(t).getTime())/60000>20)c.dlyd++;
  });
  const m={all:"cA",pending:"cP",active:"cAc",dlyr:"cDR",dlyd:"cDD"};
  Object.keys(m).forEach(k=>{const el=document.getElementById(m[k]);if(el)el.textContent=c[k];});
}
function renderRadar(){
  const now=Date.now();let list=[...liveOrd];
  if(rfilt==="pending")list=list.filter(o=>!o[O.DRV]||["pending_driver","system_routing","manual_pending"].includes(o[O.DRV]));
  if(rfilt==="active")list=list.filter(o=>o[O.DRV]&&!["pending_driver","system_routing","manual_pending"].includes(o[O.DRV]));
  if(rfilt==="dlyr")list=list.filter(o=>o[O.STATUS]==="arrived_at_res"&&o[O.TIME]&&(now-new Date(o[O.TIME]).getTime())/60000>10);
  if(rfilt==="dlyd")list=list.filter(o=>["picked_up","في الطريق","heading"].includes(o[O.STATUS])&&o[O.TIME]&&(now-new Date(o[O.TIME]).getTime())/60000>20);
  /* تعيين يدوي options */
  let opts='<option value="" disabled selected>تعيين يدوي</option>';
  gDrivers.forEach(d=>{const n=nP(d.phone);if(actDrv.has(n)){const cp=liveLed.drivers?.[n]?.completed_orders||0;opts+=`<option value="${esc(String(d.phone))}">${cp>=100?"💎":cp>=30?"⭐":"🟢"} ${esc(d.name)}</option>`;}});
  drvSelOpts=opts;
  const c=document.getElementById("radar");
  if(!list.length){c.innerHTML=`<div class="empty-s"><div class="es-ic">🎯</div><div class="es-t">الرادار نظيف</div></div>`;radarHtml="";return;}
  const dCnt={};list.forEach(o=>{const dp=o[O.DRV];if(dp&&!["pending_driver","system_routing","manual_pending"].includes(dp))dCnt[dp]=(dCnt[dp]||0)+1;});
  let html="";
  list.forEach(o=>{
    const[oId,rN,oA,,oP,st,dp,oT,pU,isSov,,lastOff,isReady]=o;
    const hD=dp&&!["pending_driver","system_routing","manual_pending"].includes(dp);
    const dn=hD?dN(dp):"جاري البحث...";
    const dMins=oT?Math.floor((now-new Date(oT).getTime())/60000):0;
    const tF=oT?new Date(oT).toLocaleTimeString("ar-EG",{hour:"2-digit",minute:"2-digit"}):"---";
    const isDbl=hD&&dCnt[dp]>1;
    let clsCls,sbCls,sbTxt;
    if(isSov){clsCls="os";sbCls="stb-v";sbTxt="👑 سيادي";}
    else if(!hD||st==="pending_driver"||st==="manual_pending"){
      if(hD&&st==="manual_pending"){clsCls="or";sbCls="stb-w";sbTxt="⏳ جاري الرنين";}
      else{clsCls="op";sbCls="stb-r";sbTxt="🔴 بانتظار كابتن";}
    }
    else if(st==="picked_up"||st==="في الطريق"||st==="heading"){clsCls="oa";sbCls="stb-g";sbTxt="🟢 بالطريق";}
    else if(st==="arrived_at_res"){clsCls="oar";sbCls="stb-o";sbTxt="🟠 في المطعم";}
    else{clsCls="oh";sbCls="stb-b";sbTxt="🔵 متوجه";}
    const jOId=ej(oId),jDP=ej(dp),jPU=ej(pU||"");
    const delH=dMins>3&&!hD?`<div class="dl-pill">⚠️ ${dMins} دق</div>`:"";
    const rejH=(!hD&&lastOff)?`<div class="rj-tag">✖ رفضه: ${esc(dN(lastOff))}</div>`:"";
    const dblB=isDbl?`<span class="stb" style="background:var(--violet);color:#fff;font-size:.6rem">مزدوج</span>`:"";
    const sovB=isSov?`<span class="stb stb-v" style="font-size:.6rem">👑</span>`:"";
    html+=`<div class="oc ${clsCls}">${delH}
      <div class="oc-head" style="${delH?"margin-top:24px":""}">
        <div><div class="oc-id">#${esc(oId)} ${dblB}${sovB}</div><div class="oc-tm">⏰ ${tF}</div></div>
      </div>
      <div class="oc-acts">
        <div style="display:flex;align-items:center;gap:4px;flex-wrap:wrap">
          <span class="stb ${sbCls}">${sbTxt}</span>
          ${isReady?'<span class="stb stb-g" style="font-size:.58rem">✔ جاهز</span>':''}
        </div>
        <div style="display:flex;align-items:center;gap:4px">
          ${jPU?`<button class="ob b-img" onclick="opImg('${jPU}')" title="صورة">🖼</button>`:''}
          <button class="ob b-ok" onclick="forceComplete('${jOId}',this)" title="إكمال">✓</button>
          <button class="ob b-del" onclick="delOrder('${jOId}',this)" title="إلغاء">✕</button>
        </div>
      </div>
      <div class="oc-body">
        <div class="oc-row"><div class="oc-res">🍽 ${esc(rN)}</div><div class="oc-pr">${oP||0} د.ع</div></div>
        <div class="oc-dr">
          <div class="oc-dn"><span>🛵 ${esc(dn)}</span></div>
          <div class="oc-dc">
            ${hD?`<button class="cb-sm" onclick="window.open('tel:${jDP}')">📞</button>`:''}
            ${hD&&!isSov?`<button class="ob b-del" style="width:auto;padding:0 8px;font-size:.68rem;font-weight:800;height:28px" onclick="wdOrder('${jOId}','${jDP}',this)">↩ سحب</button>`:''}
            <select class="asel" onchange="asgnDrv('${jOId}',this.value,this)">${drvSelOpts}</select>
          </div>
        </div>
        ${oA&&oA!=="غير محدد"?`<div class="oc-ar">📍 ${esc(oA)}${rejH}</div>`:""}
      </div>
    </div>`;
  });
  if(radarHtml!==html){c.innerHTML=html;radarHtml=html;}
}

/* ════ ORDER ACTIONS — كلها عبر السكربت بهوية الموظف ════ */
window.forceComplete=async function(oId,el){
  if(!confirm("تأكيد إكمال الطلب؟"))return;
  if(el){el.disabled=true;el.classList.add("loading");}
  try{
    const order=liveOrd.find(o=>String(o[O.ID])===String(oId));
    const comm=order&&order[O.COMM]!=null?order[O.COMM]:0;
    const payType=order?order[O.PAY]||"":"";
    const d=await apiGet({action:"STAFF_COMPLETE",stoken:STOKEN,orderId:oId,comm:comm,payType:payType});
    if(d.success)toast("✅ تم إكمال الطلب");else toast(d.msg||"فشل الإكمال","e");
  }catch(e){toast("خطأ في الإكمال","e");}
  finally{if(el){el.disabled=false;el.classList.remove("loading");}}
};
window.delOrder=async function(oId,el){
  if(!confirm("إلغاء الطلب؟"))return;
  if(el){el.disabled=true;el.classList.add("loading");}
  try{
    const d=await apiGet({action:"STAFF_DELETE",stoken:STOKEN,orderId:oId});
    if(d.success)toast("تم النقل للملغية");else toast(d.msg||"فشل","e");
  }catch(e){toast("خطأ","e");}
  finally{if(el){el.disabled=false;el.classList.remove("loading");}}
};
window.asgnDrv=async function(oId,dPhone,el){
  if(!dPhone)return;el.disabled=true;
  try{
    const d=await apiGet({action:"STAFF_ASSIGN",stoken:STOKEN,orderId:oId,driverPhone:dPhone});
    if(d.success)toast("تم التعيين 👑");else toast(d.msg||"فشل","e");
  }catch(e){toast("خطأ","e");}
  finally{el.disabled=false;}
};
window.wdOrder=async function(oId,dPhone,el){
  if(!confirm("سحب الطلب وإعادته للرادار؟"))return;
  if(el)el.disabled=true;
  try{
    const d=await apiGet({action:"STAFF_WITHDRAW",stoken:STOKEN,orderId:oId,driverPhone:dPhone});
    if(d.success)toast("تم السحب");else toast(d.msg||"فشل","e");
  }catch(e){toast("خطأ","e");}
  finally{if(el)el.disabled=false;}
};
</script>
