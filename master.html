<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sufyan Command Center | Al-Hut Core</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --bg-dark: #070b14; --panel-bg: rgba(15, 23, 42, 0.6); --border-glow: rgba(59, 130, 246, 0.2); }
        body { background: var(--bg-dark); color: #e2e8f0; font-family: 'Tajawal', sans-serif; min-height: 100vh; margin: 0; overflow: hidden; }
        
        /* Auth Screen - Instant Transition */
        #login-block { background: radial-gradient(circle at center, #0f172a 0%, #020617 100%); display: flex; align-items: center; justify-content: center; position: fixed; inset: 0; z-index: 9999; transition: opacity 0.2s ease; }
        .cyber-input { background: rgba(0,0,0,0.5); border: 1px solid #3b82f6; box-shadow: inset 0 0 10px rgba(59,130,246,0.1); outline: none; transition: 0.2s; }
        .cyber-input:focus { border-color: #60a5fa; box-shadow: 0 0 15px rgba(59,130,246,0.3); }
        
        /* Layout Grid */
        .glass-panel { background: var(--panel-bg); backdrop-filter: blur(20px); border: 1px solid var(--border-glow); border-radius: 1.2rem; }
        .kpi-card { background: linear-gradient(145deg, rgba(30,41,59,0.8), rgba(15,23,42,0.9)); border-left: 4px solid; }
        
        #map { height: 100%; width: 100%; border-radius: 1.2rem; background: #0b1120; z-index: 10; }
        .driver-marker { width: 12px; height: 12px; background: #3b82f6; border-radius: 50%; border: 2px solid white; box-shadow: 0 0 10px #3b82f6; }
        
        .item-row { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.03); border-radius: 0.75rem; padding: 10px; margin-bottom: 6px; transition: background 0.1s; }
        .item-row:hover { background: rgba(255,255,255,0.05); }
        
        .custom-scroll::-webkit-scrollbar { width: 3px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="p-4 md:p-6">

    <div id="login-block">
        <div class="max-w-md w-full p-10 text-center glass-panel border-t-4 border-blue-500">
            <h1 class="text-3xl font-black text-white mb-6 tracking-widest" style="font-family: 'Orbitron';">HUT<span class="text-blue-500">CORE</span></h1>
            <input type="password" id="master-pass" placeholder="SECURITY KEY" class="cyber-input w-full rounded-xl p-4 text-center text-blue-400 mb-6 font-black text-xl tracking-[0.5em]" autofocus>
            <button onclick="checkAuth()" class="w-full bg-blue-600 text-white p-4 rounded-xl font-black hover:bg-blue-500 active:scale-95 transition-all shadow-lg">AUTHORIZE</button>
        </div>
    </div>

    <div id="main-ui" class="hidden h-full flex flex-col gap-6">
        
        <header class="flex flex-wrap justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center text-white"><i class="fas fa-shield-halved"></i></div>
                <div>
                    <h1 class="text-lg font-black text-white">COMMAND CENTER</h1>
                    <p class="text-[9px] text-blue-400 font-bold uppercase tracking-[0.2em]">Sufyan Engine V10.3</p>
                </div>
            </div>

            <div class="flex gap-3 overflow-x-auto pb-2 custom-scroll">
                <div class="kpi-card border-blue-500 p-3 min-w-[140px] rounded-xl">
                    <p class="text-[9px] text-slate-400 font-bold uppercase mb-1">طيارون متصلون</p>
                    <span id="kpi-drivers" class="text-xl font-black text-white" style="font-family: 'Orbitron';">0</span>
                </div>
                <div class="kpi-card border-amber-500 p-3 min-w-[140px] rounded-xl">
                    <p class="text-[9px] text-slate-400 font-bold uppercase mb-1">عمليات جارية</p>
                    <span id="kpi-orders" class="text-xl font-black text-white" style="font-family: 'Orbitron';">0</span>
                </div>
                <div id="clock" class="bg-slate-900 px-6 py-3 rounded-xl border border-slate-800 text-white font-black text-lg self-center" style="font-family: 'Orbitron';">00:00:00</div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 flex-1 min-h-0">
            <section class="lg:col-span-8 glass-panel p-2 flex flex-col relative overflow-hidden">
                <div id="map"></div>
                <button onclick="loadMasterData()" class="absolute top-6 left-6 z-20 bg-blue-600 text-white w-10 h-10 rounded-full shadow-lg hover:rotate-180 transition-transform duration-500"><i class="fas fa-sync-alt"></i></button>
            </section>

            <section class="lg:col-span-4 flex flex-col gap-6 min-h-0">
                <div class="glass-panel p-4 flex-1 flex flex-col min-h-0 border-t-2 border-amber-500">
                    <h2 class="text-[10px] font-black text-amber-500 mb-3 uppercase tracking-widest"><i class="fas fa-bolt mr-2"></i> البث المباشر للعمليات</h2>
                    <div id="orders-list" class="overflow-y-auto flex-1 custom-scroll space-y-2"></div>
                </div>

                <div class="h-1/3 glass-panel p-4 overflow-hidden flex flex-col border-t-2 border-blue-500">
                    <h2 class="text-[10px] font-black text-blue-400 mb-3 uppercase tracking-widest"><i class="fas fa-satellite mr-2"></i> رادار الطيارين</h2>
                    <div id="drivers-list" class="overflow-y-auto flex-1 custom-scroll space-y-2"></div>
                </div>
            </section>
        </div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbzf4_VqfC5fBq0uK2Hl7S-qR-XlS6Z0T5F8H4-X-Z/exec'; 
        let map, markers = {};
        const MASTER_PASS = "112233";

        // تحديث الوقت
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB');
        }, 1000);

        // دخول فوري بدون تأخير وهمي
        function checkAuth() {
            const pass = document.getElementById('master-pass').value;
            if(pass === MASTER_PASS) { 
                document.getElementById('login-block').classList.add('hidden');
                document.getElementById('main-ui').classList.remove('hidden');
                initMap();
                loadMasterData();
                setInterval(loadMasterData, 10000); // تحديث كل 10 ثواني
            } else {
                alert("ACCESS DENIED");
                document.getElementById('master-pass').value = '';
            }
        }

        // دعم زر Enter للدخول السريع
        document.getElementById('master-pass').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkAuth();
        });

        function initMap() {
            if (map) return;
            map = L.map('map', { zoomControl: false, attributionControl: false }).setView([35.468, 44.392], 13);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        }

        async function loadMasterData() {
            try {
                const res = await fetch(`${scriptURL}?action=get_master_data&pass=${MASTER_PASS}`);
                const data = await res.json();
                if(data.status === "success") {
                    renderDashboard(data);
                }
            } catch(e) { console.error("Sync Error"); }
        }

        function renderDashboard(data) {
            // تحديث الأرقام (KPIs)
            document.getElementById('kpi-drivers').innerText = data.drivers.filter(d => d.status === 'active').length;
            document.getElementById('kpi-orders').innerText = data.orders.filter(o => o.status !== 'delivered').length;

            // رادار الطيارين
            const dContainer = document.getElementById('drivers-list');
            dContainer.innerHTML = data.drivers.map(d => `
                <div class="item-row flex justify-between items-center">
                    <div>
                        <p class="font-bold text-[11px]">${d.name}</p>
                        <p class="text-[9px] text-slate-500">${d.phone} | Bal: ${d.wallet_balance || 0}</p>
                    </div>
                    <button onclick="updateStatus('Drivers', '${d.phone}', '${d.status === 'active' ? 'banned' : 'active'}')" 
                            class="text-[9px] font-black px-2 py-1 rounded ${d.status === 'active' ? 'bg-emerald-500/10 text-emerald-500' : 'bg-red-500/10 text-red-500'}">
                        ${d.status.toUpperCase()}
                    </button>
                </div>
            `).join('');

            // البث المباشر للطلبات
            const oContainer = document.getElementById('orders-list');
            oContainer.innerHTML = data.orders.reverse().map(o => `
                <div class="item-row border-r-2 ${o.status === 'waiting' ? 'border-r-amber-500' : 'border-r-blue-500'}">
                    <div class="flex justify-between items-center">
                        <span class="text-[10px] font-black text-white">${o.restaurant}</span>
                        <span class="text-[8px] font-bold text-slate-400">${o.orderid}</span>
                    </div>
                    <div class="flex justify-between mt-1 items-end">
                        <span class="text-[9px] text-slate-400"><i class="fas fa-location-arrow mr-1"></i> ${o.area}</span>
                        <span class="text-[9px] font-bold text-blue-400">${o.status}</span>
                    </div>
                </div>
            `).join('');

            updateMarkers(data.drivers);
        }

        function updateMarkers(drivers) {
            const icon = L.divIcon({ className: 'custom-div-icon', html: "<div class='driver-marker'></div>", iconSize: [12, 12], iconAnchor: [6, 6] });
            drivers.forEach(d => {
                if(d.lat && d.lng && d.status === 'active') {
                    const pos = [parseFloat(d.lat), parseFloat(d.lng)];
                    if(markers[d.phone]) { markers[d.phone].setLatLng(pos); } 
                    else { markers[d.phone] = L.marker(pos, {icon: icon}).addTo(map).bindPopup(d.name); }
                }
            });
        }

        async function updateStatus(type, id, status) {
            await fetch(scriptURL, { method: 'POST', body: JSON.stringify({ action: 'update_status', type: type, id: id, status: status }) });
            loadMasterData();
        }
    </script>
</body>
</html>
