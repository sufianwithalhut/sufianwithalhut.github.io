<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>السيادة المطلقة | منظومة الحوت 🐋</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #020617; color: white; overflow-x: hidden; }
        .glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.05); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .master-font { font-family: 'Orbitron', sans-serif; }
        .status-badge { font-size: 8px; padding: 2px 8px; border-radius: 99px; font-weight: 900; text-transform: uppercase; }
        .btn-action { transition: all 0.2s; cursor: pointer; }
        .btn-action:active { transform: scale(0.9); }
        .pulse-emerald { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); animation: pulse 2s infinite; }
        @keyframes pulse { 70% { box-shadow: 0 0 0 15px rgba(16, 185, 129, 0); } 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); } }
    </style>
</head>
<body class="min-h-screen">

    <div id="lockScreen" class="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-slate-950">
        <div class="max-w-md w-full glass p-10 rounded-[3rem] text-center border border-emerald-500/20 shadow-2xl">
            <div class="w-20 h-20 bg-emerald-500 rounded-3xl mx-auto flex items-center justify-center mb-8 pulse-emerald text-slate-900 text-4xl font-black master-font">ح</div>
            <h1 class="text-2xl font-black mb-8 italic tracking-tighter">غرفة العمليات المركزية</h1>
            <input type="password" id="adminPass" placeholder="ادخل رمز السيادة" class="w-full bg-white/5 border border-white/10 p-5 rounded-2xl text-center mb-6 focus:border-emerald-500 outline-none text-emerald-500 text-xl font-bold tracking-widest">
            <button onclick="unlockMaster()" class="w-full bg-emerald-500 text-slate-900 py-5 rounded-2xl font-black text-lg italic uppercase shadow-lg shadow-emerald-500/20 active:scale-95 transition-all">فتح المنظومة 🔐</button>
        </div>
    </div>

    <div id="mainDashboard" class="hidden p-4 md:p-8 pb-24">
        
        <header class="max-w-7xl mx-auto mb-10 flex flex-col md:flex-row justify-between items-center bg-slate-900/80 p-6 rounded-[2.5rem] border border-emerald-500/20 shadow-2xl">
            <div class="flex items-center gap-5">
                <div class="w-14 h-14 bg-emerald-500 rounded-2xl flex items-center justify-center font-black text-slate-900 text-2xl master-font">ح</div>
                <div>
                    <h1 class="text-xl font-black text-white italic">السيادة المطلقة</h1>
                    <p class="text-[9px] text-emerald-500 font-bold uppercase tracking-[0.3em] italic">Whale HQ • Kirkuk Sector</p>
                </div>
            </div>
            <div class="flex gap-3 mt-6 md:mt-0">
                <button onclick="fetchData()" class="bg-emerald-500/10 text-emerald-400 px-5 py-3 rounded-2xl border border-emerald-500/20 font-black text-[10px] italic hover:bg-emerald-500/20 transition-all">تحديث الرادار 🔄</button>
                <button onclick="location.reload()" class="bg-red-500/10 text-red-500 px-5 py-3 rounded-2xl border border-red-500/20 font-black text-[10px] italic">خروج أمن</button>
            </div>
        </header>

        <main class="max-w-7xl mx-auto">
            <div class="flex flex-wrap gap-3 mb-10">
                <button onclick="showTab('orders')" id="btn-orders" class="tab-btn flex-1 bg-emerald-600 p-5 rounded-[2rem] font-black text-white text-sm italic shadow-xl">📡 الرادار الحي</button>
                <button onclick="showTab('approvals')" id="btn-approvals" class="tab-btn flex-1 glass p-5 rounded-[2rem] font-black text-amber-500 text-sm italic relative">
                    🔔 الانضمام <span id="reqCount" class="absolute -top-1 -right-1 bg-red-600 text-white text-[10px] w-5 h-5 rounded-full flex items-center justify-center hidden shadow-lg animate-bounce">0</span>
                </button>
                <button onclick="showTab('finance')" id="btn-finance" class="tab-btn flex-1 glass p-5 rounded-[2rem] font-black text-blue-400 text-sm italic">🏦 الإدارة المالية</button>
            </div>

            <div id="orders" class="tab-content active glass p-8 rounded-[3rem] border-t-4 border-emerald-500">
                <h2 class="text-xl font-black text-emerald-400 italic mb-8 flex items-center gap-3"><i class="fas fa-satellite-dish animate-pulse"></i> مراقبة البث المباشر</h2>
                <div id="ordersList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <p class="col-span-full text-center opacity-30 italic py-10">جاري مسح القطاع...</p>
                </div>
            </div>

            <div id="approvals" class="tab-content glass p-8 rounded-[3rem] border-t-4 border-amber-500">
                <h2 class="text-xl font-black text-amber-500 italic mb-8">طلبات معلقة تحتاج موافقتك</h2>
                <div id="pendingList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
            </div>

            <div id="finance" class="tab-content glass p-8 rounded-[3rem] border-t-4 border-blue-500">
                <h2 class="text-xl font-black text-blue-400 italic mb-8 text-center uppercase tracking-widest">إدارة شركاء الحوت</h2>
                <div id="entitiesList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
            </div>
        </main>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbzNazBaQ32kAKmHz3d4-aHWVBXlNvDif19JmiaiT9vBUBceXZh6_YeNtj_Dhu2NvGLpLw/exec';
        const MASTER_PASS = "112233"; // رمز السيادة الخاص بك

        function unlockMaster() {
            if (document.getElementById('adminPass').value === MASTER_PASS) {
                document.getElementById('lockScreen').classList.add('hidden');
                document.getElementById('mainDashboard').classList.remove('hidden');
                fetchData();
                setInterval(fetchData, 15000); // تحديث تلقائي كل 15 ثانية
            } else { alert("عذراً طه، الرمز غير صحيح!"); }
        }

        async function fetchData() {
            try {
                const response = await fetch(scriptURL + "?action=get_master_data");
                const data = await response.json();
                renderOrders(data.orders || []);
                renderPending(data.pending || []);
                renderFinance(data.restaurants || [], data.drivers || []);
            } catch (e) { console.error("Data Sync Fail"); }
        }

        function renderOrders(orders) {
            const container = document.getElementById('ordersList');
            container.innerHTML = orders.map(ord => `
                <div class="bg-white/5 p-6 rounded-[2rem] border border-white/5 hover:border-emerald-500/30 transition-all">
                    <div class="flex justify-between items-start mb-4">
                        <span class="text-[9px] font-black text-emerald-500 uppercase tracking-tighter">ID: ${ord.id}</span>
                        <span class="status-badge ${ord.status === 'delivered' ? 'bg-emerald-500' : 'bg-blue-600'} text-white italic">${ord.status}</span>
                    </div>
                    <h3 class="font-black text-white italic mb-2">${ord.restaurantName}</h3>
                    <p class="text-[10px] text-gray-400 mb-4 line-clamp-2">${ord.details}</p>
                    <div class="bg-black/40 p-3 rounded-xl mb-4 text-[10px]">
                        <p class="text-emerald-400 italic">الكابتن: <span class="text-white">${ord.driverPhone || 'بانتظار سائق'}</span></p>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="releaseOrder('${ord.id}')" class="flex-1 bg-amber-500/10 text-amber-500 py-3 rounded-xl text-[9px] font-black border border-amber-500/20 active:scale-95">سحب الطلب 🔓</button>
                        <a href="https://wa.me/${ord.driverPhone}" class="bg-emerald-500 text-slate-900 px-4 py-3 rounded-xl flex items-center"><i class="fab fa-whatsapp"></i></a>
                    </div>
                </div>
            `).join('') || '<p class="col-span-full text-center opacity-30 italic">لا توجد إشارات نشطة حالياً</p>';
        }

        function renderPending(pending) {
            const container = document.getElementById('pendingList');
            const countBadge = document.getElementById('reqCount');
            if (pending.length > 0) {
                countBadge.innerText = pending.length; countBadge.classList.remove('hidden');
                container.innerHTML = pending.map(user => `
                    <div class="bg-amber-500/5 border border-amber-500/20 p-6 rounded-[2rem] text-center">
                        <span class="text-[8px] bg-amber-500 text-black px-3 py-1 rounded-full font-black uppercase mb-3 inline-block">${user.type === 'Driver' ? 'كابتن' : 'مطعم'}</span>
                        <h4 class="font-black text-white text-lg">${user.name}</h4>
                        <p class="text-xs text-gray-500 font-mono mb-6">${user.phone}</p>
                        <div class="flex gap-2">
                            <button onclick="approveUser('${user.phone}', '${user.type}')" class="flex-1 bg-amber-500 text-black py-4 rounded-xl font-black italic shadow-lg active:scale-95 transition-all">تفعيل ✅</button>
                            <button onclick="rejectUser('${user.phone}', '${user.type}')" class="bg-red-500/20 text-red-500 px-5 py-4 rounded-xl border border-red-500/20"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                `).join('');
            } else { countBadge.classList.add('hidden'); container.innerHTML = '<p class="col-span-full text-center opacity-30 italic py-10">لا توجد طلبات معلقة</p>'; }
        }

        function renderFinance(restaurants, drivers) {
            const container = document.getElementById('entitiesList');
            const all = [...restaurants.map(r => ({...r, type: 'Restaurant'})), ...drivers.map(d => ({...d, type: 'Driver'}))];
            
            container.innerHTML = all.map(item => `
                <div class="bg-slate-900 border border-white/5 p-6 rounded-[2.5rem] relative overflow-hidden group">
                    <div class="flex justify-between items-start mb-6">
                        <div>
                            <span class="text-[8px] text-gray-500 uppercase font-black tracking-widest">${item.type === 'Driver' ? 'كابتن ميداني' : 'شريك مطعم'}</span>
                            <h3 class="text-lg font-black text-white italic">${item.name}</h3>
                        </div>
                        <p class="text-emerald-500 text-xl font-black">${item.wallet} <span class="text-[8px]">IQD</span></p>
                    </div>
                    <div class="grid grid-cols-2 gap-2 mb-4">
                        <button onclick="clearWallet('${item.phone}', '${item.type}')" class="bg-blue-600 text-white py-4 rounded-xl font-black text-[10px] italic shadow-lg active:scale-95 transition-all">تصفير الحساب 💰</button>
                        <button onclick="banUser('${item.phone}', '${item.type}')" class="bg-red-500/10 text-red-500 py-4 rounded-xl font-black text-[10px] border border-red-500/20 active:scale-95 transition-all">حظر 🚫</button>
                    </div>
                    <div class="flex justify-center gap-6 opacity-40 group-hover:opacity-100 transition-all">
                        <a href="tel:${item.phone}" class="text-white text-sm"><i class="fas fa-phone"></i></a>
                        <a href="https://wa.me/${item.phone}" class="text-emerald-500 text-sm"><i class="fab fa-whatsapp"></i></a>
                    </div>
                </div>
            `).join('');
        }

        // أوامر السيادة (أكشنات)
        async function approveUser(phone, type) {
            await fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'approve_user', phone, type, pass: MASTER_PASS }) });
            alert("تم التفعيل بنجاح!"); fetchData();
        }

        async function clearWallet(phone, type) {
            if(!confirm("هل أنت متأكد من تصفير محفظة هذا المستخدم؟")) return;
            await fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'clear_wallet', phone, type, pass: MASTER_PASS }) });
            alert("تمت تسوية الحساب."); fetchData();
        }

        async function banUser(phone, type) {
            if(!confirm("سيتم حظر المستخدم نهائياً ومنعه من الدخول. هل أنت متأكد؟")) return;
            await fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'ban_user', phone, type, pass: MASTER_PASS }) });
            alert("تم الحظر بنجاح."); fetchData();
        }

        async function releaseOrder(orderID) {
            if(!confirm("سحب الطلب سيعيده إلى الرادار ليأخذه سائق آخر. استمرار؟")) return;
            await fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'release_order', orderID, pass: MASTER_PASS }) });
            fetchData();
        }

        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            document.querySelectorAll('.tab-btn').forEach(btn => btn.className = "tab-btn flex-1 glass p-5 rounded-[2rem] font-black text-emerald-500 text-sm italic transition-all");
            
            const activeBtn = document.getElementById('btn-' + tabId);
            activeBtn.className = `tab-btn flex-1 ${tabId === 'orders' ? 'bg-emerald-600' : tabId === 'approvals' ? 'bg-amber-600' : 'bg-blue-600'} p-5 rounded-[2rem] font-black text-white text-sm italic shadow-xl transition-all`;
        }
    </script>
</body>
    </html>
