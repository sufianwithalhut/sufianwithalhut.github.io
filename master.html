<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم سفيان | منظومة الحوت</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --primary: #2563eb; --accent: #f59e0b; --bg-body: #f1f5f9; --card-bg: rgba(255, 255, 255, 0.9); --border: rgba(0, 0, 0, 0.05); }
        body { background: var(--bg-body); color: #1e293b; font-family: 'Tajawal', sans-serif; min-height: 100vh; margin: 0; overflow-x: hidden; }
        #login-block { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); display: flex; align-items: center; justify-content: center; position: fixed; inset: 0; z-index: 9999; }
        #map { height: 400px; border-radius: 2rem; border: 4px solid white; margin: 1.5rem 0; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); z-index: 10; }
        .glass-panel { background: var(--card-bg); backdrop-filter: blur(10px); border: 1px solid white; border-radius: 1.5rem; padding: 1.5rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .item-row { background: white; border-radius: 1rem; padding: 12px; margin-bottom: 10px; border: 1px solid var(--border); transition: all 0.2s ease; }
        .item-row:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05); border-color: var(--primary); }
        .btn-action { padding: 8px; border-radius: 10px; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); display: flex; align-items: center; justify-content: center; width: 34px; height: 34px; cursor: pointer; }
        .btn-action:active { transform: scale(0.9); }
        .btn-green { background: #dcfce7; color: #166534; }
        .btn-red { background: #fee2e2; color: #991b1b; }
        .btn-blue { background: #dbeafe; color: #1e40af; }
        .btn-yellow { background: #fef3c7; color: #92400e; }
        .hidden { display: none; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="login-block">
        <div class="max-w-[380px] w-full p-10 text-center glass-panel">
            <div class="w-20 h-20 bg-blue-600 rounded-3xl mx-auto mb-6 flex items-center justify-center shadow-xl">
                <i class="fas fa-shield-halved text-4xl text-white"></i>
            </div>
            <h1 class="text-2xl font-black text-slate-800 mb-2">لوحة تحكم سفيان</h1>
            <p class="text-xs text-slate-500 mb-8 font-bold italic">نظام إدارة السيادة - الحوت 🐋</p>
            <input type="password" id="master-pass" placeholder="أدخل رمز الدخول" class="w-full bg-slate-100 border-2 border-slate-200 rounded-2xl p-4 text-center text-blue-600 mb-6 outline-none focus:border-blue-600 transition-all font-bold">
            <button onclick="loadMasterData()" class="w-full bg-blue-600 hover:bg-blue-700 text-white p-4 rounded-2xl font-black transition-all shadow-lg active:scale-95">دخول النظام</button>
        </div>
    </div>

    <div id="main-ui" class="hidden p-6 max-w-7xl mx-auto">
        <header class="flex justify-between items-center mb-8 bg-white p-4 rounded-3xl shadow-sm">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center text-white text-xl font-black shadow-blue-200 shadow-lg">S</div>
                <div>
                    <h1 class="text-lg font-black text-slate-800 leading-none">لوحة تحكم سفيان</h1>
                    <span class="text-[10px] text-blue-600 font-bold uppercase tracking-widest">نظام الماستر المركزي</span>
                </div>
            </div>
            <div id="clock" class="font-bold text-slate-600 bg-slate-100 px-6 py-2 rounded-2xl text-sm border border-slate-200">00:00:00</div>
        </header>

        <div id="map"></div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 mt-8">
            <section class="glass-panel h-[650px] flex flex-col border-t-8 border-blue-600">
                <div class="mb-4">
                    <h2 class="font-black text-slate-800 text-sm mb-3 flex items-center gap-2">
                        <i class="fas fa-motorcycle text-blue-600"></i> رادار الطيارين
                    </h2>
                    <input type="text" id="searchDriver" oninput="filterDrivers()" placeholder="ابحث عن اسم أو رقم طيار..." class="w-full bg-slate-100 border border-slate-200 rounded-xl p-3 text-xs outline-none focus:border-blue-600 focus:bg-white transition-all">
                </div>
                <div id="drivers-list" class="overflow-y-auto flex-1 space-y-2"></div>
            </section>

            <section class="glass-panel h-[650px] flex flex-col border-t-8 border-emerald-500">
                <h2 class="font-black text-slate-800 text-sm mb-4 flex items-center gap-2">
                    <i class="fas fa-store text-emerald-500"></i> المحطات والعمولات
                </h2>
                <div id="rests-list" class="overflow-y-auto flex-1"></div>
            </section>

            <section class="glass-panel h-[650px] flex flex-col border-t-8 border-amber-500">
                <h2 class="font-black text-slate-800 text-sm mb-4 flex items-center gap-2">
                    <i class="fas fa-bolt text-amber-500"></i> تدفق العمليات المباشر
                </h2>
                <div id="orders-list" class="overflow-y-auto flex-1"></div>
            </section>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyIqK63Xu4b2G8BN0aNQIs42oTqvvYRlGDLfQCCSMo68YPYoysKjQ_IjoXhie0MhIaZpQ/exec";
        let map, markers = {}, currentData = null;

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('ar-EG'); }, 1000);

        function initMap() {
            if (map) return;
            map = L.map('map', { zoomControl: false }).setView([35.467, 44.392], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        }

        async function loadMasterData(isSilent = false) {
            const pass = document.getElementById('master-pass').value;
            if(!pass) return;
            try {
                const res = await fetch(`${SCRIPT_URL}?action=get_master_data&pass=${encodeURIComponent(pass)}`);
                const data = await res.json();
                if (data.status === "denied") return alert("رمز الدخول غير صحيح!");
                currentData = data;
                if (!isSilent) { 
                    document.getElementById('login-block').style.display = 'none'; 
                    document.getElementById('main-ui').classList.remove('hidden'); 
                    initMap(); 
                }
                renderUI(data);
                updateMarkers(data.drivers);
            } catch (e) { console.error("Sync Error"); }
        }

        function renderUI(data) {
            // رندر السائقين مع زر الحذف
            document.getElementById('drivers-list').innerHTML = data.drivers.map(d => `
                <div class="item-row driver-item" data-name="${d[1]}" data-phone="${d[2]}">
                    <div class="flex justify-between mb-3">
                        <span class="font-black text-slate-800 text-xs">${d[1]}</span>
                        <span class="text-[9px] font-bold text-blue-600 bg-blue-50 px-2 py-0.5 rounded-md">${d[4] === 'active' ? 'متصل حالياً' : 'محظور'}</span>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="trackOnMap(${d[5]}, ${d[6]})" class="btn-action btn-blue" title="تتبع الموضع"><i class="fas fa-location-dot"></i></button>
                        <button onclick="control('Drivers', '${d[2]}', 4, 'active')" class="btn-action btn-green" title="تنشيط"><i class="fas fa-user-check"></i></button>
                        <a href="tel:${d[2]}" class="btn-action btn-yellow" title="اتصال بالطيار"><i class="fas fa-phone-alt"></i></a>
                        <button onclick="deleteItem('Drivers', '${d[2]}')" class="btn-action btn-red" title="حذف السائق نهائياً"><i class="fas fa-trash-alt"></i></button>
                    </div>
                </div>`).join('');

            // رندر المحطات
            document.getElementById('rests-list').innerHTML = data.restaurants.map(r => {
                const totalOrders = data.orders.filter(o => o[1] === r[1]).length;
                const totalDebt = totalOrders * parseFloat(r[5] || 0);
                return `
                <div class="item-row">
                    <div class="flex justify-between items-start mb-3">
                        <div>
                            <span class="font-black text-slate-800 text-xs block">${r[1]}</span>
                            <span class="text-[10px] text-slate-400 font-bold">${r[2]}</span>
                        </div>
                        <span class="status-badge px-2 py-1 rounded-lg ${r[4] === 'active' ? 'bg-emerald-100 text-emerald-700' : 'bg-amber-100 text-amber-700'}">${r[4] === 'active' ? 'نشط' : 'بانتظار التفعيل'}</span>
                    </div>
                    <div class="bg-slate-50 p-3 rounded-xl mb-3 flex justify-between items-center border border-slate-100">
                        <div>
                            <p class="text-[10px] text-slate-500">إجمالي الطلبات: <span class="text-slate-800 font-black">${totalOrders}</span></p>
                            <p class="text-[10px] text-slate-500">ذمة العمولات: <span class="text-blue-600 font-black">${totalDebt} د.ع</span></p>
                        </div>
                        <button onclick="resetCommission('${r[2]}')" class="text-[9px] bg-white border border-red-200 text-red-600 px-3 py-1.5 rounded-lg font-black hover:bg-red-600 hover:text-white transition-all">تصفير</button>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="control('Restaurants', '${r[2]}', 4, 'active')" class="btn-action btn-green"><i class="fas fa-check"></i></button>
                        <a href="tel:${r[2]}" class="btn-action btn-blue"><i class="fas fa-phone"></i></a>
                        <button onclick="deleteItem('Restaurants', '${r[2]}')" class="btn-action btn-red"><i class="fas fa-trash-alt"></i></button>
                    </div>
                </div>`;
            }).join('');

            // رندر العمليات مع ترجمة الحالات الجديدة
            document.getElementById('orders-list').innerHTML = data.orders.map(o => {
                let statusText = "يبحث النظام عن سائق...";
                let statusClass = "text-amber-600 bg-amber-50";
                
                if (o[5] === 'assigned') {
                    const driver = data.drivers.find(d => d[2] == o[6]);
                    statusText = `وصول الطيار (${driver ? driver[1] : 'المعين'}) للمطعم`;
                    statusClass = "text-blue-600 bg-blue-50";
                } else if (o[5] === 'delivered') {
                    statusText = "تم تسليم الطلب بنجاح ✅";
                    statusClass = "text-emerald-600 bg-emerald-50";
                }

                const customerPhone = o[3].match(/07\d{9}/) || "";

                return `
                <div class="item-row">
                    <div class="flex justify-between border-b border-slate-50 pb-2 mb-2">
                        <span class="text-blue-600 font-black text-[11px]">طلب #${o[0]}</span>
                        <span class="text-[9px] font-bold px-2 py-1 rounded-md ${statusClass}">${statusText}</span>
                    </div>
                    <div class="mb-3 space-y-1">
                        <p class="text-xs font-black text-slate-800"><i class="fas fa-store text-emerald-500 ml-1"></i> ${o[1]}</p>
                        <p class="text-[10px] text-slate-500 font-medium"><i class="fas fa-user-motorcycle text-blue-500 ml-1"></i> الكابتن: ${o[6] || "لم يتم التعيين"}</p>
                    </div>
                    <div class="flex gap-2">
                        <a href="tel:${o[10]}" class="flex-1 bg-slate-100 text-slate-700 py-2 rounded-xl text-center text-[10px] font-black hover:bg-slate-200">اتصال بالمطعم</a>
                        ${customerPhone ? `<a href="tel:${customerPhone}" class="flex-1 bg-blue-50 text-blue-600 py-2 rounded-xl text-center text-[10px] font-black hover:bg-blue-600 hover:text-white">اتصال بالزبون</a>` : ''}
                        <button onclick="deleteItem('Orders', '${o[0]}')" class="btn-action btn-red"><i class="fas fa-trash"></i></button>
                    </div>
                </div>`;
            }).reverse().join('');
        }

        // نفس الدوال السابقة مع تعديل طفيف في سرعة الرد
        function filterDrivers() {
            const val = document.getElementById('searchDriver').value.toLowerCase();
            document.querySelectorAll('.driver-item').forEach(el => {
                const text = el.getAttribute('data-name').toLowerCase() + el.getAttribute('data-phone');
                el.classList.toggle('hidden', !text.includes(val));
            });
        }

        async function resetCommission(phone) {
            const pass = prompt("أدخل رمز السيادة للتأكيد:");
            if (pass === document.getElementById('master-pass').value) {
                alert("تم تصفير السجل بنجاح");
                loadMasterData(true);
            } else { alert("الرمز غير صحيح!"); }
        }

        async function deleteItem(sheet, id) {
            if(!confirm("هل أنت متأكد من الحذف النهائي؟ لا يمكن التراجع!")) return;
            const pass = document.getElementById('master-pass').value;
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'delete_item', pass: pass, targetSheet: sheet, targetID: id }) });
            setTimeout(() => loadMasterData(true), 500);
        }

        async function control(target, id, col, val) {
            const pass = document.getElementById('master-pass').value;
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'master_control', pass: pass, targetSheet: target, targetID: id, colIndex: col, newValue: val }) });
            setTimeout(() => loadMasterData(true), 500);
        }

        function updateMarkers(drivers) {
            drivers.forEach(d => {
                if(d[5] && d[5] != 0) {
                    if(markers[d[2]]) markers[d[2]].setLatLng([d[5], d[6]]);
                    else markers[d[2]] = L.marker([d[5], d[6]]).addTo(map).bindPopup(d[1]);
                }
            });
        }

        function trackOnMap(lat, lng) {
            if(!lat || lat == 0) return alert("الطيار غير متصل بالرادار.");
            map.flyTo([lat, lng], 16, { animate: true, duration: 1 });
        }

        setInterval(() => { if (!document.getElementById('main-ui').classList.contains('hidden')) loadMasterData(true); }, 10000);
    </script>
</body>
</html>
