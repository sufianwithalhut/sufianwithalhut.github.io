<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>التحكم المركزي | منظومة الحوت 🐋</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --primary: #2563eb; --danger: #ef4444; --success: #22c55e; --warning: #f59e0b; }
        body { background: #f1f5f9; color: #1e293b; font-family: 'Tajawal', sans-serif; overflow-x: hidden; }
        #map { height: 350px; border-radius: 1.5rem; border: 4px solid white; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 1.5rem; }
        .glass-panel { background: white; border: 1px solid #e2e8f0; border-radius: 1.5rem; padding: 1rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02); }
        .item-row { border-radius: 1rem; padding: 10px; margin-bottom: 8px; background: #fff; border: 1px solid #f1f5f9; transition: 0.2s; }
        .item-row:hover { border-color: var(--primary); transform: translateX(-2px); }
        .btn-round { width: 28px; height: 28px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 12px; transition: 0.2s; }
        .hidden { display: none; }
        .status-badge { font-size: 9px; padding: 2px 6px; border-radius: 5px; font-weight: 900; }
    </style>
</head>
<body class="p-4">

    <div id="login-block" class="fixed inset-0 z-[9999] flex items-center justify-center bg-slate-900">
        <div class="max-w-[350px] w-full p-8 glass-panel text-center">
            <h1 class="text-2xl font-black mb-6 italic text-blue-600 uppercase">Al-Hut Master</h1>
            <input type="password" id="master-pass" placeholder="رمز الدخول" class="w-full bg-slate-100 rounded-xl p-3 text-center mb-4 font-bold outline-none border-2 focus:border-blue-500">
            <button onclick="loadMasterData()" class="w-full bg-blue-600 text-white p-3 rounded-xl font-black">فتح النظام</button>
        </div>
    </div>

    <div id="main-ui" class="hidden">
        <header class="flex justify-between items-center mb-4 bg-white p-3 rounded-2xl shadow-sm">
            <div class="flex items-center gap-2">
                <div class="bg-blue-600 text-white p-2 rounded-lg text-lg"><i class="fas fa-whale"></i></div>
                <h1 class="font-black text-xs text-slate-800 uppercase italic">Control Center V9.0</h1>
            </div>
            <div id="clock" class="text-xs font-black bg-slate-800 text-white px-3 py-1 rounded-full italic">00:00</div>
        </header>

        <div id="map"></div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            
            <section class="glass-panel">
                <h2 class="font-black text-[10px] text-slate-400 mb-3 border-b pb-2 uppercase"><i class="fas fa-motorcycle text-blue-500"></i> الأسطول النشط</h2>
                <div id="drivers-list" class="space-y-2 h-[400px] overflow-y-auto"></div>
            </section>

            <section class="glass-panel">
                <h2 class="font-black text-[10px] text-slate-400 mb-3 border-b pb-2 uppercase"><i class="fas fa-file-invoice-dollar text-emerald-500"></i> المحاسبة الذكية</h2>
                <div id="rests-list" class="space-y-2 h-[400px] overflow-y-auto"></div>
            </section>

            <section class="glass-panel">
                <h2 class="font-black text-[10px] text-slate-400 mb-3 border-b pb-2 uppercase"><i class="fas fa-bullseye text-amber-500"></i> العمليات الجارية</h2>
                <div id="active-orders" class="space-y-2 h-[400px] overflow-y-auto"></div>
            </section>

        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyi9ksTSLnwjRyCloT_0oEzhH4a_35Ijhr2unGVB-9wdOB6eoItU-XVKV9ufOlFLkLUCA/exec";
        let map, markers = {};

        async function loadMasterData(isSilent = false) {
            const pass = document.getElementById('master-pass').value;
            try {
                const response = await fetch(`${SCRIPT_URL}?action=get_master_data&pass=${encodeURIComponent(pass)}`);
                const data = await response.json();
                if (data.status === "denied") return alert("الرمز خطأ");
                
                if (!isSilent) {
                    document.getElementById('login-block').classList.add('hidden');
                    document.getElementById('main-ui').classList.remove('hidden');
                    initMap();
                }
                renderDrivers(data.drivers);
                renderRestaurants(data.restaurants);
                renderOrders(data.orders);
            } catch (e) { console.log("Sync Error"); }
        }

        function initMap() {
            if (map) return;
            map = L.map('map', { zoomControl: false }).setView([35.467, 44.392], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{y}.png').addTo(map);
        }

        function renderDrivers(drivers) {
            document.getElementById('drivers-list').innerHTML = drivers.slice(1).map(d => `
                <div class="item-row border-r-4 ${d[4]==='active'?'border-blue-500':'border-slate-300'}">
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="font-black text-xs text-slate-800">${d[1]}</p>
                            <p class="text-[9px] text-slate-400 font-bold">${d[2]}</p>
                        </div>
                        <span class="status-badge ${d[4]==='active'?'bg-blue-100 text-blue-600':'bg-slate-100 text-slate-400'}">${d[4]}</span>
                    </div>
                    <div class="flex gap-1 mt-3">
                        <a href="tel:${d[2]}" class="btn-round bg-green-50 text-green-600"><i class="fas fa-phone"></i></a>
                        <a href="https://wa.me/964${d[2].slice(1)}" class="btn-round bg-emerald-50 text-emerald-600"><i class="fab fa-whatsapp"></i></a>
                        <button onclick="focusOnMap(${d[5]},${d[6]})" class="btn-round bg-blue-50 text-blue-600"><i class="fas fa-location-arrow"></i></button>
                        <button onclick="confirmAction('تصفير ديون السائق؟', 'master_control', 'Drivers','${d[2]}',7,0)" class="btn-round bg-red-50 text-red-600"><i class="fas fa-eraser"></i></button>
                        <button onclick="confirmAction('تغيير حالة السائق؟', 'master_control', 'Drivers','${d[2]}',4,'${d[4]==='active'?'pending':'active'}')" class="flex-1 text-[9px] font-black bg-slate-100 rounded-lg">تبديل الحالة</button>
                    </div>
                </div>`).join('');
            
            // تحديث المواقع على الخريطة
            drivers.slice(1).forEach(d => {
                if(d[5] && d[5] != 0) {
                    if(markers[d[2]]) markers[d[2]].setLatLng([d[5], d[6]]);
                    else markers[d[2]] = L.circleMarker([d[5], d[6]], {radius: 6, color: '#2563eb', fillOpacity: 0.8}).addTo(map).bindPopup(d[1]);
                }
            });
        }

        function renderRestaurants(rests) {
            document.getElementById('rests-list').innerHTML = rests.slice(1).map(r => `
                <div class="item-row border-r-4 border-emerald-500">
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="font-black text-xs text-slate-800">${r[1]}</p>
                            <div class="flex gap-2 mt-1">
                                <span class="bg-amber-100 text-amber-700 text-[8px] px-1 font-bold rounded">${r[10] || 'مطعم'}</span>
                                <span class="bg-slate-100 text-slate-600 text-[8px] px-1 font-bold rounded">طلبات: ${r[8] || 0}</span>
                            </div>
                        </div>
                        <div class="text-left">
                            <p class="text-[11px] font-black text-red-600">${parseFloat(r[9]||0).toLocaleString()} د.ع</p>
                            <p class="text-[8px] font-bold text-slate-400 uppercase tracking-tighter">ديون متراكمة</p>
                        </div>
                    </div>
                    <div class="flex gap-1 mt-3">
                        <a href="tel:${r[2]}" class="btn-round bg-green-50 text-green-600"><i class="fas fa-phone"></i></a>
                        <button onclick="confirmAction('تصفير حساب المطعم؟', 'master_control', 'Restaurants','${r[2]}',9,0)" class="btn-round bg-red-50 text-red-600"><i class="fas fa-undo"></i></button>
                        <button onclick="confirmAction('إيقاف مؤقت للمطعم؟', 'master_control', 'Restaurants','${r[2]}',4,'pending')" class="btn-round bg-amber-50 text-amber-600"><i class="fas fa-pause"></i></button>
                        <button onclick="confirmAction('حذف المطعم نهائياً؟', 'delete_item', 'Restaurants','${r[2]}')" class="btn-round bg-slate-900 text-white"><i class="fas fa-trash"></i></button>
                    </div>
                </div>`).join('');
        }

        function renderOrders(orders) {
            const active = orders.slice(1).filter(o => o[5] !== 'delivered').reverse();
            document.getElementById('active-orders').innerHTML = active.map(o => `
                <div class="item-row border-r-4 ${o[5]==='waiting'?'border-amber-500':'border-blue-500'}">
                    <div class="flex justify-between items-center">
                        <p class="font-black text-xs">${o[1]}</p>
                        <span class="text-[9px] font-bold text-blue-600">${o[5]}</span>
                    </div>
                    <p class="text-[10px] text-slate-500 mt-1">${o[9]} | كابتن: ${o[6] || 'بانتظار سائق'}</p>
                    <div class="mt-2 text-left">
                        <button onclick="confirmAction('إلغاء هذا الطلب؟', 'delete_item', 'Orders','${o[0]}')" class="text-[9px] font-black text-red-500 uppercase"><i class="fas fa-times-circle"></i> إلغاء الطلب</button>
                    </div>
                </div>`).join('');
        }

        async function confirmAction(msg, action, sheet, id, col, val) {
            if(!confirm(msg)) return;
            const pass = document.getElementById('master-pass').value;
            try {
                const response = await fetch(SCRIPT_URL, { 
                    method: 'POST', 
                    body: JSON.stringify({ action: action, pass: pass, targetSheet: sheet, targetID: id, colIndex: col, newValue: val }) 
                });
                alert("تم تنفيذ الإجراء بنجاح ✅");
                loadMasterData(true);
            } catch (e) { alert("حدث خطأ في التنفيذ"); }
        }

        function focusOnMap(lat, lng) {
            if(lat && lat != 0) map.flyTo([lat, lng], 16);
        }

        setInterval(() => loadMasterData(true), 15000);
        setInterval(() => {
            const n = new Date();
            document.getElementById('clock').innerText = n.getHours() + ":" + String(n.getMinutes()).padStart(2,'0');
        }, 1000);
    </script>
</body>
</html>
