<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Al-Hut Sovereign | السيطرة المطلقة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --gold: #ffcc00; --bg-dark: #020617; --card-glass: rgba(15, 23, 42, 0.8); --border-glass: rgba(255, 255, 255, 0.1); }
        body { background: var(--bg-dark); color: #f1f5f9; font-family: 'Tajawal', sans-serif; min-height: 100vh; margin: 0; }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        #login-block { background: #020617; display: flex; align-items: center; justify-content: center; position: fixed; inset: 0; z-index: 9999; }
        .login-btn { width: 100%; background: #ffcc00 !important; color: #000 !important; padding: 1rem; border-radius: 1rem; font-weight: 900; border: none; cursor: pointer; }
        #map { height: 400px; border-radius: 2rem; border: 1px solid var(--border-glass); margin: 1rem 0; z-index: 10; }
        .glass-panel { background: var(--card-glass); backdrop-filter: blur(16px); border: 1px solid var(--border-glass); border-radius: 1.5rem; padding: 1.25rem; margin-bottom: 1rem; }
        .item-row { background: rgba(255,255,255,0.03); border-radius: 1rem; padding: 12px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.05); }
        .btn-action { padding: 6px; border-radius: 8px; font-size: 0.75rem; transition: 0.2s; display: flex; align-items: center; justify-content: center; width: 30px; height: 30px; }
        .btn-green { background: rgba(16, 185, 129, 0.15); color: #10b981; }
        .btn-red { background: rgba(239, 68, 68, 0.15); color: #ef4444; }
        .btn-blue { background: rgba(59, 130, 246, 0.15); color: #3b82f6; }
        .btn-yellow { background: rgba(255, 204, 0, 0.15); color: #ffcc00; }
        .status-badge { font-size: 0.6rem; padding: 2px 8px; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="login-block">
        <div class="max-w-[320px] w-full p-6 text-center">
            <i class="fas fa-crown text-5xl text-yellow-500 mb-4"></i>
            <h1 class="orbitron text-xl font-black text-white mb-6 uppercase">Master Access</h1>
            <input type="password" id="master-pass" placeholder="شفرة السيادة" class="w-full bg-slate-900 border-2 border-slate-700 rounded-xl p-4 text-center text-gold mb-4 outline-none focus:border-gold">
            <button onclick="loadMasterData()" class="login-btn">دخول السيطرة</button>
        </div>
    </div>

    <div id="main-ui" class="hidden p-4">
        <header class="flex justify-between items-center mb-4">
            <h1 class="orbitron text-lg font-black text-white">WHALE <span class="text-gold">SOVEREIGN</span></h1>
            <div id="clock" class="orbitron text-xs text-gold font-bold">00:00:00</div>
        </header>

        <div id="map"></div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-4 mt-4">
            <section class="glass-panel h-[500px] flex flex-col">
                <h2 class="font-black text-gold mb-3 text-sm flex items-center gap-2"><i class="fas fa-motorcycle"></i> إدارة الطيارين</h2>
                <div id="drivers-list" class="overflow-y-auto flex-1 pr-1"></div>
            </section>

            <section class="glass-panel h-[500px] flex flex-col">
                <h2 class="font-black text-emerald-400 mb-3 text-sm flex items-center gap-2"><i class="fas fa-utensils"></i> سيطرة المحطات</h2>
                <div id="rests-list" class="overflow-y-auto flex-1 pr-1"></div>
            </section>

            <section class="glass-panel h-[500px] flex flex-col">
                <h2 class="font-black text-blue-400 mb-3 text-sm flex items-center gap-2"><i class="fas fa-bolt"></i> إدارة العمليات</h2>
                <div id="orders-list" class="overflow-y-auto flex-1 pr-1"></div>
            </section>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz-Rgnwclf9OJz2uJuBhD4PqDkY9XI0KCnSDhq1bRI558bxT5YLTTozkpZHky20oX9g/exec";
        let map, markers = {};

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB'); }, 1000);

        function initMap() {
            if (map) return;
            map = L.map('map', { zoomControl: false }).setView([35.467, 44.392], 13);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        }

        async function loadMasterData(isSilent = false) {
            const pass = document.getElementById('master-pass').value;
            try {
                const res = await fetch(`${SCRIPT_URL}?action=get_master_data&pass=${encodeURIComponent(pass)}`);
                const data = await res.json();
                if (data.status === "denied") return alert("مرفوض!");
                if (!isSilent) { document.getElementById('login-block').style.display = 'none'; document.getElementById('main-ui').classList.remove('hidden'); initMap(); }
                renderUI(data);
                updateMarkers(data.drivers, data.restaurants);
            } catch (e) { console.log("Updating..."); }
        }

        function renderUI(data) {
            // رادار الطيارين
            document.getElementById('drivers-list').innerHTML = data.drivers.map(d => `
                <div class="item-row text-[11px]">
                    <div class="flex justify-between mb-2">
                        <span class="font-bold text-white">${d[1]}</span>
                        <span class="status-badge bg-white/10 text-gold italic">${d[4]}</span>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="trackOnMap(${d[5]}, ${d[6]}, '${d[1]}')" class="btn-action btn-blue"><i class="fas fa-location-arrow"></i></button>
                        <button onclick="control('Drivers', '${d[2]}', 4, 'active')" class="btn-action btn-green"><i class="fas fa-check"></i></button>
                        <button onclick="control('Drivers', '${d[2]}', 4, 'banned')" class="btn-action btn-red"><i class="fas fa-user-slash"></i></button>
                        <a href="tel:${d[2]}" class="btn-action btn-yellow"><i class="fas fa-phone"></i></a>
                        <button onclick="deleteItem('Drivers', '${d[2]}')" class="btn-action btn-del"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            `).join('');

            // سيطرة المطاعم
            document.getElementById('rests-list').innerHTML = data.restaurants.map(r => `
                <div class="item-row text-[11px]">
                    <div class="flex justify-between mb-1">
                        <span class="font-bold text-emerald-400">${r[1]}</span>
                        <span class="text-white/50">عمولة: ${r[7] || '0'}%</span>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="trackOnMap(${r[5]}, ${r[6]}, '${r[1]}')" class="btn-action btn-blue"><i class="fas fa-map-marker-alt"></i></button>
                        <button onclick="control('Restaurants', '${r[2]}', 4, 'active')" class="btn-action btn-green"><i class="fas fa-store"></i></button>
                        <button onclick="control('Restaurants', '${r[2]}', 4, 'closed')" class="btn-action btn-red"><i class="fas fa-ban"></i></button>
                        <a href="tel:${r[2]}" class="btn-action btn-yellow"><i class="fas fa-phone"></i></a>
                        <button onclick="deleteItem('Restaurants', '${r[2]}')" class="btn-action btn-del opacity-30"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            `).join('');

            // إدارة الطلبات (العمليات)
            document.getElementById('orders-list').innerHTML = data.orders.map(o => `
                <div class="item-row text-[10px]">
                    <div class="flex justify-between font-bold mb-1">
                        <span class="text-gold">#${o[0]}</span>
                        <span class="text-blue-300 uppercase">${o[5]}</span>
                    </div>
                    <p class="opacity-80 mb-2">${o[1]} ➔ ${o[9]}</p>
                    <div class="flex flex-wrap gap-2">
                        <button onclick="control('Orders', '${o[0]}', 5, 'assigned')" class="bg-blue-600 px-2 py-1 rounded text-white">تعيين قسري</button>
                        <button onclick="control('Orders', '${o[0]}', 5, 'pending')" class="bg-white/10 px-2 py-1 rounded text-white">إعادة للنظام</button>
                        <button onclick="deleteItem('Orders', '${o[0]}')" class="text-red-500"><i class="fas fa-times-circle"></i></button>
                    </div>
                </div>
            `).reverse().join('');
        }

        function updateMarkers(drivers, rests) {
            // هنا يتم تحديث النقاط على الخريطة لكل من الطيارين والمطاعم
            drivers.forEach(d => {
                if(d[5]) {
                    if(markers[d[2]]) markers[d[2]].setLatLng([d[5], d[6]]);
                    else markers[d[2]] = L.marker([d[5], d[6]]).addTo(map).bindPopup("طيار: " + d[1]);
                }
            });
            rests.forEach(r => {
                if(r[5]) {
                    if(!markers[r[2]]) markers[r[2]] = L.circleMarker([r[5], r[6]], {color: '#10b981'}).addTo(map).bindPopup("مطعم: " + r[1]);
                }
            });
        }

        function trackOnMap(lat, lng, name) {
            if(!lat || lat == 0) return alert("الموقع غير متوفر");
            map.flyTo([lat, lng], 17);
            L.popup().setLatLng([lat, lng]).setContent(name).openOn(map);
        }

        async function deleteItem(sheet, id) {
            if(!confirm("حذف نهائي من السجلات؟")) return;
            const pass = document.getElementById('master-pass').value;
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'delete_item', pass: pass, targetSheet: sheet, targetID: id }) });
            setTimeout(() => loadMasterData(true), 1200);
        }

        async function control(target, id, col, val) {
            const pass = document.getElementById('master-pass').value;
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'master_control', pass: pass, targetSheet: target, targetID: id, colIndex: col, newValue: val }) });
            setTimeout(() => loadMasterData(true), 1200);
        }

        setInterval(() => { if (!document.getElementById('main-ui').classList.contains('hidden')) loadMasterData(true); }, 10000);
    </script>
</body>
</html>
