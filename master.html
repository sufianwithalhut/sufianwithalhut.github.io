<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Al-Hut Sovereign | التحكم المطلق</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --gold: #ffcc00; --bg-dark: #020617; --card-glass: rgba(15, 23, 42, 0.8); --border-glass: rgba(255, 255, 255, 0.1); }
        body { background: var(--bg-dark); color: #f1f5f9; font-family: 'Tajawal', sans-serif; min-height: 100vh; margin: 0; overflow-x: hidden; }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        #login-block { background: #010409; display: flex; align-items: center; justify-content: center; position: fixed; inset: 0; z-index: 9999; }
        .login-btn { width: 100%; background: #ffcc00 !important; color: #000 !important; padding: 1.2rem; border-radius: 1.2rem; font-weight: 900; border: none; cursor: pointer; transition: 0.3s; }
        .login-btn:hover { background: #e6b800 !important; transform: scale(1.02); }
        #map { height: 400px; border-radius: 2.5rem; border: 1px solid var(--border-glass); margin: 1.5rem 0; z-index: 10; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        .glass-panel { background: var(--card-glass); backdrop-filter: blur(20px); border: 1px solid var(--border-glass); border-radius: 2rem; padding: 1.5rem; margin-bottom: 1rem; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .item-row { background: rgba(255,255,255,0.03); border-radius: 1.2rem; padding: 14px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.05); transition: 0.2s; }
        .item-row:hover { border-color: rgba(255,204,0,0.3); background: rgba(255,255,255,0.05); }
        .btn-action { padding: 8px; border-radius: 12px; font-size: 0.8rem; transition: 0.3s; display: flex; align-items: center; justify-content: center; width: 38px; height: 38px; }
        .btn-green { background: rgba(16, 185, 129, 0.15); color: #10b981; }
        .btn-green:hover { background: #10b981; color: #020617; }
        .btn-red { background: rgba(239, 68, 68, 0.15); color: #ef4444; }
        .btn-red:hover { background: #ef4444; color: #fff; }
        .btn-blue { background: rgba(59, 130, 246, 0.15); color: #3b82f6; }
        .btn-blue:hover { background: #3b82f6; color: #fff; }
        .btn-yellow { background: rgba(255, 204, 0, 0.15); color: #ffcc00; }
        .btn-yellow:hover { background: #ffcc00; color: #000; }
        .status-badge { font-size: 0.65rem; padding: 4px 10px; border-radius: 12px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.05em; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="login-block">
        <div class="max-w-[350px] w-full p-8 text-center glass-panel">
            <div class="w-20 h-20 bg-yellow-500 rounded-3xl mx-auto mb-6 flex items-center justify-center shadow-[0_0_30px_rgba(255,204,0,0.3)]">
                <i class="fas fa-crown text-4xl text-slate-900"></i>
            </div>
            <h1 class="orbitron text-2xl font-black text-white mb-2 uppercase tracking-tighter">AL-HUT <span class="text-gold">MASTER</span></h1>
            <p class="text-[10px] text-gray-500 mb-8 italic font-bold">SOVEREIGN CONTROL INTERFACE 2026</p>
            <input type="password" id="master-pass" placeholder="أدخل شفرة السيادة" class="w-full bg-slate-900 border-2 border-slate-700 rounded-2xl p-4 text-center text-gold mb-6 outline-none focus:border-gold transition-all">
            <button onclick="loadMasterData()" class="login-btn orbitron italic">INITIATE COMMAND</button>
        </div>
    </div>

    <div id="main-ui" class="hidden p-4 max-w-7xl mx-auto">
        <header class="flex justify-between items-center mb-6 px-4">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-gold rounded-lg flex items-center justify-center text-slate-900 font-black">M</div>
                <h1 class="orbitron text-xl font-black text-white italic tracking-widest uppercase">SOVEREIGN <span class="text-gold">CORE</span></h1>
            </div>
            <div class="flex items-center gap-4">
                <div id="clock" class="orbitron text-sm text-gold font-bold bg-white/5 px-4 py-2 rounded-xl border border-white/10 tracking-widest">00:00:00</div>
                <button onclick="location.reload()" class="text-white/40 hover:text-white"><i class="fas fa-sync-alt"></i></button>
            </div>
        </header>

        <div id="map"></div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mt-6">
            <section class="glass-panel h-[600px] flex flex-col border-t-4 border-gold">
                <h2 class="font-black text-gold mb-4 text-sm flex justify-between items-center uppercase italic">
                    <span><i class="fas fa-motorcycle mr-2"></i> رادار الطيارين</span>
                    <span id="driver-count" class="bg-gold/10 px-2 py-1 rounded text-[10px]">0</span>
                </h2>
                <div id="drivers-list" class="overflow-y-auto flex-1 pr-1 custom-scrollbar"></div>
            </section>

            <section class="glass-panel h-[600px] flex flex-col border-t-4 border-emerald-500">
                <h2 class="font-black text-emerald-400 mb-4 text-sm flex justify-between items-center uppercase italic">
                    <span><i class="fas fa-store mr-2"></i> إدارة المحطات</span>
                    <span id="rest-count" class="bg-emerald-500/10 px-2 py-1 rounded text-[10px]">0</span>
                </h2>
                <div id="rests-list" class="overflow-y-auto flex-1 pr-1 custom-scrollbar"></div>
            </section>

            <section class="glass-panel h-[600px] flex flex-col border-t-4 border-blue-500">
                <h2 class="font-black text-blue-400 mb-4 text-sm flex justify-between items-center uppercase italic">
                    <span><i class="fas fa-bolt mr-2"></i> تدفق العمليات</span>
                    <span id="order-count" class="bg-blue-500/10 px-2 py-1 rounded text-[10px]">0</span>
                </h2>
                <div id="orders-list" class="overflow-y-auto flex-1 pr-1 custom-scrollbar"></div>
            </section>
        </div>
    </div>

    <script>
        // الرابط الجديد V6.2 لعام 2026
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw0IyVaO5zgsrFFohgarfB_AkjWyUqZ8UMg-8cYlGQfYymg-eDhE-gDJEq3etTPP635Iw/exec";
        let map, markers = {};

        // تحديث الساعة
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB'); }, 1000);

        function initMap() {
            if (map) return;
            map = L.map('map', { zoomControl: false }).setView([35.467, 44.392], 13);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; Al-Hut Radar'
            }).addTo(map);
        }

        async function loadMasterData(isSilent = false) {
            const pass = document.getElementById('master-pass').value;
            if(!pass) return;

            try {
                const res = await fetch(`${SCRIPT_URL}?action=get_master_data&pass=${encodeURIComponent(pass)}`);
                const data = await res.json();
                
                if (data.status === "denied") {
                    alert("شفرة السيادة غير صحيحة!");
                    return;
                }

                if (!isSilent) { 
                    document.getElementById('login-block').style.display = 'none'; 
                    document.getElementById('main-ui').classList.remove('hidden'); 
                    initMap(); 
                }
                
                renderUI(data);
                updateMarkers(data.drivers);
            } catch (e) { 
                console.error("Sync error:", e); 
            }
        }

        function renderUI(data) {
            // تحديث الأعداد
            document.getElementById('driver-count').innerText = data.drivers.length;
            document.getElementById('rest-count').innerText = data.restaurants.length;
            document.getElementById('order-count').innerText = data.orders.length;

            // ريندر الطيارين
            document.getElementById('drivers-list').innerHTML = data.drivers.map(d => `
                <div class="item-row text-[11px]">
                    <div class="flex justify-between mb-3 items-center">
                        <div>
                            <span class="font-black text-white text-xs block">${d[1]}</span>
                            <span class="text-white/40 text-[9px]">${d[2]}</span>
                        </div>
                        <span class="status-badge ${d[4] === 'active' ? 'text-emerald-500 bg-emerald-500/10' : 'text-red-500 bg-red-500/10'}">${d[4]}</span>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="trackOnMap(${d[5]}, ${d[6]}, '${d[1]}')" class="btn-action btn-blue" title="تتبع الموضع"><i class="fas fa-crosshairs"></i></button>
                        <button onclick="control('Drivers', '${d[2]}', 4, 'active')" class="btn-action btn-green" title="تفعيل"><i class="fas fa-check"></i></button>
                        <button onclick="control('Drivers', '${d[2]}', 4, 'banned')" class="btn-action btn-red" title="حظر"><i class="fas fa-user-slash"></i></button>
                        <a href="tel:${d[2]}" class="btn-action btn-yellow"><i class="fas fa-phone-alt"></i></a>
                    </div>
                </div>
            `).join('');

            // ريندر المطاعم
            document.getElementById('rests-list').innerHTML = data.restaurants.map(r => `
                <div class="item-row text-[11px]">
                    <div class="flex justify-between mb-3 items-center">
                        <div>
                            <span class="font-black text-emerald-400 text-xs block">${r[1]}</span>
                            <span class="text-white/40 text-[9px] italic">العمولة: ${r[5]} IQD</span>
                        </div>
                        <span class="status-badge ${r[4] === 'active' ? 'text-emerald-500 bg-emerald-500/10' : 'text-amber-500 bg-amber-500/10'}">${r[4]}</span>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="control('Restaurants', '${r[2]}', 4, 'active')" class="btn-action btn-green" title="تفعيل"><i class="fas fa-check-circle"></i></button>
                        <button onclick="control('Restaurants', '${r[2]}', 4, 'pending')" class="btn-action btn-yellow" title="تعليق"><i class="fas fa-pause-circle"></i></button>
                        <button onclick="window.open('${r[3]}', '_blank')" class="btn-action btn-blue" title="عرض الموقع"><i class="fas fa-map-marked-alt"></i></button>
                        <a href="tel:${r[2]}" class="btn-action btn-yellow"><i class="fas fa-phone"></i></a>
                        <button onclick="deleteItem('Restaurants', '${r[2]}')" class="btn-action btn-red" title="حذف نهائي"><i class="fas fa-trash-alt"></i></button>
                    </div>
                </div>
            `).join('');

            // ريندر العمليات
            document.getElementById('orders-list').innerHTML = data.orders.map(o => {
                const statusColor = o[5] === 'pending' ? 'text-amber-500' : 'text-emerald-400';
                return `
                <div class="item-row text-[10px]">
                    <div class="flex justify-between font-black mb-2 border-b border-white/5 pb-2">
                        <span class="text-gold uppercase tracking-tighter">ORDER #${o[0]}</span>
                        <span class="${statusColor} italic uppercase font-bold">${o[5]}</span>
                    </div>
                    <div class="mb-3">
                        <p class="text-white/90 font-bold mb-1"><i class="fas fa-store text-[8px] mr-1 text-emerald-500"></i> ${o[1]}</p>
                        <p class="text-white/60"><i class="fas fa-map-pin text-[8px] mr-1 text-red-500"></i> ${o[9]}</p>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="control('Orders', '${o[0]}', 5, 'pending')" class="bg-white/5 hover:bg-white/10 text-white/70 px-3 py-2 rounded-xl text-[9px] font-black border border-white/10 transition-all">إعادة كجديد</button>
                        <button onclick="deleteItem('Orders', '${o[0]}')" class="bg-red-500/10 text-red-500 px-3 py-2 rounded-xl text-[9px] hover:bg-red-500 hover:text-white transition-all"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
                `;
            }).reverse().join('');
        }

        function updateMarkers(drivers) {
            drivers.forEach(d => {
                const lat = parseFloat(d[5]);
                const lng = parseFloat(d[6]);
                if(lat && lng && lat !== 0) {
                    const icon = L.divIcon({
                        className: 'custom-div-icon',
                        html: `<div style='background-color: ${d[4] === 'active' ? '#fbbf24' : '#ef4444'}; width: 12px; height: 12px; border: 2px solid white; border-radius: 50%; box-shadow: 0 0 10px rgba(0,0,0,0.5);'></div>`,
                        iconSize: [12, 12]
                    });

                    if(markers[d[2]]) {
                        markers[d[2]].setLatLng([lat, lng]);
                    } else {
                        markers[d[2]] = L.marker([lat, lng], {icon: icon}).addTo(map).bindPopup(`<b class="orbitron">${d[1]}</b><br>${d[4]}`);
                    }
                }
            });
        }

        function trackOnMap(lat, lng, name) {
            if(!lat || lat == 0) return alert("الطيار لم يرسل إحداثياته بعد.");
            map.flyTo([lat, lng], 16, { animate: true, duration: 1.5 });
            markers[Object.keys(markers).find(key => markers[key].getLatLng().lat == lat)]?.openPopup();
        }

        async function deleteItem(sheet, id) {
            if(!confirm("سيتم مسح البيانات نهائياً من السجلات، هل أنت متأكد؟")) return;
            const pass = document.getElementById('master-pass').value;
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'delete_item', pass: pass, targetSheet: sheet, targetID: id }) });
            setTimeout(() => loadMasterData(true), 1000);
        }

        async function control(target, id, col, val) {
            const pass = document.getElementById('master-pass').value;
            // تنفيذ التحكم فورياً في الواجهة لسرعة التجاوب
            await fetch(SCRIPT_URL, { 
                method: 'POST', 
                mode: 'no-cors', 
                body: JSON.stringify({ 
                    action: 'master_control', 
                    pass: pass, 
                    targetSheet: target, 
                    targetID: id, 
                    colIndex: col, 
                    newValue: val 
                }) 
            });
            // تحديث البيانات صامتاً بعد ثانية واحدة للتأكد من المزامنة
            setTimeout(() => loadMasterData(true), 1000);
        }

        // التحديث التلقائي الصامت كل 10 ثوانٍ
        setInterval(() => { 
            if (!document.getElementById('main-ui').classList.contains('hidden')) {
                loadMasterData(true);
            }
        }, 10000);
    </script>
</body>
</html>
