<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Al-Hut Sovereign | Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Tajawal:wght@300;500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --gold: #ffcc00; --emerald: #10b981; --blue: #3b82f6; --bg-dark: #010409; --card-bg: rgba(13, 17, 23, 0.7); }
        
        body { background-color: var(--bg-dark); color: #e6edf3; font-family: 'Tajawal', sans-serif; overflow-x: hidden; scroll-behavior: smooth; }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        
        /* Glassmorphism Ultra */
        .glass-card { background: var(--card-bg); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 1.5rem; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .glass-card:hover { border-color: rgba(255, 204, 0, 0.2); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4); }

        /* Map Styling */
        #map { height: 450px; border-radius: 2rem; border: 1px solid rgba(255,255,255,0.05); filter: grayscale(0.2) contrast(1.1); box-shadow: inset 0 0 20px rgba(0,0,0,0.5); }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 204, 0, 0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--gold); }

        /* Animations */
        @keyframes pulse-gold { 0% { box-shadow: 0 0 0 0 rgba(255, 204, 0, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(255, 204, 0, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 204, 0, 0); } }
        .active-dot { width: 8px; height: 8px; background: var(--gold); border-radius: 50%; animation: pulse-gold 2s infinite; }
        
        .btn-action { transition: all 0.2s ease; position: relative; overflow: hidden; }
        .btn-action:active { transform: scale(0.9); }
        
        #login-block { background: radial-gradient(circle at center, #0d1117 0%, #010409 100%); z-index: 10000; }
        
        .status-chip { font-size: 0.65rem; padding: 2px 8px; border-radius: 20px; font-weight: 700; text-transform: uppercase; }
    </style>
</head>
<body class="antialiased">

    <div id="login-block" class="fixed inset-0 flex items-center justify-center p-6">
        <div class="max-w-md w-full glass-card p-10 text-center border-t-2 border-gold shadow-2xl">
            <div class="mb-6 relative inline-block">
                <div class="w-20 h-20 bg-gold rounded-2xl flex items-center justify-center rotate-3 shadow-lg">
                    <i class="fas fa-shield-halved text-3xl text-black -rotate-3"></i>
                </div>
            </div>
            <h1 class="orbitron text-3xl font-black tracking-tighter mb-2">AL-HUT <span class="text-gold">OS</span></h1>
            <p class="text-xs text-slate-500 font-medium mb-8 italic">SOVEREIGN CORE V6.2 - KIRKUK DIVISION</p>
            <input type="password" id="master-pass" placeholder="SECURITY CODE" class="w-full bg-black/40 border border-white/10 rounded-xl p-4 text-center text-gold mb-6 focus:ring-2 focus:ring-gold/20 outline-none transition-all orbitron">
            <button onclick="loadMasterData()" class="w-full bg-gold hover:bg-yellow-400 text-black font-black py-4 rounded-xl orbitron transition-all active:scale-95 shadow-lg shadow-yellow-500/10">ACCESS SYSTEM</button>
        </div>
    </div>

    <div id="main-ui" class="hidden p-4 lg:p-8 max-w-[1600px] mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center gap-4 mb-8">
            <div class="flex items-center gap-4">
                <div class="p-3 bg-white/5 rounded-2xl border border-white/10">
                    <img src="https://cdn-icons-png.flaticon.com/512/1042/1042339.png" class="w-8 h-8 filter grayscale invert" alt="logo">
                </div>
                <div>
                    <h1 class="orbitron text-xl font-black leading-none">COMMAND <span class="text-gold">CENTER</span></h1>
                    <p class="text-[10px] text-slate-500 font-bold mt-1 uppercase tracking-[0.2em]">Fleet Real-time Monitoring</p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <div id="clock" class="orbitron text-xs font-bold bg-white/5 px-5 py-2.5 rounded-full border border-white/10 shadow-inner">00:00:00</div>
                <button onclick="location.reload()" class="p-2.5 bg-white/5 rounded-full hover:bg-white/10 transition-colors border border-white/05"><i class="fas fa-rotate text-xs"></i></button>
            </div>
        </header>

        <div id="map" class="mb-8"></div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="flex flex-col gap-4">
                <div class="flex items-center justify-between px-2">
                    <h2 class="font-black text-xs uppercase tracking-widest text-slate-400"><i class="fas fa-satellite mr-2 text-gold"></i> Live Pilots</h2>
                    <span id="driver-count" class="bg-gold/10 text-gold text-[10px] px-2 py-0.5 rounded-full font-bold">0</span>
                </div>
                <div class="glass-card p-4 overflow-hidden flex flex-col h-[550px]">
                    <input type="text" id="searchDriver" oninput="filterDrivers()" placeholder="Search pilot..." class="w-full bg-black/30 border border-white/05 rounded-xl p-3 text-xs mb-4 outline-none focus:border-gold/50">
                    <div id="drivers-list" class="flex-1 overflow-y-auto space-y-3"></div>
                </div>
            </div>

            <div class="flex flex-col gap-4">
                <div class="flex items-center justify-between px-2">
                    <h2 class="font-black text-xs uppercase tracking-widest text-slate-400"><i class="fas fa-house-signal mr-2 text-emerald-500"></i> Hub Nodes</h2>
                    <span id="rest-count" class="bg-emerald-500/10 text-emerald-500 text-[10px] px-2 py-0.5 rounded-full font-bold">0</span>
                </div>
                <div id="rests-list" class="glass-card p-4 h-[550px] overflow-y-auto space-y-3 border-t-2 border-emerald-500/30"></div>
            </div>

            <div class="flex flex-col gap-4">
                <div class="flex items-center justify-between px-2">
                    <h2 class="font-black text-xs uppercase tracking-widest text-slate-400"><i class="fas fa-bolt mr-2 text-blue-500"></i> Active Ops</h2>
                    <span id="order-count" class="bg-blue-500/10 text-blue-500 text-[10px] px-2 py-0.5 rounded-full font-bold">0</span>
                </div>
                <div id="orders-list" class="glass-card p-4 h-[550px] overflow-y-auto space-y-3 border-t-2 border-blue-500/30"></div>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyIqK63Xu4b2G8BN0aNQIs42oTqvvYRlGDLfQCCSMo68YPYoysKjQ_IjoXhie0MhIaZpQ/exec";
        let map, markers = {}, currentData = null;

        // Clock sync
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB'); }, 1000);

        function initMap() {
            if (map) return;
            map = L.map('map', { zoomControl: false, attributionControl: false }).setView([35.467, 44.392], 13);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        }

        async function loadMasterData(isSilent = false) {
            const pass = document.getElementById('master-pass').value;
            if(!pass) return;
            
            try {
                const res = await fetch(`${SCRIPT_URL}?action=get_master_data&pass=${encodeURIComponent(pass)}`);
                const data = await res.json();
                if (data.status === "denied") return alert("ACCESS DENIED: Unauthorized Signature.");

                currentData = data;
                if (!isSilent) {
                    document.getElementById('login-block').style.opacity = '0';
                    setTimeout(() => {
                        document.getElementById('login-block').style.display = 'none';
                        document.getElementById('main-ui').classList.remove('hidden');
                        initMap();
                    }, 400);
                }
                renderUI(data);
                updateMarkers(data.drivers);
            } catch (e) { console.error("Neural Link Failure."); }
        }

        function renderUI(data) {
            document.getElementById('driver-count').innerText = data.drivers.length;
            document.getElementById('rest-count').innerText = data.restaurants.length;
            document.getElementById('order-count').innerText = data.orders.length;

            // Pilots Render
            document.getElementById('drivers-list').innerHTML = data.drivers.map(d => `
                <div class="bg-white/05 rounded-2xl p-4 border border-white/05 driver-item group hover:bg-white/10 transition-all" data-name="${d[1]}" data-phone="${d[2]}">
                    <div class="flex justify-between items-start mb-3">
                        <div class="flex items-center gap-3">
                            <div class="w-2 h-2 rounded-full ${d[4] === 'active' ? 'bg-emerald-500 shadow-[0_0_8px_#10b981]' : 'bg-red-500'}"></div>
                            <div>
                                <h3 class="text-xs font-bold text-white">${d[1]}</h3>
                                <p class="text-[9px] text-slate-500 orbitron">${d[2]}</p>
                            </div>
                        </div>
                        <button onclick="trackOnMap(${d[5]}, ${d[6]})" class="text-slate-500 hover:text-gold transition-colors"><i class="fas fa-location-crosshairs text-xs"></i></button>
                    </div>
                    <div class="flex gap-2 opacity-60 group-hover:opacity-100 transition-opacity">
                        <button onclick="control('Drivers', '${d[2]}', 4, 'active')" class="btn-action flex-1 bg-emerald-500/10 text-emerald-500 py-2 rounded-lg text-[10px] font-bold"><i class="fas fa-check"></i></button>
                        <button onclick="control('Drivers', '${d[2]}', 4, 'banned')" class="btn-action flex-1 bg-red-500/10 text-red-500 py-2 rounded-lg text-[10px] font-bold"><i class="fas fa-ban"></i></button>
                        <a href="tel:${d[2]}" class="btn-action flex-1 bg-gold/10 text-gold py-2 rounded-lg text-[10px] text-center"><i class="fas fa-phone"></i></a>
                    </div>
                </div>
            `).join('');

            // Hub Nodes Render
            document.getElementById('rests-list').innerHTML = data.restaurants.map(r => {
                const totalOrders = data.orders.filter(o => o[1] === r[1]).length;
                const totalDebt = (totalOrders * parseFloat(r[5] || 0)).toLocaleString();
                return `
                <div class="bg-white/05 rounded-2xl p-4 border border-white/05">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-xs font-bold text-emerald-400">${r[1]}</h3>
                        <span class="text-[8px] orbitron font-bold text-slate-600">${r[4]}</span>
                    </div>
                    <div class="grid grid-cols-2 gap-2 mb-4">
                        <div class="bg-black/30 p-2 rounded-xl text-center">
                            <p class="text-[8px] text-slate-500 uppercase font-black mb-1">Orders</p>
                            <p class="text-xs font-black text-white orbitron">${totalOrders}</p>
                        </div>
                        <div class="bg-black/30 p-2 rounded-xl text-center">
                            <p class="text-[8px] text-slate-500 uppercase font-black mb-1">Balance</p>
                            <p class="text-xs font-black text-gold orbitron">${totalDebt}</p>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="resetCommission('${r[2]}')" class="flex-1 bg-white/05 hover:bg-red-500/20 text-[9px] font-black py-2 rounded-lg transition-colors border border-white/05">RESET</button>
                        <a href="tel:${r[2]}" class="p-2 bg-gold/10 text-gold rounded-lg"><i class="fas fa-phone-alt text-xs"></i></a>
                        <button onclick="deleteItem('Restaurants', '${r[2]}')" class="p-2 bg-red-500/10 text-red-500 rounded-lg"><i class="fas fa-trash-alt text-xs"></i></button>
                    </div>
                </div>`;
            }).join('');

            // Active Operations Render
            document.getElementById('orders-list').innerHTML = data.orders.map(o => {
                const customerPhone = o[3].match(/07\d{9}/) || "";
                return `
                <div class="bg-white/05 rounded-2xl p-4 border border-white/05 border-l-2 ${o[5] === 'pending' ? 'border-l-gold' : 'border-l-emerald-500'}">
                    <div class="flex justify-between mb-3">
                        <span class="orbitron text-[9px] font-black text-white/40">ID: ${o[0]}</span>
                        <span class="text-[8px] font-black uppercase text-gold">${o[5]}</span>
                    </div>
                    <p class="text-xs font-bold mb-1">${o[1]}</p>
                    <p class="text-[10px] text-slate-500 mb-4 line-clamp-1">${o[3]}</p>
                    <div class="flex gap-2">
                        <a href="tel:${o[10]}" class="flex-1 bg-white/05 text-[9px] font-black py-2 rounded-lg text-center border border-white/05 hover:border-gold/30">CALL HUB</a>
                        ${customerPhone ? `<a href="tel:${customerPhone}" class="flex-1 bg-blue-500/10 text-blue-400 text-[9px] font-black py-2 rounded-lg text-center">CLIENT</a>` : ''}
                        <button onclick="deleteItem('Orders', '${o[0]}')" class="p-2 text-red-500/40 hover:text-red-500"><i class="fas fa-trash-can text-xs"></i></button>
                    </div>
                </div>`;
            }).reverse().join('');
        }

        function updateMarkers(drivers) {
            drivers.forEach(d => {
                const lat = parseFloat(d[5]), lng = parseFloat(d[6]);
                if(lat && lat !== 0) {
                    const color = d[4] === 'active' ? '#ffcc00' : '#ff4444';
                    const icon = L.divIcon({
                        className: 'custom-pin',
                        html: `<div style="background:${color}; width:12px; height:12px; border:2px solid #fff; border-radius:50%; box-shadow: 0 0 10px ${color}"></div>`,
                        iconSize: [12, 12]
                    });
                    if(markers[d[2]]) markers[d[2]].setLatLng([lat, lng]);
                    else markers[d[2]] = L.marker([lat, lng], {icon}).addTo(map);
                }
            });
        }

        function trackOnMap(lat, lng) {
            if(!lat || lat == 0) return;
            map.flyTo([lat, lng], 16, { animate: true, duration: 1 });
        }

        function filterDrivers() {
            const val = document.getElementById('searchDriver').value.toLowerCase();
            document.querySelectorAll('.driver-item').forEach(el => {
                const text = el.getAttribute('data-name').toLowerCase() + el.getAttribute('data-phone');
                el.classList.toggle('hidden', !text.includes(val));
            });
        }

        async function resetCommission(phone) {
            const pass = prompt("CONFIRMATION REQUIRED: Enter Master Pass to reset balance:");
            if (pass === document.getElementById('master-pass').value) {
                alert("Processing Balance Reset...");
                loadMasterData(true);
            }
        }

        async function deleteItem(sheet, id) {
            if(!confirm("TERMINATE RECORD: Are you sure?")) return;
            const pass = document.getElementById('master-pass').value;
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'delete_item', pass, targetSheet: sheet, targetID: id }) });
            setTimeout(() => loadMasterData(true), 1200);
        }

        async function control(target, id, col, val) {
            const pass = document.getElementById('master-pass').value;
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'master_control', pass, targetSheet: target, targetID: id, colIndex: col, newValue: val }) });
            setTimeout(() => loadMasterData(true), 1200);
        }

        // Live Link Cycle
        setInterval(() => { 
            if (!document.getElementById('main-ui').classList.contains('hidden')) loadMasterData(true); 
        }, 10000);
    </script>
</body>
</html>
