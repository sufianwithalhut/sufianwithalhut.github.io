<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Al-Hut V6.1 | لوحة السيادة المطلقة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --main-gold: #d4af37; --dark-bg: #0a0a0a; --card-bg: #1a1a1a; --danger: #b71c1c; --success: #1b5e20; --whale-blue: #0288d1; }
        body { background: var(--dark-bg); color: white; font-family: 'Tajawal', sans-serif; margin: 0; padding: 10px; }
        .header { text-align: center; border-bottom: 2px solid var(--main-gold); padding-bottom: 10px; margin-bottom: 20px; background: rgba(0,0,0,0.5); border-radius: 0 0 20px 20px; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 15px; }
        .section-card { background: var(--card-bg); border-radius: 15px; padding: 15px; border: 1px solid #333; height: 500px; overflow-y: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .section-card h2 { color: var(--main-gold); border-bottom: 1px solid #444; padding-bottom: 10px; font-size: 1.1rem; position: sticky; top: 0; background: var(--card-bg); z-index: 10; display: flex; justify-content: space-between; align-items: center; }
        
        #map { height: 400px; border-radius: 20px; margin-bottom: 20px; border: 2px solid var(--main-gold); box-shadow: 0 0 20px rgba(212, 175, 55, 0.2); }

        .filter-box { background: #111; padding: 20px; border-radius: 20px; margin-bottom: 20px; border: 1px solid var(--main-gold); }
        .filter-inputs { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 15px; justify-content: center; }
        .filter-box input { padding: 10px; border-radius: 8px; background: #000; color: gold; border: 1px solid #444; outline: none; }

        .item-row { background: #222; margin-bottom: 10px; padding: 12px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border-right: 4px solid transparent; }
        .item-row:hover { background: #2a2a2a; transform: translateX(-5px); transition: 0.3s; }
        
        .status-badge { padding: 3px 8px; border-radius: 6px; font-size: 0.65rem; font-weight: bold; }
        .active { background: var(--success); color: white; } 
        .pending { background: #f57f17; color: white; } 
        .banned { background: var(--danger); color: white; }
        
        .btn { cursor: pointer; border: none; padding: 8px 12px; border-radius: 8px; color: white; font-size: 0.8rem; display: inline-flex; align-items: center; gap: 5px; }
        .btn-ban { background: var(--danger); } 
        .btn-approve { background: var(--success); } 
        .btn-clear { background: var(--whale-blue); }
        .btn-force { background: #6a1b9a; }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; }
        .stat-item { background: #000; padding: 15px; border-radius: 15px; text-align: center; border: 1px solid #333; }
        .stat-item span { display: block; color: var(--main-gold); font-size: 1.3rem; font-weight: 900; margin-top: 5px; }
        
        .pending-alert { background: rgba(212, 175, 55, 0.1); border: 1px solid var(--main-gold); color: var(--main-gold); padding: 12px; border-radius: 12px; margin-bottom: 15px; text-align: center; font-weight: bold; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

        small { display: block; opacity: 0.6; font-size: 0.75rem; margin-top: 3px; }
    </style>
</head>
<body>

    <div class="header">
        <h1 style="font-size: 1.5rem; letter-spacing: 2px;">🐋 منظومة الحوت <span style="color:var(--main-gold)">V6.1</span></h1>
        <p style="font-size: 0.8rem; opacity: 0.8;">السيطرة المركزية - كركوك | الرصد الميداني النشط</p>
    </div>

    <div id="login-block" style="text-align: center; padding: 50px 0;">
        <i class="fas fa-shield-alt" style="font-size: 4rem; color: var(--main-gold); margin-bottom: 20px;"></i><br>
        <input type="password" id="master-pass" placeholder="رمز السيادة..." style="padding: 15px; border-radius: 12px; border: 2px solid var(--main-gold); background: #000; color: gold; width: 300px; font-size: 1.2rem; text-align: center; outline: none;">
        <br><br>
        <button class="btn btn-approve" onclick="loadMasterData()" style="padding: 15px 50px; font-size: 1.1rem; font-weight: 900;">دخول النظام</button>
    </div>

    <div id="main-ui" style="display: none;">
        
        <div id="pending-section" class="pending-alert" style="display: none;">
            <i class="fas fa-exclamation-triangle"></i> تنبيه: يوجد <span id="pending-count">0</span> طلبات انضمام جديدة تتطلب قرارك!
        </div>

        <div id="map"></div>

        <div class="filter-box">
            <div class="filter-inputs">
                <i class="fas fa-file-invoice-dollar" style="color: var(--main-gold); font-size: 1.5rem; margin-left: 10px;"></i>
                <input type="date" id="date-from">
                <span style="color:var(--main-gold)">إلى</span>
                <input type="date" id="date-to">
                <button class="btn btn-approve" onclick="applyFinancialFilter()">جرد الحسابات</button>
            </div>
            
            <div class="stats-grid">
                <div class="stat-item">إجمالي الطلبات<span id="stat-count">0</span></div>
                <div class="stat-item">أرباح المنظومة<span id="stat-profit">0 د.ع</span></div>
                <div class="stat-item">مطاعم نشطة<span id="stat-rests">0</span></div>
                <div class="stat-item">سواق في الميدان<span id="stat-drivers">0</span></div>
            </div>
        </div>

        <div class="grid-container">
            <div class="section-card">
                <h2><span><i class="fas fa-biking"></i> الرادار الحي (السواق)</span></h2>
                <div id="drivers-list"></div>
            </div>

            <div class="section-card">
                <h2><span><i class="fas fa-store"></i> المطاعم (الشركاء)</span></h2>
                <div id="rests-list"></div>
            </div>

            <div class="section-card">
                <h2><span><i class="fas fa-box-open"></i> حركة الطلبات (مباشر)</span></h2>
                <div id="orders-list"></div>
            </div>
        </div>
    </div>

    <script>
        // الرابط المحدث V6.1
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbypXnyeduY_p9Ax-BWJC-u_dYMU7q-zZ8MSv_7o3BWNtBZdYxNo3h7CX0OVR_GGbZr5ew/exec";
        let rawData = null;
        let map, markers = [];

        function initMap() {
            if (map) return;
            map = L.map('map').setView([35.467, 44.392], 13); 
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        }

        async function loadMasterData() {
            const pass = document.getElementById('master-pass').value;
            if(!pass) return;
            
            try {
                const res = await fetch(`${SCRIPT_URL}?action=get_master_data&pass=${encodeURIComponent(pass)}`);
                rawData = await res.json();

                if (rawData.status === "denied") return alert("فشل التوثيق: رمز السيادة غير صحيح!");
                
                document.getElementById('login-block').style.display = 'none';
                document.getElementById('main-ui').style.display = 'block';
                
                initMap();
                renderUI(rawData);
                updateMapMarkers(rawData.drivers);
                
                document.getElementById('stat-rests').innerText = rawData.restaurants.filter(r => r[4] === 'active').length;
                document.getElementById('stat-drivers').innerText = rawData.drivers.filter(d => d[4] === 'active').length;

            } catch (e) { alert("حدثت مشكلة في الاتصال بالقاعدة!"); }
        }

        function renderUI(data) {
            // 1. التنبيهات المعلقة
            const pendingCount = data.pending ? data.pending.length : 0;
            if (pendingCount > 0) {
                document.getElementById('pending-section').style.display = 'block';
                document.getElementById('pending-count').innerText = pendingCount;
            } else {
                document.getElementById('pending-section').style.display = 'none';
            }

            // 2. قائمة السواق
            document.getElementById('drivers-list').innerHTML = data.drivers.map(d => `
                <div class="item-row" style="border-right-color: ${d[4] === 'active' ? '#1b5e20' : '#b71c1c'}">
                    <div>
                        <b style="color:${d[4] === 'active' ? '#10b981' : '#ff4444'}">${d[1]}</b>
                        <small><i class="fas fa-phone"></i> ${d[2]}</small>
                        <small><i class="fas fa-motorcycle"></i> الحالة: ${d[4]}</small>
                    </div>
                    <div style="text-align:left">
                        <div style="margin-top:5px; display:flex; gap:3px">
                            <button class="btn btn-approve" onclick="control('Drivers', '${d[2]}', 4, 'active')"><i class="fas fa-check"></i></button>
                            <button class="btn btn-ban" onclick="control('Drivers', '${d[2]}', 4, 'banned')"><i class="fas fa-user-slash"></i></button>
                        </div>
                    </div>
                </div>
            `).join('');

            // 3. قائمة المطاعم
            document.getElementById('rests-list').innerHTML = data.restaurants.map(r => `
                <div class="item-row">
                    <div>
                        <b>${r[1]}</b>
                        <small><i class="fas fa-map-pin"></i> ${r[3]}</small>
                        <small><i class="fas fa-coins"></i> عمولة: ${r[5]} د.ع</small>
                    </div>
                    <div style="text-align:left">
                        <div style="margin-top:5px; display:flex; gap:3px">
                            <button class="btn btn-approve" onclick="control('Restaurants', '${r[2]}', 4, 'active')"><i class="fas fa-unlock"></i></button>
                            <button class="btn btn-ban" onclick="control('Restaurants', '${r[2]}', 4, 'banned')"><i class="fas fa-lock"></i></button>
                        </div>
                    </div>
                </div>
            `).join('');

            // 4. مراقبة الطلبات
            document.getElementById('orders-list').innerHTML = data.orders.map(o => `
                <div class="item-row">
                    <span>
                        <b style="color:var(--main-gold)">ID: ${o[0].toString().slice(-4)}</b>
                        <small>من: ${o[1]}</small>
                        <small>المنطقة: ${o[3]}</small>
                        <small style="color:#10b981">السائق الحالي: ${o[7] || 'في الانتظار'}</small>
                    </span>
                    <div style="display:flex; flex-direction:column; gap:5px">
                        <button class="btn btn-clear" onclick="releaseOrder('${o[0]}')"><i class="fas fa-undo"></i> سحب</button>
                        <button class="btn btn-force" onclick="forceAssign('${o[0]}')"><i class="fas fa-crosshairs"></i> تكليف</button>
                    </div>
                </div>
            `).sort().reverse().join('');
        }

        function updateMapMarkers(drivers) {
            markers.forEach(m => map.removeLayer(m));
            markers = [];
            drivers.forEach(d => {
                // دالة رسم المواقع (تأكد أن السائق نشط ولديه إحداثيات)
                if(d[5] && d[6] && d[5] != "0" && d[4] === 'active') {
                    let m = L.marker([d[5], d[6]]).addTo(map)
                        .bindPopup(`<b>${d[1]}</b><br>هاتف: ${d[2]}`);
                    markers.push(m);
                }
            });
        }

        async function control(target, id, col, val) {
            if(!confirm(`تأكيد تغيير حالة ${id}؟`)) return;
            const pass = document.getElementById('master-pass').value;
            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ action: 'master_control', pass: pass, targetSheet: target, targetID: id, colIndex: col, newValue: val })
                });
                setTimeout(loadMasterData, 1000); // مهلة للتزامن
            } catch(e) { alert("فشل التحديث."); }
        }

        async function releaseOrder(orderID) {
            if(!confirm("سحب الطلب؟")) return;
            const pass = document.getElementById('master-pass').value;
            try {
                await fetch(SCRIPT_URL, { 
                    method: 'POST', 
                    mode: 'no-cors',
                    body: JSON.stringify({ action: 'master_control', pass: pass, targetSheet: 'Orders', targetID: orderID, colIndex: 6, newValue: 'waiting' })
                });
                await fetch(SCRIPT_URL, { 
                    method: 'POST', 
                    mode: 'no-cors',
                    body: JSON.stringify({ action: 'master_control', pass: pass, targetSheet: 'Orders', targetID: orderID, colIndex: 7, newValue: '' })
                });
                setTimeout(loadMasterData, 1000);
            } catch(e) { alert("فشل السحب."); }
        }

        async function forceAssign(orderID) {
            const phone = prompt("أدخل هاتف السائق المكلف:");
            if(!phone) return;
            const pass = document.getElementById('master-pass').value;
            try {
                await fetch(SCRIPT_URL, { 
                    method: 'POST', 
                    mode: 'no-cors',
                    body: JSON.stringify({ action: 'master_control', pass: pass, targetSheet: 'Orders', targetID: orderID, colIndex: 7, newValue: phone })
                });
                await fetch(SCRIPT_URL, { 
                    method: 'POST', 
                    mode: 'no-cors',
                    body: JSON.stringify({ action: 'master_control', pass: pass, targetSheet: 'Orders', targetID: orderID, colIndex: 6, newValue: 'assigned' })
                });
                alert("تم التكليف القسري.");
                setTimeout(loadMasterData, 1000);
            } catch(e) { alert("فشل التكليف."); }
        }

        function applyFinancialFilter() {
            const fromStr = document.getElementById('date-from').value;
            const toStr = document.getElementById('date-to').value;
            if(!fromStr || !toStr || !rawData) return alert("حدد التاريخ أولاً");
            
            const from = new Date(fromStr);
            const to = new Date(toStr);
            to.setHours(23,59,59);
            
            let count = 0, totalProfit = 0;
            rawData.orders.forEach(o => {
                const orderDate = new Date(o[8]); // تاريخ الطلب في العمود 9 (Index 8)
                if (orderDate >= from && orderDate <= to) {
                    count++;
                    totalProfit += parseFloat(o[5] || 0); // العمولة في العمود 6 (Index 5)
                }
            });
            document.getElementById('stat-count').innerText = count;
            document.getElementById('stat-profit').innerText = totalProfit.toLocaleString() + " د.ع";
        }
    </script>
</body>
</html>
