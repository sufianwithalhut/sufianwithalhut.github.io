<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Al-Hut V6.1.3 | لوحة السيادة المطلقة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --main-gold: #d4af37; --dark-bg: #0a0a0a; --card-bg: #1a1a1a; --danger: #b71c1c; --success: #1b5e20; --whale-blue: #0288d1; --whatsapp: #25d366; }
        body { background: var(--dark-bg); color: white; font-family: 'Tajawal', sans-serif; margin: 0; padding: 10px; }
        .header { text-align: center; border-bottom: 2px solid var(--main-gold); padding-bottom: 10px; margin-bottom: 20px; background: rgba(0,0,0,0.5); border-radius: 0 0 20px 20px; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 15px; }
        .section-card { background: var(--card-bg); border-radius: 15px; padding: 15px; border: 1px solid #333; height: 500px; overflow-y: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .section-card h2 { color: var(--main-gold); border-bottom: 1px solid #444; padding-bottom: 10px; font-size: 1.1rem; position: sticky; top: 0; background: var(--card-bg); z-index: 10; display: flex; justify-content: space-between; align-items: center; }
        #map { height: 400px; border-radius: 20px; margin-bottom: 20px; border: 2px solid var(--main-gold); box-shadow: 0 0 20px rgba(212, 175, 55, 0.2); }
        .item-row { background: #222; margin-bottom: 10px; padding: 12px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border-right: 4px solid transparent; }
        .status-badge { padding: 3px 8px; border-radius: 6px; font-size: 0.65rem; font-weight: bold; }
        .active { background: var(--success); } .pending { background: #f57f17; } .banned { background: var(--danger); }
        .btn { cursor: pointer; border: none; padding: 8px 12px; border-radius: 8px; color: white; font-size: 0.8rem; display: inline-flex; align-items: center; gap: 5px; text-decoration: none; }
        .btn-ban { background: var(--danger); } .btn-approve { background: var(--success); } 
        .btn-clear { background: var(--whale-blue); } .btn-force { background: #6a1b9a; }
        .btn-wa { background: var(--whatsapp); }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .stat-item { background: #000; padding: 15px; border-radius: 15px; text-align: center; border: 1px solid #333; }
        .stat-item span { display: block; color: var(--main-gold); font-size: 1.3rem; font-weight: 900; margin-top: 5px; }
        small { display: block; opacity: 0.6; font-size: 0.75rem; margin-top: 3px; }
        .action-group { display: flex; gap: 5px; margin-top: 8px; }
    </style>
</head>
<body>

    <div class="header">
        <h1 style="font-size: 1.5rem; letter-spacing: 2px;">🐋 منظومة الحوت <span style="color:var(--main-gold)">V6.1.3</span></h1>
        <p style="font-size: 0.8rem; opacity: 0.8;">السيطرة المركزية - كركوك | قمرة القيادة</p>
    </div>

    <div id="login-block" style="text-align: center; padding: 50px 0;">
        <i class="fas fa-shield-alt" style="font-size: 4rem; color: var(--main-gold); margin-bottom: 20px;"></i><br>
        <input type="password" id="master-pass" placeholder="رمز السيادة..." style="padding: 15px; border-radius: 12px; border: 2px solid var(--main-gold); background: #000; color: gold; width: 300px; font-size: 1.2rem; text-align: center; outline: none;">
        <br><br>
        <button class="btn btn-approve" onclick="loadMasterData()" style="padding: 15px 50px; font-size: 1.1rem; font-weight: 900;">دخول النظام</button>
    </div>

    <div id="main-ui" style="display: none;">
        <div id="map"></div>
        <div class="stats-grid">
            <div class="stat-item">أرباح اليوم<span id="stat-profit">0 د.ع</span></div>
            <div class="stat-item">طلبات نشطة<span id="stat-count">0</span></div>
            <div class="stat-item">مطاعم<span id="stat-rests">0</span></div>
            <div class="stat-item">سواق<span id="stat-drivers">0</span></div>
        </div>

        <div class="grid-container">
            <div class="section-card">
                <h2><span><i class="fas fa-biking"></i> الرادار الحي (السواق)</span></h2>
                <div id="drivers-list"></div>
            </div>
            <div class="section-card">
                <h2><span><i class="fas fa-store"></i> المطاعم الشريكة</span></h2>
                <div id="rests-list"></div>
            </div>
            <div class="section-card">
                <h2><span><i class="fas fa-box-open"></i> حركة الطلبات المباشرة</span></h2>
                <div id="orders-list"></div>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz-Rgnwclf9OJz2uJuBhD4PqDkY9XI0KCnSDhq1bRI558bxT5YLTTozkpZHky20oX9g/exec";
        let rawData = null;
        let map, markers = [];

        function initMap() {
            if (map) return;
            map = L.map('map').setView([35.467, 44.392], 13); 
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        }

        async function loadMasterData() {
            const pass = document.getElementById('master-pass').value;
            try {
                const res = await fetch(`${SCRIPT_URL}?action=get_master_data&pass=${encodeURIComponent(pass)}`);
                rawData = await res.json();
                if (rawData.status === "denied") return alert("رمز السيادة خاطئ!");
                
                document.getElementById('login-block').style.display = 'none';
                document.getElementById('main-ui').style.display = 'block';
                initMap();
                renderUI(rawData);
                updateMapMarkers(rawData.drivers);
            } catch (e) { alert("خطأ في الاتصال!"); }
        }

        function renderUI(data) {
            // تحديث الإحصائيات
            document.getElementById('stat-rests').innerText = data.restaurants.length;
            document.getElementById('stat-drivers').innerText = data.drivers.length;
            document.getElementById('stat-count').innerText = data.orders.filter(o => o[5] !== 'delivered').length;

            // قائمة السواق مع ميزات الاتصال والتتبع والحذف
            document.getElementById('drivers-list').innerHTML = data.drivers.map(d => `
                <div class="item-row" style="border-right-color: ${d[4] === 'active' ? '#1b5e20' : '#b71c1c'}">
                    <div>
                        <b>${d[1]}</b>
                        <small>ID: ${d[2]}</small>
                        <div class="action-group">
                            <a href="tel:${d[2]}" class="btn btn-approve"><i class="fas fa-phone"></i></a>
                            <a href="https://wa.me/${d[2].replace(/\D/g,'')}" target="_blank" class="btn btn-wa"><i class="fab fa-whatsapp"></i></a>
                            <button class="btn btn-force" onclick="trackOnMap(${d[5]}, ${d[6]}, '${d[1]}')"><i class="fas fa-location-arrow"></i></button>
                        </div>
                    </div>
                    <div style="text-align:left">
                        <span class="status-badge ${d[4]}">${d[4]}</span>
                        <div class="action-group">
                            <button class="btn btn-ban" onclick="deleteItem('Drivers', '${d[2]}')"><i class="fas fa-trash"></i></button>
                            <button class="btn btn-approve" onclick="control('Drivers', '${d[2]}', 4, 'active')"><i class="fas fa-check"></i></button>
                        </div>
                    </div>
                </div>
            `).join('');

            // قائمة المطاعم
            document.getElementById('rests-list').innerHTML = data.restaurants.map(r => `
                <div class="item-row">
                    <div>
                        <b>${r[1]}</b>
                        <small>${r[3]}</small>
                        <div class="action-group">
                            <a href="tel:${r[2]}" class="btn btn-approve"><i class="fas fa-phone"></i></a>
                        </div>
                    </div>
                    <div style="text-align:left">
                        <span class="status-badge ${r[4]}">${r[4]}</span>
                        <div class="action-group">
                            <button class="btn btn-ban" onclick="deleteItem('Restaurants', '${r[2]}')"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                </div>
            `).join('');

            // قائمة الطلبات
            document.getElementById('orders-list').innerHTML = data.orders.map(o => `
                <div class="item-row">
                    <span>
                        <b style="color:var(--main-gold)">${o[0]}</b>
                        <small>من: ${o[1]} | إلى: ${o[9]}</small>
                        <small>حالة: ${o[5]}</small>
                    </span>
                    <div style="display:flex; flex-direction:column; gap:5px">
                        <button class="btn btn-ban" onclick="deleteItem('Orders', '${o[0]}')"><i class="fas fa-trash"></i></button>
                        <button class="btn btn-clear" onclick="releaseOrder('${o[0]}')">سحب</button>
                    </div>
                </div>
            `).reverse().join('');
        }

        function trackOnMap(lat, lng, name) {
            if(!lat || lat == 0) return alert("موقع السائق غير متوفر حالياً.");
            map.setView([lat, lng], 18);
            L.popup().setLatLng([lat, lng]).setContent(`السائق: ${name}`).openOn(map);
        }

        async function deleteItem(sheet, id) {
            if(!confirm("هل أنت متأكد من حذف هذا العنصر نهائياً؟")) return;
            const pass = document.getElementById('master-pass').value;
            await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'delete_item', pass: pass, targetSheet: sheet, targetID: id })
            });
            loadMasterData();
        }

        async function control(target, id, col, val) {
            const pass = document.getElementById('master-pass').value;
            await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'master_control', pass: pass, targetSheet: target, targetID: id, colIndex: col, newValue: val })
            });
            loadMasterData();
        }

        function updateMapMarkers(drivers) {
            markers.forEach(m => map.removeLayer(m));
            markers = [];
            drivers.forEach(d => {
                if(d[5] && d[5] != 0) {
                    let m = L.marker([d[5], d[6]]).addTo(map).bindPopup(`<b>${d[1]}</b>`);
                    markers.push(m);
                }
            });
        }
    </script>
</body>
</html>
