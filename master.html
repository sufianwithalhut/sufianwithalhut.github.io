<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>التحكم المركزي | منظومة الحوت 🐋</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --primary: #2563eb; --danger: #ef4444; --success: #22c55e; --warning: #f59e0b; }
        body { background: #f8fafc; color: #1e293b; font-family: 'Tajawal', sans-serif; margin: 0; overflow-x: hidden; }
        
        #map { height: 450px; border-radius: 2rem; border: 8px solid white; box-shadow: 0 20px 50px rgba(0,0,0,0.1); margin-bottom: 2rem; z-index: 10; }
        .glass-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid #e2e8f0; border-radius: 1.5rem; padding: 1.25rem; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); }
        
        /* تأثيرات الحالة */
        .critical-pulse { animation: red-pulse 1.5s infinite; border: 2px solid var(--danger) !important; background: #fff1f1 !important; }
        @keyframes red-pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        
        .pending-acceptance { border: 2px dashed var(--warning) !important; background: #fffbeb !important; animation: yellow-glow 2s infinite; }
        @keyframes yellow-glow { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

        .item-row { border-radius: 1rem; padding: 12px; margin-bottom: 10px; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); background: white; border: 1px solid #f1f5f9; position: relative; }
        .item-row:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .row-active { border-right: 5px solid var(--primary); }
        
        .btn-action { width: 32px; height: 32px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 14px; transition: 0.2s; border: none; cursor: pointer; }
        .btn-blue { background: #eff6ff; color: var(--primary); }
        .btn-blue:hover { background: var(--primary); color: white; }
        .btn-red { background: #fef2f2; color: var(--danger); }
        .btn-red:hover { background: var(--danger); color: white; }
        .btn-green { background: #f0fdf4; color: var(--success); }
        .btn-green:hover { background: var(--success); color: white; }

        .stats-card { background: white; padding: 1rem; border-radius: 1.25rem; border: 1px solid #e2e8f0; text-align: center; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="p-4 lg:p-6">

    <div id="login-block" class="fixed inset-0 z-[9999] flex items-center justify-center bg-slate-900 px-4">
        <div class="max-w-[400px] w-full p-8 text-center glass-panel shadow-2xl">
            <div class="text-5xl mb-4">🐋</div>
            <h1 class="text-2xl font-black mb-2 italic text-slate-800">غرفة قيادة الحوت</h1>
            <p class="text-slate-400 text-sm mb-6">الرجاء إدخال رمز السلطة المركزية</p>
            <input type="password" id="master-pass" placeholder="••••••••" class="w-full bg-slate-100 rounded-2xl p-4 text-center mb-4 outline-none font-bold text-xl tracking-widest border-2 focus:border-blue-500 transition-all">
            <button onclick="loadMasterData()" class="w-full bg-blue-600 hover:bg-blue-700 text-white p-4 rounded-2xl font-black shadow-lg shadow-blue-200 transition-all">دخول آمن</button>
        </div>
    </div>

    <div id="main-ui" class="hidden max-w-[1600px] mx-auto">
        
        <header class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4 bg-white/70 backdrop-blur p-4 rounded-3xl border border-white shadow-sm">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 text-white w-10 h-10 rounded-xl flex items-center justify-center shadow-lg shadow-blue-200">
                    <i class="fas fa-whale"></i>
                </div>
                <div>
                    <h1 class="text-lg font-black text-slate-800 leading-tight">AL-HUT COMMAND <span class="text-blue-600">V8.5</span></h1>
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Kirkuk Logistics Center</p>
                </div>
            </div>
            
            <div class="flex gap-4 overflow-x-auto w-full md:w-auto pb-2 md:pb-0">
                <div id="stat-active-drivers" class="stats-card min-w-[100px]"><p class="text-[9px] font-bold text-slate-400 uppercase">سائق نشط</p><p class="text-lg font-black text-blue-600">0</p></div>
                <div id="stat-pending-orders" class="stats-card min-w-[100px]"><p class="text-[9px] font-bold text-slate-400 uppercase">قيد الانتظار</p><p class="text-lg font-black text-amber-500">0</p></div>
                <div id="stat-today-money" class="stats-card min-w-[120px]"><p class="text-[9px] font-bold text-slate-400 uppercase">عمولات اليوم</p><p class="text-lg font-black text-emerald-600">0</p></div>
                <div id="clock" class="stats-card min-w-[120px] bg-slate-900 !text-white border-none"><p class="text-[9px] font-bold opacity-60 uppercase">الوقت الحالي</p><p class="text-lg font-black">00:00</p></div>
            </div>
        </header>

        <div id="map"></div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            
            <section class="glass-panel h-[650px] flex flex-col border-t-4 border-blue-500">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="font-black text-sm uppercase text-slate-600"><i class="fas fa-motorcycle mr-1 text-blue-500"></i> الأسطول الميداني</h2>
                    <span id="count-drivers" class="bg-blue-100 text-blue-600 text-[10px] px-2 py-0.5 rounded-full font-bold">0</span>
                </div>
                <div class="relative mb-4">
                    <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-300 text-xs"></i>
                    <input type="text" id="searchDriver" oninput="filterDrivers()" placeholder="بحث باسم السائق..." class="w-full bg-slate-50 border border-slate-200 rounded-xl py-2 pl-8 pr-4 text-xs outline-none focus:border-blue-400">
                </div>
                <div id="drivers-list" class="overflow-y-auto flex-1 space-y-2 pr-1"></div>
            </section>

            <section class="glass-panel h-[650px] flex flex-col border-t-4 border-emerald-500">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="font-black text-sm uppercase text-slate-600"><i class="fas fa-store mr-1 text-emerald-500"></i> الشركاء والمحاسبة</h2>
                </div>
                <div id="rests-list" class="overflow-y-auto flex-1 space-y-2 pr-1"></div>
            </section>

            <section class="glass-panel h-[650px] flex flex-col border-t-4 border-amber-500">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="font-black text-sm uppercase text-slate-600"><i class="fas fa-satellite-dish mr-1 text-amber-500"></i> الرادار اللحظي</h2>
                    <div class="flex gap-1">
                        <span class="w-2 h-2 rounded-full bg-amber-500 animate-ping"></span>
                    </div>
                </div>
                <div id="active-orders" class="overflow-y-auto flex-1 space-y-2 pr-1"></div>
            </section>

            <section class="glass-panel h-[650px] flex flex-col border-t-4 border-slate-400">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="font-black text-sm uppercase text-slate-600"><i class="fas fa-history mr-1 text-slate-400"></i> سجل الإنجاز</h2>
                </div>
                <div id="completed-orders" class="overflow-y-auto flex-1 space-y-2 pr-1 opacity-80"></div>
            </section>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxziP5TpfK4FVZcVO-4xzPaLqvpxjLMVL_JbSIZ0E9pKujgxgQU0ZIIfR1GufbOehwPBg/exec";
        let map, markers = {}, currentData = null, selectedOrderID = null;

        // إحداثيات المناطق للتوزيع الذكي
        const locationsCoords = { "الماس": [35.478, 44.385], "طريق بغداد": [35.455, 44.375], "التسعين": [35.460, 44.395], "شارع المحافظة": [35.468, 44.392], "قورية": [35.475, 44.398], "بنجه علي": [35.485, 44.420] };

        async function loadMasterData(isSilent = false) {
            const pass = document.getElementById('master-pass').value;
            if(!pass) return;
            try {
                const res = await fetch(`${SCRIPT_URL}?action=get_master_data&pass=${encodeURIComponent(pass)}`);
                const data = await res.json();
                if (data.status === "denied") return alert("الرمز غير صحيح!");
                currentData = data;
                if (!isSilent) {
                    document.getElementById('login-block').classList.add('hidden');
                    document.getElementById('main-ui').classList.remove('hidden');
                    initMap();
                }
                renderUI(data);
                updateMarkers(data.drivers);
                updateStats(data);
            } catch (e) { console.error("Sync Error"); }
        }

        function initMap() {
            if (map) return;
            map = L.map('map', { zoomControl: false }).setView([35.467, 44.392], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{y}.png').addTo(map);
        }

        function updateStats(data) {
            const activeDrivers = data.drivers.filter(d => d[4] === 'active').length;
            const pendingOrders = data.orders.filter(o => o[5] === 'pending_confirmation').length;
            
            document.getElementById('stat-active-drivers').querySelector('p:last-child').innerText = activeDrivers;
            document.getElementById('stat-pending-orders').querySelector('p:last-child').innerText = pendingOrders;
            document.getElementById('count-drivers').innerText = data.drivers.length;
        }

        function renderUI(data) {
            const activeOrders = data.orders.filter(o => o[5] !== 'delivered');
            const completedOrders = data.orders.filter(o => o[5] === 'delivered');

            // 1. رندر السائقين
            document.getElementById('drivers-list').innerHTML = data.drivers.map(d => {
                const isActive = d[4] === 'active';
                return `
                <div class="item-row ${isActive ? 'row-active' : 'row-pending'}" data-name="${d[1]}" data-phone="${d[2]}">
                    <div class="flex justify-between items-center mb-1">
                        <p class="font-black text-xs text-slate-700">${d[1]}</p>
                        <span class="text-[8px] font-bold px-1.5 py-0.5 rounded ${isActive?'bg-green-100 text-green-600':'bg-slate-100 text-slate-500'}">${isActive?'متصل':'أوفلاين'}</span>
                    </div>
                    <p class="text-[9px] text-slate-400 mb-3"><i class="fas fa-phone-alt mr-1"></i> ${d[2]}</p>
                    <div class="flex gap-2">
                        <button onclick="trackOnMap(${d[5]},${d[6]})" class="btn-action btn-blue"><i class="fas fa-location-arrow"></i></button>
                        <button onclick="control('Drivers','${d[2]}',4,'${isActive?'pending':'active'}')" class="flex-1 text-[10px] font-bold rounded-lg ${isActive?'bg-amber-50 text-amber-600':'bg-green-50 text-green-600'} transition-colors">${isActive?'تعطيل':'تفعيل'}</button>
                        <a href="https://wa.me/${d[2]}" target="_blank" class="btn-action btn-green"><i class="fab fa-whatsapp"></i></a>
                        <button onclick="deleteItem('Drivers','${d[2]}')" class="btn-action btn-red"><i class="fas fa-trash"></i></button>
                    </div>
                </div>`;
            }).join('');

            // 2. رندر المطاعم والمحاسبة
            document.getElementById('rests-list').innerHTML = data.restaurants.map(r => {
                const rOrders = completedOrders.filter(o => o[1] === r[1]);
                const debt = parseFloat(r[9] || 0);
                const isActive = r[4] === 'active';
                return `
                <div class="item-row border-r-4 border-emerald-500">
                    <div class="flex justify-between items-start mb-2">
                        <div>
                            <p class="font-black text-xs text-slate-800">${r[1]}</p>
                            <p class="text-[9px] text-emerald-600 font-bold italic">📍 ${r[3].split('|')[0]}</p>
                        </div>
                        <span class="bg-emerald-50 text-emerald-700 text-[8px] px-2 py-1 rounded-lg font-black italic">نظام: ${r[8]}</span>
                    </div>
                    <div class="bg-slate-50 p-2 rounded-xl mb-3 flex justify-between items-center border border-slate-100">
                        <span class="text-[10px] font-black text-red-600 tracking-tighter">${debt.toLocaleString()} د.ع</span>
                        <button onclick="control('Restaurants','${r[2]}',9,0)" class="text-[9px] font-black text-white bg-red-500 px-3 py-1 rounded-lg shadow-sm">تصفير</button>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="control('Restaurants','${r[2]}',4,'${isActive?'pending':'active'}')" class="flex-1 text-[10px] font-bold py-1.5 rounded-lg ${isActive?'bg-slate-100 text-slate-600':'bg-emerald-600 text-white'}">${isActive?'إيقاف مؤقت':'تشغيل الآن'}</button>
                        <a href="tel:${r[2]}" class="btn-action btn-blue"><i class="fas fa-phone"></i></a>
                    </div>
                </div>`;
            }).join('');

            // 3. رندر الرادار (الطلبات النشطة)
            document.getElementById('active-orders').innerHTML = activeOrders.reverse().map(o => {
                const diff = Math.floor(((new Date()) - new Date(o[7])) / 60000);
                const isCritical = diff > 30;
                const isPending = o[5] === 'pending_confirmation';
                
                return `
                <div class="item-row ${isPending ? 'pending-acceptance' : (isCritical ? 'critical-pulse' : 'row-active')}">
                    <div class="flex justify-between mb-2">
                        <span class="text-[10px] font-black text-blue-600 italic">#${o[0]}</span>
                        <span class="text-[9px] font-bold ${isCritical?'text-red-600':'text-slate-400'}"><i class="far fa-clock"></i> ${diff} دقيقة</span>
                    </div>
                    <p class="font-black text-xs text-slate-800">${o[1]}</p>
                    <p class="text-[9px] text-slate-500 mb-2 truncate"><i class="fas fa-map-marker-alt"></i> ${o[9]}</p>
                    <div class="flex items-center gap-2 mt-2 pt-2 border-t border-slate-50">
                        <div class="flex-1">
                            <p class="text-[8px] text-slate-400 font-bold uppercase">السائق المعين</p>
                            <p class="text-[10px] font-black text-slate-700">${o[6] || 'جاري البحث...'}</p>
                        </div>
                        <button onclick="deleteItem('Orders','${o[0]}')" class="btn-action btn-red"><i class="fas fa-times"></i></button>
                    </div>
                </div>`;
            }).join('');

            // 4. الأرشيف
            document.getElementById('completed-orders').innerHTML = completedOrders.reverse().slice(0, 15).map(o => `
                <div class="item-row bg-slate-50 border-r-4 border-slate-300">
                    <div class="flex justify-between items-center">
                        <p class="text-[9px] font-bold text-slate-600">${o[1]}</p>
                        <i class="fas fa-check-circle text-emerald-500 text-[10px]"></i>
                    </div>
                    <p class="text-[8px] text-slate-400">سائق: ${o[6]}</p>
                </div>`).join('');
        }

        async function control(target, id, col, val) {
            const pass = document.getElementById('master-pass').value;
            try {
                await fetch(SCRIPT_URL, { 
                    method: 'POST', 
                    mode: 'no-cors', 
                    body: JSON.stringify({ action: 'master_control', pass: pass, targetSheet: target, targetID: id, colIndex: col, newValue: val }) 
                });
                setTimeout(() => loadMasterData(true), 800);
            } catch (e) { alert("حدث خطأ في الاتصال"); }
        }

        async function deleteItem(sheet, id) {
            if(!confirm("هل أنت متأكد من الحذف النهائي لهذا العنصر؟")) return;
            const pass = document.getElementById('master-pass').value;
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'delete_item', pass: pass, targetSheet: sheet, targetID: id }) });
            setTimeout(() => loadMasterData(true), 800);
        }

        function trackOnMap(lat, lng) { 
            if(lat && lat != 0) {
                map.flyTo([lat, lng], 17, { animate: true, duration: 1.5 });
            } else alert("السائق غير متصل بالإنترنت حالياً"); 
        }

        function updateMarkers(drivers) {
            drivers.forEach(d => {
                if(d[5] && d[5] != 0) {
                    const color = d[4]==='active' ? '#2563eb' : '#94a3b8';
                    const icon = L.divIcon({
                        className: 'custom-div-icon',
                        html: `<div style="background:${color}; width:14px; height:14px; border-radius:50%; border:3px solid white; box-shadow:0 0 10px rgba(0,0,0,0.2);"></div>`,
                        iconSize: [14, 14],
                        iconAnchor: [7, 7]
                    });
                    if(markers[d[2]]) markers[d[2]].setLatLng([d[5], d[6]]);
                    else markers[d[2]] = L.marker([d[5], d[6]], {icon: icon}).addTo(map).bindPopup(`<b class="font-bold text-xs">${d[1]}</b>`);
                }
            });
        }

        function filterDrivers() {
            const val = document.getElementById('searchDriver').value.toLowerCase();
            document.querySelectorAll('#drivers-list .item-row').forEach(el => {
                const text = el.getAttribute('data-name').toLowerCase() + el.getAttribute('data-phone');
                el.style.display = text.includes(val) ? 'block' : 'none';
            });
        }

        // تحديث البيانات كل 10 ثوانٍ بصمت
        setInterval(() => { if (!document.getElementById('main-ui').classList.contains('hidden')) loadMasterData(true); }, 10000);
        
        // الساعة الحية
        setInterval(() => { 
            const now = new Date();
            document.getElementById('clock').querySelector('p:last-child').innerText = now.getHours() + ":" + String(now.getMinutes()).padStart(2, '0'); 
        }, 1000);

    </script>
</body>
</html>
