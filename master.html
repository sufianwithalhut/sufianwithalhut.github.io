<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم سفيان | منظومة الحوت السيادية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --primary: #2563eb; --accent: #f59e0b; --bg-body: #f1f5f9; --card-bg: rgba(255, 255, 255, 0.95); }
        body { background: var(--bg-body); color: #1e293b; font-family: 'Tajawal', sans-serif; margin: 0; overflow-x: hidden; }
        #map { height: 350px; border-radius: 2rem; border: 4px solid white; margin: 1.5rem 0; box-shadow: 0 10px 25px rgba(0,0,0,0.1); z-index: 10; }
        .glass-panel { background: var(--card-bg); backdrop-filter: blur(10px); border: 1px solid white; border-radius: 1.5rem; padding: 1.2rem; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        
        .item-row { border-radius: 1rem; padding: 12px; margin-bottom: 10px; border: 1px solid rgba(0,0,0,0.05); transition: all 0.2s ease; position: relative; }
        
        /* محرك ألوان التأخير */
        .delay-safe { border-right: 6px solid #22c55e; background: white; }
        .delay-warning { border-right: 6px solid #f59e0b; background: #fffbeb; animation: pulse-warn 2s infinite; }
        .delay-danger { border-right: 6px solid #ef4444; background: #fef2f2; }

        @keyframes pulse-warn { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }

        .btn-text { padding: 6px 10px; border-radius: 8px; font-weight: 700; font-size: 10px; cursor: pointer; transition: 0.2s; text-align: center; display: inline-block; }
        .btn-green { background: #22c55e; color: white; }
        .btn-red { background: #ef4444; color: white; }
        .btn-blue { background: #3b82f6; color: white; }
        .btn-yellow { background: #f59e0b; color: white; }
        .btn-gray { background: #64748b; color: white; }

        .hidden { display: none; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="login-block" class="fixed inset-0 z-[9999] flex items-center justify-center bg-slate-900">
        <div class="max-w-[380px] w-full p-10 text-center glass-panel">
            <i class="fas fa-whale text-5xl text-blue-600 mb-6 block"></i>
            <h1 class="text-xl font-black mb-6">نظام التحكم المركزي</h1>
            <input type="password" id="master-pass" placeholder="رمز الدخول" class="w-full bg-slate-100 rounded-2xl p-4 text-center mb-4 outline-none font-bold">
            <button onclick="loadMasterData()" class="w-full bg-blue-600 text-white p-4 rounded-2xl font-black">دخول</button>
        </div>
    </div>

    <div id="main-ui" class="hidden p-4 max-w-[1800px] mx-auto">
        <header class="flex justify-between items-center mb-6 bg-white p-4 rounded-3xl shadow-sm">
            <h1 class="font-black text-slate-800">منظومة الحوت <span class="text-blue-600">V6.2</span></h1>
            <div id="clock" class="font-bold text-slate-600 bg-slate-50 px-4 py-1 rounded-xl border">00:00:00</div>
        </header>

        <div id="map"></div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mt-6">
            <section class="glass-panel h-[680px] flex flex-col border-t-4 border-blue-600">
                <h2 class="font-black text-xs mb-3 uppercase tracking-widest"><i class="fas fa-motorcycle ml-2"></i> رادار الطيارين</h2>
                <input type="text" id="searchDriver" oninput="filterDrivers()" placeholder="بحث سريع..." class="w-full bg-slate-50 border rounded-xl p-2 text-xs mb-3">
                <div id="drivers-list" class="overflow-y-auto flex-1 space-y-2"></div>
            </section>

            <section class="glass-panel h-[680px] flex flex-col border-t-4 border-emerald-500">
                <h2 class="font-black text-xs mb-3 text-emerald-600 uppercase tracking-widest"><i class="fas fa-utensils ml-2"></i> المحاسبة الذكية</h2>
                <div id="rests-list" class="overflow-y-auto flex-1 space-y-2"></div>
            </section>

            <section class="glass-panel h-[680px] flex flex-col border-t-4 border-amber-500">
                <h2 class="font-black text-xs mb-3 text-amber-600 uppercase tracking-widest"><i class="fas fa-satellite-dish ml-2"></i> البث المباشر</h2>
                <div id="active-orders" class="overflow-y-auto flex-1 space-y-2"></div>
            </section>

            <section class="glass-panel h-[680px] flex flex-col border-t-4 border-slate-400">
                <h2 class="font-black text-xs mb-3 text-slate-500 uppercase tracking-widest"><i class="fas fa-check-double ml-2"></i> المكتملة اليوم</h2>
                <div id="completed-orders" class="overflow-y-auto flex-1 space-y-2"></div>
            </section>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyIqK63Xu4b2G8BN0aNQIs42oTqvvYRlGDLfQCCSMo68YPYoysKjQ_IjoXhie0MhIaZpQ/exec";
        let map, markers = {}, currentData = null;

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('ar-EG'); }, 1000);

        async function loadMasterData(isSilent = false) {
            const pass = document.getElementById('master-pass').value;
            if(!pass) return;
            try {
                const res = await fetch(`${SCRIPT_URL}?action=get_master_data&pass=${encodeURIComponent(pass)}`);
                const data = await res.json();
                if (data.status === "denied") return alert("الرمز خطأ!");
                currentData = data;
                if (!isSilent) { 
                    document.getElementById('login-block').classList.add('hidden'); 
                    document.getElementById('main-ui').classList.remove('hidden'); 
                    initMap(); 
                }
                renderUI(data);
                updateMarkers(data.drivers);
            } catch (e) { console.error("Sync Error"); }
        }

        function initMap() {
            if (map) return;
            map = L.map('map', { zoomControl: false }).setView([35.467, 44.392], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        }

        function renderUI(data) {
            // رندر السائقين (حفظ كافة ميزات التواصل والحذف)
            document.getElementById('drivers-list').innerHTML = data.drivers.map(d => {
                const isActive = d[4] === 'active';
                return `
                <div class="item-row ${isActive ? 'bg-white border-blue-100' : 'bg-amber-50 border-dashed border-amber-300'}">
                    <div class="flex justify-between items-start mb-2">
                        <div>
                            <span class="font-black text-xs block">${d[1]}</span>
                            <span class="text-[9px] text-slate-500 font-bold">${d[2]}</span>
                        </div>
                        <span class="text-[8px] font-black uppercase ${isActive?'text-green-600':'text-amber-600'}">${isActive?'نشط':'معلق'}</span>
                    </div>
                    <div class="flex gap-1">
                        <span onclick="trackOnMap(${d[5]}, ${d[6]})" class="btn-text btn-blue flex-1">تتبع</span>
                        <a href="tel:${d[2]}" class="btn-text btn-gray flex-1">اتصال</a>
                        <span onclick="control('Drivers', '${d[2]}', 4, '${isActive?'pending':'active'}')" class="btn-text ${isActive?'btn-yellow':'btn-green'}">${isActive?'تعليق':'تفعيل'}</span>
                        <span onclick="deleteItem('Drivers', '${d[2]}')" class="btn-text btn-red"><i class="fas fa-trash"></i></span>
                    </div>
                </div>`;
            }).join('');

            // رندر المطاعم (حفظ التواصل + إضافة عداد الحسابات)
            document.getElementById('rests-list').innerHTML = data.restaurants.map(r => {
                const uncollected = data.orders.filter(o => o[1] === r[1] && o[5] === 'delivered').length;
                const totalDebt = uncollected * parseFloat(r[5] || 0);
                return `
                <div class="item-row bg-white border-emerald-100">
                    <span class="font-black text-xs block text-slate-800 mb-1">${r[1]}</span>
                    <div class="bg-slate-50 p-2 rounded-lg mb-2 flex justify-between items-center border">
                        <div class="text-[8px] font-black text-slate-500">طلبات: <span class="text-blue-600">${uncollected}</span></div>
                        <div class="text-[9px] font-black">المستحق: <span class="text-red-600">${totalDebt} د.ع</span></div>
                    </div>
                    <div class="flex gap-1">
                        <a href="tel:${r[2]}" class="btn-text btn-gray flex-1">اتصال</a>
                        <span onclick="control('Restaurants', '${r[2]}', 4, '${r[4]==='active'?'pending':'active'}')" class="btn-text ${r[4]==='active'?'btn-yellow':'btn-green'} flex-1">الحالة</span>
                        <span onclick="deleteItem('Restaurants', '${r[2]}')" class="btn-text btn-red"><i class="fas fa-trash"></i></span>
                    </div>
                </div>`;
            }).join('');

            // رندر الطلبات الجارية (الألوان + المؤقت + التواصل)
            const activeOrders = data.orders.filter(o => o[5] !== 'delivered');
            document.getElementById('active-orders').innerHTML = activeOrders.reverse().map(o => {
                const diffMins = Math.floor(((new Date()) - new Date(o[7])) / 60000);
                let delayClass = diffMins > 30 ? "delay-danger" : (diffMins > 15 ? "delay-warning" : "delay-safe");

                return `
                <div class="item-row ${delayClass} shadow-sm">
                    <div class="flex justify-between items-center mb-1">
                        <span class="text-[9px] font-black text-blue-600">#${o[0]}</span>
                        <span class="text-[9px] font-black ${diffMins > 20 ? 'text-red-600' : 'text-slate-400'}">⏳ ${diffMins} د</span>
                    </div>
                    <p class="font-black text-[11px] text-slate-800">${o[1]}</p>
                    <p class="text-[10px] text-slate-500 mb-2 truncate">📍 ${o[9]}</p>
                    <div class="flex gap-1">
                        <a href="tel:${o[10] || ''}" class="btn-text btn-blue flex-1 text-[9px]">المطعم</a>
                        <a href="tel:${o[6] || ''}" class="btn-text btn-yellow flex-1 text-[9px]">الطيار</a>
                        <span onclick="deleteItem('Orders', '${o[0]}')" class="btn-text btn-red"><i class="fas fa-trash"></i></span>
                    </div>
                </div>`;
            }).join('');

            // رندر الأرشيف (الوقت والتاريخ)
            const completed = data.orders.filter(o => o[5] === 'delivered');
            document.getElementById('completed-orders').innerHTML = completed.reverse().map(o => {
                const date = new Date(o[7]);
                return `
                <div class="item-row bg-green-50/50 border-green-200">
                    <div class="flex justify-between text-[8px] font-bold text-slate-400 mb-1">
                        <span>📅 ${date.toLocaleDateString('ar-EG')}</span>
                        <span>⏰ ${date.toLocaleTimeString('ar-EG', {hour:'2-digit', minute:'2-digit'})}</span>
                    </div>
                    <p class="font-black text-xs text-slate-700">${o[1]}</p>
                    <p class="text-[9px] text-slate-400">الطيار: ${o[6] || '---'}</p>
                </div>`;
            }).join('');
        }

        // دوال التحكم والحذف (لا تلمسها - مرتبطة بالماكرو)
        async function deleteItem(sheet, id) {
            if(!confirm("حذف نهائي؟")) return;
            const pass = document.getElementById('master-pass').value;
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'delete_item', pass: pass, targetSheet: sheet, targetID: id }) });
            setTimeout(() => loadMasterData(true), 500);
        }

        async function control(target, id, col, val) {
            const pass = document.getElementById('master-pass').value;
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'master_control', pass: pass, targetSheet: target, targetID: id, colIndex: col, newValue: val }) });
            setTimeout(() => loadMasterData(true), 500);
        }

        function filterDrivers() {
            const val = document.getElementById('searchDriver').value.toLowerCase();
            document.querySelectorAll('#drivers-list .item-row').forEach(el => {
                const text = el.innerText.toLowerCase();
                el.style.display = text.includes(val) ? 'block' : 'none';
            });
        }

        function trackOnMap(lat, lng) {
            if(!lat || lat == 0) return alert("الطيار غير متصل.");
            map.flyTo([lat, lng], 16);
        }

        function updateMarkers(drivers) {
            drivers.forEach(d => {
                if(d[5] && d[5] != 0) {
                    if(markers[d[2]]) markers[d[2]].setLatLng([d[5], d[6]]);
                    else markers[d[2]] = L.marker([d[5], d[6]]).addTo(map).bindPopup(d[1]);
                }
            });
        }

        setInterval(() => { if (!document.getElementById('main-ui').classList.contains('hidden')) loadMasterData(true); }, 10000);
    </script>
</body>
</html>
