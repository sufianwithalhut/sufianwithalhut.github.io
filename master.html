<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>السيادة المطلقة | منظومة الحوت 🐋</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #020617; color: white; overflow-x: hidden; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        #lockScreen { background: radial-gradient(circle at center, #0f172a 0%, #020617 100%); transition: all 0.6s; }
        .master-font { font-family: 'Orbitron', sans-serif; }
        .status-badge { font-size: 8px; padding: 2px 8px; border-radius: 99px; font-weight: 900; text-transform: uppercase; }
    </style>
</head>
<body class="min-h-screen">

    <div id="lockScreen" class="fixed inset-0 z-[100] flex items-center justify-center p-6">
        <div class="max-w-md w-full glass p-10 rounded-[3rem] text-center border border-emerald-500/20 shadow-[0_0_60px_rgba(16,185,129,0.15)]">
            <div class="w-20 h-20 bg-emerald-500 rounded-3xl mx-auto flex items-center justify-center mb-8 shadow-2xl animate-pulse">
                <span class="text-slate-900 text-4xl font-black master-font">ح</span>
            </div>
            <h1 class="text-2xl font-black mb-8 italic text-white">غرفة العمليات المركزية</h1>
            <input type="password" id="adminPass" placeholder="رمز السيادة" 
                   class="w-full bg-white/5 border border-white/10 p-5 rounded-2xl text-center mb-6 focus:border-emerald-500 outline-none text-emerald-500 text-xl font-bold tracking-widest">
            <button onclick="unlockMaster()" class="w-full bg-emerald-500 text-slate-900 py-5 rounded-2xl font-black hover:scale-95 transition-all text-lg italic uppercase">دخول السيادة 🔐</button>
        </div>
    </div>

    <div id="mainDashboard" class="hidden p-4 md:p-8 pb-24">
        
        <header class="max-w-7xl mx-auto mb-10 flex flex-col md:flex-row justify-between items-center bg-slate-900/80 p-6 rounded-[2.5rem] border border-emerald-500/20 shadow-2xl">
            <div class="flex items-center gap-5">
                <div class="w-16 h-16 bg-emerald-500 rounded-2xl flex items-center justify-center font-black text-slate-900 text-3xl master-font">ح</div>
                <div>
                    <h1 class="text-2xl font-black text-white italic">السيادة المطلقة</h1>
                    <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest italic">Whale HQ • Kirkuk Operational Center</p>
                </div>
            </div>
            <div class="flex gap-4 mt-6 md:mt-0">
                <button onclick="fetchData()" class="bg-emerald-500/20 text-emerald-400 px-6 py-3 rounded-2xl border border-emerald-500/30 font-black text-xs italic">تحديث الرادار 🔄</button>
                <button onclick="lockDashboard()" class="bg-red-500/10 text-red-500 p-4 rounded-2xl border border-red-500/20 hover:bg-red-500 hover:text-white transition-all">خروج</button>
            </div>
        </header>

        <main class="max-w-7xl mx-auto">
            <div class="flex flex-wrap gap-4 mb-10">
                <button onclick="showTab('orders')" id="btn-orders" class="tab-btn flex-1 bg-emerald-600 p-6 rounded-3xl font-black text-white text-lg italic">📡 الرادار الحي</button>
                <button onclick="showTab('restaurants')" id="btn-restaurants" class="tab-btn flex-1 glass p-6 rounded-3xl font-black text-emerald-500 text-lg italic">🏢 المحافظ والديون</button>
            </div>

            <div id="orders" class="tab-content active glass p-8 rounded-[3.5rem] border-t-4 border-emerald-500">
                <div class="flex justify-between items-center mb-10 border-b border-white/5 pb-4">
                    <h2 class="text-2xl font-black text-emerald-400 italic uppercase flex items-center gap-3">
                        <span class="w-3 h-3 bg-emerald-500 rounded-full animate-ping"></span> مراقبة الطلبات النشطة
                    </h2>
                </div>
                <div id="ordersList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    </div>
            </div>

            <div id="restaurants" class="tab-content glass p-8 rounded-[3.5rem] border-t-4 border-red-500">
                <h2 class="text-2xl font-black text-red-500 italic uppercase mb-10 italic">إدارة الأموال والديون</h2>
                <div id="entitiesList" class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    </div>
            </div>
        </main>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbyYL0NRSg1V9xL62JyL5MQfP2jNO3sNU6lDl1xf_GcmOAZXWBg8G7YpdFdJjxpEDcpDhQ/exec';
        const MASTER_PASS = "112233";

        function unlockMaster() {
            const pass = document.getElementById('adminPass').value;
            if (pass === MASTER_PASS) {
                document.getElementById('lockScreen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('lockScreen').classList.add('hidden');
                    document.getElementById('mainDashboard').classList.remove('hidden');
                    fetchData();
                    setInterval(fetchData, 15000); // تحديث آلي كل 15 ثانية
                }, 600);
            } else { alert("⚠️ رمز السيادة غير صحيح!"); }
        }

        async function fetchData() {
            try {
                // ملاحظة: تأكد أن السكريبت يحتوي على أكشن لجلب كل البيانات
                const response = await fetch(scriptURL + "?action=get_master_data");
                const data = await response.json();
                
                renderOrders(data.orders || []);
                renderEntities(data.restaurants || [], 'Restaurants', 'emerald');
                renderEntities(data.drivers || [], 'Drivers', 'red', true);
            } catch (e) { console.log("Master Sync Error"); }
        }

        function renderOrders(orders) {
            const container = document.getElementById('ordersList');
            container.innerHTML = orders.map(ord => {
                const statusColor = ord.status === 'delivered' ? 'bg-emerald-500' : 'bg-blue-500';
                return `
                    <div class="bg-white/5 p-6 rounded-[2rem] border border-white/10 relative overflow-hidden">
                        <div class="flex justify-between items-start mb-4">
                            <span class="text-emerald-500 font-mono text-[10px] font-bold">${ord.id}</span>
                            <span class="${statusColor} text-slate-900 status-badge italic">${ord.status}</span>
                        </div>
                        <h3 class="font-black italic text-lg text-white mb-1">${ord.restaurantName}</h3>
                        <p class="text-[11px] text-gray-400 mb-4 line-clamp-2">${ord.details}</p>
                        <div class="pt-4 border-t border-white/5 flex justify-between items-center">
                            <span class="text-[9px] text-gray-500 uppercase font-black italic">الكابتن:</span>
                            <span class="text-[10px] text-emerald-400 font-bold italic">${ord.driverPhone || 'بدون سائق'}</span>
                        </div>
                    </div>
                `;
            }).join('') || '<p class="text-center col-span-full opacity-20 py-20 italic">الرادار نظيف تماماً الآن 🐋</p>';
        }

        function renderEntities(items, type, color, append = false) {
            const container = document.getElementById('entitiesList');
            if (!append) container.innerHTML = "";
            
            container.innerHTML += items.map(item => `
                <div class="bg-white/[0.02] border border-white/5 p-8 rounded-[3rem] hover:border-${color}-500/30 transition-all shadow-xl">
                    <div class="flex justify-between items-start mb-6">
                        <div>
                            <span class="text-[9px] text-gray-500 uppercase font-black mb-1 block tracking-widest">${type === 'Drivers' ? 'كابتن ميداني' : 'شريك مطعم'}</span>
                            <h3 class="text-xl font-black text-white italic">${item.name}</h3>
                        </div>
                        <div class="text-right">
                            <p class="text-[10px] text-gray-500 font-bold font-mono uppercase">المبلغ الحالي</p>
                            <p class="text-${color}-500 text-2xl font-black italic">${item.wallet} <span class="text-[10px]">د.ع</span></p>
                        </div>
                    </div>
                    <button onclick="clearWallet('${item.name}', '${type}')" 
                            class="w-full bg-${color}-500/10 text-${color}-500 py-4 rounded-2xl font-black italic border border-${color}-500/20 hover:bg-${color}-500 hover:text-slate-900 transition-all">
                        تسوية وتصفير الحساب 💰
                    </button>
                </div>
            `).join('');
        }

        async function clearWallet(name, targetSheet) {
            if(!confirm(`تأكيد السيادة: هل استلمت المبالغ من [${name}] وتريد تصفير محفظته الآن؟`)) return;
            
            try {
                const response = await fetch(scriptURL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'clear_wallet', name: name, targetSheet: targetSheet, pass: MASTER_PASS })
                });
                const result = await response.json();
                if(result.status === "ok") { alert("تم تصفير الحساب وتحديث السجلات ✅"); fetchData(); }
            } catch (e) { alert("حدث خطأ في عملية التسوية"); }
        }

        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.className = "tab-btn flex-1 glass p-6 rounded-3xl font-black text-emerald-500 text-lg italic";
            });
            const activeBtn = document.getElementById('btn-' + tabId);
            activeBtn.className = "tab-btn flex-1 bg-emerald-600 p-6 rounded-3xl font-black text-white text-lg italic shadow-[0_10px_30px_rgba(16,185,129,0.3)]";
        }

        function lockDashboard() { location.reload(); }
    </script>
</body>
</html>
