<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>غرفة العمليات السيادية | الحوت 🐋</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: #f1f5f9; font-family: 'Tajawal', sans-serif; }
        #map { height: 350px; border-radius: 2rem; border: 2px solid #1e293b; margin-bottom: 2rem; z-index: 10; }
        .glass-panel { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); border-radius: 1.5rem; padding: 1.2rem; }
        .item-row { background: rgba(30, 41, 59, 0.5); border-radius: 1rem; padding: 10px; margin-bottom: 8px; border-right: 4px solid transparent; transition: 0.3s; }
        .status-active { border-right-color: #10b981; }
        .status-away { border-right-color: #f59e0b; opacity: 0.6; }
        .debt-alert { color: #ef4444; font-weight: 900; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
        .btn-clear { background: #10b981; color: #020617; padding: 2px 8px; border-radius: 5px; font-size: 10px; font-weight: 900; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="p-4 lg:p-6">

    <div id="login-block" class="fixed inset-0 z-[9999] flex items-center justify-center bg-slate-950">
        <div class="max-w-[350px] w-full p-8 text-center glass-panel">
            <div class="text-5xl mb-4">🐋</div>
            <h1 class="text-xl font-black mb-6">قائد الأسطول | طه</h1>
            <input type="password" id="master-pass" placeholder="كود الصلاحيات" class="w-full bg-slate-800 rounded-xl p-3 text-center mb-4 outline-none border-2 border-transparent focus:border-emerald-500 text-white font-bold">
            <button onclick="loadMasterData()" class="w-full bg-emerald-500 text-slate-900 py-3 rounded-xl font-black shadow-lg hover:bg-emerald-400 transition-all">فتح الرادار</button>
        </div>
    </div>

    <div id="main-ui" class="hidden max-w-[1600px] mx-auto">
        <header class="flex flex-wrap justify-between items-center gap-4 mb-6">
            <div class="flex gap-3">
                <div class="glass-panel py-2 px-5 text-center border-b-2 border-blue-500">
                    <p class="text-[10px] text-slate-400 font-bold uppercase">الطلبات اليوم</p>
                    <h3 id="stat-total" class="text-xl font-black">0</h3>
                </div>
                <div class="glass-panel py-2 px-5 text-center border-b-2 border-emerald-500">
                    <p class="text-[10px] text-slate-400 font-bold uppercase">كباتن أونلاين</p>
                    <h3 id="stat-drivers" class="text-xl font-black">0</h3>
                </div>
                <div class="glass-panel py-2 px-5 text-center border-b-2 border-red-500">
                    <p class="text-[10px] text-slate-400 font-bold uppercase">إجمالي الديون</p>
                    <h3 id="stat-debt" class="text-xl font-black text-red-400">0</h3>
                </div>
            </div>
            <div class="text-left">
                <p id="clock" class="text-lg font-black text-emerald-500 tracking-tighter">00:00:00</p>
                <span class="text-[9px] bg-white/5 px-2 py-1 rounded text-slate-500 font-bold">AL-HUT OS V7.5</span>
            </div>
        </header>

        <div id="map"></div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            <section class="glass-panel h-[600px] flex flex-col">
                <h2 class="text-xs font-black mb-4 text-emerald-400 uppercase tracking-widest"><i class="fas fa-wallet mr-1"></i> محفظة الكباتن</h2>
                <div id="drivers-list" class="overflow-y-auto flex-1 pr-1"></div>
            </section>

            <section class="glass-panel h-[600px] flex flex-col">
                <h2 class="text-xs font-black mb-4 text-blue-400 uppercase tracking-widest"><i class="fas fa-utensils mr-1"></i> مديونية المطاعم</h2>
                <div id="rests-list" class="overflow-y-auto flex-1 pr-1"></div>
            </section>

            <section class="glass-panel h-[600px] flex flex-col border-2 border-emerald-500/10">
                <h2 class="text-xs font-black mb-4 text-amber-400 uppercase tracking-widest text-center">الطلبات النشطة 🛰️</h2>
                <div id="active-orders" class="overflow-y-auto flex-1 pr-1"></div>
            </section>

            <section class="glass-panel h-[600px] flex flex-col">
                <h2 class="text-xs font-black mb-4 text-slate-500 uppercase tracking-widest text-center">آخر 10 عمليات</h2>
                <div id="completed-orders" class="overflow-y-auto flex-1 pr-1"></div>
            </section>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxODYE0lTSF_v3NdQw1lN0GCq3dcxeEfo3SB9QaDy2Klcg3NEMvs3GxUjHFxQ5fooQm2Q/exec";
        let map, markers = {}, currentData = null;

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('ar-EG'); }, 1000);

        async function loadMasterData(isSilent = false) {
            const pass = document.getElementById('master-pass').value;
            try {
                const res = await fetch(`${SCRIPT_URL}?action=get_master_data&pass=${encodeURIComponent(pass)}&cb=${Date.now()}`);
                const data = await res.json();
                if (data.status === "denied") return alert("كود خطأ!");
                currentData = data;
                if (!isSilent) { 
                    document.getElementById('login-block').classList.add('hidden'); 
                    document.getElementById('main-ui').classList.remove('hidden'); 
                    initMap(); 
                }
                renderUI(data);
                updateMarkers(data.drivers);
            } catch (e) { console.error("Sync Error"); }
        }

        function initMap() {
            if (map) return;
            map = L.map('map', { zoomControl: false }).setView([35.467, 44.392], 13);
            L.tileLayer('https://{s}.tile.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        }

        function renderUI(data) {
            const activeOrders = data.orders.filter(o => o[5] !== 'delivered' && o[5] !== 'canceled');
            const completedOrders = data.orders.filter(o => o[5] === 'delivered');

            document.getElementById('stat-total').innerText = data.orders.length;
            document.getElementById('stat-drivers').innerText = data.drivers.filter(d => d[4] === 'active').length;
            
            // حساب إجمالي الديون في السوق
            let totalMarketDebt = 0;
            data.restaurants.forEach(r => totalMarketDebt += Math.abs(parseFloat(r[9] || 0)));
            data.drivers.forEach(d => totalMarketDebt += Math.abs(parseFloat(d[10] || 0)));
            document.getElementById('stat-debt').innerText = totalMarketDebt.toLocaleString() + " د.ع";

            // 1. قائمة السائقين والمحافظ
            document.getElementById('drivers-list').innerHTML = data.drivers.map(d => {
                const wallet = parseFloat(d[10] || 0);
                return `
                <div class="item-row ${d[4]==='active'?'status-active':'status-away'}">
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="text-xs font-black">${d[1]}</p>
                            <p class="text-[10px] text-slate-500">${d[2]}</p>
                        </div>
                        <div class="text-left">
                            <p class="text-[11px] ${wallet < -20000 ? 'debt-alert' : 'text-emerald-400'} font-black">${wallet} د.ع</p>
                            <button onclick="clearDebt('Drivers', '${d[2]}', 10)" class="btn-clear mt-1">تصفية</button>
                        </div>
                    </div>
                </div>`;
            }).join('');

            // 2. قائمة المطاعم والديون
            document.getElementById('rests-list').innerHTML = data.restaurants.map(r => {
                const debt = parseFloat(r[9] || 0);
                return `
                <div class="item-row status-active">
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="text-xs font-black text-blue-400">${r[1]}</p>
                            <p class="text-[9px] text-slate-500 italic">${r[8] || 'مناصفة'}</p>
                        </div>
                        <div class="text-left">
                            <p class="text-[11px] font-black ${debt < 0 ? 'text-red-400' : ''}">${debt} د.ع</p>
                            <button onclick="clearDebt('Restaurants', '${r[2]}', 9)" class="btn-clear mt-1 bg-blue-500 text-white">تحصيل</button>
                        </div>
                    </div>
                </div>`;
            }).join('');

            // 3. الطلبات النشطة مع زر "تم التوصيل"
            document.getElementById('active-orders').innerHTML = activeOrders.reverse().map(o => `
                <div class="item-row status-active border-amber-500/50">
                    <div class="flex justify-between items-start mb-2">
                        <span class="text-[10px] font-black text-amber-500">#${o[0]}</span>
                        <span class="text-[9px] text-slate-400">${new Date(o[7]).toLocaleTimeString('ar-EG', {hour:'2-digit', minute:'2-digit'})}</span>
                    </div>
                    <p class="text-xs font-black">${o[1]}</p>
                    <p class="text-[10px] text-slate-400">📍 ${o[9]}</p>
                    <div class="mt-3 flex justify-between items-center">
                        <span class="text-[10px] font-bold text-emerald-400"><i class="fas fa-truck-moving"></i> ${o[6] || 'بانتظار سائق'}</span>
                        <button onclick="updateStatus('${o[0]}', 'delivered')" class="bg-emerald-500 text-slate-900 text-[10px] font-black px-3 py-1 rounded-lg">تسليم ✅</button>
                    </div>
                </div>`).join('');

            // 4. الأرشيف
            document.getElementById('completed-orders').innerHTML = completedOrders.reverse().slice(0, 10).map(o => `
                <div class="item-row opacity-50 border-slate-700">
                    <p class="text-[10px] font-bold">${o[1]} ➔ ${o[6]}</p>
                    <p class="text-[9px] text-emerald-500">تم التوصيل بنجاح</p>
                </div>`).join('');
        }

        async function updateStatus(orderID, status) {
            if(!confirm("تأكيد إتمام الطلب وتفعيل الخصم المالي؟")) return;
            const pass = document.getElementById('master-pass').value;
            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ action: 'master_control', targetSheet: 'Orders', targetID: orderID, colIndex: 5, newValue: status })
            });
            setTimeout(() => loadMasterData(true), 1000);
        }

        async function clearDebt(sheet, id, col) {
            if(!confirm("هل استلمت المبلغ نقداً وتريد تصفير الحساب؟")) return;
            const pass = document.getElementById('master-pass').value;
            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ action: 'master_control', targetSheet: sheet, targetID: id, colIndex: col, newValue: 0 })
            });
            setTimeout(() => loadMasterData(true), 1000);
        }

        function updateMarkers(drivers) {
            drivers.forEach(d => {
                if(d[5] && d[5] != 0) {
                    const color = d[4]==='active' ? '#10b981' : '#f59e0b';
                    const icon = L.divIcon({className: 'c-icon', html: `<div style="background: ${color}; width: 12px; height: 12px; border-radius: 50%; border: 2px solid white; box-shadow: 0 0 10px ${color}"></div>`});
                    if(markers[d[2]]) markers[d[2]].setLatLng([d[5], d[6]]);
                    else markers[d[2]] = L.marker([d[5], d[6]], {icon: icon}).addTo(map);
                }
            });
        }

        setInterval(() => { if (!document.getElementById('main-ui').classList.contains('hidden')) loadMasterData(true); }, 15000);
    </script>
</body>
</html>
