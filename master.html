<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Al-Hut Sovereign | لوحة القيادة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { 
            --primary: #2563eb; 
            --accent: #f59e0b;
            --bg-light: #f8fafc; 
            --card-bg: #ffffff;
            --border-color: #e2e8f0;
        }
        body { 
            background: var(--bg-light); 
            color: #1e293b; 
            font-family: 'Tajawal', sans-serif; 
            min-height: 100vh; 
            margin: 0; 
            overflow-x: hidden; 
        }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        
        /* شاشة الدخول */
        #login-block { 
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); 
            display: flex; align-items: center; justify-content: center; 
            position: fixed; inset: 0; z-index: 9999; 
        }

        /* الخريطة */
        #map { 
            height: 450px; border-radius: 1.5rem; 
            border: 4px solid white; 
            margin: 1.5rem 0; box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
        }

        /* البطاقات */
        .glass-panel { 
            background: var(--card-bg); 
            border: 1px solid var(--border-color); 
            border-radius: 1.5rem; padding: 1.5rem; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); 
        }

        .item-row { 
            background: #ffffff; 
            border-radius: 1rem; padding: 14px; 
            margin-bottom: 12px; border: 1px solid #f1f5f9; 
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .item-row:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 8px 15px rgba(0,0,0,0.05);
            border-color: var(--primary);
        }

        /* الأزرار التفاعلية */
        .btn-action { 
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 10px; width: 36px; height: 36px;
            display: flex; align-items: center; justify-content: center;
        }
        .btn-action:active { transform: scale(0.9); }
        
        .btn-green { background: #dcfce7; color: #166534; }
        .btn-green:hover { background: #22c55e; color: white; }
        
        .btn-red { background: #fee2e2; color: #991b1b; }
        .btn-red:hover { background: #ef4444; color: white; }
        
        .btn-blue { background: #dbeafe; color: #1e40af; }
        .btn-blue:hover { background: #3b82f6; color: white; }

        .btn-yellow { background: #fef3c7; color: #92400e; }
        .btn-yellow:hover { background: #f59e0b; color: white; }

        .hidden { display: none; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="login-block">
        <div class="max-w-[350px] w-full p-8 text-center bg-white rounded-[2.5rem] shadow-2xl">
            <div class="w-20 h-20 bg-blue-600 rounded-3xl mx-auto mb-6 flex items-center justify-center shadow-lg shadow-blue-200">
                <i class="fas fa-shield-halved text-4xl text-white"></i>
            </div>
            <h1 class="orbitron text-2xl font-black text-slate-800 mb-2 italic">AL-HUT <span class="text-blue-600">CORE</span></h1>
            <p class="text-[10px] text-slate-400 font-bold mb-8 italic uppercase tracking-widest">Master Control System</p>
            <input type="password" id="master-pass" placeholder="Password" class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl p-4 text-center text-blue-600 mb-6 outline-none focus:border-blue-500 transition-all font-bold">
            <button onclick="loadMasterData()" class="w-full bg-blue-600 text-white p-4 rounded-2xl font-black orbitron italic shadow-lg shadow-blue-100 active:scale-95 transition-all">ACCESS SYSTEM</button>
        </div>
    </div>

    <div id="main-ui" class="hidden p-6 max-w-7xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-white rounded-2xl flex items-center justify-center text-blue-600 shadow-sm border border-slate-100">
                    <i class="fas fa-whale fa-lg"></i>
                </div>
                <div>
                    <h1 class="orbitron text-xl font-black text-slate-800 tracking-tight uppercase">SOVEREIGN <span class="text-blue-600 italic">DASHBOARD</span></h1>
                    <p class="text-[9px] text-slate-400 font-bold uppercase tracking-[0.2em]">Operational Command Center</p>
                </div>
            </div>
            <div id="clock" class="orbitron text-sm text-slate-500 font-bold bg-white px-6 py-3 rounded-2xl border border-slate-100 shadow-sm italic">00:00:00</div>
        </header>

        <div id="map"></div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 mt-4">
            <section class="glass-panel h-[680px] flex flex-col border-t-4 border-blue-500">
                <div class="mb-6">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="font-black text-slate-800 text-xs uppercase italic tracking-wider"><i class="fas fa-motorcycle text-blue-500 mr-2"></i> رادار الطيارين</h2>
                        <span id="d-count" class="bg-blue-50 text-blue-600 px-3 py-1 rounded-full text-[10px] font-black">0</span>
                    </div>
                    <input type="text" id="searchDriver" oninput="filterDrivers()" placeholder="بحث سريع..." class="w-full bg-slate-50 border border-slate-100 rounded-xl p-3 text-[11px] outline-none focus:bg-white focus:border-blue-400 transition-all">
                </div>
                <div id="drivers-list" class="overflow-y-auto flex-1 space-y-1"></div>
            </section>

            <section class="glass-panel h-[680px] flex flex-col border-t-4 border-emerald-500">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="font-black text-slate-800 text-xs uppercase italic tracking-wider"><i class="fas fa-store text-emerald-500 mr-2"></i> المحطات المالية</h2>
                    <span id="r-count" class="bg-emerald-50 text-emerald-600 px-3 py-1 rounded-full text-[10px] font-black">0</span>
                </div>
                <div id="rests-list" class="overflow-y-auto flex-1 space-y-1"></div>
            </section>

            <section class="glass-panel h-[680px] flex flex-col border-t-4 border-amber-500">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="font-black text-slate-800 text-xs uppercase italic tracking-wider"><i class="fas fa-bolt text-amber-500 mr-2"></i> تدفق العمليات</h2>
                    <span id="o-count" class="bg-amber-50 text-amber-600 px-3 py-1 rounded-full text-[10px] font-black">0</span>
                </div>
                <div id="orders-list" class="overflow-y-auto flex-1 space-y-1"></div>
            </section>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyIqK63Xu4b2G8BN0aNQIs42oTqvvYRlGDLfQCCSMo68YPYoysKjQ_IjoXhie0MhIaZpQ/exec";
        let map, markers = {}, currentData = null;

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB'); }, 1000);

        function initMap() {
            if (map) return;
            map = L.map('map', { zoomControl: false }).setView([35.467, 44.392], 13);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);
        }

        async function loadMasterData(isSilent = false) {
            const pass = document.getElementById('master-pass').value;
            try {
                const res = await fetch(`${SCRIPT_URL}?action=get_master_data&pass=${encodeURIComponent(pass)}`);
                const data = await res.json();
                if (data.status === "denied") return alert("ACCESS DENIED");

                currentData = data;
                if (!isSilent) { 
                    document.getElementById('login-block').classList.add('hidden'); 
                    document.getElementById('main-ui').classList.remove('hidden'); 
                    initMap(); 
                }
                renderUI(data);
                updateMarkers(data.drivers);
            } catch (e) { console.error("Sync Error"); }
        }

        function renderUI(data) {
            document.getElementById('d-count').innerText = data.drivers.length;
            document.getElementById('r-count').innerText = data.restaurants.length;
            document.getElementById('o-count').innerText = data.orders.length;

            // السائقين
            document.getElementById('drivers-list').innerHTML = data.drivers.map(d => `
                <div class="item-row driver-item" data-name="${d[1]}" data-phone="${d[2]}">
                    <div class="flex justify-between items-center mb-3">
                        <span class="font-black text-slate-700 text-xs">${d[1]}</span>
                        <span class="text-[9px] font-bold px-2 py-1 rounded bg-slate-100 ${d[4] === 'active' ? 'text-blue-600' : 'text-slate-400'}">${d[4]}</span>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="trackOnMap(${d[5]}, ${d[6]})" class="btn-action btn-blue"><i class="fas fa-location-crosshairs"></i></button>
                        <button onclick="control('Drivers', '${d[2]}', 4, 'active')" class="btn-action btn-green"><i class="fas fa-check"></i></button>
                        <a href="tel:${d[2]}" class="btn-action btn-yellow"><i class="fas fa-phone"></i></a>
                        <button onclick="deleteItem('Drivers', '${d[2]}')" class="btn-action btn-red"><i class="fas fa-trash-can"></i></button>
                    </div>
                </div>`).join('');

            // المطاعم
            document.getElementById('rests-list').innerHTML = data.restaurants.map(r => {
                const totalOrders = data.orders.filter(o => o[1] === r[1]).length;
                const totalDebt = totalOrders * parseFloat(r[5] || 0);
                return `
                <div class="item-row">
                    <div class="flex justify-between items-start mb-3">
                        <div>
                            <span class="font-black text-slate-700 text-xs block">${r[1]}</span>
                            <span class="text-[9px] text-slate-400 font-bold tracking-tighter">${totalOrders} طلب | ${totalDebt} IQD</span>
                        </div>
                        <button onclick="resetCommission('${r[2]}')" class="text-[9px] bg-slate-900 text-white px-3 py-1 rounded-lg font-black active:scale-90 transition-all">تصفير</button>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="control('Restaurants', '${r[2]}', 4, 'active')" class="btn-action btn-green"><i class="fas fa-power-off"></i></button>
                        <a href="tel:${r[2]}" class="btn-action btn-blue"><i class="fas fa-headset"></i></a>
                        <button onclick="deleteItem('Restaurants', '${r[2]}')" class="btn-action btn-red"><i class="fas fa-trash-can"></i></button>
                    </div>
                </div>`;
            }).join('');

            // الطلبيات
            document.getElementById('orders-list').innerHTML = data.orders.map(o => {
                const customerPhone = o[3].match(/07\d{9}/) || "";
                return `
                <div class="item-row text-[10px]">
                    <div class="flex justify-between mb-3 border-b border-slate-50 pb-2">
                        <span class="text-blue-600 font-black">#${o[0]}</span>
                        <span class="text-slate-400 font-bold">${o[5]}</span>
                    </div>
                    <p class="font-black text-slate-700 mb-1">${o[1]}</p>
                    <p class="text-slate-500 text-[9px] mb-3 truncate italic">${o[3]}</p>
                    <div class="flex gap-2">
                        <a href="tel:${o[10]}" class="flex-1 bg-slate-100 text-slate-700 py-2 rounded-xl text-center font-black hover:bg-slate-200 transition-all"><i class="fas fa-store"></i></a>
                        ${customerPhone ? `<a href="tel:${customerPhone}" class="flex-1 bg-blue-600 text-white py-2 rounded-xl text-center font-black shadow-md shadow-blue-100"><i class="fas fa-phone"></i></a>` : ''}
                        <button onclick="deleteItem('Orders', '${o[0]}')" class="btn-action btn-red"><i class="fas fa-trash"></i></button>
                    </div>
                </div>`;
            }).reverse().join('');
        }

        function filterDrivers() {
            const val = document.getElementById('searchDriver').value.toLowerCase();
            document.querySelectorAll('.driver-item').forEach(el => {
                const text = el.getAttribute('data-name').toLowerCase() + el.getAttribute('data-phone');
                el.classList.toggle('hidden', !text.includes(val));
            });
        }

        async function resetCommission(phone) {
            const pass = prompt("Confirmation Required - Master Pass:");
            if (pass === document.getElementById('master-pass').value) {
                alert("تم تصفير السجلات المالية");
                loadMasterData(true);
            }
        }

        async function deleteItem(sheet, id) {
            if(!confirm("سيتم الحذف من القاعدة، موافق؟")) return;
            const pass = document.getElementById('master-pass').value;
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'delete_item', pass: pass, targetSheet: sheet, targetID: id }) });
            setTimeout(() => loadMasterData(true), 1200);
        }

        async function control(target, id, col, val) {
            const pass = document.getElementById('master-pass').value;
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'master_control', pass: pass, targetSheet: target, targetID: id, colIndex: col, newValue: val }) });
            setTimeout(() => loadMasterData(true), 1200);
        }

        function trackOnMap(lat, lng) {
            if(!lat || lat == 0) return alert("Signal Lost.");
            map.flyTo([lat, lng], 17, { animate: true, duration: 1 });
        }

        function updateMarkers(drivers) {
            drivers.forEach(d => {
                const lat = parseFloat(d[5]), lng = parseFloat(d[6]);
                if(lat && lat !== 0) {
                    const color = d[4] === 'active' ? '#2563eb' : '#94a3b8';
                    const icon = L.divIcon({
                        className: 'm-icon',
                        html: `<div style='background:${color}; width:12px; height:12px; border:3px solid white; border-radius:50%; box-shadow:0 0 10px rgba(0,0,0,0.1);'></div>`
                    });
                    if(markers[d[2]]) markers[d[2]].setLatLng([lat, lng]);
                    else markers[d[2]] = L.marker([lat, lng], {icon}).addTo(map);
                }
            });
        }

        setInterval(() => { if (!document.getElementById('main-ui').classList.contains('hidden')) loadMasterData(true); }, 8000);
    </script>
</body>
</html>
