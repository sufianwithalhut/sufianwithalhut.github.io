<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>التحكم المركزي | منظومة الحوت 🐋 V10.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --primary: #2563eb; --danger: #ef4444; --success: #22c55e; --warning: #f59e0b; }
        body { background: #f8fafc; color: #1e293b; font-family: 'Tajawal', sans-serif; overflow-x: hidden; }
        #map { height: 350px; border-radius: 1.5rem; border: 4px solid white; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 1.5rem; z-index: 10; }
        .glass-panel { background: white; border: 1px solid #e2e8f0; border-radius: 1.5rem; padding: 1rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02); }
        .item-row { border-radius: 1rem; padding: 12px; margin-bottom: 10px; background: white; border: 1px solid #f1f5f9; transition: 0.3s; position: relative; }
        .item-row:hover { border-color: var(--primary); transform: translateY(-2px); }
        .btn-action { width: 30px; height: 30px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 13px; transition: 0.2s; border: none; cursor: pointer; }
        .stats-badge { font-size: 10px; font-weight: 800; padding: 2px 8px; border-radius: 6px; }
        .hidden { display: none; }
    </style>
</head>
<body class="p-4 lg:p-6">

    <div id="login-block" class="fixed inset-0 z-[9999] flex items-center justify-center bg-slate-900 px-4">
        <div class="max-w-[400px] w-full p-8 text-center glass-panel shadow-2xl">
            <div class="text-5xl mb-4 text-blue-600">🐋</div>
            <h1 class="text-2xl font-black mb-2 italic text-slate-800 uppercase">Master Command</h1>
            <p class="text-slate-400 text-xs mb-6 font-bold uppercase tracking-widest">Kirkuk Logistics Center</p>
            <input type="password" id="master-pass" placeholder="••••••••" class="w-full bg-slate-100 rounded-2xl p-4 text-center mb-4 outline-none font-bold text-xl tracking-widest border-2 focus:border-blue-500">
            <button onclick="loadMasterData()" class="w-full bg-blue-600 hover:bg-blue-700 text-white p-4 rounded-2xl font-black shadow-lg transition-all">دخول آمن</button>
        </div>
    </div>

    <div id="main-ui" class="hidden max-w-[1600px] mx-auto">
        <header class="flex justify-between items-center mb-6 bg-white p-4 rounded-3xl border border-white shadow-sm">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 text-white w-10 h-10 rounded-xl flex items-center justify-center shadow-lg shadow-blue-200">
                    <i class="fas fa-crown"></i>
                </div>
                <div>
                    <h1 class="text-sm font-black text-slate-800 leading-tight italic uppercase">Al-Hut V10.0</h1>
                    <p class="text-[9px] text-blue-600 font-bold tracking-tighter">لوحة التحكم المركزية - كركوك</p>
                </div>
            </div>
            <div id="clock" class="stats-card bg-slate-900 text-white px-4 py-2 rounded-2xl text-lg font-black italic">00:00</div>
        </header>

        <div id="map"></div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            
            <section class="glass-panel h-[600px] flex flex-col">
                <h2 class="font-black text-[11px] uppercase text-slate-400 mb-4 flex items-center gap-2 border-b pb-2">
                    <i class="fas fa-motorcycle text-blue-500"></i> أسطول الكباتن
                </h2>
                <div id="drivers-list" class="overflow-y-auto flex-1 space-y-3 pr-1"></div>
            </section>

            <section class="glass-panel h-[600px] flex flex-col">
                <h2 class="font-black text-[11px] uppercase text-slate-400 mb-4 flex items-center gap-2 border-b pb-2">
                    <i class="fas fa-store text-emerald-500"></i> الإدارة المالية للمطاعم
                </h2>
                <div id="rests-list" class="overflow-y-auto flex-1 space-y-3 pr-1"></div>
            </section>

            <section class="glass-panel h-[600px] flex flex-col">
                <h2 class="font-black text-[11px] uppercase text-slate-400 mb-4 flex items-center gap-2 border-b pb-2">
                    <i class="fas fa-bolt text-amber-500"></i> الرادار المباشر
                </h2>
                <div id="active-orders" class="overflow-y-auto flex-1 space-y-3 pr-1"></div>
            </section>

        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzywi3-mLv5H4bNHYvQbFDpy_FwA-AceD4g8JZX6Ah3QZhmC5LGXNLvBeQBjYO9tmt9vA/exec";
        let map, markers = {};

        async function loadMasterData(isSilent = false) {
            const pass = document.getElementById('master-pass').value;
            if(!pass) return;

            try {
                const response = await fetch(`${SCRIPT_URL}?action=get_master_data&pass=${encodeURIComponent(pass)}`);
                const data = await response.json();
                
                if (data.status === "denied") return alert("الرمز غير صحيح!");

                if (!isSilent) {
                    document.getElementById('login-block').classList.add('hidden');
                    document.getElementById('main-ui').classList.remove('hidden');
                    initMap();
                }
                renderDrivers(data.drivers);
                renderRestaurants(data.restaurants);
                renderOrders(data.orders);
            } catch (e) { console.error("Sync Error"); }
        }

        function initMap() {
            if (map) return;
            map = L.map('map', { zoomControl: false }).setView([35.467, 44.392], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{y}.png').addTo(map);
        }

        function renderDrivers(drivers) {
            document.getElementById('drivers-list').innerHTML = drivers.slice(1).map(d => `
                <div class="item-row border-r-4 ${d[4]==='active'?'border-blue-500':'border-slate-300'}">
                    <div class="flex justify-between items-center mb-2">
                        <p class="font-black text-xs text-slate-800">${d[1]}</p>
                        <span class="stats-badge ${d[4]==='active'?'bg-blue-100 text-blue-600':'bg-red-100 text-red-600'}">${d[4]}</span>
                    </div>
                    <div class="flex justify-between items-center text-[10px] font-bold text-slate-500 mb-3">
                        <span>طلبات: ${d[7] || 0}</span>
                        <span class="text-red-600 bg-red-50 px-2 rounded">المحفظة: ${parseFloat(d[10]||0).toLocaleString()} د.ع</span>
                    </div>
                    <div class="flex gap-1">
                        <a href="tel:${d[2]}" class="btn-action bg-green-50 text-green-600"><i class="fas fa-phone"></i></a>
                        <a href="https://wa.me/964${d[2].slice(1)}" class="btn-action bg-emerald-50 text-emerald-600"><i class="fab fa-whatsapp"></i></a>
                        <button onclick="focusOnMap(${d[5]},${d[6]})" class="btn-action bg-blue-50 text-blue-600"><i class="fas fa-location-arrow"></i></button>
                        <button onclick="confirmAction('تصفير ديون السائق؟', 'master_control', 'Drivers','${d[2]}',10,0)" class="btn-action bg-red-50 text-red-600"><i class="fas fa-eraser"></i></button>
                        <button onclick="confirmAction('تغيير الحالة؟', 'master_control', 'Drivers','${d[2]}',4,'${d[4]==='active'?'pending':'active'}')" class="flex-1 text-[9px] font-black bg-slate-100 rounded-lg hover:bg-slate-200">تبديل الحالة</button>
                    </div>
                </div>`).join('');
            
            drivers.slice(1).forEach(d => {
                if(d[5] && d[5] != 0) {
                    if(markers[d[2]]) markers[d[2]].setLatLng([d[5], d[6]]);
                    else markers[d[2]] = L.circleMarker([d[5], d[6]], {radius: 6, color: '#2563eb', fillOpacity: 0.8}).addTo(map);
                }
            });
        }

        function renderRestaurants(rests) {
            document.getElementById('rests-list').innerHTML = rests.slice(1).map(r => `
                <div class="item-row border-r-4 border-emerald-500">
                    <div class="flex justify-between items-start mb-2">
                        <div>
                            <p class="font-black text-xs text-slate-800">${r[1]}</p>
                            <p class="text-[9px] font-bold text-slate-400 italic">${r[8] || 'غير محدد'} دافع</p>
                        </div>
                        <div class="text-left">
                            <p class="text-[11px] font-black text-red-600">${parseFloat(r[9]||0).toLocaleString()} د.ع</p>
                            <p class="text-[8px] font-bold text-slate-400 uppercase">ديون المطعم</p>
                        </div>
                    </div>
                    <div class="bg-slate-50 p-2 rounded-lg flex justify-between items-center text-[9px] font-bold text-slate-600 mb-3 border border-slate-100">
                        <span>نوع الدفع: ${r[8]}</span>
                        <span>طلبات غير مصفّرة: ${r[7] || 0}</span>
                    </div>
                    <div class="flex gap-1">
                        <a href="tel:${r[2]}" class="btn-action bg-green-50 text-green-600"><i class="fas fa-phone"></i></a>
                        <button onclick="confirmAction('تصفير حساب المطعم؟', 'master_control', 'Restaurants','${r[2]}',9,0)" class="btn-action bg-red-50 text-red-600"><i class="fas fa-undo"></i></button>
                        <button onclick="confirmAction('إيقاف مؤقت؟', 'master_control', 'Restaurants','${r[2]}',4,'pending')" class="btn-action bg-amber-50 text-amber-600"><i class="fas fa-pause"></i></button>
                        <button onclick="confirmAction('حذف نهائي للمطعم؟', 'delete_item', 'Restaurants','${r[2]}')" class="btn-action bg-slate-900 text-white"><i class="fas fa-trash"></i></button>
                    </div>
                </div>`).join('');
        }

        function renderOrders(orders) {
            const active = orders.slice(1).filter(o => o[5] !== 'delivered').reverse();
            document.getElementById('active-orders').innerHTML = active.map(o => `
                <div class="item-row border-r-4 ${o[5]==='waiting'?'border-amber-500':'border-blue-500'}">
                    <div class="flex justify-between items-center mb-1">
                        <p class="font-black text-xs text-slate-800">${o[1]}</p>
                        <span class="text-[9px] font-bold text-blue-600 bg-blue-50 px-2 rounded">${o[5]}</span>
                    </div>
                    <p class="text-[10px] text-slate-500 font-bold mb-2">${o[9]} - ${o[8]} د.ع</p>
                    <div class="flex justify-between items-center pt-2 border-t">
                        <p class="text-[9px] font-black text-slate-400">كابتن: ${o[6] || 'جاري البحث'}</p>
                        <button onclick="confirmAction('إلغاء الطلب نهائياً؟', 'delete_item', 'Orders','${o[0]}')" class="btn-action bg-red-50 text-red-500 border-none"><i class="fas fa-times"></i></button>
                    </div>
                </div>`).join('');
        }

        async function confirmAction(msg, action, sheet, id, col, val) {
            if(!confirm(msg)) return;
            const pass = document.getElementById('master-pass').value;
            try {
                const response = await fetch(SCRIPT_URL, { 
                    method: 'POST', 
                    body: JSON.stringify({ action: action, pass: pass, targetSheet: sheet, targetID: id, colIndex: col, newValue: val }) 
                });
                const result = await response.json();
                if(result.status === "success") {
                    alert("تم تنفيذ الإجراء بنجاح ✅");
                    loadMasterData(true);
                } else {
                    alert("فشل الإجراء ❌: " + (result.msg || "الرمز غير صحيح"));
                }
            } catch (e) { alert("خطأ في الاتصال بالخادم"); }
        }

        function focusOnMap(lat, lng) {
            if(lat && lat != 0) {
                map.flyTo([lat, lng], 16);
                L.popup().setLatLng([lat, lng]).setContent("موقع الكابتن الحالي").openOn(map);
            } else {
                alert("الموقع غير متاح حالياً");
            }
        }

        setInterval(() => { if (!document.getElementById('main-ui').classList.contains('hidden')) loadMasterData(true); }, 15000);
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = String(now.getHours()).padStart(2,'0') + ":" + String(now.getMinutes()).padStart(2,'0'); 
        }, 1000);
    </script>
</body>
</html>
