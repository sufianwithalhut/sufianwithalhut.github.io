<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>مركز قيادة الحوت | Al-Hut Command Center</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root {
            --sidebar-width: 280px;
            --primary-dark: #0f172a;
            --accent-orange: #f97316;
            --success-green: #10b981;
            --bg-light: #f8fafc;
            --glass: rgba(255, 255, 255, 0.9);
        }

        body { 
            background-color: var(--bg-light); 
            font-family: 'Cairo', sans-serif; 
            margin: 0; 
            color: var(--primary-dark);
        }

        /* شاشة القفل الاحترافية */
        #authOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            z-index: 10000; display: flex; align-items: center; justify-content: center;
        }
        .auth-card {
            background: white; border-radius: 40px; padding: 50px; width: 90%; max-width: 450px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3); text-align: center;
        }

        /* القائمة الجانبية (Sidebar) */
        .sidebar {
            width: var(--sidebar-width); background: var(--primary-dark);
            height: 100vh; position: fixed; right: 0; top: 0; color: white; 
            padding: 30px 20px; z-index: 1001; transition: 0.3s;
            box-shadow: -10px 0 30px rgba(0,0,0,0.1);
        }
        
        .main-content { 
            margin-right: var(--sidebar-width); 
            padding: 40px; 
            min-height: 100vh; 
            transition: 0.3s;
        }

        .nav-item {
            display: flex; align-items: center; gap: 15px; padding: 18px 25px; color: #94a3b8;
            text-decoration: none; border-radius: 20px; margin-bottom: 8px; cursor: pointer; transition: 0.3s;
            font-weight: 600;
        }
        .nav-item:hover { background: rgba(255,255,255,0.05); color: white; }
        .nav-item.active { 
            background: var(--accent-orange); color: white; 
            box-shadow: 0 10px 20px rgba(249, 115, 22, 0.2);
        }

        /* بطاقات الإحصائيات */
        .stat-card {
            background: white; border-radius: 30px; padding: 30px; 
            border: 1px solid rgba(0,0,0,0.03); height: 100%;
            transition: 0.3s; position: relative; overflow: hidden;
        }
        .stat-card:hover { transform: translateY(-5px); box-shadow: 0 20px 40px rgba(0,0,0,0.05); }
        .stat-icon {
            width: 60px; height: 60px; border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; margin-bottom: 20px;
        }

        /* الخريطة */
        #adminMap { 
            height: 550px; width: 100%; border-radius: 35px; 
            border: 12px solid white; box-shadow: 0 15px 45px rgba(0,0,0,0.07);
        }

        /* الجداول */
        .table-container { 
            background: white; border-radius: 35px; padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.02); margin-top: 30px;
        }
        .table thead th { background: #f8fafc; border: none; padding: 20px; font-weight: 900; color: #64748b; text-transform: uppercase; font-size: 0.8rem; }
        .table tbody td { padding: 20px; vertical-align: middle; border-bottom: 1px solid #f1f5f9; font-weight: 600; }

        /* حالة الطلب (Badges) */
        .status-pill {
            padding: 6px 16px; border-radius: 12px; font-size: 0.75rem; font-weight: 900;
        }
        .status-pending { background: #fef3c7; color: #d97706; }
        .status-active { background: #dcfce7; color: #15803d; }

        /* شريط الوقت الحي */
        .live-indicator {
            width: 10px; height: 10px; background: var(--success-green);
            border-radius: 50%; display: inline-block; margin-left: 8px;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        @media (max-width: 1100px) {
            .sidebar { transform: translateX(100%); }
            .main-content { margin-right: 0; padding: 20px; }
            .sidebar.show { transform: translateX(0); }
        }
    </style>
</head>
<body>

<div id="authOverlay">
    <div class="auth-card">
        <div class="mb-4">
            <div class="d-inline-block p-4 bg-light rounded-circle shadow-sm">
                <i data-lucide="shield-check" size="50" color="#f97316"></i>
            </div>
        </div>
        <h3 class="fw-black mb-2">نظام الحوت الذكي</h3>
        <p class="text-muted mb-4 small fw-bold">مركز الإدارة والتحكم والسيطرة</p>
        <input type="password" id="masterPass" class="form-control form-control-lg text-center mb-3 shadow-none border-2 rounded-4" placeholder="••••••">
        <button class="btn btn-dark w-100 py-3 fw-black rounded-4 shadow-lg" onclick="checkAuth()">دخول المسؤول</button>
    </div>
</div>

<div class="d-none" id="mainDashboard">
    <aside class="sidebar" id="sidebar">
        <div class="d-flex align-items-center gap-3 mb-5 px-3">
            <div class="bg-warning p-2 rounded-3 shadow-sm"><i data-lucide="anchor" color="#0f172a"></i></div>
            <h4 class="m-0 fw-black">AL-HUT PRO</h4>
        </div>
        
        <nav>
            <div class="nav-item active" onclick="showTab(event, 'live')"><i data-lucide="layout-dashboard"></i> <span>الرصد المباشر</span></div>
            <div class="nav-item" onclick="showTab(event, 'orders')"><i data-lucide="shopping-cart"></i> <span>إدارة الطلبات</span></div>
            <div class="nav-item" onclick="showTab(event, 'restaurants')"><i data-lucide="store"></i> <span>المطاعم الشريكة</span></div>
            <div class="nav-item" onclick="showTab(event, 'drivers')"><i data-lucide="truck"></i> <span>أسطول الكباتن</span></div>
        </nav>

        <div style="position: absolute; bottom: 40px; width: calc(100% - 40px);">
            <button class="btn btn-link text-danger text-decoration-none fw-bold" onclick="location.reload()">
                <i data-lucide="log-out" class="me-2"></i> تسجيل خروج
            </button>
        </div>
    </aside>

    <main class="main-content">
        <header class="d-flex justify-content-between align-items-start mb-5">
            <div>
                <h1 class="fw-black m-0">لوحة التحكم</h1>
                <p class="text-muted fw-bold small"><span class="live-indicator"></span> النظام متصل ومستقر الآن</p>
            </div>
            <div id="liveTime" class="bg-white px-4 py-2 rounded-4 shadow-sm fw-black border border-2 text-primary fs-5">00:00:00</div>
        </header>

        <div id="tab-live" class="admin-tab">
            <div class="row g-4 mb-5">
                <div class="col-xl-4">
                    <div class="stat-card border-start border-primary border-5">
                        <div class="stat-icon bg-primary bg-opacity-10 text-primary"><i data-lucide="package"></i></div>
                        <h6 class="text-muted fw-bold">إجمالي الطلبات اليوم</h6>
                        <h2 class="fw-black m-0" id="count-orders">0</h2>
                    </div>
                </div>
                <div class="col-xl-4">
                    <div class="stat-card border-start border-success border-5">
                        <div class="stat-icon bg-success bg-opacity-10 text-success"><i data-lucide="navigation-2"></i></div>
                        <h6 class="text-muted fw-bold">كابتن متصل حالياً</h6>
                        <h2 class="fw-black m-0" id="count-drivers">0</h2>
                    </div>
                </div>
                <div class="col-xl-4">
                    <div class="stat-card border-start border-warning border-5">
                        <div class="stat-icon bg-warning bg-opacity-10 text-warning"><i data-lucide="utensils"></i></div>
                        <h6 class="text-muted fw-bold">المطاعم النشطة</h6>
                        <h2 class="fw-black m-0" id="count-res">0</h2>
                    </div>
                </div>
            </div>
            
            <div id="adminMap"></div>
        </div>

        <div id="tab-orders" class="admin-tab d-none">
            <div class="table-container table-responsive">
                <h4 class="fw-black mb-4">سجل الطلبات الأخير</h4>
                <table class="table align-middle">
                    <thead>
                        <tr>
                            <th>الرقم</th>
                            <th>المطعم</th>
                            <th>الكابتن</th>
                            <th>العنوان</th>
                            <th>الحالة</th>
                        </tr>
                    </thead>
                    <tbody id="ordersTableBody"></tbody>
                </table>
            </div>
        </div>

        <div id="tab-restaurants" class="admin-tab d-none"><div class="row g-4" id="resListContainer"></div></div>
        <div id="tab-drivers" class="admin-tab d-none"><div class="row g-4" id="driverListContainer"></div></div>
    </main>
</div>

<script async defer src="https://maps.googleapis.com/maps/api/js?callback=initMasterMap"></script>
<script>
    lucide.createIcons();
    
    // إعدادات الـ API
    const API_URL = "https://script.google.com/macros/s/AKfycbyj-B2X68zjPMcI7SvAT8r2n1PGG18uVKTBnsWoB82hM55cAfyZ4AIHIhtRr4AHb7b5Qw/exec";
    const MASTER_KEY = "223344";

    function checkAuth() {
        const pass = document.getElementById('masterPass').value;
        if(pass === MASTER_KEY) {
            document.getElementById('authOverlay').classList.add('d-none');
            document.getElementById('mainDashboard').classList.remove('d-none');
            startClock();
            refreshData();
            setInterval(refreshData, 15000); // تحديث كل 15 ثانية
        } else {
            alert("⚠️ رمز الوصول غير صحيح!");
        }
    }

    function showTab(e, name) {
        document.querySelectorAll('.admin-tab').forEach(t => t.classList.add('d-none'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('tab-' + name).classList.remove('d-none');
        e.currentTarget.classList.add('active');
        lucide.createIcons();
    }

    function initMasterMap() {
        // مركز الخريطة على كركوك
        const map = new google.maps.Map(document.getElementById("adminMap"), {
            zoom: 13, 
            center: { lat: 35.468, lng: 44.392 },
            styles: [ { "featureType": "all", "elementType": "geometry.fill", "stylers": [ { "weight": "2.00" } ] } ],
            disableDefaultUI: true
        });
    }

    function startClock() {
        setInterval(() => {
            const now = new Date();
            document.getElementById('liveTime').innerText = now.toLocaleTimeString('en-GB');
        }, 1000);
    }

    function refreshData() {
        const script = document.createElement('script');
        script.src = `${API_URL}?action=getGlobalData&callback=renderDashboard`;
        document.body.appendChild(script);
        script.onload = () => script.remove();
    }

    window.renderDashboard = function(data) {
        // تحديث العدادات
        document.getElementById('count-orders').innerText = (data.orders.length - 1);
        document.getElementById('count-drivers').innerText = data.drivers.filter(d => d[4] === 'active').length;
        document.getElementById('count-res').innerText = data.restaurants.filter(r => r[4] === 'active').length;

        // تحديث جدول الطلبات
        let oHtml = '';
        data.orders.slice(1).reverse().forEach(o => {
            const statusClass = o[6] === 'accepted' ? 'status-active' : 'status-pending';
            oHtml += `
                <tr>
                    <td><span class="text-muted">#${o[1]}</span></td>
                    <td>${o[2]}</td>
                    <td>${o[7] || '<span class="text-warning">جاري البحث...</span>'}</td>
                    <td>${o[9]}</td>
                    <td><span class="status-pill ${statusClass}">${o[6]}</span></td>
                </tr>`;
        });
        document.getElementById('ordersTableBody').innerHTML = oHtml;

        // تحديث قوائم المطاعم والكباتن
        renderGrid('resListContainer', data.restaurants, 'store');
        renderGrid('driverListContainer', data.drivers, 'truck');
    };

    function renderGrid(containerId, list, icon) {
        let html = '';
        list.slice(1).forEach(item => {
            html += `
            <div class="col-md-4">
                <div class="stat-card">
                    <div class="d-flex align-items-center gap-3">
                        <div class="stat-icon bg-light text-dark"><i data-lucide="${icon}"></i></div>
                        <div>
                            <h6 class="fw-black m-0">${item[1]}</h6>
                            <small class="text-muted">${item[2]}</small>
                        </div>
                    </div>
                    <div class="mt-3 pt-3 border-top d-flex justify-content-between align-items-center">
                        <span class="badge ${item[4] === 'active' ? 'bg-success' : 'bg-secondary'} rounded-pill">${item[4]}</span>
                        <i data-lucide="chevron-left" size="16" class="text-muted"></i>
                    </div>
                </div>
            </div>`;
        });
        document.getElementById(containerId).innerHTML = html;
        lucide.createIcons();
    }
</script>
</body>
</html>
