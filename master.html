<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>التحكم المركزي | منظومة الحوت 🐋</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --primary: #2563eb; --danger: #ef4444; --success: #22c55e; --warning: #f59e0b; }
        body { background: #f8fafc; color: #1e293b; font-family: 'Tajawal', sans-serif; margin: 0; overflow-x: hidden; }
        #map { height: 400px; border-radius: 2rem; border: 8px solid white; box-shadow: 0 20px 50px rgba(0,0,0,0.1); margin-bottom: 2rem; z-index: 10; }
        .glass-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid #e2e8f0; border-radius: 1.5rem; padding: 1.25rem; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); }
        .critical-pulse { animation: red-pulse 1.5s infinite; border: 2px solid var(--danger) !important; background: #fff1f1 !important; }
        @keyframes red-pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        .item-row { border-radius: 1rem; padding: 12px; margin-bottom: 10px; transition: 0.3s; background: white; border: 1px solid #f1f5f9; position: relative; }
        .row-active { border-right: 5px solid var(--primary); }
        .btn-action { width: 32px; height: 32px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 14px; transition: 0.2s; border: none; cursor: pointer; }
        .btn-red { background: #fef2f2; color: var(--danger); }
        .stats-card { background: white; padding: 1rem; border-radius: 1.25rem; border: 1px solid #e2e8f0; text-align: center; }
        .hidden { display: none; }
    </style>
</head>
<body class="p-4 lg:p-6">

    <div id="login-block" class="fixed inset-0 z-[9999] flex items-center justify-center bg-slate-900 px-4">
        <div class="max-w-[400px] w-full p-8 text-center glass-panel shadow-2xl">
            <div class="text-5xl mb-4">🐋</div>
            <h1 class="text-2xl font-black mb-2 italic text-slate-800">غرفة قيادة الحوت</h1>
            <p class="text-slate-400 text-sm mb-6">الرجاء إدخال رمز السلطة المركزية</p>
            <input type="password" id="master-pass" placeholder="••••••••" class="w-full bg-slate-100 rounded-2xl p-4 text-center mb-4 outline-none font-bold text-xl tracking-widest border-2 focus:border-blue-500 transition-all">
            <button id="loginBtn" onclick="loadMasterData()" class="w-full bg-blue-600 hover:bg-blue-700 text-white p-4 rounded-2xl font-black shadow-lg shadow-blue-200 transition-all">
                دخول آمن
            </button>
        </div>
    </div>

    <div id="main-ui" class="hidden max-w-[1600px] mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4 bg-white/70 backdrop-blur p-4 rounded-3xl border border-white shadow-sm">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 text-white w-10 h-10 rounded-xl flex items-center justify-center shadow-lg shadow-blue-200">
                    <i class="fas fa-whale"></i>
                </div>
                <div>
                    <h1 class="text-lg font-black text-slate-800 leading-tight">AL-HUT COMMAND <span class="text-blue-600">V9.0</span></h1>
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Kirkuk Logistics Center</p>
                </div>
            </div>
            <div class="flex gap-4 overflow-x-auto w-full md:w-auto pb-2">
                <div id="stat-active-drivers" class="stats-card min-w-[100px]"><p class="text-[9px] font-bold text-slate-400 uppercase">سائق نشط</p><p class="text-lg font-black text-blue-600">0</p></div>
                <div id="stat-pending-orders" class="stats-card min-w-[100px]"><p class="text-[9px] font-bold text-slate-400 uppercase">بالانتظار</p><p class="text-lg font-black text-amber-500">0</p></div>
                <div id="clock" class="stats-card min-w-[120px] bg-slate-900 !text-white border-none"><p class="text-[9px] font-bold opacity-60 uppercase">الوقت</p><p class="text-lg font-black">00:00</p></div>
            </div>
        </header>

        <div id="map"></div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            <section class="glass-panel h-[600px] flex flex-col border-t-4 border-blue-500">
                <h2 class="font-black text-sm uppercase text-slate-600 mb-4"><i class="fas fa-motorcycle mr-1 text-blue-500"></i> الأسطول</h2>
                <div id="drivers-list" class="overflow-y-auto flex-1 space-y-2 pr-1"></div>
            </section>
            <section class="glass-panel h-[600px] flex flex-col border-t-4 border-emerald-500">
                <h2 class="font-black text-sm uppercase text-slate-600 mb-4"><i class="fas fa-store mr-1 text-emerald-500"></i> المحاسبة</h2>
                <div id="rests-list" class="overflow-y-auto flex-1 space-y-2 pr-1"></div>
            </section>
            <section class="glass-panel h-[600px] flex flex-col border-t-4 border-amber-500">
                <h2 class="font-black text-sm uppercase text-slate-600 mb-4"><i class="fas fa-satellite-dish mr-1 text-amber-500"></i> الرادار</h2>
                <div id="active-orders" class="overflow-y-auto flex-1 space-y-2 pr-1"></div>
            </section>
            <section class="glass-panel h-[600px] flex flex-col border-t-4 border-slate-400">
                <h2 class="font-black text-sm uppercase text-slate-600 mb-4"><i class="fas fa-history mr-1 text-slate-400"></i> السجل</h2>
                <div id="completed-orders" class="overflow-y-auto flex-1 space-y-2 pr-1"></div>
            </section>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyi9ksTSLnwjRyCloT_0oEzhH4a_35Ijhr2unGVB-9wdOB6eoItU-XVKV9ufOlFLkLUCA/exec";
        let map, markers = {};

        async function loadMasterData(isSilent = false) {
            const pass = document.getElementById('master-pass').value;
            if(!pass) return;

            try {
                const response = await fetch(`${SCRIPT_URL}?action=get_master_data&pass=${encodeURIComponent(pass)}`);
                const data = await response.json();
                
                if (data.status === "denied") {
                    alert("الرمز غير صحيح!");
                    return;
                }

                if (!isSilent) {
                    document.getElementById('login-block').classList.add('hidden');
                    document.getElementById('main-ui').classList.remove('hidden');
                    initMap();
                }
                renderUI(data);
                updateMarkers(data.drivers);
                updateStats(data);
            } catch (e) { console.error("Sync Error"); }
        }

        function initMap() {
            if (map) return;
            map = L.map('map', { zoomControl: false }).setView([35.467, 44.392], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{y}.png').addTo(map);
        }

        function renderUI(data) {
            // السائقين
            document.getElementById('drivers-list').innerHTML = data.drivers.slice(1).map(d => `
                <div class="item-row ${d[4] === 'active' ? 'row-active' : ''}">
                    <div class="flex justify-between items-center">
                        <p class="font-black text-xs">${d[1]}</p>
                        <span class="text-[8px] font-bold px-2 py-0.5 rounded ${d[4]==='active'?'bg-green-100 text-green-600':'bg-red-100 text-red-600'}">${d[4]}</span>
                    </div>
                    <div class="flex gap-2 mt-2">
                        <button onclick="control('Drivers','${d[2]}',4,'${d[4]==='active'?'pending':'active'}')" class="flex-1 text-[9px] font-black py-1 bg-slate-100 rounded">تغيير الحالة</button>
                        <button onclick="deleteItem('Drivers','${d[2]}')" class="btn-action btn-red"><i class="fas fa-trash"></i></button>
                    </div>
                </div>`).join('');

            // الرادار (الطلبات النشطة)
            const active = data.orders.slice(1).filter(o => o[5] !== 'delivered');
            document.getElementById('active-orders').innerHTML = active.reverse().map(o => `
                <div class="item-row ${o[5] === 'waiting' ? 'critical-pulse' : 'row-active'}">
                    <p class="font-black text-xs">${o[1]}</p>
                    <p class="text-[9px] text-slate-500">${o[9]} | ${o[5]}</p>
                    <div class="flex justify-between items-center mt-2 pt-2 border-t">
                        <span class="text-[9px] font-bold text-blue-600">سائق: ${o[6] || 'جاري البحث...'}</span>
                        <button onclick="deleteItem('Orders','${o[0]}')" class="btn-action btn-red"><i class="fas fa-times"></i></button>
                    </div>
                </div>`).join('');

            // المحاسبة
            document.getElementById('rests-list').innerHTML = data.restaurants.slice(1).map(r => `
                <div class="item-row border-r-4 border-emerald-500">
                    <p class="font-black text-xs">${r[1]}</p>
                    <div class="flex justify-between items-center mt-2">
                        <span class="text-[10px] font-black text-red-600">${parseFloat(r[9]||0).toLocaleString()} د.ع</span>
                        <button onclick="control('Restaurants','${r[2]}',9,0)" class="text-[8px] font-black bg-red-500 text-white px-2 py-1 rounded">تصفير</button>
                    </div>
                </div>`).join('');
        }

        async function control(target, id, col, val) {
            const pass = document.getElementById('master-pass').value;
            await fetch(SCRIPT_URL, { 
                method: 'POST', 
                body: JSON.stringify({ action: 'master_control', pass: pass, targetSheet: target, targetID: id, colIndex: col, newValue: val }) 
            });
            setTimeout(() => loadMasterData(true), 1200);
        }

        async function deleteItem(sheet, id) {
            if(!confirm("حذف نهائي؟")) return;
            const pass = document.getElementById('master-pass').value;
            await fetch(SCRIPT_URL, { 
                method: 'POST', 
                body: JSON.stringify({ action: 'delete_item', pass: pass, targetSheet: sheet, targetID: id }) 
            });
            setTimeout(() => loadMasterData(true), 1200);
        }

        function updateMarkers(drivers) {
            drivers.slice(1).forEach(d => {
                const lat = parseFloat(d[5]), lng = parseFloat(d[6]);
                if(lat && lat !== 0) {
                    const color = d[4]==='active' ? '#2563eb' : '#94a3b8';
                    if(markers[d[2]]) markers[d[2]].setLatLng([lat, lng]);
                    else markers[d[2]] = L.circleMarker([lat, lng], {radius: 6, color: color, fillOpacity: 0.8}).addTo(map);
                }
            });
        }

        function updateStats(data) {
            document.getElementById('stat-active-drivers').querySelector('p:last-child').innerText = data.drivers.filter(d => d[4] === 'active').length;
            document.getElementById('stat-pending-orders').querySelector('p:last-child').innerText = data.orders.filter(o => o[5] === 'waiting').length;
        }

        setInterval(() => { if (!document.getElementById('main-ui').classList.contains('hidden')) loadMasterData(true); }, 15000);
        setInterval(() => { 
            const now = new Date();
            document.getElementById('clock').querySelector('p:last-child').innerText = now.getHours() + ":" + String(now.getMinutes()).padStart(2, '0'); 
        }, 1000);
    </script>
</body>
</html>
