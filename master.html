<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مركز قيادة الحوت | Al-Hut Command Center</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root {
            --sidebar-width: 260px;
            --primary-dark: #0f172a;
            --accent-blue: #3b82f6;
            --accent-orange: #f97316;
            --success-green: #10b981;
            --bg-light: #f8fafc;
        }

        body { background-color: var(--bg-light); font-family: 'Cairo', sans-serif; margin: 0; overflow-x: hidden; }

        /* شاشة القفل */
        #authOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            z-index: 10000; display: flex; align-items: center; justify-content: center;
        }
        .auth-card {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 30px; padding: 40px; width: 400px; color: white;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }

        /* الهيكل الجانبي */
        .sidebar {
            width: var(--sidebar-width); background: var(--primary-dark);
            height: 100vh; position: fixed; right: 0; top: 0; color: white; padding: 20px; z-index: 1000;
        }
        .main-content { margin-right: var(--sidebar-width); padding: 30px; min-height: 100vh; }

        .nav-item {
            display: flex; align-items: center; gap: 12px; padding: 14px 20px; color: #94a3b8;
            text-decoration: none; border-radius: 12px; margin-bottom: 8px; cursor: pointer; transition: 0.3s;
        }
        .nav-item:hover, .nav-item.active { background: rgba(255,255,255,0.1); color: white; }
        .nav-item.active { border-right: 4px solid var(--accent-orange); }

        .stat-widget {
            background: white; border-radius: 24px; padding: 25px; display: flex;
            justify-content: space-between; align-items: center; box-shadow: 0 4px 20px rgba(0,0,0,0.03);
        }
        .icon-shape { width: 55px; height: 55px; border-radius: 16px; display: flex; align-items: center; justify-content: center; }

        #adminMap { height: 450px; width: 100%; border-radius: 30px; border: 8px solid white; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }

        .custom-table { background: white; border-radius: 24px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.03); }
        .table th { padding: 20px; background: #f1f5f9; border: none; }
        .table td { padding: 20px; vertical-align: middle; }

        .hidden-content { display: none; }
        .badge-status { padding: 5px 12px; border-radius: 8px; font-size: 0.75rem; font-weight: bold; }
    </style>
</head>
<body>

<div id="authOverlay">
    <div class="auth-card text-center">
        <div class="mb-4"><i data-lucide="shield-check" size="60" color="#f97316"></i></div>
        <h3 class="fw-black mb-2">تسجيل دخول المسؤول</h3>
        <input type="password" id="masterPass" class="form-control form-control-lg bg-dark text-white border-0 text-center mb-3" placeholder="••••••••">
        <button class="btn btn-warning w-100 py-3 fw-bold rounded-4" onclick="checkAuth()">تحقق من الهوية</button>
    </div>
</div>

<div class="hidden-content" id="mainDashboard">
    <aside class="sidebar shadow">
        <div class="d-flex align-items-center gap-2 mb-5 px-3">
            <i data-lucide="waves" color="#f97316" size="32"></i>
            <h4 class="m-0 fw-black">الحوت <span class="text-warning">PRO</span></h4>
        </div>
        <nav>
            <div class="nav-item active" onclick="showTab('live')"><i data-lucide="layout-dashboard"></i> <span>الرصد الحي</span></div>
            <div class="nav-item" onclick="showTab('orders')"><i data-lucide="shopping-cart"></i> <span>إدارة الطلبات</span></div>
            <div class="nav-item" onclick="showTab('restaurants')"><i data-lucide="utensils"></i> <span>المطاعم</span></div>
            <div class="nav-item" onclick="showTab('drivers')"><i data-lucide="truck"></i> <span>الكباتن</span></div>
        </nav>
    </aside>

    <main class="main-content">
        <div id="tab-live" class="admin-tab">
            <header class="d-flex justify-content-between align-items-center mb-5">
                <div><h2 class="fw-black m-0">نظرة عامة</h2><p class="text-muted">مراقبة لحظية للأسطول</p></div>
                <div id="liveTime" class="badge bg-white text-dark p-3 rounded-4 shadow-sm fw-bold">00:00:00</div>
            </header>

            <div class="row g-4 mb-5">
                <div class="col-md-4"><div class="stat-widget"><div><small class="text-muted fw-bold">الطلبات</small><h2 id="count-orders">0</h2></div><div class="icon-shape bg-primary bg-opacity-10 text-primary"><i data-lucide="package"></i></div></div></div>
                <div class="col-md-4"><div class="stat-widget"><div><small class="text-muted fw-bold">سائق متاح</small><h2 id="count-drivers" class="text-success">0</h2></div><div class="icon-shape bg-success bg-opacity-10 text-success"><i data-lucide="navigation"></i></div></div></div>
                <div class="col-md-4"><div class="stat-widget"><div><small class="text-muted fw-bold">المطاعم</small><h2 id="count-res" class="text-warning">0</h2></div><div class="icon-shape bg-warning bg-opacity-10 text-warning"><i data-lucide="store"></i></div></div></div>
            </div>
            <div id="adminMap"></div>
        </div>

        <div id="tab-orders" class="admin-tab d-none">
            <h3 class="fw-bold mb-4">سجل الطلبات الحية</h3>
            <div class="custom-table table-responsive">
                <table class="table m-0">
                    <thead><tr><th>ID</th><th>المطعم</th><th>السائق</th><th>المنطقة</th><th>الحالة</th><th>الإجراء</th></tr></thead>
                    <tbody id="ordersTableBody"></tbody>
                </table>
            </div>
        </div>

        <div id="tab-restaurants" class="admin-tab d-none">
            <h3 class="fw-bold mb-4">إدارة المطاعم</h3>
            <div class="row g-3" id="resListContainer"></div>
        </div>

        <div id="tab-drivers" class="admin-tab d-none">
            <h3 class="fw-bold mb-4">إدارة الكباتن</h3>
            <div class="row g-3" id="driverListContainer"></div>
        </div>
    </main>
</div>

<script async defer src="https://maps.googleapis.com/maps/api/js?callback=initMasterMap"></script>
<script>
    lucide.createIcons();
    const API_URL = "https://script.google.com/macros/s/AKfycbwIELSbF-1Fioo5mTwhsJw4jZ3MRcAgOY5G43ma1vDu6OkOHvItLH3HOOCSZAguWd0Ssw/exec";
    let map;

    function checkAuth() {
        if(document.getElementById('masterPass').value === "223344") {
            document.getElementById('authOverlay').style.display = 'none';
            document.getElementById('mainDashboard').classList.remove('hidden-content');
            startClock();
            refreshData();
            setInterval(refreshData, 15000);
        } else { alert("خطأ!"); }
    }

    function startClock() { setInterval(() => { document.getElementById('liveTime').innerText = new Date().toLocaleTimeString('ar-EG'); }, 1000); }

    function showTab(name) {
        document.querySelectorAll('.admin-tab').forEach(t => t.classList.add('d-none'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('tab-' + name).classList.remove('d-none');
        event.currentTarget.classList.add('active');
        lucide.createIcons();
    }

    function initMasterMap() {
        map = new google.maps.Map(document.getElementById("adminMap"), { zoom: 13, center: { lat: 35.468, lng: 44.392 }, disableDefaultUI: true });
    }

    function refreshData() {
        const script = document.createElement('script');
        script.src = `${API_URL}?action=getGlobalData&callback=renderData`;
        document.body.appendChild(script);
    }

    window.renderData = function(data) {
        // تحديث العدادات
        document.getElementById('count-orders').innerText = data.orders.length - 1;
        document.getElementById('count-drivers').innerText = data.drivers.filter(d => d[4] === 'active').length;
        document.getElementById('count-res').innerText = data.restaurants.filter(r => r[4] === 'active').length;

        // رص الطلبات
        let orderHtml = '';
        data.orders.slice(1).reverse().forEach(o => {
            orderHtml += `<tr><td>${o[1]}</td><td>${o[2]}</td><td>${o[7] || '...'}</td><td>${o[9]}</td>
            <td><span class="badge-status bg-info text-white">${o[6]}</span></td>
            <td><button class="btn btn-sm btn-light border">تفاصيل</button></td></tr>`;
        });
        document.getElementById('ordersTableBody').innerHTML = orderHtml;

        // رص المطاعم والكباتن بتصميم البطاقات
        renderGrid('resListContainer', data.restaurants, 'store');
        renderGrid('driverListContainer', data.drivers, 'truck');
    };

    function renderGrid(id, list, icon) {
        let html = '';
        list.slice(1).forEach(i => {
            html += `<div class="col-md-4"><div class="stat-widget">
                <div class="d-flex align-items-center gap-3">
                    <div class="icon-shape bg-light text-dark"><i data-lucide="${icon}"></i></div>
                    <div><h6 class="m-0 fw-bold">${i[1]}</h6><small class="text-muted">${i[2]}</small></div>
                </div>
                <span class="badge-status ${i[4] === 'active' ? 'bg-success' : 'bg-warning'} text-white">${i[4]}</span>
            </div></div>`;
        });
        document.getElementById(id).innerHTML = html;
        lucide.createIcons();
    }
</script>
</body>
</html>
