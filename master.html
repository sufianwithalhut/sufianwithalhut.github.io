<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Al-Hut Sovereign | قمرة القيادة العليا</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { 
            --gold: #ffcc00; 
            --neon-blue: #00f2ff;
            --bg-dark: #020617;
            --card-glass: rgba(15, 23, 42, 0.8);
            --border-glass: rgba(255, 255, 255, 0.1);
        }
        
        body { 
            background: var(--bg-dark); 
            color: #f1f5f9; 
            font-family: 'Tajawal', sans-serif; 
            background-image: radial-gradient(circle at top right, rgba(0, 242, 255, 0.05), transparent),
                              radial-gradient(circle at bottom left, rgba(255, 204, 0, 0.05), transparent);
            min-height: 100vh;
        }

        .orbitron { font-family: 'Orbitron', sans-serif; }

        /* تجميل الخريطة */
        #map { 
            height: 450px; 
            border-radius: 2rem; 
            border: 1px solid var(--border-glass);
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
            filter: grayscale(0.2) contrast(1.1);
        }

        /* الكروت الزجاجية */
        .glass-panel {
            background: var(--card-glass);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border-glass);
            border-radius: 1.5rem;
            transition: all 0.3s ease;
        }

        .glass-panel:hover { border-color: var(--gold); }

        .status-pill {
            padding: 2px 10px;
            border-radius: 999px;
            font-size: 0.65rem;
            font-weight: 900;
            text-transform: uppercase;
        }
        .active { background: #059669; color: #ecfdf5; box-shadow: 0 0 10px rgba(5, 150, 105, 0.4); }
        .pending { background: #d97706; color: #fffbeb; }
        .banned { background: #dc2626; color: #fef2f2; }

        /* شريط التمرير */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-glass); border-radius: 10px; }

        .item-row {
            background: rgba(255,255,255,0.03);
            border-radius: 1rem;
            padding: 12px;
            margin-bottom: 10px;
            border: 1px solid transparent;
            transition: 0.2s;
        }
        .item-row:hover { background: rgba(255,255,255,0.06); transform: translateX(-5px); }

        .stat-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.05), rgba(255,255,255,0.01));
            border: 1px solid var(--border-glass);
            border-radius: 1.25rem;
            text-align: center;
            padding: 1.5rem;
        }

        /* أنيميشن التحديث */
        @keyframes pulse-gold { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .live-indicator { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; display: inline-block; margin-left: 8px; box-shadow: 0 0 8px #22c55e; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="login-block" class="fixed inset-0 z-[100] flex items-center justify-center bg-[#020617] p-6">
        <div class="max-w-md w-full text-center space-y-8">
            <div class="relative inline-block">
                <div class="absolute -inset-4 bg-gold opacity-20 blur-xl rounded-full"></div>
                <i class="fas fa-crown text-6xl text-gold relative"></i>
            </div>
            <h1 class="orbitron text-3xl font-black tracking-tighter text-white">SOVEREIGN ACCESS</h1>
            <div class="relative">
                <input type="password" id="master-pass" placeholder="أدخل شفرة السيادة..." 
                       class="w-full bg-slate-900/50 border-2 border-slate-700 rounded-2xl p-4 text-center text-xl text-gold focus:border-gold outline-none transition-all">
            </div>
            <button onclick="loadMasterData()" class="w-full bg-gold text-black py-4 rounded-2xl font-black text-lg hover:scale-105 active:scale-95 transition-all shadow-lg shadow-gold/20">
                تحميل قاعدة البيانات
            </button>
        </div>
    </div>

    <div id="main-ui" class="hidden space-y-6">
        
        <header class="flex flex-col md:flex-row justify-between items-center gap-4 bg-slate-900/40 p-6 rounded-[2rem] border border-white/5 shadow-2xl">
            <div>
                <h1 class="orbitron text-2xl font-black text-white">WHALE <span class="text-gold">SOVEREIGN</span> <span class="text-[10px] bg-white/10 px-2 py-1 rounded text-slate-400">V6.1.3</span></h1>
                <p class="text-xs text-slate-500 font-bold mt-1 uppercase tracking-widest italic">
                    <span class="live-indicator animate-pulse"></span>Kirkuk Central Command Center
                </p>
            </div>
            <div class="flex gap-3">
                <button onclick="location.reload()" class="p-3 bg-white/5 rounded-xl hover:bg-white/10 transition-all text-slate-400"><i class="fas fa-sync-alt"></i></button>
                <div class="text-left">
                    <p class="text-[10px] text-gold orbitron font-bold">SYSTEM TIME</p>
                    <p id="clock" class="orbitron text-sm font-bold">00:00:00</p>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <div class="stat-card">
                <p class="text-[9px] text-slate-500 font-black uppercase italic mb-1">أرباح اليوم</p>
                <span id="stat-profit" class="orbitron text-xl font-black text-emerald-400">0</span>
            </div>
            <div class="stat-card">
                <p class="text-[9px] text-slate-500 font-black uppercase italic mb-1">طلبات نشطة</p>
                <span id="stat-count" class="orbitron text-xl font-black text-blue-400">0</span>
            </div>
            <div class="stat-card">
                <p class="text-[9px] text-slate-500 font-black uppercase italic mb-1">المطاعم</p>
                <span id="stat-rests" class="orbitron text-xl font-black text-purple-400">0</span>
            </div>
            <div class="stat-card">
                <p class="text-[9px] text-slate-500 font-black uppercase italic mb-1">الطيارين</p>
                <span id="stat-drivers" class="orbitron text-xl font-black text-gold">0</span>
            </div>
        </div>

        <div id="map"></div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <section class="glass-panel p-6 h-[600px] flex flex-col">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="font-black italic text-gold flex items-center gap-2">
                        <i class="fas fa-crosshairs text-xs"></i> رادار الطيارين
                    </h2>
                    <span id="count-drivers" class="text-[10px] bg-white/5 px-2 py-1 rounded">0</span>
                </div>
                <div id="drivers-list" class="overflow-y-auto flex-1 pr-2"></div>
            </section>

            <section class="glass-panel p-6 h-[600px] flex flex-col">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="font-black italic text-emerald-400 flex items-center gap-2">
                        <i class="fas fa-store text-xs"></i> المحطات الشريكة
                    </h2>
                    <span id="count-rests" class="text-[10px] bg-white/5 px-2 py-1 rounded">0</span>
                </div>
                <div id="rests-list" class="overflow-y-auto flex-1 pr-2"></div>
            </section>

            <section class="glass-panel p-6 h-[600px] flex flex-col">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="font-black italic text-blue-400 flex items-center gap-2">
                        <i class="fas fa-box-open text-xs"></i> تدفق البيانات (الطلبات)
                    </h2>
                    <span id="count-orders" class="text-[10px] bg-white/5 px-2 py-1 rounded">0</span>
                </div>
                <div id="orders-list" class="overflow-y-auto flex-1 pr-2"></div>
            </section>

        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz-Rgnwclf9OJz2uJuBhD4PqDkY9XI0KCnSDhq1bRI558bxT5YLTTozkpZHky20oX9g/exec";
        let map, markers = {};

        // ساعة النظام
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0') + ":" + now.getSeconds().toString().padStart(2,'0');
        }, 1000);

        function initMap() {
            if (map) return;
            map = L.map('map', { zoomControl: false }).setView([35.467, 44.392], 13); 
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
            L.control.zoom({ position: 'bottomright' }).addTo(map);
        }

        async function loadMasterData(isSilent = false) {
            const pass = document.getElementById('master-pass').value;
            try {
                const res = await fetch(`${SCRIPT_URL}?action=get_master_data&pass=${encodeURIComponent(pass)}`);
                const data = await res.json();
                
                if (data.status === "denied") {
                    alert("رمز السيادة مرفوض!");
                    return;
                }
                
                if (!isSilent) {
                    document.getElementById('login-block').style.display = 'none';
                    document.getElementById('main-ui').classList.remove('hidden');
                    initMap();
                }
                
                renderUI(data);
                updateMapMarkers(data.drivers);
            } catch (e) { 
                console.error("Link Error"); 
            }
        }

        // تحديث تلقائي كل 10 ثوانٍ بمجرد الدخول
        setInterval(() => {
            if (document.getElementById('main-ui').classList.contains('hidden')) return;
            loadMasterData(true);
        }, 10000);

        function renderUI(data) {
            // تحديث الأرقام
            document.getElementById('stat-rests').innerText = data.restaurants.length;
            document.getElementById('stat-drivers').innerText = data.drivers.length;
            document.getElementById('stat-count').innerText = data.orders.filter(o => o[5] !== 'delivered').length;
            
            // حساب أرباح اليوم (بافتراض العمود 11 هو الأرباح)
            const profit = data.orders.reduce((acc, curr) => acc + (parseFloat(curr[11]) || 0), 0);
            document.getElementById('stat-profit').innerText = profit.toLocaleString() + " د.ع";

            // قائمة السواق
            document.getElementById('drivers-list').innerHTML = data.drivers.map(d => `
                <div class="item-row">
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="font-black text-sm text-white">${d[1]}</p>
                            <p class="text-[10px] text-slate-500 orbitron">${d[2]}</p>
                        </div>
                        <span class="status-pill ${d[4]}">${d[4]}</span>
                    </div>
                    <div class="flex gap-2 mt-3">
                        <a href="tel:${d[2]}" class="p-2 bg-emerald-500/10 text-emerald-500 rounded-lg text-xs"><i class="fas fa-phone"></i></a>
                        <button onclick="trackOnMap(${d[5]}, ${d[6]}, '${d[1]}')" class="p-2 bg-blue-500/10 text-blue-500 rounded-lg text-xs"><i class="fas fa-location-dot"></i></button>
                        <button onclick="control('Drivers', '${d[2]}', 4, 'active')" class="p-2 bg-white/5 text-white rounded-lg text-xs"><i class="fas fa-check"></i></button>
                        <button onclick="deleteItem('Drivers', '${d[2]}')" class="p-2 bg-red-500/10 text-red-500 rounded-lg text-xs"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            `).join('');

            // قائمة المطاعم
            document.getElementById('rests-list').innerHTML = data.restaurants.map(r => `
                <div class="item-row">
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="font-black text-sm text-white">${r[1]}</p>
                            <p class="text-[10px] text-slate-500">${r[3]}</p>
                        </div>
                        <span class="status-pill active">ON</span>
                    </div>
                    <div class="flex gap-2 mt-3">
                        <a href="tel:${r[2]}" class="p-2 bg-emerald-500/10 text-emerald-500 rounded-lg text-xs"><i class="fas fa-phone"></i></a>
                        <button onclick="deleteItem('Restaurants', '${r[2]}')" class="p-2 bg-red-500/10 text-red-500 rounded-lg text-xs"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            `).join('');

            // قائمة الطلبات
            document.getElementById('orders-list').innerHTML = data.orders.map(o => `
                <div class="item-row ${o[5] === 'delivered' ? 'opacity-40' : 'border-r-2 border-blue-500'}">
                    <div class="flex justify-between items-center">
                        <p class="text-[10px] font-bold text-gold">#${o[0]}</p>
                        <p class="text-[9px] text-slate-400">${o[5]}</p>
                    </div>
                    <p class="text-xs font-bold my-1">${o[1]} ➔ ${o[9]}</p>
                    <div class="flex gap-2 mt-2">
                        <button onclick="deleteItem('Orders', '${o[0]}')" class="text-[10px] text-red-400 hover:text-red-200"><i class="fas fa-trash"></i> حذف</button>
                    </div>
                </div>
            `).reverse().join('');
        }

        function updateMapMarkers(drivers) {
            drivers.forEach(d => {
                if (d[5] && d[5] != 0) {
                    const latLng = [d[5], d[6]];
                    if (markers[d[2]]) {
                        markers[d[2]].setLatLng(latLng);
                    } else {
                        markers[d[2]] = L.marker(latLng, {
                            icon: L.divIcon({
                                className: 'custom-div-icon',
                                html: `<div style="background-color:var(--gold); width:12px; height:12px; border-radius:50%; border:2px solid white; box-shadow:0 0 10px var(--gold);"></div>`,
                                iconSize: [12, 12]
                            })
                        }).addTo(map).bindPopup(`<b>${d[1]}</b>`);
                    }
                }
            });
        }

        function trackOnMap(lat, lng, name) {
            if(!lat || lat == 0) return alert("الطيار خارج نطاق التغطية");
            map.flyTo([lat, lng], 17, { duration: 1.5 });
            L.popup().setLatLng([lat, lng]).setContent(`الطيار المستهدف: ${name}`).openOn(map);
        }

        async function deleteItem(sheet, id) {
            if(!confirm("تأكيد الحذف من السجلات العليا؟")) return;
            const pass = document.getElementById('master-pass').value;
            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ action: 'delete_item', pass: pass, targetSheet: sheet, targetID: id })
            });
            setTimeout(() => loadMasterData(true), 1000);
        }

        async function control(target, id, col, val) {
            const pass = document.getElementById('master-pass').value;
            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ action: 'master_control', pass: pass, targetSheet: target, targetID: id, colIndex: col, newValue: val })
            });
            setTimeout(() => loadMasterData(true), 1000);
        }
    </script>
</body>
</html>
