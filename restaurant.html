<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تحديث النظام | مكتب سفيان</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;800;900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #dcfce7 0%, #bbf7d0 100%); /* شاشة خضراء فاتحة */
            font-family: 'Cairo', sans-serif;
            text-align: center;
            color: #14532d;
        }
        .maintenance-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            padding: 40px 30px;
            border-radius: 28px;
            box-shadow: 0 15px 35px rgba(22, 101, 52, 0.1);
            max-width: 90%;
            width: 420px;
            border: 1px solid rgba(255, 255, 255, 0.9);
        }
        .icon-wrapper {
            width: 80px;
            height: 80px;
            background: #16a34a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 8px 25px rgba(22, 101, 52, 0.25);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(22, 101, 52, 0.5); }
            70% { transform: scale(1); box-shadow: 0 0 0 15px rgba(22, 101, 52, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(22, 101, 52, 0); }
        }
        h1 { margin: 0 0 15px; font-weight: 900; font-size: 1.8rem; color: #166534; }
        p { margin: 0 0 25px; font-weight: 700; font-size: 1.05rem; line-height: 1.6; color: #15803d; }
        .whatsapp-note {
            background: #ffffff;
            padding: 20px;
            border-radius: 20px;
            font-weight: 900;
            color: #16a34a;
            border: 2px dashed #4ade80;
            font-size: 1.1rem;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="maintenance-card">
        <div class="icon-wrapper">
            <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="23 4 23 10 17 10"></polyline>
                <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
            </svg>
        </div>
        <h1>تحديث مؤقت للنظام</h1>
        <p>نظام مكتب سفيان يخضع حالياً لتحديثات تقنية سريعة لضمان تقديم خدمة أفضل وأسرع لكم.</p>
        <div class="whatsapp-note">
            يرجى إرسال الطلبات مؤقتاً إلى واتساب مكتب سفيان (المعروف لديكم) لمدة ساعة تقريباً.
            <br>
            <span style="font-size: 0.85rem; color: #15803d; font-weight: 700; margin-top: 8px; display: block;">شكراً لتعاونكم وتفهمكم 🌹</span>
        </div>
    </div>
</body>
</html>
