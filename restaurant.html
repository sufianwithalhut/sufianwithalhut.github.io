<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>تحديث النظام | مطاعم سفيان</title>
    <meta name="theme-color" content="#10b981">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body {
            background: linear-gradient(135deg, #064e3b 0%, #10b981 100%);
            font-family: 'Cairo', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        
        .maintenance-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 35px;
            padding: 50px 30px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
            width: 90%;
            max-width: 420px;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            border: 1px solid rgba(255,255,255,0.5);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .icon-wrapper {
            background: #ecfdf5;
            width: 110px;
            height: 110px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 25px auto;
            box-shadow: 0 0 0 15px rgba(255,255,255,0.2);
            animation: pulseIcon 2s infinite;
        }

        @keyframes pulseIcon {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
            70% { box-shadow: 0 0 0 25px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }
    </style>
</head>
<body>

    <div class="maintenance-card">
        <div class="icon-wrapper">
            <i data-lucide="rocket" size="50" color="#10b981"></i>
        </div>
        
        <h2 class="fw-black text-dark mb-3" style="letter-spacing: -0.5px;">تحديث شامل للنظام!</h2>
        
        <p class="text-muted fw-bold mb-4" style="font-size: 1.1rem; line-height: 1.6;">
            نعمل حالياً على وضع اللمسات الأخيرة المذهلة لمنظومة الحوت. سيعود النظام للعمل هذا اليوم بشكله الجديد والأسرع!
        </p>
        
        <div class="bg-light p-4 rounded-4 border border-success border-opacity-25 mt-2 shadow-sm">
            <i data-lucide="message-circle" size="30" color="#10b981" class="mb-3"></i>
            <p class="text-dark fw-black m-0" style="font-size: 1.1rem;">
                مؤقتاً، يمكنكم إرسال طلباتكم إلى مكتب سفيان عبر الواتساب.
            </p>
        </div>
    </div>

    <script>
        // تفعيل الأيقونات
        lucide.createIcons();
    </script>

</body>
</html>
