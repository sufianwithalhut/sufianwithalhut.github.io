<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>بوابة المطاعم | Al-Hut PRO</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root {
            --primary: #0f172a;
            --accent: #f97316;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --success: #10b981;
        }

        body { 
            background: var(--bg); 
            font-family: 'Cairo', sans-serif; 
            color: var(--primary);
            -webkit-tap-highlight-color: transparent;
        }

        .hidden-section { display: none !important; }

        #loadingOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px);
            z-index: 9999; display: none; align-items: center; justify-content: center;
            flex-direction: column; color: white;
        }

        .app-header {
            background: var(--primary);
            color: white;
            padding: 40px 20px 80px 20px;
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .glass-card {
            background: var(--card-bg);
            border-radius: 30px;
            padding: 30px;
            border: 1px solid rgba(0,0,0,0.05);
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            margin-top: -50px;
        }

        .form-label { font-weight: 700; color: #64748b; font-size: 0.9rem; margin-bottom: 10px; display: block; }
        
        .custom-input {
            background: #f1f5f9;
            border: 2px solid transparent;
            border-radius: 18px;
            padding: 18px;
            font-weight: 600;
            transition: 0.3s;
            width: 100%;
        }
        .custom-input:focus {
            background: white;
            border-color: var(--accent);
            outline: none;
            box-shadow: 0 0 0 4px rgba(249, 115, 22, 0.1);
        }

        .btn-action {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 18px;
            padding: 20px;
            font-weight: 900;
            width: 100%;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(15, 23, 42, 0.2);
        }
        .btn-action:active { transform: scale(0.96); }

        .success-toast {
            background: var(--success);
            color: white;
            border-radius: 20px;
            padding: 20px;
            margin-top: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            animation: slideUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .recent-orders-title { font-weight: 900; margin-top: 40px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
    </style>
</head>
<body>

<div id="loadingOverlay">
    <div class="spinner-grow text-warning" role="status"></div>
    <span class="mt-3 fw-bold">جاري المزامنة مع الحوت...</span>
</div>

<div id="loginSection" class="container py-5">
    <div class="text-center mb-5">
        <div class="d-inline-block p-4 bg-white rounded-circle shadow-sm mb-4">
            <i data-lucide="store" size="50" color="#f97316"></i>
        </div>
        <h1 class="fw-black">بوابة الشركاء</h1>
        <p class="text-muted">أهلاً بك في نظام الحوت للإدارة الذكية</p>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-5">
            <div class="glass-card mt-0">
                <div class="mb-4">
                    <label class="form-label">رقم الهاتف المسجل</label>
                    <input type="tel" id="checkPhone" class="custom-input text-center fs-3" placeholder="07XXXXXXXXX">
                </div>
                <button class="btn-action" onclick="checkRestaurantStatus()">
                    دخول المنصة <i data-lucide="arrow-left"></i>
                </button>
            </div>
        </div>
    </div>
</div>

<div id="orderSection" class="hidden-section">
    <div class="app-header">
        <div class="d-flex justify-content-between align-items-center container">
            <div class="text-end">
                <h2 class="fw-black m-0" id="resTitle">جاري التحميل...</h2>
                <small class="opacity-75" id="resPhoneDisplay"></small>
            </div>
            <button class="btn btn-sm btn-outline-light rounded-pill px-3" onclick="location.reload()">خروج</button>
        </div>
    </div>

    <div class="container pb-5">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <div class="glass-card">
                    <h4 class="fw-black mb-4"><i data-lucide="send" class="me-2 text-accent"></i> إرسال طلب توصيل</h4>
                    
                    <form id="orderForm">
                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <label class="form-label">منطقة العميل</label>
                                <select id="customerArea" class="custom-input form-select">
                                    <option>المنطقة المركزية</option>
                                    <option>حي الواسطي</option>
                                    <option>حي تسعين</option>
                                    <option>طريق بغداد</option>
                                    <option>القورية</option>
                                    <option>روناكي</option>
                                    <option>بنجة علي</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">سعر الطلب (دينار)</label>
                                <input type="number" id="orderPrice" class="custom-input" placeholder="مثلاً: 15000" required>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">بيانات الطلب (العنوان وهاتف الزبون)</label>
                            <textarea id="customerDetails" class="custom-input" rows="4" placeholder="مثال: شارع 30، قرب صيدلية السلام، هاتف: 0770XXXXXXX" required></textarea>
                        </div>

                        <button type="submit" class="btn-action bg-accent">
                            طلب كابتن الآن <i data-lucide="zap"></i>
                        </button>
                    </form>

                    <div id="orderStatusBox" class="hidden-section">
                        <div class="success-toast">
                            <i data-lucide="check-circle" size="30"></i>
                            <div>
                                <div class="fw-black">تم قبول الطلب فوراً!</div>
                                <div class="small" id="statusMsg">جاري توجيه الكابتن...</div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="recent-orders-title">
                    <i data-lucide="alert-circle" class="text-warning"></i> تنبيهات هامة
                </div>
                <div class="p-4 bg-white rounded-4 border">
                    <p class="small text-muted mb-0">
                        * يرجى تجهيز الطلب قبل طلب الكابتن لضمان استلامه فور وصوله. <br>
                        * سعر التوصيل يتم احتسابه آلياً بناءً على المسافة والمنطقة.
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    lucide.createIcons();

    // الإعدادات السيادية الموحدة
    const API_URL = "https://script.google.com/macros/s/AKfycbznHSOuvIqqhFU5g1PiI7T-PU7gAXpzmV9NAHqb-dkg9HUCA2Nb-mVgLJYznf6CCNhAww/exec";
    const API_TOKEN = "HUT_SECURE_99";
    let currentResName = "";

    function showLoading(s) { 
        document.getElementById('loadingOverlay').style.display = s ? 'flex' : 'none';
    }

    // التحقق من المطعم
    function checkRestaurantStatus() {
        const phone = document.getElementById('checkPhone').value.trim();
        if(!phone) return alert("يرجى إدخال رقم هاتف المطعم");

        showLoading(true);
        const script = document.createElement('script');
        script.src = `${API_URL}?action=checkRes&phone=${phone}&callback=handleLogin&ts=${Date.now()}`;
        document.body.appendChild(script);
    }

    window.handleLogin = function(data) {
        showLoading(false);
        if(data.status === "active") {
            currentResName = data.name;
            document.getElementById('loginSection').classList.add('hidden-section');
            document.getElementById('orderSection').classList.remove('hidden-section');
            document.getElementById('resTitle').innerText = data.name;
            document.getElementById('resPhoneDisplay').innerText = "رقم المتصل: " + document.getElementById('checkPhone').value;
            lucide.createIcons();
        } else if(data.status === "pending") {
            alert("⏳ حسابكم قيد المراجعة من قبل إدارة الحوت.");
        } else {
            alert("⚠️ هذا الرقم غير مسجل لدينا كشريك.");
        }
    };

    // إرسال طلب جديد
    document.getElementById('orderForm').onsubmit = function(e) {
        e.preventDefault();
        showLoading(true);
        
        const payload = {
            action: 'NEW_ORDER',
            token: API_TOKEN,
            restaurantName: currentResName,
            area: document.getElementById('customerArea').value,
            price: document.getElementById('orderPrice').value,
            details: document.getElementById('customerDetails').value
        };

        fetch(API_URL, {
            method: 'POST',
            body: JSON.stringify(payload)
        })
        .then(r => r.json())
        .then(res => {
            showLoading(false);
            if(res.success) {
                document.getElementById('orderStatusBox').classList.remove('hidden-section');
                document.getElementById('statusMsg').innerHTML = `تم توجيه الكابتن: <b>${res.driverName}</b><br>رقم الطلب: ${res.orderId}`;
                document.getElementById('customerDetails').value = "";
                document.getElementById('orderPrice').value = "";
                
                // إخفاء التنبيه بعد 20 ثانية
                setTimeout(() => {
                    document.getElementById('orderStatusBox').classList.add('hidden-section');
                }, 20000);
            } else {
                alert(res.msg || "عذراً، لا يوجد كباتن متاحين حالياً.");
            }
        })
        .catch(err => {
            showLoading(false);
            alert("حدث خطأ في الاتصال بالسيرفر، يرجى المحاولة لاحقاً.");
        });
    };
</script>
</body>
</html>
