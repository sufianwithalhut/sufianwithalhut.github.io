<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>بوابة المطاعم | نظام الحوت</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --primary: #0f172a; --accent: #f97316; --bg: #f8fafc; }
        body { background-color: var(--bg); font-family: 'Cairo', sans-serif; color: var(--primary); }
        #loadingOverlay {
            position: fixed; top:0; left:0; width:100%; height:100%; 
            background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(8px);
            z-index:9999; display:none; align-items:center; justify-content:center; flex-direction: column; color: white;
        }
        .container { max-width: 550px; padding: 20px; }
        .card { border: none; border-radius: 28px; background: white; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 20px; padding: 25px; }
        .btn-main { background: var(--primary); color: white; border-radius: 18px; padding: 15px; font-weight: 700; border: none; width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .hidden-section { display: none; }
        #map { height: 200px; width: 100%; border-radius: 15px; margin-top: 10px; border: 2px solid #eee; }
    </style>
</head>
<body>

<div id="loadingOverlay">
    <div class="spinner-border text-warning" style="width: 3rem; height: 3rem;"></div>
    <span class="mt-3 fw-bold" id="loadingText">جاري الاتصال بالسيرفر...</span>
    <button id="cancelBtn" class="btn btn-sm btn-outline-light mt-3 hidden-section" onclick="location.reload()">إلغاء المحاولة</button>
</div>

<div class="container">
    <div class="text-center py-4">
        <h2 class="fw-black">بوابة <span>المطاعم</span></h2>
        <p class="text-muted">نظام الحوت الذكي</p>
    </div>

    <div id="loginSection" class="card">
        <div class="mb-3">
            <label class="form-label fw-bold">رقم هاتف المطعم</label>
            <input type="tel" id="checkPhone" class="form-control text-center fs-4" placeholder="07XXXXXXXXX">
        </div>
        <button class="btn btn-main" onclick="checkRestaurantStatus()">دخول اللوحة</button>
        <button class="btn btn-link w-100 mt-3 text-muted" onclick="showReg()">طلب انضمام جديد</button>
    </div>

    <div id="orderSection" class="card hidden-section">
        <h5 class="fw-bold mb-3" id="resTitle">مرحباً بك</h5>
        <form id="orderForm">
            <div class="mb-3">
                <select id="customerArea" class="form-select">
                    <option>المنطقة المركزية</option><option>تسعين</option><option>طريق بغداد</option>
                </select>
            </div>
            <div class="mb-3">
                <textarea id="customerDetails" class="form-control" placeholder="رقم الزبون وتفاصيل العنوان" required></textarea>
            </div>
            <button type="submit" class="btn btn-main">اطلب كابتن الآن</button>
        </form>
        <div id="statusMsg" class="mt-3"></div>
    </div>
</div>

<script>
    lucide.createIcons();
    
    // الرابط الرسمي - تأكد من تحديثه إذا قمت بنشر جديد
    const API_URL = "https://script.google.com/macros/s/AKfycbw11obhblN_1MpuDLZqKk337YPRrnqbkcoVJFqDrbHxUoZdxc49qHVNv7Oq2RgD2gYbMA/exec";
    const API_TOKEN = "HUT_SECURE_99";
    let currentRes = null;

    function showLoading(s) { 
        document.getElementById('loadingOverlay').style.display = s ? 'flex' : 'none';
        // إظهار زر الإلغاء إذا استغرق الأمر أكثر من 5 ثوانٍ
        if(s) setTimeout(() => document.getElementById('cancelBtn').classList.remove('hidden-section'), 5000);
    }

    function checkRestaurantStatus() {
        const phone = document.getElementById('checkPhone').value.trim();
        if(!phone) return alert("أدخل الرقم");

        showLoading(true);
        
        // استخدام JSONP لتفادي مشاكل CORS
        const script = document.createElement('script');
        // تم إضافة timestamp لمنع التخزين المؤقت (Cache)
        script.src = `${API_URL}?action=checkRes&phone=${phone}&token=${API_TOKEN}&callback=handleLogin&ts=${Date.now()}`;
        
        script.onerror = () => {
            showLoading(false);
            alert("فشل الاتصال بالسيرفر. تأكد من أن السكريبت منشور (Deployed) كـ Anyone.");
        };
        
        document.body.appendChild(script);
    }

    window.handleLogin = function(data) {
        showLoading(false);
        console.log("Response:", data); // للفحص في Console
        
        if(!data || !data.status) {
            alert("رد غير صالح من السيرفر.");
            return;
        }

        const status = String(data.status).trim().toLowerCase();
        if(status === "active") {
            currentRes = data;
            document.getElementById('loginSection').classList.add('hidden-section');
            document.getElementById('orderSection').classList.remove('hidden-section');
            document.getElementById('resTitle').innerText = "مطعم: " + data.name;
        } else if(status === "pending") {
            alert("حسابك قيد الانتظار..");
        } else {
            alert("الرقم غير مسجل أو الحساب غير مفعل.");
        }
    };

    // إرسال طلب (POST)
    document.getElementById('orderForm').onsubmit = function(e) {
        e.preventDefault();
        showLoading(true);
        const payload = {
            action: 'NEW_ORDER',
            token: API_TOKEN,
            restaurantName: currentRes.name,
            area: document.getElementById('customerArea').value,
            details: document.getElementById('customerDetails').value
        };

        fetch(API_URL, {
            method: 'POST',
            body: JSON.stringify(payload)
        })
        .then(r => r.json())
        .then(res => {
            showLoading(false);
            if(res.success) {
                document.getElementById('statusMsg').innerHTML = `<div class="alert alert-success">تم! الكابتن: ${res.driverName}</div>`;
                document.getElementById('customerDetails').value = "";
            } else {
                alert(res.msg);
            }
        })
        .catch(err => {
            showLoading(false);
            alert("خطأ في الشبكة");
        });
    };
</script>
</body>
</html>
