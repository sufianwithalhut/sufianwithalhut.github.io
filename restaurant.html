<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>بوابة المطعم | منظومة الحوت 🐋</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #f8fafc; color: #1e293b; }
        .tab-btn { transition: 0.3s; border: 1px solid #e2e8f0; }
        .tab-btn.active { background-color: #0f172a; color: white; border-color: #0f172a; box-shadow: 0 10px 15px -3px rgba(15, 23, 42, 0.2); }
        .hidden-input { display: none; }
        .btn-glow { box-shadow: 0 15px 30px -5px rgba(16, 185, 129, 0.3); }
        .glass-header { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); }
        input::placeholder { opacity: 0.5; font-size: 0.9rem; }
    </style>
</head>
<body class="p-4 md:p-10 pb-20">

    <header class="max-w-xl mx-auto mb-6 flex justify-between items-center glass-header p-4 rounded-[2rem] border border-white shadow-sm sticky top-4 z-50">
        <div class="flex items-center gap-3">
            <div class="w-11 h-11 bg-slate-900 rounded-2xl flex items-center justify-center text-emerald-400 font-black shadow-lg">ح</div>
            <div>
                <p class="text-[9px] text-gray-400 font-black uppercase italic tracking-tighter">Kitchen Control Center</p>
                <h1 id="displayResName" class="text-sm font-black text-slate-900 italic">جاري التحميل...</h1>
            </div>
        </div>
        <button onclick="logout()" class="text-[10px] font-black text-red-500 bg-red-50 px-4 py-2 rounded-xl border border-red-100 active:scale-90 transition-all">خروج</button>
    </header>

    <div class="max-w-xl mx-auto bg-white p-6 md:p-10 rounded-[3rem] shadow-2xl border border-slate-100 relative">
        
        <div class="text-center mb-8">
            <h2 class="text-2xl font-black text-slate-900 italic">بث طلبية جديدة 🚀</h2>
            <p class="text-[10px] text-emerald-600 mt-1 font-bold uppercase tracking-widest italic">Live Radar Stream</p>
        </div>

        <div class="flex gap-2 mb-8 bg-slate-100 p-1.5 rounded-2xl border border-slate-200">
            <button onclick="switchTab('manual')" id="manualBtn" class="tab-btn active flex-1 py-4 rounded-xl font-black text-xs italic">بيانات يدوية ✍️</button>
            <button onclick="switchTab('camera')" id="cameraBtn" class="tab-btn flex-1 py-4 rounded-xl font-black text-xs text-slate-500 italic">تصوير وصل 📸</button>
        </div>
        
        <form id="orderForm" class="space-y-6">
            <div>
                <label class="text-[11px] font-black text-slate-500 uppercase mb-3 mr-1 block italic">💰 حساب المطعم (يدفعه السائق لك)</label>
                <div class="relative">
                    <input type="number" id="foodPrice" placeholder="مثلاً: 15000" 
                           class="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none focus:border-emerald-500 font-bold text-xl text-emerald-700" required>
                    <span class="absolute left-5 top-1/2 -translate-y-1/2 text-[10px] font-black text-slate-400">د.ع</span>
                </div>
            </div>

            <div id="manualSection" class="space-y-6">
                <div>
                    <label class="text-[11px] font-black text-slate-500 uppercase mb-3 mr-1 block italic">📍 العنوان / التفاصيل</label>
                    <textarea id="details" placeholder="اكتب المنطقة أو اسم الزبون أو ملاحظات..." 
                              class="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none focus:border-emerald-500 font-bold min-h-[100px]"></textarea>
                </div>

                <div>
                    <label class="text-[11px] font-black text-slate-500 uppercase mb-3 mr-1 block italic">📞 رقم هاتف الزبون</label>
                    <input type="tel" id="customerPhone" class="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none focus:border-emerald-500 font-mono tracking-[0.2em] font-bold" placeholder="07XXXXXXXXX">
                </div>
            </div>

            <div id="cameraSection" class="hidden-input space-y-4 text-center">
                <div onclick="document.getElementById('receiptImage').click()" 
                     class="border-4 border-dashed border-slate-200 rounded-[2.5rem] p-10 cursor-pointer hover:bg-emerald-50 hover:border-emerald-300 transition-all group">
                    <div class="text-5xl mb-4 group-hover:scale-110 transition-transform">📸</div>
                    <p class="font-black text-slate-700 italic">اضغط لفتح الكاميرا فوراً</p>
                    <input type="file" id="receiptImage" accept="image/*" capture="camera" class="hidden" onchange="previewImage(event)">
                </div>
                
                <div id="previewContainer" class="hidden relative p-2 bg-white rounded-3xl border shadow-lg inline-block mx-auto">
                    <img id="imagePreview" src="#" class="rounded-2xl max-h-56">
                    <button type="button" onclick="cancelImage()" class="absolute -top-2 -right-2 bg-red-500 text-white w-8 h-8 rounded-full shadow-lg font-bold">✕</button>
                </div>
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-emerald-500 text-slate-900 py-6 rounded-[2.5rem] font-black text-xl hover:bg-emerald-400 transition-all active:scale-95 btn-glow flex items-center justify-center gap-3 italic uppercase shadow-xl">
                بث الآن للرادار 🚀
            </button>
        </form>
    </div>

    <script>
        // الرابط الجديد الخاص بك
        const scriptURL = 'https://script.google.com/macros/s/AKfycbzNazBaQ32kAKmHz3d4-aHWVBXlNvDif19JmiaiT9vBUBceXZh6_YeNtj_Dhu2NvGLpLw/exec';
        let currentMode = 'manual';
        let base64Image = null;

        document.addEventListener('DOMContentLoaded', () => {
            const resName = localStorage.getItem('whale_res_name');
            if (!resName) window.location.href = 'Restaurant_login.html';
            document.getElementById('displayResName').innerText = resName;
        });

        function switchTab(type) {
            currentMode = type;
            document.getElementById('manualSection').classList.toggle('hidden-input', type !== 'manual');
            document.getElementById('cameraSection').classList.toggle('hidden-input', type !== 'camera');
            document.getElementById('manualBtn').classList.toggle('active', type === 'manual');
            document.getElementById('cameraBtn').classList.toggle('active', type === 'camera');
            document.getElementById('details').required = (type === 'manual');
        }

        function previewImage(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('imagePreview').src = e.target.result;
                    document.getElementById('previewContainer').classList.remove('hidden');
                    base64Image = e.target.result.split(',')[1];
                }
                reader.readAsDataURL(file);
            }
        }

        function cancelImage() {
            base64Image = null;
            document.getElementById('receiptImage').value = "";
            document.getElementById('previewContainer').classList.add('hidden');
        }

        document.getElementById('orderForm').onsubmit = async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const resName = localStorage.getItem('whale_res_name');
            const foodPrice = document.getElementById('foodPrice').value;

            btn.disabled = true;
            btn.innerHTML = `<span>جاري البث...</span> <div class="w-4 h-4 border-2 border-slate-900 border-t-transparent rounded-full animate-spin"></div>`;

            // تجهيز البيانات للصيغة الجديدة
            const orderData = {
                action: 'restaurant_send_order',
                restName: resName,
                type: currentMode === 'camera' ? 'تصوير وصل' : 'يدوي',
                details: document.getElementById('details').value || "طلب عبر الكاميرا",
                customerPhone: document.getElementById('customerPhone').value || "0000",
                image: base64Image,
                fixedFee: parseFloat(foodPrice) // المبلغ المطلوب من السائق للمطعم
            };

            try {
                const response = await fetch(scriptURL, {
                    method: 'POST',
                    mode: 'no-cors', // لتجاوز مشاكل الـ CORS في بعض المتصفحات عند الـ POST
                    body: JSON.stringify(orderData)
                });
                
                // بما أننا نستخدم no-cors، لا يمكننا قراءة الاستجابة مباشرة، سنفترض النجاح ونوجه المستخدم
                alert("🚀 تم إرسال الطلب للرادار بنجاح!");
                location.reload();

            } catch (err) {
                alert("حدث خطأ أثناء الإرسال. يرجى التأكد من الإنترنت.");
                btn.disabled = false;
                btn.innerHTML = "بث الآن للرادار 🚀";
            }
        };

        function logout() {
            localStorage.clear();
            window.location.href = 'Restaurant_login.html';
        }
    </script>
</body>
</html>
