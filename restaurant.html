<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>رادار المطاعم | منظومة الحوت 🐋 V10.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --emerald-glow: #10b981; --dark-space: #020617; }
        body { font-family: 'Tajawal', sans-serif; background: var(--dark-space); color: white; overflow-x: hidden; touch-action: manipulation; }
        
        /* تأثيرات الإضاءة النيون */
        .neon-border { border: 1px solid rgba(16, 185, 129, 0.2); box-shadow: 0 0 15px rgba(16, 185, 129, 0.05); }
        .neon-text { text-shadow: 0 0 10px rgba(16, 185, 129, 0.5); }
        
        .glass-panel { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        
        .tab-active { background: var(--emerald-glow) !important; color: var(--dark-space) !important; font-weight: 900; box-shadow: 0 0 20px rgba(16, 185, 129, 0.4); }
        
        .input-glow:focus { border-color: var(--emerald-glow); box-shadow: 0 0 15px rgba(16, 185, 129, 0.2); outline: none; }
        
        /* أنيميشن الانطلاق الصاروخي */
        @keyframes launch {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            50% { transform: translateY(-20px) scale(1.1); opacity: 0.5; }
            100% { transform: translateY(-100vh) scale(0.5); opacity: 0; }
        }
        .launching { animation: launch 0.8s cubic-bezier(0.6, -0.28, 0.735, 0.045) forwards; }

        .hidden { display: none; }
        .online-pulse { width: 8px; height: 8px; background: var(--emerald-glow); border-radius: 50%; box-shadow: 0 0 10px var(--emerald-glow); animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.3); opacity: 0.5; } }
    </style>
</head>
<body class="p-4 flex flex-col min-h-screen">

    <header class="max-w-xl mx-auto w-full glass-panel p-4 rounded-[2rem] flex justify-between items-center mb-6 neon-border">
        <div class="flex items-center gap-3">
            <div class="w-12 h-12 bg-emerald-500 rounded-2xl flex items-center justify-center shadow-[0_0_20px_rgba(16,185,129,0.3)] rotate-3">
                <i class="fas fa-whale text-slate-900 text-2xl"></i>
            </div>
            <div>
                <h1 id="resNameDisplay" class="text-sm font-black italic neon-text">Connecting Hub...</h1>
                <div class="flex items-center gap-2">
                    <div class="online-pulse"></div>
                    <span class="text-[9px] text-emerald-400 font-bold tracking-widest uppercase italic">Radar Active V10.0</span>
                </div>
            </div>
        </div>
        <button onclick="logout()" class="w-10 h-10 rounded-xl bg-red-500/10 text-red-400 border border-red-500/20 active:scale-75 transition-all">
            <i class="fas fa-power-off"></i>
        </button>
    </header>

    <div id="mainContainer" class="max-w-xl mx-auto w-full flex-1 glass-panel rounded-[3rem] p-6 neon-border relative overflow-hidden">
        
        <div class="flex gap-2 p-1.5 bg-slate-900/50 rounded-2xl mb-8 border border-white/5">
            <button onclick="setMode('manual')" id="tabManual" class="flex-1 py-4 rounded-xl text-[10px] font-black uppercase italic tracking-widest transition-all tab-active">Manual Entry</button>
            <button onclick="setMode('camera')" id="tabCamera" class="flex-1 py-4 rounded-xl text-[10px] font-black uppercase italic tracking-widest transition-all">Quick Scan <i class="fas fa-camera mr-1"></i></button>
        </div>

        <form id="orderForm" class="space-y-6">
            <div class="space-y-2">
                <label class="text-[10px] font-black text-emerald-400 uppercase mr-2 tracking-widest italic">Target Sector / المنطقة</label>
                <select id="location" required class="w-full p-5 bg-slate-900/80 border-2 border-slate-800 rounded-2xl font-black text-emerald-50 input-glow appearance-none">
                    <option value="" disabled selected>تحديد موقع الزبون...</option>
                    <optgroup label="المناطق القريبة">
                        <option value="الماس">الماس</option>
                        <option value="طريق بغداد">طريق بغداد</option>
                        <option value="غرناطة">غرناطة</option>
                    </optgroup>
                    <optgroup label="بقية المناطق">
                        <option value="التسعين">التسعين</option>
                        <option value="الواسطي">حي الواسطي</option>
                        <option value="قورية">قورية</option>
                        <option value="بنجه علي">بنجه علي</option>
                    </optgroup>
                </select>
            </div>

            <div id="manualInput" class="space-y-5 animate-in fade-in">
                <div class="relative">
                    <i class="fas fa-phone absolute right-4 top-1/2 -translate-y-1/2 text-slate-500 text-xs"></i>
                    <input type="tel" id="phone" placeholder="رقم الموبايل" class="w-full p-5 bg-slate-900/80 border-2 border-slate-800 rounded-2xl text-center font-bold tracking-widest text-xl input-glow">
                </div>
                <textarea id="note" placeholder="تفاصيل الطلب والعنوان..." class="w-full p-5 bg-slate-900/80 border-2 border-slate-800 rounded-2xl h-24 text-right italic text-sm input-glow resize-none"></textarea>
            </div>

            <div id="cameraInput" class="hidden space-y-4 text-center animate-in zoom-in">
                <div onclick="document.getElementById('fileInput').click()" class="bg-emerald-500/5 border-2 border-dashed border-emerald-500/20 rounded-[2.5rem] py-12 cursor-pointer active:bg-emerald-500/10 transition-all">
                    <div class="w-16 h-16 bg-emerald-500 text-slate-900 rounded-full flex items-center justify-center mx-auto mb-4 shadow-lg shadow-emerald-500/20">
                        <i class="fas fa-camera text-2xl"></i>
                    </div>
                    <p class="font-black text-xs text-emerald-400 uppercase tracking-tighter">Capture Receipt / تصوير الوصل</p>
                </div>
                <input type="file" id="fileInput" accept="image/*" capture="camera" class="hidden" onchange="handleImage(event)">
                <div id="previewWrap" class="hidden relative inline-block group">
                    <img id="previewImg" class="rounded-3xl max-h-40 border-2 border-emerald-500 shadow-2xl">
                    <button type="button" onclick="clearImg()" class="absolute -top-3 -right-3 bg-red-500 w-8 h-8 rounded-full shadow-lg border-2 border-slate-900">✕</button>
                </div>
            </div>

            <button type="submit" id="launchBtn" class="w-full py-6 bg-emerald-500 text-slate-900 rounded-[2rem] font-black text-xl flex items-center justify-center gap-4 shadow-[0_10px_30px_rgba(16,185,129,0.3)] active:scale-90 transition-all">
                <span id="btnText">إطلاق الطلب للأسطول</span>
                <i class="fas fa-paper-plane"></i>
            </button>
        </form>
    </div>

    <div id="successSplash" class="fixed inset-0 bg-emerald-500 z-[100] flex flex-col items-center justify-center text-slate-900 hidden">
        <i class="fas fa-check-circle text-8xl mb-6"></i>
        <h2 class="text-4xl font-black italic">SENT!</h2>
        <p class="font-bold mt-2 tracking-widest uppercase">تم البث للأسطول بنجاح</p>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbyi9ksTSLnwjRyCloT_0oEzhH4a_35Ijhr2unGVB-9wdOB6eoItU-XVKV9ufOlFLkLUCA/exec';
        let resData = null;
        let photoBase64 = null;

        window.onload = async () => {
            const p = localStorage.getItem('whale_res_phone');
            if (!p) return window.location.href = 'Restaurant_login.html';
            
            try {
                const r = await fetch(`${scriptURL}?action=get_master_data&pass=112233`);
                const d = await r.json();
                resData = d.restaurants.find(x => x[2] == p);
                if (resData) document.getElementById('resNameDisplay').innerText = resData[1];
            } catch (e) { document.getElementById('resNameDisplay').innerText = "Offline Mode"; }
        };

        function setMode(m) {
            document.getElementById('manualInput').classList.toggle('hidden', m === 'camera');
            document.getElementById('cameraInput').classList.toggle('hidden', m === 'manual');
            document.getElementById('tabManual').className = m === 'manual' ? 'flex-1 py-4 rounded-xl text-[10px] font-black uppercase italic tracking-widest transition-all tab-active' : 'flex-1 py-4 rounded-xl text-[10px] font-black uppercase italic tracking-widest transition-all';
            document.getElementById('tabCamera').className = m === 'camera' ? 'flex-1 py-4 rounded-xl text-[10px] font-black uppercase italic tracking-widest transition-all tab-active' : 'flex-1 py-4 rounded-xl text-[10px] font-black uppercase italic tracking-widest transition-all';
        }

        function handleImage(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    // ضغط الصورة قبل التخزين لسرعة الإرسال
                    const img = new Image();
                    img.src = ev.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        const scale = 0.5; // ضغط 50%
                        canvas.width = img.width * scale;
                        canvas.height = img.height * scale;
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        photoBase64 = canvas.toDataURL('image/jpeg', 0.6); // جودة 60%
                        document.getElementById('previewImg').src = photoBase64;
                        document.getElementById('previewWrap').classList.remove('hidden');
                    };
                };
                reader.readAsDataURL(file);
            }
        }

        function clearImg() { photoBase64 = null; document.getElementById('previewWrap').classList.add('hidden'); }

        document.getElementById('orderForm').onsubmit = async function(e) {
            e.preventDefault();
            if (!resData) return alert("جاري الاتصال بالسيرفر...");

            const btn = document.getElementById('launchBtn');
            const container = document.getElementById('mainContainer');
            const splash = document.getElementById('successSplash');

            // 1. استخراج البيانات
            const payload = {
                action: 'restaurant_send_order',
                restName: resData[1],
                restLocation: resData[3],
                fee: resData[5],
                lat: resData[6],
                lng: resData[7],
                area: document.getElementById('location').value,
                details: `الهاتف: ${document.getElementById('phone').value} | ${document.getElementById('note').value}`,
                image: photoBase64
            };

            // 2. تفعيل المزامنة الصفرية (تغذية بصرية فورية)
            container.classList.add('launching');
            setTimeout(() => {
                splash.classList.remove('hidden');
                document.getElementById('orderForm').reset();
                clearImg();
            }, 400);

            // 3. الإرسال الحقيقي في الخلفية
            try {
                fetch(scriptURL, { method: 'POST', body: JSON.stringify(payload) })
                .then(() => console.log("Order Synced in background"));
                
                // إعادة الواجهة بعد 1.5 ثانية
                setTimeout(() => {
                    splash.classList.add('hidden');
                    container.classList.remove('launching');
                }, 2000);
            } catch (err) {
                console.log("Network error, but UI continued");
            }
        };

        function logout() { localStorage.clear(); window.location.href = 'Restaurant_login.html'; }
    </script>
</body>
</html>
