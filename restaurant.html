<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>بوابة المطعم | منظومة الحوت 🐋</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #020617; color: white; overflow-x: hidden; }
        .glass-card { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .tab-btn { transition: 0.3s; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); }
        .tab-btn.active { background: #10b981; color: #020617; font-weight: 900; border-color: #10b981; }
        .whale-select { background: #0f172a; border: 2px solid #1e293b; color: white; appearance: none; }
        .whale-select:focus { border-color: #10b981; }
        .btn-glow { box-shadow: 0 0 20px rgba(16, 185, 129, 0.3); }
        .hidden-section { display: none; }
    </style>
</head>
<body class="p-4 pb-24">

    <header class="max-w-xl mx-auto mb-6 flex justify-between items-center glass-card p-4 rounded-3xl sticky top-4 z-50">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-emerald-500 rounded-xl flex items-center justify-center text-slate-900 font-black shadow-lg">🐋</div>
            <div>
                <p class="text-[8px] text-emerald-500 font-black uppercase tracking-widest italic">Al-Hut Kitchen Hub</p>
                <h1 id="displayResName" class="text-xs font-black text-white italic tracking-wider">جاري التوثيق...</h1>
            </div>
        </div>
        <button onclick="logout()" class="text-[10px] font-black text-red-500 px-4 py-2 rounded-xl bg-red-500/10 border border-red-500/20">خروج</button>
    </header>

    <div class="max-w-xl mx-auto glass-card p-6 rounded-[2.5rem] shadow-2xl relative border-t-4 border-emerald-500">
        
        <div class="text-center mb-6">
            <h2 class="text-xl font-black italic">إرسال سريع للرادار 🚀</h2>
            <div class="flex justify-center items-center gap-2 mt-2">
                <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span>
                <p class="text-[9px] text-emerald-500 font-bold uppercase tracking-widest">Active Connection: Secured</p>
            </div>
        </div>

        <div class="flex gap-2 mb-6 bg-white/5 p-1 rounded-2xl">
            <button type="button" onclick="switchTab('manual')" id="manualBtn" class="tab-btn active flex-1 py-3 rounded-xl font-black text-[10px] italic">إدخال بيانات</button>
            <button type="button" onclick="switchTab('camera')" id="cameraBtn" class="tab-btn flex-1 py-3 rounded-xl font-black text-[10px] italic">تصوير الوصل 📸</button>
        </div>
        
        <form id="orderForm" class="space-y-5">
            <div>
                <label class="text-[10px] font-black text-emerald-500 uppercase mb-2 block mr-1 italic">📍 تحديد منطقة الزبون</label>
                <div class="relative">
                    <select id="locationSelect" class="w-full p-4 whale-select rounded-2xl outline-none font-black text-sm pr-10" required>
                        <option value="" disabled selected>اختر المنطقة...</option>
                        <option value="الماس">الماس</option>
                        <option value="طريق بغداد">طريق بغداد</option>
                        <option value="تسعين">التسعين</option>
                        <option value="شارع المحافظة">شارع المحافظة</option>
                        <option value="قورية">قورية</option>
                        <option value="بنجه علي">بنجه علي</option>
                        <option value="عرفه">عرفه</option>
                        <option value="حي الواسطي">حي الواسطي</option>
                        <option value="حزيران">حي حزيران</option>
                        <option value="المصلى">المصلى</option>
                        <option value="حي عدن">حي عدن</option>
                        <option value="حي الخضراء">حي الخضراء</option>
                    </select>
                    <i class="fas fa-map-marker-alt absolute right-4 top-1/2 -translate-y-1/2 text-emerald-500"></i>
                </div>
            </div>

            <div id="manualSection" class="space-y-5">
                <div>
                    <label class="text-[10px] font-black text-emerald-500 uppercase mb-2 block mr-1 italic">📞 هاتف الزبون</label>
                    <input type="tel" id="customerPhone" class="w-full p-4 bg-white/5 border border-white/10 rounded-2xl outline-none focus:border-emerald-500 font-bold text-center tracking-widest" placeholder="07XXXXXXXXX">
                </div>
                <div>
                    <label class="text-[10px] font-black text-emerald-500 uppercase mb-2 block mr-1 italic">📝 ملاحظات إضافية</label>
                    <input type="text" id="details" class="w-full p-4 bg-white/5 border border-white/10 rounded-2xl outline-none focus:border-emerald-500 font-bold text-sm text-right" placeholder="مثلاً: بدون طرشي، العمارة الثانية">
                </div>
            </div>

            <div id="cameraSection" class="hidden space-y-4 text-center">
                <div onclick="document.getElementById('receiptImage').click()" 
                     class="border-2 border-dashed border-white/10 rounded-[2rem] p-10 cursor-pointer hover:bg-emerald-500/5 hover:border-emerald-500/40 transition-all group">
                    <i class="fas fa-camera text-4xl mb-3 text-white/20 group-hover:text-emerald-500"></i>
                    <p class="font-black text-[10px] italic">التقط صورة الوصل الآن</p>
                    <input type="file" id="receiptImage" accept="image/*" capture="camera" class="hidden" onchange="previewImage(event)">
                </div>
                <div id="previewContainer" class="hidden relative inline-block">
                    <img id="imagePreview" src="#" class="rounded-2xl max-h-48 border-2 border-emerald-500/30">
                    <button type="button" onclick="cancelImage()" class="absolute -top-3 -right-3 bg-red-600 text-white w-8 h-8 rounded-full shadow-lg">✕</button>
                </div>
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-emerald-500 text-slate-900 py-5 rounded-2xl font-black text-lg hover:bg-emerald-400 transition-all active:scale-95 btn-glow flex items-center justify-center gap-3 italic uppercase shadow-xl mt-6">
                <span>بث فوري للرادار</span>
                <i class="fas fa-paper-plane"></i>
            </button>
        </form>

        <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-emerald-500 text-slate-900 px-8 py-4 rounded-full font-black text-sm hidden shadow-2xl z-[100] border-2 border-white/20 animate-bounce">
            ✅ تم بث الطلب لرادار الكباتن بنجاح!
        </div>
    </div>

    <script>
        // الرابط الجديد V6.1 المحدث
        const scriptURL = 'https://script.google.com/macros/s/AKfycbypXnyeduY_p9Ax-BWJC-u_dYMU7q-zZ8MSv_7o3BWNtBZdYxNo3h7CX0OVR_GGbZr5ew/exec';
        let currentMode = 'manual';
        let base64Image = null;

        document.addEventListener('DOMContentLoaded', () => {
            const resName = localStorage.getItem('whale_res_name') || "مطعم غير معرف";
            document.getElementById('displayResName').innerText = resName;
            
            if (!localStorage.getItem('res_lat')) {
                alert("تنبيه: موقع المطعم غير مثبت. يرجى تسجيل الدخول مرة أخرى.");
                logout();
            }
        });

        function switchTab(type) {
            currentMode = type;
            const manual = document.getElementById('manualSection');
            const camera = document.getElementById('cameraSection');
            
            if (type === 'manual') {
                manual.classList.remove('hidden');
                camera.classList.add('hidden');
            } else {
                manual.classList.add('hidden');
                camera.classList.remove('hidden');
            }
            
            document.getElementById('manualBtn').classList.toggle('active', type === 'manual');
            document.getElementById('cameraBtn').classList.toggle('active', type === 'camera');
        }

        function previewImage(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.getElementById('imagePreview').src = e.target.result;
                    document.getElementById('previewContainer').classList.remove('hidden');
                    base64Image = e.target.result;
                };
                reader.readAsDataURL(file);
            }
        }

        function cancelImage() {
            base64Image = null;
            document.getElementById('previewContainer').classList.add('hidden');
            document.getElementById('receiptImage').value = "";
        }

        document.getElementById('orderForm').onsubmit = async function(e) {
            e.preventDefault();
            
            const btn = document.getElementById('submitBtn');
            const toast = document.getElementById('toast');
            const resName = localStorage.getItem('whale_res_name');
            const area = document.getElementById('locationSelect').value;
            const phone = document.getElementById('customerPhone').value || "لا يوجد";
            const userDetails = document.getElementById('details').value || "بدون ملاحظات";

            const lat = localStorage.getItem('res_lat');
            const lng = localStorage.getItem('res_lng');

            const orderData = {
                action: 'restaurant_send_order',
                restName: resName,
                type: currentMode === 'camera' ? 'تصوير وصل' : 'يدوي',
                area: area,
                details: `هاتف الزبون: ${phone} | ملاحظات: ${userDetails}`,
                lat: parseFloat(lat),
                lng: parseFloat(lng),
                image: base64Image
            };

            btn.disabled = true;
            btn.innerHTML = `<i class="fas fa-satellite-dish animate-spin"></i> جاري بث الإشارة...`;
            
            try {
                await fetch(scriptURL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(orderData)
                });

                toast.classList.remove('hidden');
                document.getElementById('orderForm').reset();
                cancelImage();
                
                setTimeout(() => { 
                    toast.classList.add('hidden'); 
                    btn.disabled = false;
                    btn.innerHTML = `<span>بث فوري للرادار</span> <i class="fas fa-paper-plane"></i>`;
                }, 3000);

            } catch (err) {
                alert("حدث خطأ في الاتصال. تأكد من الإنترنت.");
                btn.disabled = false;
                btn.innerHTML = `<span>بث فوري للرادار</span> <i class="fas fa-paper-plane"></i>`;
            }
        };

        function logout() { localStorage.clear(); window.location.href = 'restaurant_login.html'; }
    </script>
</body>
</html>
