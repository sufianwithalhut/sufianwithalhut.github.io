<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة المطاعم | نظام الحوت</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root {
            --primary: #0f172a; 
            --accent: #f97316;  
            --glass: rgba(255, 255, 255, 0.95);
            --bg: #f8fafc;
        }

        body { 
            background-color: var(--bg); 
            font-family: 'Cairo', sans-serif; 
            color: var(--primary);
            overflow-x: hidden;
        }

        #loadingOverlay {
            position: fixed; top:0; left:0; width:100%; height:100%; 
            background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(10px);
            z-index:9999; display:none; align-items:center; justify-content:center; flex-direction: column;
            color: white;
        }

        .container { max-width: 600px; padding-bottom: 50px; }

        .header-brand { padding: 40px 0 20px; text-align: center; }
        .header-brand h2 { font-weight: 900; letter-spacing: -1px; color: var(--primary); }
        .header-brand span { color: var(--accent); }

        .card {
            border: none; border-radius: 28px; background: var(--glass);
            box-shadow: 0 15px 35px rgba(0,0,0,0.05); transition: all 0.3s ease;
            margin-bottom: 20px; border: 1px solid rgba(0,0,0,0.03);
        }

        .card-title { font-weight: 800; display: flex; align-items: center; gap: 12px; margin-bottom: 25px; font-size: 1.2rem; }

        .form-control, .form-select {
            border-radius: 16px; padding: 14px 20px; border: 2px solid #e2e8f0; background: #fff; transition: 0.3s;
        }
        .form-control:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(249, 115, 22, 0.1); }

        #map { 
            height: 250px; width: 100%; border-radius: 24px; 
            margin-top: 10px; border: 6px solid white; box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }

        .btn-main {
            background: var(--primary); color: white; border-radius: 18px; padding: 16px;
            font-weight: 700; border: none; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px;
            box-shadow: 0 10px 20px rgba(15, 23, 42, 0.2);
        }
        .btn-main:hover { background: #1e293b; transform: translateY(-3px); color: white; box-shadow: 0 15px 25px rgba(15, 23, 42, 0.3); }

        .btn-group .btn { border-radius: 14px !important; margin: 0 5px; border: 2px solid #e2e8f0 !important; font-weight: 700; }
        .btn-group .btn.active { background-color: var(--accent) !important; color: white !important; border-color: var(--accent) !important; box-shadow: 0 5px 15px rgba(249, 115, 22, 0.3); }

        .hidden-section { display: none; }
        .show-section { display: block; animation: fadeIn 0.6s cubic-bezier(0.23, 1, 0.32, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .status-badge { background: #f0fdf4; color: #166534; padding: 10px 18px; border-radius: 14px; font-weight: 800; font-size: 0.95rem; border: 1px solid #dcfce7; }
    </style>
</head>
<body>

<div id="loadingOverlay">
    <div class="spinner-border text-warning" style="width: 3rem; height: 3rem;" role="status"></div>
    <span class="mt-3 fw-black text-white">جاري معالجة الطلب...</span>
</div>

<div class="container">
    <div class="header-brand">
        <div class="mb-2"><i data-lucide="waves" size="55" color="#f97316"></i></div>
        <h2>نظام <span>الحوت</span></h2>
        <p class="text-muted fw-bold">بوابة الشركاء والمطاعم الذكية</p>
    </div>

    <div id="loginCheckSection" class="card p-4">
        <div class="card-title"><i data-lucide="log-in" color="#f97316"></i> دخول المطعم</div>
        <div class="mb-3">
            <input type="tel" id="checkPhone" class="form-control" placeholder="رقم الهاتف المسجل (07...)">
        </div>
        <button class="btn btn-main w-100" onclick="checkRestaurantStatus()">
            دخول للوحة التحكم <i data-lucide="chevron-left"></i>
        </button>
    </div>

    <div id="registrationSection" class="card p-4">
        <div class="card-title"><i data-lucide="plus-circle" color="#f97316"></i> طلب انضمام شريك جديد</div>
        <form id="regForm">
            <div class="row g-3">
                <div class="col-12">
                    <label class="form-label small fw-bold">اسم المطعم التجاري</label>
                    <input type="text" id="resName" class="form-control" placeholder="مثلاً: مطعم كركوك الملكي" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label small fw-bold">المنطقة</label>
                    <select id="resArea" class="form-select">
                        <option value="المنطقة المركزية">المنطقة المركزية</option>
                        <option value="حي النصر">حي النصر</option>
                        <option value="تسعين">تسعين</option>
                        <option value="عرفات">عرفات</option>
                        <option value="طريق بغداد">طريق بغداد</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label small fw-bold">رقم هاتف المطعم</label>
                    <input type="tel" id="resPhone" class="form-control" placeholder="07XXXXXXXXX" required>
                </div>
                <div class="col-12">
                    <label class="form-label small fw-bold">حدد موقع المطعم بدقة</label>
                    <div id="map"></div>
                    <input type="hidden" id="lat" value="35.468">
                    <input type="hidden" id="lng" value="44.392">
                </div>
                <button type="submit" class="btn btn-main w-100 mt-3">إرسال طلب التفعيل</button>
            </div>
        </form>
    </div>

    <div id="orderSection" class="card p-4 hidden-section">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div class="card-title m-0"><i data-lucide="shopping-bag" color="#f97316"></i> إرسال طلبية</div>
            <span class="status-badge" id="activeResName"></span>
        </div>
        
        <div class="btn-group w-100 mb-4">
            <button class="btn btn-outline-secondary active" id="btnManual" onclick="switchMethod('manual')" type="button">إدخال يدوي</button>
            <button class="btn btn-outline-secondary" id="btnPhoto" onclick="switchMethod('photo')" type="button">تصوير وصل</button>
        </div>

        <form id="orderForm">
            <div id="manualInput">
                <div class="mb-3">
                    <label class="form-label small fw-bold">منطقة الزبون</label>
                    <select id="customerArea" class="form-select">
                        <option value="المنطقة المركزية">المنطقة المركزية</option>
                        <option value="حي النصر">حي النصر</option>
                        <option value="تسعين">تسعين</option>
                        <option value="حي الواسطي">حي الواسطي</option>
                        <option value="حي الخضراء">حي الخضراء</option>
                    </select>
                </div>
                <div class="mb-4">
                    <label class="form-label small fw-bold">هاتف الزبون وتفاصيل العنوان</label>
                    <input type="text" id="customerPhone" class="form-control" placeholder="07XXXXXXXXX - مقابل مدرسة الرشيد" required>
                </div>
            </div>

            <div id="photoInput" class="hidden-section mb-4 text-center">
                <div class="p-4 border-2 border-dashed rounded-4 mb-2" style="border: 2px dashed #cbd5e1; background: #f1f5f9;">
                    <i data-lucide="camera" size="32" class="text-muted mb-2"></i>
                    <input type="file" id="orderImg" class="form-control" accept="image/*" capture="camera">
                    <p class="text-muted small mt-2">قم بتصوير الوصل الورقي ليتم معالجته</p>
                </div>
            </div>

            <button type="submit" class="btn btn-main w-100">
                <i data-lucide="navigation-2"></i> البحث عن أقرب كابتن متاح
            </button>
        </form>
        <div id="statusMsg" class="mt-4 text-center"></div>
    </div>
</div>

<script async defer src="https://maps.googleapis.com/maps/api/js?callback=initMap"></script>
<script>
    lucide.createIcons();

    // الإعدادات الأمنية والرابط الجديد
    const API_URL = "https://script.google.com/macros/s/AKfycby1HTAowv3kjAORpBn-ZeMImhiBFVAhRd9gXYeMhIKGDlvQjO1yaY7HBioyQBMDWkmz4A/exec";
    const API_TOKEN = "HUT_SECURE_99"; 
    
    let map, marker;
    let currentRestaurant = null;

    function initMap() {
        const defaultLoc = { lat: 35.468, lng: 44.392 };
        map = new google.maps.Map(document.getElementById("map"), { zoom: 14, center: defaultLoc, disableDefaultUI: true });
        marker = new google.maps.Marker({ position: defaultLoc, map: map, draggable: true });
        
        marker.addListener('dragend', () => {
            document.getElementById('lat').value = marker.getPosition().lat();
            document.getElementById('lng').value = marker.getPosition().lng();
        });
    }

    function switchMethod(method) {
        document.getElementById('manualInput').style.display = method === 'manual' ? 'block' : 'none';
        document.getElementById('photoInput').style.display = method === 'photo' ? 'block' : 'none';
        document.getElementById('btnManual').classList.toggle('active', method === 'manual');
        document.getElementById('btnPhoto').classList.toggle('active', method === 'photo');
    }

    function showLoading(show) { document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none'; }

    // التحقق من الدخول
    function checkRestaurantStatus() {
        const phone = document.getElementById('checkPhone').value;
        if(!phone) return alert("يرجى إدخال رقم الهاتف");
        
        showLoading(true);
        const script = document.createElement('script');
        // إضافة التوكن للرابط
        script.src = `${API_URL}?action=checkRes&phone=${phone}&token=${API_TOKEN}&callback=handleLogin`;
        document.body.appendChild(script);
        script.onload = () => script.remove();
    }

    window.handleLogin = function(data) {
        showLoading(false);
        if(data.status === "active") {
            currentRestaurant = data;
            document.getElementById('registrationSection').style.display = 'none';
            document.getElementById('loginCheckSection').style.display = 'none';
            document.getElementById('orderSection').classList.remove('hidden-section');
            document.getElementById('orderSection').classList.add('show-section');
            document.getElementById('activeResName').innerText = data.name;
        } else if (data.status === "pending") {
            alert("طلبك قيد المراجعة، يرجى الانتظار لحين تفعيل الحساب من الإدارة.");
        } else {
            alert("هذا الرقم غير مسجل في نظام الحوت.");
        }
    };

    // تسجيل مطعم (POST مع Token)
    document.getElementById('regForm').onsubmit = function(e) {
        e.preventDefault();
        showLoading(true);
        const payload = {
            action: 'RESTAURANT_REG',
            token: API_TOKEN,
            name: document.getElementById('resName').value,
            phone: document.getElementById('resPhone').value,
            area: document.getElementById('resArea').value,
            lat: document.getElementById('lat').value,
            lng: document.getElementById('lng').value,
            comm: 10,
            pay: "cash"
        };

        fetch(API_URL, {
            method: 'POST',
            mode: 'no-cors', // لضمان الإرسال دون مشاكل CORS مع Google Apps Script
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        }).then(() => {
            showLoading(false);
            alert("تم إرسال طلب الانضمام! سيتم تفعيل حسابك قريباً.");
            location.reload();
        }).catch(err => {
            showLoading(false);
            alert("حدث خطأ في الاتصال، حاول مرة أخرى.");
        });
    };

    // إرسال طلب (POST مع Token)
    document.getElementById('orderForm').onsubmit = function(e) {
        e.preventDefault();
        if(!currentRestaurant) return;
        showLoading(true);

        const payload = {
            action: 'NEW_ORDER',
            token: API_TOKEN,
            restaurantName: currentRestaurant.name,
            area: document.getElementById('customerArea').value,
            details: document.getElementById('customerPhone').value
        };

        fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify(payload)
        })
        .then(res => res.json())
        .then(result => {
            showLoading(false);
            if(result.success) {
                document.getElementById('statusMsg').innerHTML = `
                    <div class="alert alert-success fw-bold rounded-4 shadow-sm p-4 border-0">
                        <i data-lucide="check-circle" class="mb-2 text-success" size="40"></i><br>
                        تم تعيين الكابتن: <span class="text-primary">${result.driverName}</span><br>
                        رقم التتبع: <span class="text-dark">${result.orderId}</span>
                    </div>`;
                lucide.createIcons();
                document.getElementById('customerPhone').value = '';
            } else {
                document.getElementById('statusMsg').innerHTML = `
                    <div class="alert alert-warning fw-bold rounded-4 border-0">
                        <i data-lucide="alert-triangle" class="mb-2"></i><br>
                        ${result.msg}
                    </div>`;
                lucide.createIcons();
            }
        })
        .catch(err => {
            showLoading(false);
            alert("خطأ في الشبكة، تأكد من الاتصال بالإنترنت.");
        });
    };
</script>
</body>
</html>
