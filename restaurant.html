<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>بوابة المطعم | منظومة الحوت 🐋</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #020617; color: white; }
        .glass-card { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .tab-btn { transition: 0.3s; background: rgba(255,255,255,0.05); }
        .tab-btn.active { background: #10b981; color: #020617; font-weight: 900; }
        .whale-select { background: #0f172a; border: 2px solid #1e293b; color: white; appearance: none; }
        .whale-select:focus { border-color: #10b981; }
        .hidden-input { display: none; }
        .btn-glow { box-shadow: 0 0 20px rgba(16, 185, 129, 0.2); }
        @keyframes success-pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .success-anim { animation: success-pulse 0.4s ease-out; }
    </style>
</head>
<body class="p-4 md:p-8 pb-20">

    <header class="max-w-xl mx-auto mb-6 flex justify-between items-center glass-card p-4 rounded-3xl sticky top-4 z-50">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-emerald-500 rounded-xl flex items-center justify-center text-slate-900 font-black shadow-lg">ح</div>
            <div>
                <p class="text-[8px] text-emerald-500 font-black uppercase tracking-widest italic">Kitchen HQ</p>
                <h1 id="displayResName" class="text-xs font-black text-white italic">جاري التحميل...</h1>
            </div>
        </div>
        <button onclick="logout()" class="text-[9px] font-black text-red-500 px-3 py-2 rounded-lg bg-red-500/10 border border-red-500/20">خروج</button>
    </header>

    <div class="max-w-xl mx-auto glass-card p-6 md:p-8 rounded-[2.5rem] shadow-2xl relative border-t-4 border-emerald-500">
        
        <div class="text-center mb-6">
            <h2 class="text-xl font-black italic">إرسال سريع للرادار 🚀</h2>
            <p class="text-[9px] text-emerald-500 mt-1 font-bold uppercase tracking-widest">Instant Zero-Delay Stream</p>
        </div>

        <div class="flex gap-2 mb-6 bg-white/5 p-1 rounded-2xl">
            <button onclick="switchTab('manual')" id="manualBtn" class="tab-btn active flex-1 py-3 rounded-xl font-black text-[10px] italic">إدخال يدوي</button>
            <button onclick="switchTab('camera')" id="cameraBtn" class="tab-btn flex-1 py-3 rounded-xl font-black text-[10px] italic">تصوير وصل</button>
        </div>
        
        <form id="orderForm" class="space-y-5">
            <div>
                <label class="text-[10px] font-black text-emerald-500 uppercase mb-2 block mr-1 italic">📍 وجهة الزبون (المنطقة)</label>
                <div class="relative">
                    <select id="locationSelect" class="w-full p-4 whale-select rounded-2xl outline-none font-black text-sm pr-10" required>
                        <option value="" disabled selected>اختر المنطقة...</option>
                        <option value="الماس|3000">الماس (3,000 د.ع)</option>
                        <option value="شارع المحافظة|2000">شارع المحافظة (2,000 د.ع)</option>
                        <option value="شارع القدس|2000">شارع القدس (2,000 د.ع)</option>
                        <option value="حزيران|3000">حزيران (3,000 د.ع)</option>
                        <option value="واسطي|2500">واسطي (2,500 د.ع)</option>
                        <option value="طريق عرفة|3000">طريق عرفة (3,000 د.ع)</option>
                        <option value="تسعين|2000">تسعين (2,000 د.ع)</option>
                        <option value="قورية|2000">قورية (2,000 د.ع)</option>
                    </select>
                    <i class="fas fa-map-marker-alt absolute right-4 top-1/2 -translate-y-1/2 text-emerald-500"></i>
                </div>
            </div>

            <div id="manualSection" class="space-y-5">
                <div>
                    <label class="text-[10px] font-black text-emerald-500 uppercase mb-2 block mr-1 italic">📞 رقم هاتف الزبون</label>
                    <input type="tel" id="customerPhone" class="w-full p-4 bg-white/5 border border-white/10 rounded-2xl outline-none focus:border-emerald-500 font-bold text-center tracking-widest" placeholder="07XXXXXXXXX">
                </div>
                <div>
                    <label class="text-[10px] font-black text-emerald-500 uppercase mb-2 block mr-1 italic">📝 ملاحظات إضافية (اختياري)</label>
                    <input type="text" id="details" class="w-full p-4 bg-white/5 border border-white/10 rounded-2xl outline-none focus:border-emerald-500 font-bold text-sm" placeholder="رقم الدار، معلم قريب...">
                </div>
            </div>

            <div id="cameraSection" class="hidden-input space-y-4 text-center">
                <div onclick="document.getElementById('receiptImage').click()" 
                     class="border-2 border-dashed border-white/10 rounded-[2rem] p-8 cursor-pointer hover:bg-emerald-500/5 hover:border-emerald-500/40 transition-all">
                    <div class="text-4xl mb-2">📸</div>
                    <p class="font-black text-[10px] italic">فتح الكاميرا لتصوير الوصل</p>
                    <input type="file" id="receiptImage" accept="image/*" capture="camera" class="hidden" onchange="previewImage(event)">
                </div>
                <div id="previewContainer" class="hidden relative inline-block">
                    <img id="imagePreview" src="#" class="rounded-xl max-h-40 border border-white/20">
                    <button type="button" onclick="cancelImage()" class="absolute -top-2 -right-2 bg-red-600 text-white w-6 h-6 rounded-full text-xs">✕</button>
                </div>
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-emerald-500 text-slate-900 py-5 rounded-2xl font-black text-lg hover:bg-emerald-400 transition-all active:scale-95 btn-glow flex items-center justify-center gap-3 italic uppercase shadow-xl">
                بث فوري للرادار 🚀
            </button>
        </form>

        <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-emerald-500 text-slate-900 px-6 py-3 rounded-full font-black text-xs hidden shadow-2xl z-[100]">تم البث بنجاح! جاري المعالجة...</div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbwka4X5EuWllid1JLzvrXvGoYpcMdnEFID7gwrk4TPiHpudxhCWKB7OPT1rvSxeU6YfbA/exec';
        let currentMode = 'manual';
        let base64Image = null;

        document.addEventListener('DOMContentLoaded', () => {
            const resName = localStorage.getItem('whale_res_name');
            if (!resName) window.location.href = 'restaurant_login.html';
            document.getElementById('displayResName').innerText = resName;
        });

        function switchTab(type) {
            currentMode = type;
            document.getElementById('manualSection').classList.toggle('hidden-input', type !== 'manual');
            document.getElementById('cameraSection').classList.toggle('hidden-input', type !== 'camera');
            document.getElementById('manualBtn').classList.toggle('active', type === 'manual');
            document.getElementById('cameraBtn').classList.toggle('active', type === 'camera');
        }

        function previewImage(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.getElementById('imagePreview').src = e.target.result;
                    document.getElementById('previewContainer').classList.remove('hidden');
                    base64Image = e.target.result.split(',')[1];
                };
                reader.readAsDataURL(file);
            }
        }

        function cancelImage() {
            base64Image = null;
            document.getElementById('previewContainer').classList.add('hidden');
        }

        // دالة الإرسال مع المعالجة في الخلفية
        document.getElementById('orderForm').onsubmit = function(e) {
            e.preventDefault();
            
            const btn = document.getElementById('submitBtn');
            const toast = document.getElementById('toast');
            const resName = localStorage.getItem('whale_res_name');
            const locationData = document.getElementById('locationSelect').value.split('|');
            
            const orderData = {
                action: 'restaurant_send_order',
                restName: resName,
                type: currentMode === 'camera' ? 'تصوير وصل' : 'يدوي',
                details: `المنطقة: ${locationData[0]} | ملاحظات: ${document.getElementById('details').value || "لا يوجد"}`,
                deliveryFee: locationData[1], // سعر التوصيل الثابت للمنطقة
                customerPhone: document.getElementById('customerPhone').value || "0000",
                image: base64Image
            };

            // --- الخطوة الذهبية: التصفير الفوري ---
            toast.classList.remove('hidden');
            btn.classList.add('success-anim');
            
            // تصفير الواجهة فوراً ليكون المطعم جاهزاً للطلب التالي
            document.getElementById('orderForm').reset();
            cancelImage();
            setTimeout(() => { toast.classList.add('hidden'); }, 2000);

            // --- المعالجة في الخلفية ---
            fetch(scriptURL, {
                method: 'POST',
                mode: 'no-cors', // لضمان عدم توقف المتصفح بانتظار الرد (سرعة قصوى)
                body: JSON.stringify(orderData)
            }).then(() => {
                console.log("Order transmitted successfully in background.");
            }).catch(err => {
                console.error("Background sync error:", err);
            });
        };

        function logout() { localStorage.clear(); window.location.href = 'restaurant_login.html'; }
    </script>
</body>
</html>
