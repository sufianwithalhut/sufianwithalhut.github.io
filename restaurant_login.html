<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>دخول المطاعم | منظومة الحوت 🐋 V10.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --whale-blue: #2563eb; --whale-light: #f8fafc; }
        body { font-family: 'Tajawal', sans-serif; background: var(--whale-light); color: #1e293b; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow-x: hidden; }
        .bg-pattern { position: fixed; inset: 0; background-image: radial-gradient(#2563eb 0.5px, transparent 0.5px); background-size: 25px 25px; opacity: 0.05; z-index: -1; }
        .login-card { background: white; border-radius: 3rem; box-shadow: 0 25px 50px -12px rgba(37, 99, 235, 0.15); border: 1px solid rgba(37, 99, 235, 0.1); width: 100%; max-width: 400px; padding: 2.5rem; position: relative; z-index: 10; }
        .whale-input { width: 100%; padding: 1.1rem; background: #f1f5f9; border: 2px solid transparent; border-radius: 1.5rem; font-weight: bold; text-align: center; transition: 0.3s; appearance: none; }
        .whale-input:focus { border-color: var(--whale-blue); background: white; outline: none; box-shadow: 0 0 15px rgba(37, 99, 235, 0.05); }
        .btn-primary { background: var(--whale-blue); color: white; font-weight: 900; border-radius: 1.5rem; transition: 0.3s; box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2); border: none; cursor: pointer; }
        .btn-primary:disabled { background: #cbd5e1; box-shadow: none; cursor: not-allowed; }
        .btn-primary:active { transform: scale(0.95); }
        .loading-ring { width: 45px; height: 45px; border: 4px solid #f1f5f9; border-top: 4px solid var(--whale-blue); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .hidden { display: none; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="p-6">
    <div class="bg-pattern"></div>

    <div class="login-card">
        <div class="text-center mb-10">
            <div class="w-20 h-20 bg-blue-600 text-white rounded-[2rem] flex items-center justify-center text-4xl mx-auto mb-4 shadow-xl shadow-blue-100">
                <i class="fas fa-utensils"></i>
            </div>
            <h2 class="text-2xl font-black text-slate-800 italic uppercase" style="font-family: 'Orbitron';">WHALE <span class="text-blue-600">KITCHEN</span></h2>
            <p class="text-[9px] text-slate-400 font-bold tracking-[0.3em] mt-2 uppercase">Kirkuk Network V10.0</p>
        </div>

        <div id="step-auth" class="space-y-5 fade-in">
            <div class="relative">
                <input type="tel" id="mainPhone" placeholder="077XXXXXXXX" class="whale-input tracking-[0.2em]" dir="ltr">
            </div>
            <button onclick="handleLogin()" id="loginBtn" class="w-full py-4 btn-primary flex items-center justify-center gap-3">
                <span id="loginBtnText">دخول المنظومة</span>
                <i class="fas fa-satellite-dish"></i>
            </button>
        </div>

        <div id="step-register" class="hidden space-y-4 fade-in">
            <div class="bg-blue-50 p-4 rounded-2xl mb-2 border border-blue-100">
                <p class="text-[10px] text-blue-600 font-black text-center italic uppercase">New Partner Registration</p>
            </div>
            <input type="text" id="resName" placeholder="اسم المطعم أو الكافيه" class="whale-input">
            <div class="relative">
                <select id="resArea" class="whale-input cursor-pointer">
                    <option value="" disabled selected>اختر منطقة المطعم</option>
                    <option value="الماس">الماس</option>
                    <option value="طريق بغداد">طريق بغداد</option>
                    <option value="التسعين">التسعين</option>
                    <option value="قورية">قورية</option>
                    <option value="الواسطي">حي الواسطي</option>
                    <option value="عرفه">عرفه</option>
                    <option value="غرناطة">غرناطة</option>
                    <option value="المصلى">المصلى</option>
                </select>
            </div>
            <input type="url" id="resMapLink" placeholder="رابط الموقع (Google Maps)" class="whale-input text-xs font-mono">
            
            <button onclick="submitNewRegistration()" id="regBtn" class="w-full py-4 btn-primary mt-2">إرسال طلب الانضمام</button>
            <button onclick="location.reload()" class="w-full text-[10px] font-black text-slate-400 uppercase tracking-widest hover:text-blue-600 transition-all">Back to login</button>
        </div>

        <div id="step-wait" class="hidden text-center py-6 fade-in">
            <div class="loading-ring mb-6"></div>
            <h3 class="text-xl font-black text-slate-800 italic uppercase">Waiting Approval</h3>
            <p class="text-[12px] text-slate-500 mt-4 leading-relaxed font-bold italic px-2">
                طلبك قيد المراجعة في سيرفر الحوت.<br>سيتم فتح لوحة التحكم تلقائياً فور تفعيل طه لحسابك.
            </p>
            <button onclick="logout()" class="mt-10 text-red-500 text-[10px] font-black uppercase flex items-center justify-center gap-2 mx-auto hover:underline">
                <i class="fas fa-user-edit"></i> تغيير بيانات الحساب
            </button>
        </div>
    </div>

    <script>
        // رابط المحرك V10.0 الخاص بك
        const scriptURL = 'https://script.google.com/macros/s/AKfycbzywi3-mLv5H4bNHYvQbFDpy_FwA-AceD4g8JZX6Ah3QZhmC5LGXNLvBeQBjYO9tmt9vA/exec';
        let checkInterval = null;

        window.onload = () => {
            const savedPhone = localStorage.getItem('whale_res_phone');
            if (savedPhone) {
                document.getElementById('mainPhone').value = savedPhone;
                handleLogin(true);
            }
        };

        async function handleLogin(isAuto = false) {
            const phone = document.getElementById('mainPhone').value.trim();
            if (!phone || phone.length < 10) return;

            const btn = document.getElementById('loginBtn');
            const btnText = document.getElementById('loginBtnText');
            
            if(!isAuto) { 
                btn.disabled = true; 
                btnText.innerText = "جاري الفحص..."; 
            }

            try {
                // استخدام login_check لزيادة الأمان (يفحص شيت Restaurants)
                const response = await fetch(`${scriptURL}?action=login_check&id=${encodeURIComponent(phone)}`);
                const res = await response.json();

                if (res.status === 'active') {
                    localStorage.setItem('whale_res_phone', phone);
                    localStorage.setItem('whale_res_name', res.data[1]);
                    window.location.replace('Restaurant.html');
                } else if (res.status === 'pending') {
                    localStorage.setItem('whale_res_phone', phone);
                    showStep('step-wait');
                    startAutoCheck();
                } else if (res.status === 'banned') {
                    alert("عذراً، هذا الحساب محظور حالياً.");
                    if(!isAuto) location.reload();
                } else {
                    if(!isAuto) showStep('step-register');
                }
            } catch (e) {
                if(!isAuto) { 
                    alert("تأكد من اتصالك بالإنترنت"); 
                    btn.disabled = false; 
                    btnText.innerText = "دخول المنظومة"; 
                }
            }
        }

        async function submitNewRegistration() {
            const phone = document.getElementById('mainPhone').value.trim();
            const name = document.getElementById('resName').value.trim();
            const area = document.getElementById('resArea').value;
            const mapLink = document.getElementById('resMapLink').value.trim();
            const btn = document.getElementById('regBtn');

            if (!name || !area) return alert("يرجى إدخال اسم المطعم والمنطقة");

            btn.disabled = true;
            btn.innerText = "جاري إرسال الطلب...";

            const payload = {
                action: "register_user",
                type: "Restaurant",
                name: name,
                phone: phone,
                address: `${area} | ${mapLink}`,
                fee: "1000", // عمولة افتراضية
                lat: "35.467", lng: "44.392"
            };

            try {
                const response = await fetch(scriptURL, { method: 'POST', body: JSON.stringify(payload) });
                const result = await response.json();
                
                if (result.status === "success") {
                    localStorage.setItem('whale_res_phone', phone);
                    showStep('step-wait');
                    startAutoCheck();
                }
            } catch (e) { 
                alert("حدث خطأ أثناء التسجيل، حاول مرة أخرى"); 
                btn.disabled = false; 
                btn.innerText = "إرسال طلب الانضمام";
            }
        }

        function showStep(stepId) {
            document.getElementById('step-auth').classList.add('hidden');
            document.getElementById('step-register').classList.add('hidden');
            document.getElementById('step-wait').classList.add('hidden');
            document.getElementById(stepId).classList.remove('hidden');
        }

        function startAutoCheck() {
            if (!checkInterval) checkInterval = setInterval(() => handleLogin(true), 10000);
        }

        function logout() {
            clearInterval(checkInterval);
            localStorage.clear();
            location.reload();
        }
    </script>
</body>
</html>
