<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تسجيل المطاعم | رادار الحوت 🐋</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --whale-emerald: #10b981; --whale-navy: #020617; }
        body { font-family: 'Tajawal', sans-serif; background: #010409; color: white; overflow-x: hidden; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .radar-grid { position: fixed; inset: 0; background-image: linear-gradient(rgba(16, 185, 129, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(16, 185, 129, 0.03) 1px, transparent 1px); background-size: 30px 30px; z-index: -1; }
        .glass-card { background: rgba(13, 17, 23, 0.85); backdrop-filter: blur(25px); border: 1px solid rgba(16, 185, 129, 0.2); box-shadow: 0 0 50px rgba(16, 185, 129, 0.1); }
        .whale-input { width: 100%; padding: 1.1rem 3.5rem 1.1rem 1.1rem; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(16, 185, 129, 0.2); border-radius: 1.2rem; color: white; outline: none; transition: 0.3s; font-weight: bold; }
        .whale-input:focus { border-color: var(--whale-emerald); background: rgba(16, 185, 129, 0.05); }
        .action-btn { background: var(--whale-emerald); color: #020617; font-weight: 900; clip-path: polygon(4% 0, 100% 0, 96% 100%, 0% 100%); transition: 0.3s; cursor: pointer; }
        .location-btn { background: rgba(16, 185, 129, 0.1); color: var(--whale-emerald); border: 1px dashed var(--whale-emerald); padding: 12px; border-radius: 1.2rem; transition: 0.3s; width: 100%; font-weight: bold; }
        .location-btn.success { background: var(--whale-emerald); color: black; border-style: solid; box-shadow: 0 0 20px rgba(16, 185, 129, 0.4); }
        .hidden { display: none; }
        label { display: block; text-align: right; font-size: 11px; color: #10b981; font-weight: 900; margin-bottom: 5px; margin-right: 5px; }
    </style>
</head>
<body class="p-6">

    <div class="radar-grid"></div>

    <div class="max-w-md w-full glass-card p-8 rounded-[2.5rem] relative z-10">
        
        <div id="loader" class="text-center py-12">
            <div class="w-14 h-14 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin mx-auto mb-6"></div>
            <p class="text-[10px] text-emerald-500 font-black italic uppercase tracking-[0.2em]">Authenticating Kitchen...</p>
        </div>

        <div id="authUI" class="hidden">
            <header class="text-center mb-6">
                <h2 class="text-2xl font-black tracking-widest uppercase italic" style="font-family: 'Orbitron', sans-serif;">
                    WHALE <span class="text-emerald-500">KITCHEN</span>
                </h2>
                <p class="text-[10px] text-gray-400 mt-1 font-bold italic opacity-60">مركز تسجيل مطاعم كركوك</p>
            </header>

            <form id="smartForm" class="space-y-4">
                
                <div>
                    <label>اسم المطعم (الرسمي)</label>
                    <div class="relative">
                        <i class="fas fa-store absolute right-4 top-1/2 -translate-y-1/2 text-emerald-500"></i>
                        <input type="text" id="resName" required placeholder="مثال: مطعم البركة" class="whale-input text-right">
                    </div>
                </div>

                <div>
                    <label>رقم هاتف التواصل</label>
                    <div class="relative">
                        <i class="fas fa-phone absolute right-4 top-1/2 -translate-y-1/2 text-emerald-500"></i>
                        <input type="tel" id="resPhone" required placeholder="07XXXXXXXXX" class="whale-input text-right">
                    </div>
                </div>

                <div>
                    <label>العنوان (كتابةً)</label>
                    <div class="relative">
                        <i class="fas fa-map-marker-alt absolute right-4 top-1/2 -translate-y-1/2 text-emerald-500"></i>
                        <input type="text" id="resAddress" required placeholder="مثلاً: كركوك - حي الواسطي" class="whale-input text-right">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label>العمولة الثابتة</label>
                        <input type="number" id="fixedFee" required placeholder="مثلاً: 2000" class="whale-input text-center p-2">
                    </div>
                    <div>
                        <label>نظام الدفع</label>
                        <select id="commType" class="whale-input bg-slate-900 text-[10px] px-1">
                            <option value="restaurant">المطعم يدفع</option>
                            <option value="split">مناصفة (مطعم+سائق)</option>
                        </select>
                    </div>
                </div>

                <div class="pt-2">
                    <label>تثبيت الموقع (GPS)</label>
                    <button type="button" onclick="getLocation()" id="locBtn" class="location-btn flex items-center justify-center gap-2">
                        <i class="fas fa-crosshairs"></i>
                        <span id="locStatus">اضغط لتحديد الموقع بدقة</span>
                    </button>
                    <input type="hidden" id="resCoords" value="">
                </div>

                <button type="submit" id="mainBtn" class="w-full py-5 action-btn mt-4 flex items-center justify-center gap-3 italic shadow-xl">
                    <span id="btnText">إرسال طلب الانضمام</span>
                    <i class="fas fa-paper-plane"></i>
                </button>
            </form>
        </div>

        <div id="waitMessage" class="hidden text-center py-12">
            <div class="text-6xl mb-6 animate-bounce">⏳</div>
            <h3 class="text-xl font-black text-amber-500 italic uppercase">بانتظار موافقة طه</h3>
            <p class="text-[10px] text-slate-400 mt-6 leading-relaxed italic">يتم الآن مراجعة بيانات مطعمك.<br>ستتمكن من الدخول فور تفعيل حسابك.</p>
            <button onclick="logout()" class="mt-10 text-[9px] text-red-500 font-black uppercase border-b border-red-500/30">إلغاء وتغيير البيانات</button>
        </div>

        <div id="banMessage" class="hidden text-center py-12">
            <div class="text-6xl mb-6">🚫</div>
            <h3 class="text-xl font-black text-red-500 italic uppercase">الحساب محظور</h3>
            <p class="text-[10px] text-slate-400 mt-6 leading-relaxed italic">نأسف، لقد تم تقييد وصول هذا المطعم.<br>يرجى التواصل مع الإدارة.</p>
            <button onclick="logout()" class="mt-8 text-[9px] text-gray-500">العودة</button>
        </div>

    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbyuXWjqrDVJEFUeNbj2WL78NomEzigv_ewkQ9O0NEc7ZIedHqo8qaTbIUe45FkbHyHMzw/exec';

        window.onload = async () => {
            const savedName = localStorage.getItem('whale_res_name');
            if (savedName) {
                try {
                    const res = await fetch(`${scriptURL}?action=login_check&type=Restaurant&id=${encodeURIComponent(savedName)}`);
                    const result = await res.json();
                    handleStatus(result, savedName);
                } catch (e) { showUI('authUI'); }
            } else { showUI('authUI'); }
        };

        function getLocation() {
            const locBtn = document.getElementById('locBtn');
            const locStatus = document.getElementById('locStatus');
            if (navigator.geolocation) {
                locStatus.innerText = "جاري الاتصال بالأقمار... 🛰️";
                navigator.geolocation.getCurrentPosition((pos) => {
                    document.getElementById('resCoords').value = `${pos.coords.latitude},${pos.coords.longitude}`;
                    locBtn.classList.add('success');
                    locStatus.innerText = "تم تثبيت الموقع بنجاح ✅";
                }, () => {
                    alert("يرجى تفعيل الـ GPS.");
                    locStatus.innerText = "فشل التحديد - حاول مجدداً";
                });
            }
        }

        function handleStatus(result, name) {
            document.getElementById('loader').classList.add('hidden');
            if (result.status === 'active') {
                localStorage.setItem('whale_res_name', name);
                window.location.href = 'restaurant.html'; 
            } else if (result.status === 'pending') {
                showUI('waitMessage');
            } else if (result.status === 'banned') {
                showUI('banMessage');
            } else { showUI('authUI'); }
        }

        function showUI(id) {
            document.getElementById('loader').classList.add('hidden');
            document.querySelectorAll('.max-w-md > div').forEach(div => div.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        document.getElementById('smartForm').onsubmit = async function(e) {
            e.preventDefault();
            const btn = document.getElementById('mainBtn');
            const data = {
                name: document.getElementById('resName').value,
                phone: document.getElementById('resPhone').value,
                address: document.getElementById('resAddress').value,
                fee: document.getElementById('fixedFee').value,
                commType: document.getElementById('commType').value,
                coords: document.getElementById('resCoords').value
            };

            if (!data.coords) return alert("يجب تثبيت الموقع الجغرافي للمطعم أولاً.");

            btn.disabled = true;
            document.getElementById('btnText').innerText = "جاري إرسال البيانات... 🚀";

            try {
                const url = `${scriptURL}?action=login_check&type=Restaurant&register=true&name=${encodeURIComponent(data.name)}&phone=${data.phone}&address=${encodeURIComponent(data.address)}&fee=${data.fee}&commType=${data.commType}&coords=${data.coords}&id=${encodeURIComponent(data.name)}`;
                const response = await fetch(url);
                const result = await response.json();
                handleStatus(result, data.name);
            } catch (e) {
                alert("حدث خطأ في الاتصال.");
                btn.disabled = false;
            }
        };

        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
