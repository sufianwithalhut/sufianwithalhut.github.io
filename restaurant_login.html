<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>بوابة المطاعم | رادار الحوت 🐋</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --whale-emerald: #10b981; --whale-navy: #020617; }
        body { font-family: 'Tajawal', sans-serif; background: #010409; color: white; overflow-x: hidden; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .radar-grid { position: fixed; inset: 0; background-image: linear-gradient(rgba(16, 185, 129, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(16, 185, 129, 0.03) 1px, transparent 1px); background-size: 30px 30px; z-index: -1; }
        .glass-card { background: rgba(13, 17, 23, 0.85); backdrop-filter: blur(25px); border: 1px solid rgba(16, 185, 129, 0.2); box-shadow: 0 0 50px rgba(16, 185, 129, 0.1); }
        .whale-input { width: 100%; padding: 1.1rem 3.5rem 1.1rem 1.1rem; background: rgba(0, 0, 0, 0.6); border: 1px solid rgba(255,255,255,0.08); border-radius: 1.2rem; color: white; outline: none; transition: 0.3s; }
        .whale-input:focus { border-color: var(--whale-emerald); box-shadow: 0 0 15px rgba(16, 185, 129, 0.1); }
        .action-btn { background: var(--whale-emerald); color: #020617; font-weight: 900; clip-path: polygon(4% 0, 100% 0, 96% 100%, 0% 100%); transition: 0.3s; cursor: pointer; }
        .action-btn:active { transform: scale(0.95); }
        .action-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .hidden { display: none; }
    </style>
</head>
<body class="p-6">

    <div class="radar-grid"></div>

    <div class="max-w-md w-full glass-card p-10 rounded-[2.5rem] relative z-10">
        
        <div id="loader" class="text-center py-12">
            <div class="w-14 h-14 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin mx-auto mb-6"></div>
            <p class="text-[10px] text-emerald-500 font-black italic uppercase tracking-[0.2em]">Linking Kitchen Radar...</p>
        </div>

        <div id="authUI" class="hidden">
            <header class="text-center mb-10">
                <div class="inline-block p-4 rounded-3xl bg-emerald-500/10 border border-emerald-500/20 mb-4">
                    <span class="text-4xl text-emerald-500"><i class="fas fa-utensils"></i></span>
                </div>
                <h2 class="text-2xl font-black tracking-widest uppercase italic" style="font-family: 'Orbitron', sans-serif;">
                    WHALE <span class="text-emerald-500">KITCHEN</span>
                </h2>
                <p class="text-[10px] text-gray-400 mt-2 font-bold italic opacity-60">مركز إدارة الطلبات - كركوك</p>
            </header>

            <form id="smartForm" class="space-y-4 text-center">
                <div class="relative">
                    <i class="fas fa-store absolute right-4 top-1/2 -translate-y-1/2 text-emerald-500"></i>
                    <input type="text" id="resName" required placeholder="اسم المطعم" 
                           class="whale-input text-center font-black tracking-tight text-lg">
                </div>

                <div id="regFields" class="hidden space-y-4 pt-2">
                    <div class="relative">
                        <i class="fas fa-phone absolute right-4 top-1/2 -translate-y-1/2 text-emerald-500"></i>
                        <input type="tel" id="resPhone" placeholder="رقم الهاتف للتفعيل" 
                               class="whale-input text-center font-bold">
                    </div>
                </div>

                <button type="submit" id="mainBtn" class="w-full py-5 action-btn mt-6 flex items-center justify-center gap-3 italic shadow-xl shadow-emerald-500/10">
                    <span id="btnText">تفعيل الرادار</span>
                    <i class="fas fa-satellite-dish"></i>
                </button>
            </form>
        </div>

        <div id="waitMessage" class="hidden text-center py-12">
            <div class="text-6xl mb-6 animate-bounce">⏳</div>
            <h3 class="text-xl font-black text-amber-500 italic uppercase">بانتظار الموافقة</h3>
            <p class="text-[10px] text-slate-400 mt-6 leading-relaxed italic">طلب انضمام مطعمك قيد المراجعة في غرفة العمليات.<br>سيتم التفعيل من قبل الإدارة فوراً.</p>
            <button onclick="logout()" class="mt-10 text-[9px] text-red-500 font-black uppercase border-b border-red-500/30 pb-1">تغيير البيانات / إعادة المحاولة</button>
        </div>

        <div id="banMessage" class="hidden text-center py-12">
            <div class="text-6xl mb-6">🚫</div>
            <h3 class="text-xl font-black text-red-500 italic uppercase">تم تقييد الوصول</h3>
            <p class="text-[10px] text-slate-400 mt-6 leading-relaxed italic">نأسف، لقد تم حظر هذا الحساب من قبل الإدارة.<br>يرجى التواصل مع طه للمراجعة.</p>
            <button onclick="logout()" class="mt-8 text-[9px] text-gray-500">العودة للرئيسية</button>
        </div>

    </div>

    <script>
        // رابط السكريبت الجديد الخاص بك
        const scriptURL = 'https://script.google.com/macros/s/AKfycbwka4X5EuWllid1JLzvrXvGoYpcMdnEFID7gwrk4TPiHpudxhCWKB7OPT1rvSxeU6YfbA/exec';

        window.onload = async () => {
            const savedName = localStorage.getItem('whale_res_name');
            const savedPhone = localStorage.getItem('whale_res_phone');

            if (savedName) {
                // محاولة التحقق التلقائي من الحالة عند فتح التطبيق
                try {
                    const response = await fetch(`${scriptURL}?action=restaurant_login&id=${encodeURIComponent(savedName)}&phone=${savedPhone || ''}`);
                    const result = await response.json();
                    handleStatus(result, savedName, savedPhone);
                } catch (e) {
                    showUI('authUI'); // في حال فشل الاتصال نظهر واجهة الدخول
                }
            } else {
                showUI('authUI');
            }
        };

        async function handleStatus(result, name, phone) {
            document.getElementById('loader').classList.add('hidden');
            if (result.status === 'active') {
                localStorage.setItem('whale_res_name', name);
                localStorage.setItem('whale_res_phone', phone);
                window.location.href = 'restaurant.html'; 
            } else if (result.status === 'pending') {
                showUI('waitMessage');
            } else if (result.status === 'banned') {
                showUI('banMessage');
            } else {
                showUI('authUI');
            }
        }

        function showUI(id) {
            document.getElementById('loader').classList.add('hidden');
            document.getElementById('authUI').classList.add('hidden');
            document.getElementById('waitMessage').classList.add('hidden');
            document.getElementById('banMessage').classList.add('hidden');
            document.getElementById(id).classList.remove('hidden');
        }

        document.getElementById('smartForm').onsubmit = async function(e) {
            e.preventDefault();
            const name = document.getElementById('resName').value;
            const phone = document.getElementById('resPhone').value;
            const btn = document.getElementById('mainBtn');
            const btnText = document.getElementById('btnText');
            const regFields = document.getElementById('regFields');
            
            btn.disabled = true;
            btnText.innerText = "جاري الاتصال بالرادار... 📡";

            try {
                const response = await fetch(`${scriptURL}?action=restaurant_login&id=${encodeURIComponent(name)}&phone=${phone}&name=${encodeURIComponent(name)}`);
                const result = await response.json();

                if (result.status === 'not_found' && !regFields.classList.contains('hidden')) {
                     // هذا يعني أنه أدخل الهاتف بالفعل والنتيجة لا تزال غير موجودة (خطأ ما)
                     alert("حدث خطأ في التسجيل، يرجى المحاولة مرة أخرى.");
                     btn.disabled = false;
                } else if (result.status === 'not_found') {
                    // أول مرة يحاول الدخول: نطلب الهاتف للتسجيل
                    regFields.classList.remove('hidden');
                    document.getElementById('resPhone').required = true;
                    btn.disabled = false;
                    btnText.innerText = "ارسال طلب انضمام";
                    alert("المطعم غير مسجل. يرجى إدخال رقم الهاتف لتقديم طلبك للإدارة.");
                } else {
                    handleStatus(result, name, phone);
                }
            } catch (e) {
                alert("فشل الاتصال بالخادم. تحقق من جودة الإنترنت.");
                btn.disabled = false;
                btnText.innerText = "إعادة المحاولة";
            }
        };

        function logout() {
            localStorage.clear();
            location.reload();
        }
    </script>
</body>
</html>
