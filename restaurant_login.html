<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تسجيل المطاعم | رادار الحوت 🐋</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --whale-emerald: #10b981; --whale-navy: #020617; }
        body { font-family: 'Tajawal', sans-serif; background: #010409; color: white; overflow-x: hidden; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .radar-grid { position: fixed; inset: 0; background-image: linear-gradient(rgba(16, 185, 129, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(16, 185, 129, 0.03) 1px, transparent 1px); background-size: 30px 30px; z-index: -1; }
        .glass-card { background: rgba(13, 17, 23, 0.85); backdrop-filter: blur(25px); border: 1px solid rgba(16, 185, 129, 0.2); box-shadow: 0 0 50px rgba(16, 185, 129, 0.1); }
        .whale-input { width: 100%; padding: 1.1rem 3.5rem 1.1rem 1.1rem; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(16, 185, 129, 0.2); border-radius: 1.2rem; color: white; outline: none; transition: 0.3s; font-weight: bold; font-size: 0.85rem; }
        .whale-input:focus { border-color: var(--whale-emerald); background: rgba(16, 185, 129, 0.05); }
        .action-btn { background: var(--whale-emerald); color: #020617; font-weight: 900; clip-path: polygon(4% 0, 100% 0, 96% 100%, 0% 100%); transition: 0.3s; cursor: pointer; }
        label { display: block; text-align: right; font-size: 10px; color: #10b981; font-weight: 900; margin-bottom: 5px; margin-right: 5px; text-transform: uppercase; }
    </style>
</head>
<body class="p-6">

    <div class="radar-grid"></div>

    <div class="max-w-md w-full glass-card p-8 rounded-[2.5rem] relative z-10">
        
        <div id="loader" class="text-center py-12">
            <div class="w-14 h-14 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin mx-auto mb-6"></div>
            <p class="text-[10px] text-emerald-500 font-black italic uppercase tracking-[0.2em]">Authenticating Kitchen...</p>
        </div>

        <div id="authUI" class="hidden">
            <header class="text-center mb-6">
                <h2 class="text-2xl font-black tracking-widest uppercase italic orbitron">
                    WHALE <span class="text-emerald-500">KITCHEN</span>
                </h2>
                <p class="text-[10px] text-gray-400 mt-1 font-bold italic opacity-60">مركز انضمام شركاء الحوت</p>
            </header>

            <form id="smartForm" class="space-y-4">
                <div>
                    <label>اسم المطعم</label>
                    <div class="relative">
                        <i class="fas fa-store absolute right-4 top-1/2 -translate-y-1/2 text-emerald-500"></i>
                        <input type="text" id="resName" required placeholder="مثال: مطعم القلعة" class="whale-input text-right">
                    </div>
                </div>

                <div>
                    <label>رقم هاتف المدير (سيكون هويتك للدخول)</label>
                    <div class="relative">
                        <i class="fas fa-phone absolute right-4 top-1/2 -translate-y-1/2 text-emerald-500"></i>
                        <input type="tel" id="resPhone" required placeholder="07XXXXXXXXX" class="whale-input text-right">
                    </div>
                </div>

                <div>
                    <label>رابط الموقع من Google Maps</label>
                    <div class="relative">
                        <i class="fas fa-link absolute right-4 top-1/2 -translate-y-1/2 text-emerald-500"></i>
                        <input type="url" id="resMapLink" required placeholder="انصق رابط موقع المطعم هنا..." class="whale-input text-right">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label>العمولة الثابتة</label>
                        <input type="number" id="fixedFee" required placeholder="2000" class="whale-input text-center p-2">
                    </div>
                    <div>
                        <label>نظام الدفع</label>
                        <select id="paySystem" class="whale-input bg-slate-900 text-[10px] px-1">
                            <option value="المطعم يدفع">المطعم يدفع</option>
                            <option value="مناصفة">مناصفة</option>
                        </select>
                    </div>
                </div>

                <button type="submit" id="mainBtn" class="w-full py-5 action-btn mt-4 flex items-center justify-center gap-3 italic shadow-xl">
                    <span id="btnText">إرسال طلب الانضمام</span>
                    <i class="fas fa-paper-plane"></i>
                </button>
            </form>
        </div>

        <div id="waitMessage" class="hidden text-center py-12">
            <div class="text-6xl mb-6 animate-bounce">⏳</div>
            <h3 class="text-xl font-black text-amber-500 italic uppercase">بانتظار تفعيل السيادة</h3>
            <p class="text-[10px] text-slate-400 mt-6 leading-relaxed italic">طلبك الآن على طاولة الإدارة في كركوك.<br>بمجرد الموافقة، ستفتح لك قمرة قيادة المطعم.</p>
            <button onclick="logout()" class="mt-10 text-[9px] text-red-500 font-black uppercase border-b border-red-500/30">إعادة إدخال البيانات</button>
        </div>

        <div id="banMessage" class="hidden text-center py-12">
            <div class="text-6xl mb-6">🚫</div>
            <h3 class="text-xl font-black text-red-500 italic uppercase">وصول مقيد</h3>
            <p class="text-[10px] text-slate-400 mt-6 leading-relaxed italic">تم استبعاد هذا المطعم من منظومة الحوت.</p>
            <button onclick="logout()" class="mt-8 text-[9px] text-gray-500">خروج</button>
        </div>

    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbz-Rgnwclf9OJz2uJuBhD4PqDkY9XI0KCnSDhq1bRI558bxT5YLTTozkpZHky20oX9g/exec';

        window.onload = async () => {
            const savedPhone = localStorage.getItem('whale_res_phone');
            if (savedPhone) {
                try {
                    const res = await fetch(`${scriptURL}?action=login_check&type=Restaurant&id=${encodeURIComponent(savedPhone)}`);
                    const result = await res.json();
                    handleStatus(result, savedPhone);
                } catch (e) { showUI('authUI'); }
            } else { showUI('authUI'); }
        };

        function handleStatus(result, phone) {
            document.getElementById('loader').classList.add('hidden');
            if (result.status === 'active') {
                localStorage.setItem('whale_res_phone', phone);
                // حفظ البيانات الأساسية لاستخدامها في إرسال الطلبات
                if (result.data) {
                    localStorage.setItem('whale_res_name', result.data[1]);
                    localStorage.setItem('whale_res_map', result.data[3]); // حفظ الرابط في الذاكرة
                }
                window.location.href = 'restaurant.html'; 
            } else if (result.status === 'pending') {
                showUI('waitMessage');
            } else if (result.status === 'banned') {
                showUI('banMessage');
            } else { 
                showUI('authUI'); 
            }
        }

        function showUI(id) {
            document.getElementById('loader').classList.add('hidden');
            document.getElementById('authUI').classList.add('hidden');
            document.getElementById('waitMessage').classList.add('hidden');
            document.getElementById('banMessage').classList.add('hidden');
            document.getElementById(id).classList.remove('hidden');
        }

        document.getElementById('smartForm').onsubmit = async function(e) {
            e.preventDefault();
            const btn = document.getElementById('mainBtn');
            const resPhone = document.getElementById('resPhone').value;
            const resMapLink = document.getElementById('resMapLink').value;

            const data = {
                action: "register_user",
                type: "Restaurant",
                name: document.getElementById('resName').value,
                phone: resPhone,
                address: resMapLink, // نرسل الرابط هنا ليتم تخزينه في عمود العنوان/الموقع
                fee: document.getElementById('fixedFee').value,
                paySystem: document.getElementById('paySystem').value
            };

            btn.disabled = true;
            document.getElementById('btnText').innerText = "جاري إرسال البيانات... 🛰️";

            try {
                // حفظ البيانات مؤقتاً
                localStorage.setItem('whale_res_phone', resPhone);
                localStorage.setItem('whale_res_map', resMapLink);

                await fetch(scriptURL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(data)
                });
                
                setTimeout(() => showUI('waitMessage'), 1000);
            } catch (e) {
                showUI('waitMessage');
            }
        };

        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
